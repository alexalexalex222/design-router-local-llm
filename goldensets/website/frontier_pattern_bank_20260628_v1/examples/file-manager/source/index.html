<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Aperture Files — a calm, modern file manager</title>
<meta name="color-scheme" content="light" />
<style>
/* ============================================================= TOKENS */
:root{
  --font-ui: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;

  /* neutral ramp (cool) */
  --n-0:#ffffff; --n-25:#fbfcfe; --n-50:#f5f7fa; --n-100:#eef1f6; --n-150:#e5e9f0;
  --n-200:#d9dee7; --n-300:#c2c9d4; --n-400:#98a1b0; --n-500:#6c7585; --n-600:#4c5563;
  --n-700:#343b46; --n-800:#222831; --n-900:#141920;

  --accent:#3b6ef6; --accent-strong:#2c57d6; --accent-soft:#e9effe; --accent-ring:rgba(59,110,246,.4);
  --danger:#e0444a; --danger-soft:#fdecec;

  /* semantic */
  --bg: var(--n-50);
  --surface: var(--n-0);
  --sidebar: rgba(243,246,250,.82);
  --text: var(--n-800);
  --text-muted: var(--n-500);
  --text-faint: var(--n-400);
  --border: var(--n-150);
  --border-strong: var(--n-200);
  --selected: var(--accent);
  --selected-soft: var(--accent-soft);
  --hover: var(--n-100);

  /* kind tints */
  --k-folder:#4f8cf0; --k-image:#16a39b; --k-video:#a456d6; --k-audio:#e0689a;
  --k-pdf:#e0444a; --k-doc:#5b86e5; --k-sheet:#27a567; --k-code:#d4892a;
  --k-archive:#8a8f9c; --k-app:#7a6ff0; --k-generic:#98a1b0;

  /* spacing 4px scale */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px;
  --r-xs:4px; --r-sm:6px; --r-md:9px; --r-lg:13px; --r-xl:18px;

  --e-1: 0 1px 2px rgba(20,25,32,.06), 0 1px 1px rgba(20,25,32,.04);
  --e-2: 0 6px 16px -4px rgba(20,25,32,.14), 0 2px 6px -2px rgba(20,25,32,.08);
  --e-3: 0 18px 48px -12px rgba(20,25,32,.30), 0 4px 12px -4px rgba(20,25,32,.14);

  --dur-1:120ms; --dur-2:190ms; --dur-3:260ms;
  --ease: cubic-bezier(.22,.61,.27,1);

  --row-h: 30px;
  --type-ui: 13.5px;
}

@media (prefers-color-scheme: dark){
  /* light-committed surface; honor reduced-motion below. Dark left intentionally minimal. */
}

*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0; font-family:var(--font-ui); color:var(--text); background:var(--bg);
  font-size:16px; line-height:1.45; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow:hidden;
}
button{ font-family:inherit; }
:focus{ outline:none; }
:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:var(--r-sm); }

.skip{
  position:absolute; left:-999px; top:8px; z-index:200; background:var(--accent); color:#fff;
  padding:8px 14px; border-radius:var(--r-sm); font-size:13px; font-weight:600;
}
.skip:focus{ left:8px; }

.sr-only{ position:absolute; width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0; }

/* ============================================================= APP SHELL */
.app{
  display:grid; height:100dvh;
  grid-template-columns: var(--tree-w, 248px) 1fr var(--details-w, 0px);
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "toolbar toolbar toolbar"
    "sidebar content details"
    "status  status  status";
  transition: grid-template-columns var(--dur-3) var(--ease);
}
.app.details-open{ --details-w: 280px; }

/* ---- toolbar ---- */
.toolbar{
  grid-area:toolbar; display:flex; align-items:center; gap:var(--sp-2);
  padding:0 var(--sp-3); height:52px; background:var(--surface);
  border-bottom:1px solid var(--border); position:relative; z-index:30; overflow:hidden;
}
.tb-group{ display:flex; align-items:center; gap:2px; }
.icon-btn{
  display:inline-flex; align-items:center; justify-content:center;
  width:32px; height:32px; min-width:32px; border:none; border-radius:var(--r-sm);
  background:transparent; color:var(--text-muted); cursor:pointer;
  transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
}
.icon-btn:hover{ background:var(--hover); color:var(--text); }
.icon-btn:active{ transform:scale(.92); }
.icon-btn[aria-pressed="true"], .icon-btn.active{ background:var(--accent-soft); color:var(--accent-strong); }
.icon-btn:disabled{ color:var(--n-300); cursor:default; }
.icon-btn:disabled:hover{ background:transparent; }
.icon-btn svg{ width:18px; height:18px; }

.seg{ display:flex; background:var(--n-100); border-radius:var(--r-md); padding:2px; gap:2px; }
.seg .icon-btn{ width:30px; height:28px; border-radius:var(--r-sm); }
.seg .icon-btn[aria-pressed="true"]{ background:var(--surface); color:var(--accent-strong); box-shadow:var(--e-1); }

/* breadcrumb */
.crumbs{
  display:flex; align-items:center; gap:1px; min-width:0; flex:0 1 auto;
  font-size:var(--type-ui); overflow:hidden;
}
.crumb{
  display:inline-flex; align-items:center; gap:6px; max-width:200px; padding:5px 8px;
  border:none; background:transparent; color:var(--text-muted); cursor:pointer; border-radius:var(--r-sm);
  font-size:var(--type-ui); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
}
.crumb:hover{ background:var(--hover); color:var(--text); }
.crumb.current{ color:var(--text); font-weight:650; cursor:default; }
.crumb.current:hover{ background:transparent; }
.crumb svg{ width:15px; height:15px; flex:none; color:var(--k-folder); }
.crumb-sep{ color:var(--n-300); flex:none; display:inline-flex; }
.crumb-sep svg{ width:14px;height:14px; }
.crumb.drop-target{ background:var(--accent-soft); box-shadow:inset 0 0 0 1.5px var(--accent); color:var(--accent-strong); }

.spacer{ flex:1 1 auto; min-width:8px; }

/* search */
.search{
  display:flex; align-items:center; gap:6px; background:var(--n-100); border:1px solid transparent;
  border-radius:var(--r-md); padding:0 8px 0 10px; height:32px; width:190px; max-width:34vw;
  transition: border-color var(--dur-1) var(--ease), background var(--dur-1) var(--ease), box-shadow var(--dur-1) var(--ease);
}
.search:focus-within{ background:var(--surface); border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }
.search svg{ width:15px; height:15px; color:var(--text-faint); flex:none; }
.search input{
  border:none; background:transparent; outline:none; width:100%; font-size:var(--type-ui); color:var(--text);
}
.search input::placeholder{ color:var(--text-faint); }
.search .clear-x{ display:none; }
.search.has-value .clear-x{ display:inline-flex; }

/* ---- sidebar tree ---- */
.sidebar{
  grid-area:sidebar; background:var(--sidebar); backdrop-filter:saturate(1.4) blur(14px);
  -webkit-backdrop-filter:saturate(1.4) blur(14px);
  border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:0;
  z-index:25;
}
.sidebar-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--sp-4) var(--sp-3) var(--sp-2);
}
.sidebar-head h2{
  margin:0; font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text-faint);
}
.sample-badge{
  font-size:10px; font-weight:700; letter-spacing:.03em; color:var(--accent-strong);
  background:var(--accent-soft); padding:2px 7px; border-radius:999px; text-transform:uppercase;
}
.tree-scroll{ flex:1; overflow-y:auto; overflow-x:hidden; padding:0 var(--sp-2) var(--sp-3); }

[role="tree"]{ display:flex; flex-direction:column; gap:1px; }
.tnode{
  display:flex; align-items:center; gap:6px; height:var(--row-h); padding:0 6px; border-radius:var(--r-sm);
  cursor:pointer; color:var(--text); font-size:var(--type-ui); user-select:none; position:relative;
  transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
}
.tnode:hover{ background:var(--hover); }
.tnode.current{ background:var(--accent); color:#fff; }
.tnode.current .tnode-name{ font-weight:600; }
.tnode.current svg{ color:#fff !important; }
.tnode.drop-target{ box-shadow:inset 0 0 0 2px var(--accent); background:var(--accent-soft); }
.tnode .twist{
  width:18px; height:18px; min-width:18px; display:inline-flex; align-items:center; justify-content:center;
  border-radius:var(--r-xs); color:var(--text-faint); transition: transform var(--dur-2) var(--ease), background var(--dur-1) var(--ease);
}
.tnode .twist:hover{ background:rgba(0,0,0,.06); }
.tnode.current .twist{ color:rgba(255,255,255,.85); }
.tnode[aria-expanded="true"] > .twist{ transform:rotate(90deg); }
.tnode .twist.leaf{ visibility:hidden; }
.tnode .ficon{ width:17px; height:17px; min-width:17px; color:var(--k-folder); display:inline-flex; }
.tnode-name{
  flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tnode .count{ font-size:11px; color:var(--text-faint); font-variant-numeric:tabular-nums; }
.tnode.current .count{ color:rgba(255,255,255,.7); }

/* ---- content ---- */
.content{ grid-area:content; background:var(--surface); min-height:0; display:flex; flex-direction:column; position:relative; z-index:10; }
.content-head{
  display:flex; align-items:center; justify-content:space-between; gap:var(--sp-3);
  padding:var(--sp-3) var(--sp-4) var(--sp-2); border-bottom:1px solid var(--border);
}
.content-title{ display:flex; align-items:baseline; gap:10px; min-width:0; }
.content-title h1{ margin:0; font-size:18px; font-weight:680; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.content-title .sub{ font-size:12px; color:var(--text-faint); white-space:nowrap; }
.sort-wrap{ position:relative; }
.sort-btn{
  display:inline-flex; align-items:center; gap:6px; height:30px; padding:0 10px; border:1px solid var(--border-strong);
  background:var(--surface); border-radius:var(--r-md); color:var(--text-muted); font-size:12.5px; font-weight:550; cursor:pointer;
  transition: background var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
}
.sort-btn:hover{ background:var(--hover); color:var(--text); border-color:var(--n-300); }
.sort-btn svg{ width:14px; height:14px; }

.files-scroll{ flex:1; overflow-y:auto; overflow-x:hidden; padding:var(--sp-2) var(--sp-3) 80px; position:relative; }
.files-scroll:focus-visible{ outline:none; box-shadow:inset 0 0 0 2px var(--accent-ring); }

/* list view: column header */
.list-cols{
  display:grid; grid-template-columns: 1fr 96px 132px 90px; gap:var(--sp-3); align-items:center;
  padding:6px var(--sp-3) 8px; position:sticky; top:0; background:var(--surface); z-index:2;
  border-bottom:1px solid var(--border);
}
.list-cols button{
  border:none; background:none; cursor:pointer; font-size:11px; font-weight:700; letter-spacing:.04em;
  text-transform:uppercase; color:var(--text-faint); display:inline-flex; align-items:center; gap:4px; padding:2px 0;
}
.list-cols button:hover{ color:var(--text-muted); }
.list-cols button.active{ color:var(--accent-strong); }
.list-cols button .caret{ width:11px; height:11px; opacity:0; transition:opacity var(--dur-1), transform var(--dur-1); }
.list-cols button.active .caret{ opacity:1; }
.list-cols button.desc .caret{ transform:rotate(180deg); }
.list-cols .col-r{ justify-content:flex-end; text-align:right; }
.view-grid .list-cols{ display:none; }

[role="listbox"]{ outline:none; }
.view-list [role="listbox"]{ display:flex; flex-direction:column; }

/* list row */
.frow{
  display:grid; grid-template-columns: 1fr 96px 132px 90px; gap:var(--sp-3); align-items:center;
  height:var(--row-h); padding:0 var(--sp-3); border-radius:var(--r-sm); cursor:default; user-select:none;
  font-size:var(--type-ui); color:var(--text); position:relative;
}
.view-list .frow:nth-child(even){ background:linear-gradient(0deg, rgba(245,247,250,.55), rgba(245,247,250,.55)); }
.frow:hover{ background:var(--hover); }
.frow.selected{ background:var(--selected-soft); }
.frow.selected:hover{ background:#dde7fd; }
.frow.selected.focus-row{ box-shadow: inset 0 0 0 1.5px var(--accent); }
.frow.cut{ opacity:.45; }
.frow.drop-target{ box-shadow: inset 0 0 0 2px var(--accent); background:var(--accent-soft); }
.frow .name-cell{ display:flex; align-items:center; gap:9px; min-width:0; }
.frow .ficon{ width:18px; height:18px; min-width:18px; display:inline-flex; }
.frow .fname{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.frow .meta{ font-size:12px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
.frow .col-r{ text-align:right; }
.frow .kind-cell{ color:var(--text-muted); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* rename input */
.rename-input{
  font:inherit; font-size:var(--type-ui); border:1px solid var(--accent); border-radius:var(--r-xs);
  padding:1px 5px; margin:-2px 0; width:100%; min-width:60px; background:var(--surface); color:var(--text);
  box-shadow:0 0 0 3px var(--accent-ring); outline:none;
}

/* grid view */
.view-grid [role="listbox"]{
  display:grid; grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
  gap:var(--sp-2); padding-top:var(--sp-2);
}
.view-grid .frow{
  grid-template-columns:none; display:flex; flex-direction:column; align-items:center; gap:8px;
  height:auto; padding:var(--sp-3) var(--sp-2); text-align:center; border-radius:var(--r-md);
}
.view-grid .frow:nth-child(even){ background:none; }
.view-grid .frow:hover{ background:var(--hover); }
.view-grid .frow.selected{ background:var(--selected-soft); }
.view-grid .frow .name-cell{ flex-direction:column; gap:8px; width:100%; }
.view-grid .frow .ficon{ width:46px; height:46px; }
.view-grid .frow .fname{
  white-space:normal; word-break:break-word; line-height:1.3; max-height:2.6em; overflow:hidden; font-size:12.5px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
}
.view-grid .frow .meta, .view-grid .frow .kind-cell, .view-grid .list-cols{ display:none; }

/* ---- details pane ---- */
.details{
  grid-area:details; background:var(--surface); border-left:1px solid var(--border);
  overflow-y:auto; overflow-x:hidden; min-height:0; z-index:15;
}
.app:not(.details-open) .details{ display:none; }
.details-inner{ padding:var(--sp-5) var(--sp-4); display:flex; flex-direction:column; gap:var(--sp-4); }
.details-hero{ display:flex; flex-direction:column; align-items:center; text-align:center; gap:var(--sp-3); padding-top:var(--sp-2); }
.details-hero .big-ficon{ width:84px; height:84px; }
.details-hero .d-name{ font-size:15px; font-weight:640; word-break:break-word; max-width:100%; }
.details-hero .d-kind{ font-size:12px; color:var(--text-faint); }
.preview-thumb{
  width:100%; aspect-ratio:4/3; border-radius:var(--r-md); border:1px solid var(--border);
  overflow:hidden; display:flex; align-items:center; justify-content:center; background:var(--n-50);
}
.preview-thumb svg, .preview-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
.meta-list{ display:flex; flex-direction:column; gap:0; border-top:1px solid var(--border); }
.meta-list .mrow{ display:flex; justify-content:space-between; gap:var(--sp-3); padding:9px 0; border-bottom:1px solid var(--border); font-size:12.5px; }
.meta-list .mrow dt{ color:var(--text-faint); }
.meta-list .mrow dd{ margin:0; color:var(--text); font-variant-numeric:tabular-nums; text-align:right; word-break:break-word; }
.details-empty{ color:var(--text-faint); font-size:13px; text-align:center; padding:48px 16px; }

/* ---- status bar ---- */
.statusbar{
  grid-area:status; height:30px; display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--sp-4); background:var(--sidebar); border-top:1px solid var(--border);
  font-size:11.5px; color:var(--text-muted); font-variant-numeric:tabular-nums; z-index:20;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); gap:var(--sp-3);
}
#statusInfo{ min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.statusbar .reset-link{ flex:none; }
.statusbar .reset-link{ border:none; background:none; color:var(--text-faint); font-size:11.5px; cursor:pointer; padding:2px 6px; border-radius:var(--r-xs); }
.statusbar .reset-link:hover{ color:var(--accent-strong); background:var(--accent-soft); }

/* ---- empty / loading / error states ---- */
.state-pane{
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:var(--sp-3); text-align:center; padding:var(--sp-6); color:var(--text-muted); background:var(--surface);
}
.state-pane .state-ic{ width:54px; height:54px; color:var(--n-300); }
.state-pane h3{ margin:0; font-size:15px; font-weight:620; color:var(--text); }
.state-pane p{ margin:0; font-size:13px; max-width:280px; }
.state-pane .btn{
  margin-top:var(--sp-2); border:1px solid var(--border-strong); background:var(--surface); color:var(--text);
  padding:7px 14px; border-radius:var(--r-md); font-size:13px; font-weight:560; cursor:pointer;
}
.state-pane .btn:hover{ background:var(--hover); }
.state-pane.error .state-ic{ color:var(--danger); }
.state-pane.error h3{ color:var(--danger); }

/* skeleton */
.skeleton{ padding:var(--sp-2) var(--sp-3); display:flex; flex-direction:column; gap:6px; }
.sk-row{ height:var(--row-h); border-radius:var(--r-sm); display:flex; align-items:center; gap:10px; padding:0 12px; }
.sk-dot{ width:18px; height:18px; border-radius:5px; }
.sk-bar{ height:10px; border-radius:5px; }
.shimmer{ background:linear-gradient(90deg, var(--n-100) 25%, var(--n-150) 37%, var(--n-100) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; }
@keyframes shimmer{ 0%{ background-position:100% 0; } 100%{ background-position:-100% 0; } }

/* ---- context menu ---- */
.ctx{
  position:fixed; z-index:120; min-width:206px; background:var(--surface); border:1px solid var(--border-strong);
  border-radius:var(--r-md); box-shadow:var(--e-3); padding:5px; font-size:13px;
  animation: ctxin var(--dur-1) var(--ease);
}
@keyframes ctxin{ from{ opacity:0; transform:scale(.97) translateY(-3px); } to{ opacity:1; transform:none; } }
.ctx-item{
  display:flex; align-items:center; gap:10px; width:100%; padding:7px 10px; border:none; background:none;
  border-radius:var(--r-sm); cursor:pointer; color:var(--text); text-align:left; font-size:13px;
}
.ctx-item:hover:not(:disabled), .ctx-item.active{ background:var(--accent); color:#fff; }
.ctx-item:hover:not(:disabled) svg, .ctx-item.active svg{ color:#fff !important; }
.ctx-item:disabled{ color:var(--n-300); cursor:default; }
.ctx-item svg{ width:16px; height:16px; color:var(--text-faint); flex:none; }
.ctx-item .hint{ margin-left:auto; font-size:11px; color:var(--text-faint); font-variant-numeric:tabular-nums; }
.ctx-item:hover:not(:disabled) .hint, .ctx-item.active .hint{ color:rgba(255,255,255,.75); }
.ctx-item.danger{ color:var(--danger); }
.ctx-item.danger:hover:not(:disabled){ background:var(--danger); color:#fff; }
.ctx-sep{ height:1px; background:var(--border); margin:5px 4px; }

/* ---- quick look overlay ---- */
.ql-backdrop{
  position:fixed; inset:0; z-index:150; background:rgba(20,25,32,.42); backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:var(--sp-6);
  animation: fade var(--dur-2) var(--ease);
}
@keyframes fade{ from{ opacity:0; } to{ opacity:1; } }
.ql{
  background:var(--surface); border-radius:var(--r-xl); box-shadow:var(--e-3); width:min(560px, 100%);
  max-height:86dvh; overflow:hidden; display:flex; flex-direction:column; animation: qlin var(--dur-3) var(--ease);
}
@keyframes qlin{ from{ opacity:0; transform:scale(.94) translateY(8px); } to{ opacity:1; transform:none; } }
.ql-head{ display:flex; align-items:center; gap:10px; padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border); }
.ql-head .ficon{ width:20px; height:20px; }
.ql-head .ql-name{ font-weight:620; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ql-head .ql-close{ margin-left:auto; }
.ql-body{ padding:var(--sp-5); overflow:auto; display:flex; flex-direction:column; gap:var(--sp-4); align-items:center; }
.ql-stage{ width:100%; border-radius:var(--r-md); border:1px solid var(--border); overflow:hidden; background:var(--n-50); }
.ql-stage.img{ aspect-ratio:16/10; }
.ql-stage svg{ width:100%; height:100%; display:block; }
.ql-text{ width:100%; font-family:var(--font-mono); font-size:12.5px; line-height:1.65; color:var(--n-700); background:var(--n-25); border-radius:var(--r-md); border:1px solid var(--border); padding:var(--sp-4); white-space:pre-wrap; max-height:340px; overflow:auto; }
.ql-info{ display:flex; gap:var(--sp-5); flex-wrap:wrap; justify-content:center; font-size:12.5px; color:var(--text-muted); }
.ql-info b{ color:var(--text); font-weight:600; }

/* ---- mobile drawer ---- */
.scrim{ display:none; }
.mobile-only{ display:none; }

@media (max-width: 920px){
  .app{ --details-w:0 !important; grid-template-columns: var(--tree-w,232px) 1fr; grid-template-areas:"toolbar toolbar" "sidebar content" "status status"; }
  .app.details-open .details{ display:none; }
  .details-toggle{ display:none; }
}

@media (max-width: 680px){
  :root{ --type-ui:14.5px; --row-h:44px; }
  .app{ grid-template-columns: 1fr; grid-template-areas:"toolbar" "content" "status"; }
  .sidebar{
    position:fixed; top:0; left:0; bottom:0; width:min(82vw, 300px); z-index:90;
    transform:translateX(-104%); transition: transform var(--dur-3) var(--ease); box-shadow:var(--e-3);
    background:var(--n-25);
  }
  .app.drawer-open .sidebar{ transform:none; }
  .scrim{ display:block; position:fixed; inset:0; background:rgba(20,25,32,.34); z-index:80; opacity:0; pointer-events:none; transition:opacity var(--dur-2) var(--ease); }
  .app.drawer-open .scrim{ opacity:1; pointer-events:auto; }
  .mobile-only{ display:inline-flex; }
  .toolbar > .tb-group:first-of-type{ display:none; } /* hide back/forward on phones (also in context menu) */
  .crumbs{ flex:1 1 0; min-width:0; }
  .crumb{ max-width:110px; }
  .crumb:not(.current){ display:none; } /* show only current location on phones */
  .crumb.current{ display:inline-flex; }
  .crumb-sep{ display:none; }
  .spacer{ display:none; }
  .search{ width:auto; flex:0 1 132px; min-width:40px; }
  .content-title h1{ font-size:16px; }
  .list-cols{ grid-template-columns: 1fr 84px; }
  .list-cols .c-date, .list-cols .c-kind{ display:none; }
  .frow{ grid-template-columns: 1fr 84px; }
  .frow .col-date, .frow .kind-cell{ display:none; }
  .view-grid [role="listbox"]{ grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); }
}
@media (min-width:921px){ .menu-toggle{ display:none; } }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
}

<body>
<a class="skip" href="#content">Skip to files</a>

<div class="app view-list" id="app">
  <!-- TOOLBAR -->
  <header class="toolbar" role="toolbar" aria-label="File manager toolbar">
    <button class="icon-btn menu-toggle mobile-only" id="drawerBtn" aria-label="Show folder tree" aria-expanded="false"></button>
    <div class="tb-group">
      <button class="icon-btn" id="backBtn" aria-label="Back" title="Back"></button>
      <button class="icon-btn" id="fwdBtn" aria-label="Forward" title="Forward"></button>
    </div>
    <nav class="crumbs" id="crumbs" aria-label="Breadcrumb"></nav>
    <span class="spacer"></span>
    <div class="search" id="searchBox" role="search">
      <span aria-hidden="true" id="searchIcon"></span>
      <input id="searchInput" type="search" placeholder="Search" aria-label="Search files in this folder" autocomplete="off" />
      <button class="icon-btn clear-x" id="searchClear" aria-label="Clear search" style="width:22px;height:22px"></button>
    </div>
    <button class="icon-btn" id="newFolderBtn" aria-label="New folder" title="New folder (Cmd/Ctrl+Shift+N)"></button>
    <div class="seg" role="group" aria-label="View">
      <button class="icon-btn" id="viewListBtn" aria-label="List view" aria-pressed="true"></button>
      <button class="icon-btn" id="viewGridBtn" aria-label="Grid view" aria-pressed="false"></button>
    </div>
    <button class="icon-btn details-toggle" id="detailsBtn" aria-label="Toggle details pane" aria-pressed="false" title="Details"></button>
  </header>

  <!-- SIDEBAR / TREE -->
  <aside class="sidebar" aria-label="Folders">
    <div class="sidebar-head">
      <h2>Locations</h2>
      <span class="sample-badge" title="This file system is fictional sample data">Sample</span>
    </div>
    <div class="tree-scroll">
      <div role="tree" id="tree" aria-label="Folder tree"></div>
    </div>
  </aside>

  <!-- CONTENT -->
  <main class="content" id="content" tabindex="-1">
    <div class="content-head">
      <div class="content-title">
        <h1 id="folderTitle">Aperture</h1>
        <span class="sub" id="folderSub"></span>
      </div>
      <div class="sort-wrap">
        <button class="sort-btn" id="sortBtn" aria-haspopup="menu" aria-expanded="false">
          <span id="sortLabel">Name</span>
          <span id="sortBtnCaret" aria-hidden="true"></span>
        </button>
      </div>
    </div>
    <div class="files-scroll" id="filesScroll">
      <div class="list-cols" id="listCols" role="presentation"></div>
      <div role="listbox" id="fileList" aria-label="Files and folders" aria-multiselectable="true" tabindex="0"></div>
    </div>
  </main>

  <!-- DETAILS -->
  <aside class="details" id="details" aria-label="Item details">
    <div class="details-inner" id="detailsInner"></div>
  </aside>

  <!-- STATUS -->
  <footer class="statusbar">
    <span id="statusInfo">—</span>
    <button class="reset-link" id="resetBtn" title="Restore the original sample file system">Reset sample data</button>
  </footer>

  <div class="scrim" id="scrim" aria-hidden="true"></div>
</div>

<div class="sr-only" id="live" role="status" aria-live="polite"></div>

/* ============================================================ STATE */
let fs;
const state = {
  expanded: new Set(),
  current: null,        // folder id shown in content
  selection: new Set(), // ids selected in content
  treeFocus: null,      // treeitem id with roving tabindex

  sortKey: 'name',
  sortDir: 'asc',

/* ---- persistence ---- */
function persist(){
  if(state.errored) return;
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify({
      fs, uid,
      expanded:[...state.expanded], current:state.current, selection:[...state.selection],
      view:state.view, sortKey:state.sortKey, sortDir:state.sortDir, details:state.details
    }));
  }catch(e){ /* quota / private mode: stay in-memory */ }
}
function loadPersisted(){
  let raw=null;
  try{ raw=localStorage.getItem(STORE_KEY); }catch(e){ raw=null; }
  if(!raw){ fs=buildSampleFS(); state.current=fs.id; state.expanded.add(fs.id); state.treeFocus=fs.id; return; }
  let p;
  try{ p=JSON.parse(raw); if(!p||!p.fs||!p.fs.id) throw new Error('bad'); }
  catch(e){ state.errored=true; return; }
  fs=p.fs; uid=p.uid||9999;
  state.expanded=new Set((p.expanded||[]).filter(id=>findNode(id)));
  state.current=(p.current && findNode(p.current) && findNode(p.current).type==='folder')? p.current : fs.id;
  state.selection=new Set((p.selection||[]).filter(id=>findNode(id)));
  state.view=p.view==='grid'?'grid':'list';
  state.sortKey=p.sortKey||'name'; state.sortDir=p.sortDir==='desc'?'desc':'asc';
  state.details=!!p.details;
  state.expanded.add(fs.id);
  state.treeFocus=state.current;
}
function resetSample(){
  try{ localStorage.removeItem(STORE_KEY); }catch(e){}
  fs=buildSampleFS();
  state.errored=false;
  state.expanded=new Set([fs.id]);
  state.current=fs.id; state.selection=new Set(); state.treeFocus=fs.id; state.listFocus=null;
  state.query=''; document.getElementById('searchInput').value=''; document.getElementById('searchBox').classList.remove('has-value');
  state.clipboard=null; state.history=[fs.id]; state.histIndex=0;
  persist(); renderAll(); announce('Sample file system restored.');
}

/* ============================================================ FS HELPERS */
function findNode(id, node){
  node=node||fs; if(node.id===id) return node;
  if(node.children) for(const c of node.children){ const r=findNode(id,c); if(r) return r; }
  return null;
}
function findParent(id, node){
  node=node||fs;
  if(node.children) for(const c of node.children){ if(c.id===id) return node; const r=findParent(id,c); if(r) return r; }
  return null;
}
function pathTo(id){
  const path=[]; let cur=findNode(id);
  while(cur){ path.unshift(cur); cur=findParent(cur.id); }
  return path;
}
function isDescendant(maybeAncestorId, id){
  let p=findParent(id);
  while(p){ if(p.id===maybeAncestorId) return true; p=findParent(p.id); }
  return false;
}
function folderSize(node){
  if(node.type==='file') return node.size||0;
  return (node.children||[]).reduce((s,c)=>s+folderSize(c),0);
}
function subfolders(node){ return (node.children||[]).filter(c=>c.type==='folder'); }
function fmtSize(b){
  if(b===0) return '0 KB';
  if(b<1024) return b+' B';
  const u=['KB','MB','GB','TB']; let i=-1, n=b;
  do{ n/=1024; i++; }while(n>=1024 && i<u.length-1);
  return (n>=10?n.toFixed(0):n.toFixed(1))+' '+u[i];
}
function fmtDate(ts){
  const dd=new Date(ts), now=new Date();
  const sameDay=dd.toDateString()===now.toDateString();
  const t=dd.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  if(sameDay) return 'Today '+t;
  const yest=new Date(now); yest.setDate(now.getDate()-1);
  if(dd.toDateString()===yest.toDateString()) return 'Yesterday '+t;
  return dd.toLocaleDateString([], {month:'short', day:'numeric', year:dd.getFullYear()===now.getFullYear()?undefined:'numeric'});
}
function uniqueName(parent, base){
  const names=new Set((parent.children||[]).map(c=>c.name));
  if(!names.has(base)) return base;
  const m=/^(.*?)(\.[a-z0-9]+)?$/i.exec(base); const stem=m[1], ext=m[2]||'';
  let i=2; while(names.has(stem+' '+i+ext)) i++;
  return stem+' '+i+ext;
}

/* ---- sorting ---- */
function sortedChildren(folder){
  let arr=(folder.children||[]).slice();
  if(state.query){
    const q=state.query.toLowerCase();
    arr=arr.filter(c=>c.name.toLowerCase().includes(q));
  }
  const dir=state.sortDir==='asc'?1:-1;
  arr.sort((a,b)=>{
    if(a.type!==b.type) return a.type==='folder'?-1:1; // folders first always
    let r=0;
    switch(state.sortKey){
      case 'size': r=folderSize(a)-folderSize(b); break;
      case 'date': r=(a.modified||0)-(b.modified||0); break;
      case 'kind': r=(a.type==='folder'?'':KIND_LABEL[a.kind||'generic']).localeCompare(b.type==='folder'?'':KIND_LABEL[b.kind||'generic']); break;
      default: r=0;
    }
    if(r===0) r=a.name.localeCompare(b.name, undefined, {numeric:true, sensitivity:'base'});
    return r*dir;
  });
  return arr;
}

/* ============================================================ MUTATIONS */
function expandAncestors(id){ pathTo(id).forEach(n=>{ if(n.type==='folder') state.expanded.add(n.id); }); }
function navigate(folderId, pushHist){
  if(!findNode(folderId)) return;
  state.current=folderId; state.selection.clear(); state.listFocus=null; state.renaming=null;
  expandAncestors(folderId);
  state.treeFocus=folderId;
  if(pushHist!==false){
    state.history=state.history.slice(0, state.histIndex+1);
    if(state.history[state.histIndex]!==folderId){ state.history.push(folderId); state.histIndex++; }
  }
  closeCtx(); persist(); renderAll();
}
function toggleExpand(id, force){
  const want = force!==undefined? force : !state.expanded.has(id);
  if(want) state.expanded.add(id); else state.expanded.delete(id);
  persist(); renderTree(); renderCrumbs();
}
function moveNodes(ids, targetFolderId){
  const target=findNode(targetFolderId);
  if(!target || target.type!=='folder') return 0;
  let moved=0; const names=[];
  ids.forEach(id=>{
    const node=findNode(id); if(!node) return;
    if(node.id===targetFolderId || isDescendant(node.id, targetFolderId)) return; // no self/cycle
    const parent=findParent(id); if(!parent || parent.id===targetFolderId) return;
    parent.children=parent.children.filter(c=>c.id!==id);
    node.name=uniqueName(target, node.name);
    target.children.push(node); moved++; names.push(node.name);
  });
  if(moved){
    persist(); renderAll();
    announce(moved+(moved>1?' items':' item')+' moved to “'+target.name+'”'+(names.length?': '+names.join(', '):''));
  }
  return moved;
}
function newFolder(){
  const parent=findNode(state.current);
  const name=uniqueName(parent, 'untitled folder');
  const node={ id:nid(), name, type:'folder', children:[], modified:Date.now() };
  parent.children.push(node);
  state.selection=new Set([node.id]); state.listFocus=node.id;
  persist(); renderAll();
  startRename(node.id);
  announce('New folder created.');
}
function duplicateNodes(ids){
  const parent=findNode(state.current); const newIds=[];
  ids.forEach(id=>{
    const node=findNode(id); if(!node) return;
    const clone=deepClone(node);
    const m=/^(.*?)(\.[a-z0-9]+)?$/i.exec(node.name);
    clone.name=uniqueName(parent, m[1]+' copy'+(m[2]||''));
    parent.children.push(clone); newIds.push(clone.id);
  });
  if(newIds.length){ state.selection=new Set(newIds); state.listFocus=newIds[0]; persist(); renderAll(); announce(newIds.length+' item'+(newIds.length>1?'s':'')+' duplicated.'); }
}
function deepClone(node){
  const c={ id:nid(), name:node.name, type:node.type, modified:Date.now() };
  if(node.type==='file'){ c.kind=node.kind; c.size=node.size; }
  else c.children=(node.children||[]).map(deepClone);
  return c;
}
function deleteNodes(ids){
  let n=0;
  ids.forEach(id=>{ const p=findParent(id); if(p){ p.children=p.children.filter(c=>c.id!==id); n++; state.expanded.delete(id); } });
  if(n){ state.selection.clear(); state.listFocus=null; persist(); renderAll(); announce(n+' item'+(n>1?'s':'')+' moved to Trash.'); }
}
function pasteInto(folderId){
  if(!state.clipboard) return;
  const {mode, ids}=state.clipboard;
  if(mode==='cut'){ const m=moveNodes(ids, folderId); if(m){ state.clipboard=null; } }
  else {
    const target=findNode(folderId); const newIds=[];
    ids.forEach(id=>{ const node=findNode(id); if(!node) return; const clone=deepClone(node); clone.name=uniqueName(target, clone.name); target.children.push(clone); newIds.push(clone.id); });
    if(newIds.length){ state.selection=new Set(newIds); persist(); renderAll(); announce(newIds.length+' item'+(newIds.length>1?'s':'')+' pasted.'); }
  }
}

/* ============================================================ RENAME */
function startRename(id){
  if(!findNode(id)) return;
  state.renaming=id; renderTree(); renderContent();
  requestAnimationFrame(()=>{
    const inp=document.querySelector('.rename-input');
    if(inp){ inp.focus(); const dot=inp.value.lastIndexOf('.'); if(dot>0) inp.setSelectionRange(0,dot); else inp.select(); }
  });
}
function commitRename(id, value){
  const node=findNode(id); if(!node){ state.renaming=null; renderAll(); return; }
  const v=(value||'').trim();
  if(v && v!==node.name){
    const parent=findParent(id);
    node.name = parent ? uniqueName(parent, v) : v;
    if(node.type==='file') node.kind=kindOf(node.name);
    node.modified=Date.now();
    announce('Renamed to “'+node.name+'”.');
  }
  state.renaming=null; persist(); renderAll();
}
function cancelRename(){ const id=state.renaming; state.renaming=null; renderTree(); renderContent(); if(id){ const el=document.querySelector('[data-id="'+id+'"]'); if(el) el.focus(); } }

/* ============================================================ RENDER */
const el = id=>document.getElementById(id);
const app = el('app');

function renderAll(){ renderTree(); renderCrumbs(); renderContent(); renderDetails(); renderStatus(); syncToolbar(); }

function syncToolbar(){
  app.classList.toggle('view-grid', state.view==='grid');
  app.classList.toggle('view-list', state.view==='list');
  app.classList.toggle('details-open', state.details);
  el('viewListBtn').setAttribute('aria-pressed', state.view==='list');
  el('viewGridBtn').setAttribute('aria-pressed', state.view==='grid');
  el('detailsBtn').setAttribute('aria-pressed', state.details);
  el('backBtn').disabled = state.histIndex<=0;
  el('fwdBtn').disabled = state.histIndex>=state.history.length-1;
  const SK={name:'Name',size:'Size',kind:'Kind',date:'Date Modified'};
  el('sortLabel').textContent=SK[state.sortKey];
}

/* ---- tree (folders only) ---- */
function renderTree(){
  const root=el('tree'); root.innerHTML='';
  const visible=[];
  (function walk(node, depth){
    visible.push({node, depth});
    if(node.type==='folder' && state.expanded.has(node.id))
      subfolders(node).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).forEach(c=>walk(c, depth+1));
  })(fs, 0);

  if(!visible.find(v=>v.node.id===state.treeFocus)) state.treeFocus=visible[0].node.id;

  visible.forEach(({node, depth})=>{
    const kids=subfolders(node);
    const hasKids=kids.length>0;
    const row=document.createElement('div');
    row.className='tnode'+(state.current===node.id?' current':'');
    row.setAttribute('role','treeitem');
    row.setAttribute('data-id', node.id);
    row.setAttribute('aria-level', depth+1);
    row.setAttribute('aria-selected', state.current===node.id);
    if(hasKids) row.setAttribute('aria-expanded', state.expanded.has(node.id));
    row.tabIndex = (node.id===state.treeFocus)?0:-1;
    row.style.paddingLeft=(6+depth*15)+'px';

    const tw=document.createElement('span');
    tw.className='twist'+(hasKids?'':' leaf'); tw.innerHTML=I.chevR; tw.setAttribute('aria-hidden','true');
    row.appendChild(tw);
    row.insertAdjacentHTML('beforeend', iconFor(node));

    if(state.renaming===node.id){
      const inp=mkRenameInput(node);
      row.appendChild(inp);
    }else{
      const nm=document.createElement('span'); nm.className='tnode-name'; nm.textContent=node.name; row.appendChild(nm);
      if(hasKids){ const c=document.createElement('span'); c.className='count'; c.textContent=kids.length; row.appendChild(c); }
    }

    tw.addEventListener('click', e=>{ e.stopPropagation(); if(hasKids) toggleExpand(node.id); });
    row.addEventListener('click', ()=>{ if(state.renaming) return; navigate(node.id); });
    row.addEventListener('dblclick', e=>{ e.preventDefault(); if(hasKids) toggleExpand(node.id); });
    row.addEventListener('contextmenu', e=>{ e.preventDefault(); navigate(node.id); openCtx(e.clientX, e.clientY, node, 'tree'); });
    // drop target
    row.addEventListener('dragover', e=>{ if(dragData){ e.preventDefault(); e.dataTransfer.dropEffect='move'; row.classList.add('drop-target'); } });
    row.addEventListener('dragleave', ()=> row.classList.remove('drop-target'));
    row.addEventListener('drop', e=>{ e.preventDefault(); row.classList.remove('drop-target'); if(dragData) moveNodes(dragData, node.id); });
    row.addEventListener('keydown', e=>treeKey(e, node, visible));
    root.appendChild(row);
  });
}

function mkRenameInput(node){
  const inp=document.createElement('input');
  inp.className='rename-input'; inp.type='text'; inp.value=node.name; inp.setAttribute('aria-label','Rename '+node.name);
  inp.addEventListener('keydown', e=>{
    e.stopPropagation();
    if(e.key==='Enter'){ e.preventDefault(); commitRename(node.id, inp.value); }
    else if(e.key==='Escape'){ e.preventDefault(); cancelRename(); }
  });
  inp.addEventListener('blur', ()=>{ if(state.renaming===node.id) commitRename(node.id, inp.value); });
  inp.addEventListener('click', e=>e.stopPropagation());
  inp.addEventListener('dblclick', e=>e.stopPropagation());
  return inp;
}

function treeKey(e, node, visible){
  const idx=visible.findIndex(v=>v.node.id===node.id);
  const kids=subfolders(node); const hasKids=kids.length>0; const open=state.expanded.has(node.id);
  let handled=true;
  switch(e.key){
    case 'ArrowDown': moveTreeFocus(visible, idx+1); break;
    case 'ArrowUp': moveTreeFocus(visible, idx-1); break;
    case 'ArrowRight':
      if(hasKids && !open){ toggleExpand(node.id, true); focusTree(node.id); }
      else if(hasKids && open){ moveTreeFocus(visible, idx+1); }
      break;
    case 'ArrowLeft':
      if(hasKids && open){ toggleExpand(node.id, false); focusTree(node.id); }
      else { const p=findParent(node.id); if(p && p.id!==fs.id || (p && p.id===fs.id)) { if(p){ focusTree(p.id); } } }
      break;
    case 'Enter': navigate(node.id); break;
    case 'F2': if(node.id!==fs.id) startRename(node.id); break;
    case 'Home': moveTreeFocus(visible, 0); break;
    case 'End': moveTreeFocus(visible, visible.length-1); break;
    default: handled=false;
  }
  if(handled){ e.preventDefault(); e.stopPropagation(); }
}
function moveTreeFocus(visible, i){
  if(i<0||i>=visible.length) return;
  focusTree(visible[i].node.id);
}
function focusTree(id){
  state.treeFocus=id; renderTree();
  const elx=document.querySelector('#tree [data-id="'+id+'"]'); if(elx){ elx.focus(); elx.scrollIntoView({block:'nearest'}); }
}

/* ---- breadcrumb ---- */
function renderCrumbs(){
  const c=el('crumbs'); c.innerHTML='';
  const path=pathTo(state.current);
  path.forEach((node, i)=>{
    if(i>0){ const s=document.createElement('span'); s.className='crumb-sep'; s.innerHTML=I.chevR; s.setAttribute('aria-hidden','true'); c.appendChild(s); }
    const b=document.createElement('button');
    b.className='crumb'+(i===path.length-1?' current':'');
    b.type='button'; b.setAttribute('data-id', node.id);
    if(i===path.length-1) b.setAttribute('aria-current','page');
    b.innerHTML=(i===0?iconFor(node):'')+'<span>'+escapeHtml(node.name)+'</span>';
    b.addEventListener('click', ()=>{ if(i!==path.length-1) navigate(node.id); });
    // breadcrumb as drop target
    b.addEventListener('dragover', e=>{ if(dragData){ e.preventDefault(); b.classList.add('drop-target'); } });
    b.addEventListener('dragleave', ()=> b.classList.remove('drop-target'));
    b.addEventListener('drop', e=>{ e.preventDefault(); b.classList.remove('drop-target'); if(dragData) moveNodes(dragData, node.id); });
    c.appendChild(b);
  });
}

/* ---- content ---- */
function renderContent(){
  const scroll=el('filesScroll'); const list=el('fileList'); const cols=el('listCols');
  const folder=findNode(state.current);
  el('folderTitle').textContent=folder.name;

  // states
  scroll.querySelectorAll('.state-pane').forEach(n=>n.remove());
  if(state.loading){ cols.style.display='none'; list.innerHTML=''; list.appendChild(skeleton()); el('folderSub').textContent=''; return; }
  cols.style.display='';

  renderListCols();
  const items=sortedChildren(folder);
  el('folderSub').textContent = describeFolder(folder, items.length);

  list.innerHTML='';
  if(items.length===0){
    const pane=document.createElement('div'); pane.className='state-pane';
    if(state.query){
      pane.innerHTML='<span class="state-ic">'+I.search+'</span><h3>No matches</h3><p>Nothing in “'+escapeHtml(folder.name)+'” matches “'+escapeHtml(state.query)+'”.</p><button class="btn" id="clrSearch">Clear search</button>';
      scroll.appendChild(pane); el('clrSearch').addEventListener('click', clearSearch);
    }else{
      pane.innerHTML='<span class="state-ic">'+I.empty+'</span><h3>This folder is empty</h3><p>Drag files here, or create a new folder to get started.</p><button class="btn" id="emptyNew">New Folder</button>';
      scroll.appendChild(pane); el('emptyNew').addEventListener('click', newFolder);
    }
    return;
  }

  if(state.listFocus && !items.find(it=>it.id===state.listFocus)) state.listFocus=null;

  items.forEach(node=>{
    const row=document.createElement('div');
    const sel=state.selection.has(node.id);
    row.className='frow'+(sel?' selected':'')+(state.listFocus===node.id?' focus-row':'')+(isCut(node.id)?' cut':'');
    row.setAttribute('role','option'); row.setAttribute('data-id', node.id);
    row.setAttribute('aria-selected', sel);
    row.tabIndex=-1;
    row.draggable = state.renaming!==node.id;

    const nameCell=document.createElement('div'); nameCell.className='name-cell';
    nameCell.insertAdjacentHTML('beforeend', iconFor(node));
    if(state.renaming===node.id){ nameCell.appendChild(mkRenameInput(node)); }
    else { const nm=document.createElement('span'); nm.className='fname'; nm.textContent=node.name; nameCell.appendChild(nm); }
    row.appendChild(nameCell);

    const sizeCell=document.createElement('div'); sizeCell.className='meta col-r'; sizeCell.textContent = node.type==='folder'? itemCount(node) : fmtSize(node.size); row.appendChild(sizeCell);
    const dateCell=document.createElement('div'); dateCell.className='meta col-date'; dateCell.textContent=fmtDate(node.modified); row.appendChild(dateCell);
    const kindCell=document.createElement('div'); kindCell.className='kind-cell'; kindCell.textContent = node.type==='folder'?'Folder':KIND_LABEL[node.kind||'generic']; row.appendChild(kindCell);

    wireRow(row, node, items);
    list.appendChild(row);
  });
}
function describeFolder(folder, shown){
  const all=(folder.children||[]); const total=all.length;
  const base=total+(total===1?' item':' items');
  const size=fmtSize(folderSize(folder));
  if(state.query) return shown+' of '+base+' shown · '+size;
  return base+' · '+size;
}
function renderListCols(){
  const cols=el('listCols');
  const defs=[['name','Name',''],['size','Size','col-r c-size'],['date','Date Modified','c-date'],['kind','Kind','c-kind']];
  cols.innerHTML='';
  defs.forEach(([key,label,cls])=>{
    const b=document.createElement('button'); b.type='button';
    b.className=(cls||'')+(state.sortKey===key?' active':'')+(state.sortKey===key&&state.sortDir==='desc'?' desc':'');
    b.innerHTML=escapeHtml(label)+(key!=='name'?'':'')+'<span class="caret" aria-hidden="true">'+I.caret+'</span>';
    b.addEventListener('click', ()=>setSort(key));
    cols.appendChild(b);
  });
}
function skeleton(){
  const wrap=document.createElement('div'); wrap.className='skeleton';
  const widths=[60,42,72,38,55,48,66,40];
  widths.forEach(w=>{ const r=document.createElement('div'); r.className='sk-row'; r.innerHTML='<span class="sk-dot shimmer"></span><span class="sk-bar shimmer" style="width:'+w+'%"></span>'; wrap.appendChild(r); });
  return wrap;
}

function wireRow(row, node, items){
  row.addEventListener('click', e=>{ if(state.renaming) return; selectClick(node, items, e); });
  row.addEventListener('dblclick', e=>{ if(state.renaming) return; e.preventDefault(); openNode(node); });
  row.addEventListener('contextmenu', e=>{
    e.preventDefault();
    if(!state.selection.has(node.id)){ state.selection=new Set([node.id]); state.listFocus=node.id; renderContent(); renderDetails(); renderStatus(); }
    openCtx(e.clientX, e.clientY, node, 'content');
  });
  row.addEventListener('dragstart', e=>{
    if(!state.selection.has(node.id)){ state.selection=new Set([node.id]); state.listFocus=node.id; renderContent(); }
    dragData=[...state.selection];
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain', dragData.join(','));
  });
  row.addEventListener('dragend', ()=>{ dragData=null; document.querySelectorAll('.drop-target').forEach(n=>n.classList.remove('drop-target')); });
  if(node.type==='folder'){
    row.addEventListener('dragover', e=>{ if(dragData && !dragData.includes(node.id)){ e.preventDefault(); e.dataTransfer.dropEffect='move'; row.classList.add('drop-target'); } });
    row.addEventListener('dragleave', ()=> row.classList.remove('drop-target'));
    row.addEventListener('drop', e=>{ e.preventDefault(); row.classList.remove('drop-target'); if(dragData) moveNodes(dragData, node.id); });
  }
}
function selectClick(node, items, e){
  const ids=items.map(it=>it.id);
  if(e.shiftKey && state.listFocus){
    const a=ids.indexOf(state.listFocus), b=ids.indexOf(node.id);
    const [lo,hi]=a<b?[a,b]:[b,a];
    state.selection=new Set(ids.slice(lo,hi+1));
  }else if(e.metaKey||e.ctrlKey){
    if(state.selection.has(node.id)) state.selection.delete(node.id); else state.selection.add(node.id);
    state.listFocus=node.id;
  }else{
    state.selection=new Set([node.id]); state.listFocus=node.id;
  }
  persist(); renderContent(); renderDetails(); renderStatus();
  el('fileList').focus({preventScroll:true});
}
function openNode(node){
  if(node.type==='folder') navigate(node.id);
  else openQuickLook(node);
}

/* ---- content keyboard nav ---- */
function contentKey(e){
  if(state.renaming) return;
  const folder=findNode(state.current); const items=sortedChildren(folder);
  if(!items.length) return;
  const ids=items.map(it=>it.id);
  let idx = state.listFocus? ids.indexOf(state.listFocus) : -1;
  const cols = state.view==='grid'? gridColumns() : 1;
  let handled=true;
  switch(e.key){
    case 'ArrowDown': idx = idx<0?0:Math.min(ids.length-1, idx+cols); setListFocus(ids[idx], e); break;
    case 'ArrowUp': idx = idx<0?0:Math.max(0, idx-cols); setListFocus(ids[idx], e); break;
    case 'ArrowRight': if(state.view==='grid'){ idx=idx<0?0:Math.min(ids.length-1, idx+1); setListFocus(ids[idx], e);} else handled=false; break;
    case 'ArrowLeft': if(state.view==='grid'){ idx=idx<0?0:Math.max(0, idx-1); setListFocus(ids[idx], e);} else handled=false; break;
    case 'Home': setListFocus(ids[0], e); break;
    case 'End': setListFocus(ids[ids.length-1], e); break;
    case 'Enter': if(state.listFocus) startRename(state.listFocus); break;
    case ' ': if(state.listFocus){ const n=findNode(state.listFocus); if(n.type==='file') openQuickLook(n); else navigate(n.id); } break;
    case 'F2': if(state.listFocus) startRename(state.listFocus); break;
    case 'Backspace': if(state.selection.size){ deleteNodes([...state.selection]); } break;
    case 'a': if(e.metaKey||e.ctrlKey){ state.selection=new Set(ids); state.listFocus=ids[ids.length-1]; renderContent(); renderDetails(); renderStatus(); } else handled=false; break;
    case 'Escape': if(state.selection.size){ state.selection.clear(); renderContent(); renderDetails(); renderStatus(); } else handled=false; break;
    default: handled=false;
  }
  if(handled){ e.preventDefault(); }
}
function setListFocus(id, e){
  state.listFocus=id;
  if(e && (e.shiftKey)){ state.selection.add(id); }
  else { state.selection=new Set([id]); }
  persist(); renderContent(); renderDetails(); renderStatus();
  const r=document.querySelector('#fileList [data-id="'+id+'"]'); if(r) r.scrollIntoView({block:'nearest'});
}
function gridColumns(){
  const list=el('fileList');
  const style=getComputedStyle(list);
  if(style.display!=='grid') return 1;
  return style.gridTemplateColumns.split(' ').length || 1;
}

/* ---- details ---- */
function renderDetails(){
  if(!state.details) return;
  const inner=el('detailsInner');
  const sel=[...state.selection];
  if(sel.length===0){ inner.innerHTML='<div class="details-empty">Select an item to see its details.</div>'; return; }
  if(sel.length>1){
    const nodes=sel.map(findNode).filter(Boolean);
    const total=nodes.reduce((s,n)=>s+folderSize(n),0);
    inner.innerHTML='<div class="details-hero"><span class="big-ficon ficon" style="color:var(--k-generic)">'+fileGlyph('generic')+'</span><div class="d-name">'+sel.length+' items selected</div><div class="d-kind">'+fmtSize(total)+' total</div></div>';
    return;
  }
  const node=findNode(sel[0]); if(!node){ inner.innerHTML=''; return; }
  let preview='';
  if(node.type==='file' && node.kind==='image') preview='<div class="preview-thumb">'+imgPreview(node)+'</div>';
  const rows=[
    ['Kind', node.type==='folder'?'Folder':KIND_LABEL[node.kind||'generic']],
    ['Size', fmtSize(folderSize(node))],
    node.type==='folder'?['Contains', itemCount(node)]:null,
    ['Modified', new Date(node.modified).toLocaleString([], {dateStyle:'medium', timeStyle:'short'})],
    ['Where', pathTo(node.id).slice(0,-1).map(n=>n.name).join(' / ')||'—']
  ].filter(Boolean);
  inner.innerHTML=
    '<div class="details-hero">'+bigIconFor(node)+'<div class="d-name">'+escapeHtml(node.name)+'</div><div class="d-kind">'+(node.type==='folder'?'Folder':KIND_LABEL[node.kind||'generic'])+'</div></div>'
    +preview
    +'<dl class="meta-list">'+rows.map(([k,v])=>'<div class="mrow"><dt>'+k+'</dt><dd>'+escapeHtml(String(v))+'</dd></div>').join('')+'</dl>';
}
function imgPreview(node){
  // deterministic sample gradient thumbnail derived from the name (labeled sample, not a real photo)
  const h=hashHue(node.name);
  return '<svg viewBox="0 0 120 90" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Sample preview"><defs><linearGradient id="g'+node.id+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="hsl('+h+',70%,62%)"/><stop offset="1" stop-color="hsl('+((h+50)%360)+',68%,48%)"/></linearGradient></defs><rect width="120" height="90" fill="url(#g'+node.id+')"/><circle cx="34" cy="30" r="11" fill="rgba(255,255,255,.85)"/><path d="M8 78l30-26 18 14 20-20 36 30z" fill="rgba(0,0,0,.22)"/></svg>';
}
function hashHue(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))%360; return h; }

/* ---- status ---- */
function renderStatus(){
  const folder=findNode(state.current);
  const items=(folder.children||[]);
  const sel=[...state.selection].map(findNode).filter(Boolean);
  let txt;
  if(sel.length===1){ const n=sel[0]; txt='“'+n.name+'” — '+ (n.type==='folder'? itemCount(n)+', ' : '') + fmtSize(folderSize(n)); }
  else if(sel.length>1){ txt=sel.length+' of '+items.length+' selected — '+fmtSize(sel.reduce((s,n)=>s+folderSize(n),0)); }
  else { txt=items.length+(items.length===1?' item':' items')+' · '+fmtSize(folderSize(folder))+' total'; }
  if(state.clipboard) txt+= ' · '+state.clipboard.ids.length+' on clipboard';
  el('statusInfo').textContent=txt;
}

/* ============================================================ CONTEXT MENU */
let ctxEl=null;
function closeCtx(){ if(ctxEl){ ctxEl.remove(); ctxEl=null; document.removeEventListener('keydown', ctxKey, true); } }
function openCtx(x, y, node, where){
  closeCtx();
  const menu=document.createElement('div'); menu.className='ctx'; menu.setAttribute('role','menu');
  const selCount=state.selection.size;
  const isFolder=node && node.type==='folder';
  const items=[];
  if(node){
    items.push({label: isFolder?'Open':'Quick Look', icon:isFolder?I.open:I.ql, act:()=>openNode(node)});
    items.push({label:'Rename', icon:I.rename, hint:'F2', act:()=>startRename(node.id), disabled: node.id===fs.id});
    items.push({label:'Duplicate', icon:I.dup, hint:'⌘D', act:()=>duplicateNodes(selCount>1?[...state.selection]:[node.id]), disabled: node.id===fs.id});
    items.push({sep:true});
    items.push({label:'Cut', icon:I.cut, hint:'⌘X', act:()=>{ state.clipboard={mode:'cut', ids:selCount>1?[...state.selection]:[node.id]}; renderContent(); renderStatus(); announce('Cut '+state.clipboard.ids.length+' item(s).'); }, disabled: node.id===fs.id});
    items.push({label:'Copy', icon:I.copy, hint:'⌘C', act:()=>{ state.clipboard={mode:'copy', ids:selCount>1?[...state.selection]:[node.id]}; renderStatus(); announce('Copied '+state.clipboard.ids.length+' item(s).'); }, disabled: node.id===fs.id});
    items.push({label:'Paste Into', icon:I.paste, act:()=>pasteInto(isFolder?node.id:state.current), disabled:!state.clipboard});
    items.push({sep:true});
    items.push({label:'Move to Trash', icon:I.trash, danger:true, hint:'⌫', act:()=>deleteNodes(selCount>1?[...state.selection]:[node.id]), disabled: node.id===fs.id});
  }else{
    items.push({label:'New Folder', icon:I.newFolder, hint:'⇧⌘N', act:newFolder});
    items.push({label:'Paste', icon:I.paste, act:()=>pasteInto(state.current), disabled:!state.clipboard});
  }
  items.forEach(it=>{
    if(it.sep){ const s=document.createElement('div'); s.className='ctx-sep'; menu.appendChild(s); return; }
    const b=document.createElement('button'); b.className='ctx-item'+(it.danger?' danger':''); b.setAttribute('role','menuitem'); b.tabIndex=-1;
    b.innerHTML=(it.icon||'')+'<span>'+escapeHtml(it.label)+'</span>'+(it.hint?'<span class="hint">'+it.hint+'</span>':'');
    b.disabled=!!it.disabled;
    b.addEventListener('click', ()=>{ closeCtx(); it.act && it.act(); });
    menu.appendChild(b);
  });
  document.body.appendChild(menu);
  // clamp to viewport
  const r=menu.getBoundingClientRect();
  let px=x, py=y;
  if(px+r.width>innerWidth-8) px=innerWidth-r.width-8;
  if(py+r.height>innerHeight-8) py=Math.max(8, y-r.height);
  menu.style.left=Math.max(8,px)+'px'; menu.style.top=Math.max(8,py)+'px';
  ctxEl=menu;
  document.addEventListener('keydown', ctxKey, true);
  requestAnimationFrame(()=>{ const first=menu.querySelector('.ctx-item:not(:disabled)'); if(first) first.focus(); });
}
function ctxKey(e){
  if(!ctxEl) return;
  const opts=[...ctxEl.querySelectorAll('.ctx-item:not(:disabled)')];
  const i=opts.indexOf(document.activeElement);
  if(e.key==='Escape'){ e.preventDefault(); closeCtx(); }
  else if(e.key==='ArrowDown'){ e.preventDefault(); (opts[i+1]||opts[0]).focus(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); (opts[i-1]||opts[opts.length-1]).focus(); }
  else if(e.key==='Enter'||e.key===' '){ e.preventDefault(); if(document.activeElement.classList.contains('ctx-item')) document.activeElement.click(); }
}
document.addEventListener('pointerdown', e=>{ if(ctxEl && !ctxEl.contains(e.target)) closeCtx(); }, true);
window.addEventListener('scroll', closeCtx, true);
window.addEventListener('resize', closeCtx);

/* ============================================================ QUICK LOOK */
let qlEl=null, qlPrevFocus=null;
function openQuickLook(node){
  closeQuickLook();
  qlPrevFocus=document.activeElement;
  const back=document.createElement('div'); back.className='ql-backdrop'; back.setAttribute('role','dialog'); back.setAttribute('aria-modal','true'); back.setAttribute('aria-label','Quick Look: '+node.name);
  let stage='';
  const k=node.kind||'generic';
  if(k==='image'){ stage='<div class="ql-stage img">'+imgPreview(node)+'</div>'; }
  else if(k==='code'||k==='doc'||k==='sheet'){ stage='<pre class="ql-text">'+escapeHtml(sampleText(node))+'</pre>'; }
  else { stage='<div class="ql-stage" style="aspect-ratio:16/10;display:flex;align-items:center;justify-content:center">'+'<span style="width:84px;height:84px;display:inline-flex;color:var('+KIND_COLOR[k]+')">'+fileGlyph(k)+'</span></div>'; }
  back.innerHTML=
    '<div class="ql"><div class="ql-head">'+iconFor(node)+'<span class="ql-name">'+escapeHtml(node.name)+'</span>'
    +'<button class="icon-btn ql-close" aria-label="Close Quick Look">'+I.x+'</button></div>'
    +'<div class="ql-body">'+stage
    +'<div class="ql-info"><span><b>'+KIND_LABEL[k]+'</b></span><span>'+fmtSize(node.size)+'</span><span>'+fmtDate(node.modified)+'</span></div>'
    +'<div style="font-size:11px;color:var(--text-faint)">Sample preview — generated from labeled sample data</div>'
    +'</div></div>';
  document.body.appendChild(back); qlEl=back;
  back.querySelector('.ql-close').addEventListener('click', closeQuickLook);
  back.addEventListener('pointerdown', e=>{ if(e.target===back) closeQuickLook(); });
  document.addEventListener('keydown', qlKey, true);
  requestAnimationFrame(()=>back.querySelector('.ql-close').focus());
}
function closeQuickLook(){ if(qlEl){ qlEl.remove(); qlEl=null; document.removeEventListener('keydown', qlKey, true); if(qlPrevFocus&&qlPrevFocus.focus) qlPrevFocus.focus(); } }
function qlKey(e){ if(e.key==='Escape'||e.key===' '){ e.preventDefault(); closeQuickLook(); } else if(e.key==='Tab'){ e.preventDefault(); } }
function sampleText(node){
  if(node.kind==='code') return '// '+node.name+'  —  sample source (fictional)\n\nexport function render(ctx){\n  const tokens = loadTokens();\n  for (const node of ctx.tree) {\n    paint(node, tokens);\n  }\n  return ctx.flush();\n}\n';
  if(node.kind==='sheet') return 'Item,Qty,Unit,Total\nDesign,12,140,1680\nBuild,40,160,6400\nQA,8,120,960\nTotal,,,9040\n\n(sample spreadsheet data)';
  return '# '+node.name.replace(/\.[a-z]+$/,'')+'\n\nThis is sample document content used to demonstrate Quick Look.\nNo real file data is stored — the virtual file system is labeled sample data.\n';
}

/* ============================================================ HELPERS */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function itemCount(node){ const n=(node.children||[]).length; return n+(n===1?' item':' items'); }
function isCut(id){ return state.clipboard && state.clipboard.mode==='cut' && state.clipboard.ids.includes(id); }
function announce(msg){ el('live').textContent=''; requestAnimationFrame(()=>{ el('live').textContent=msg; }); }
function setSort(key){
  if(state.sortKey===key) state.sortDir = state.sortDir==='asc'?'desc':'asc';
  else { state.sortKey=key; state.sortDir = key==='date'?'desc':'asc'; }
  persist(); renderContent(); syncToolbar();
}
function setView(v){ state.view=v; persist(); syncToolbar(); renderContent(); }
function clearSearch(){ state.query=''; el('searchInput').value=''; el('searchBox').classList.remove('has-value'); renderContent(); }

let dragData=null;

/* ============================================================ TOOLBAR WIRING */
function initIcons(){
  el('drawerBtn').innerHTML=I.menu; el('backBtn').innerHTML=I.back; el('fwdBtn').innerHTML=I.fwd;
  el('searchIcon').innerHTML=I.search; el('searchClear').innerHTML=I.x; el('newFolderBtn').innerHTML=I.newFolder;
  el('viewListBtn').innerHTML=I.list; el('viewGridBtn').innerHTML=I.grid; el('detailsBtn').innerHTML=I.info;
  el('sortBtnCaret').innerHTML=I.caret;
}
function wireToolbar(){
  el('backBtn').addEventListener('click', ()=>{ if(state.histIndex>0){ state.histIndex--; navigate(state.history[state.histIndex], false); } });
  el('fwdBtn').addEventListener('click', ()=>{ if(state.histIndex<state.history.length-1){ state.histIndex++; navigate(state.history[state.histIndex], false); } });
  el('viewListBtn').addEventListener('click', ()=>setView('list'));
  el('viewGridBtn').addEventListener('click', ()=>setView('grid'));
  el('newFolderBtn').addEventListener('click', newFolder);
  el('detailsBtn').addEventListener('click', ()=>{ state.details=!state.details; persist(); syncToolbar(); renderDetails(); });
  el('resetBtn').addEventListener('click', resetSample);

  const si=el('searchInput'), sb=el('searchBox');
  si.addEventListener('input', ()=>{ state.query=si.value.trim(); sb.classList.toggle('has-value', si.value.length>0); renderContent(); });
  si.addEventListener('keydown', e=>{ if(e.key==='Escape'){ clearSearch(); si.blur(); } });
  el('searchClear').addEventListener('click', ()=>{ clearSearch(); si.focus(); });

  // sort menu
  el('sortBtn').addEventListener('click', e=>{
    e.stopPropagation();
    const r=el('sortBtn').getBoundingClientRect();
    openSortMenu(r.left, r.bottom+4);
  });

  // mobile drawer
  el('drawerBtn').addEventListener('click', ()=>{ const open=app.classList.toggle('drawer-open'); el('drawerBtn').setAttribute('aria-expanded', open); });
  el('scrim').addEventListener('click', ()=>{ app.classList.remove('drawer-open'); el('drawerBtn').setAttribute('aria-expanded','false'); });
}
function openSortMenu(x,y){
  closeCtx();
  const menu=document.createElement('div'); menu.className='ctx'; menu.setAttribute('role','menu'); menu.style.minWidth='180px';
  [['name','Name'],['size','Size'],['kind','Kind'],['date','Date Modified']].forEach(([k,label])=>{
    const b=document.createElement('button'); b.className='ctx-item'; b.setAttribute('role','menuitemradio'); b.setAttribute('aria-checked', state.sortKey===k); b.tabIndex=-1;
    b.innerHTML='<span style="width:16px;display:inline-flex">'+(state.sortKey===k?I.caret.replace('M3 4.5L6 7.5l3-3','M3.5 6.5L6 9l4-5'):'')+'</span><span>'+label+'</span>';
    b.addEventListener('click', ()=>{ closeCtx(); if(state.sortKey===k) setSort(k); else { state.sortKey=k; state.sortDir=k==='date'?'desc':'asc'; persist(); renderContent(); syncToolbar(); } el('sortBtn').setAttribute('aria-expanded','false'); });
    menu.appendChild(b);
  });
  const sep=document.createElement('div'); sep.className='ctx-sep'; menu.appendChild(sep);
  const dir=document.createElement('button'); dir.className='ctx-item'; dir.tabIndex=-1; dir.setAttribute('role','menuitem');
  dir.innerHTML='<span style="width:16px"></span><span>'+(state.sortDir==='asc'?'Ascending ↑':'Descending ↓')+'</span>';
  dir.addEventListener('click', ()=>{ closeCtx(); state.sortDir=state.sortDir==='asc'?'desc':'asc'; persist(); renderContent(); syncToolbar(); });
  menu.appendChild(dir);
  document.body.appendChild(menu);
  const r=menu.getBoundingClientRect(); if(x+r.width>innerWidth-8) x=innerWidth-r.width-8;
  menu.style.left=Math.max(8,x)+'px'; menu.style.top=y+'px'; ctxEl=menu;
  el('sortBtn').setAttribute('aria-expanded','true');
  document.addEventListener('keydown', ctxKey, true);
  requestAnimationFrame(()=>{ const f=menu.querySelector('.ctx-item'); if(f) f.focus(); });
}

/* ============================================================ GLOBAL KEYS */
function globalKeys(e){
  const tag=(e.target.tagName||'').toLowerCase();
  const typing = tag==='input' || tag==='textarea' || state.renaming;
  if(typing) return;
  const mod=e.metaKey||e.ctrlKey;
  if(mod && e.key.toLowerCase()==='n' && e.shiftKey){ e.preventDefault(); newFolder(); return; }
  if(mod && e.key.toLowerCase()==='d'){ e.preventDefault(); if(state.selection.size) duplicateNodes([...state.selection]); return; }
  if(mod && e.key.toLowerCase()==='c'){ if(state.selection.size){ state.clipboard={mode:'copy', ids:[...state.selection]}; renderStatus(); announce('Copied.'); } return; }
  if(mod && e.key.toLowerCase()==='x'){ if(state.selection.size){ state.clipboard={mode:'cut', ids:[...state.selection]}; renderContent(); renderStatus(); announce('Cut.'); } return; }
  if(mod && e.key.toLowerCase()==='v'){ pasteInto(state.current); return; }
  if(mod && e.key.toLowerCase()==='f'){ e.preventDefault(); el('searchInput').focus(); return; }
}

/* ============================================================ BOOT */
function boot(){
  initIcons();
  loadPersisted();
  if(state.errored){ renderErrorState(); return; }
  if(!state.history.length){ state.history=[state.current]; state.histIndex=0; }
  wireToolbar();
  el('fileList').addEventListener('keydown', contentKey);
  el('filesScroll').addEventListener('contextmenu', e=>{
    if(e.target.closest('.frow')) return;
    e.preventDefault();
    state.selection.clear(); renderContent(); renderDetails(); renderStatus();
    openCtx(e.clientX, e.clientY, null, 'empty');
  });
  document.addEventListener('keydown', globalKeys);
  renderAll();
  // initial loading shimmer, then reveal (honors reduced-motion via short delay)
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  setTimeout(()=>{ state.loading=false; renderContent(); }, reduce?0:380);
}
function renderErrorState(){
  const scroll=el('filesScroll');
  el('folderTitle').textContent='Couldn’t load';
  const pane=document.createElement('div'); pane.className='state-pane error';
  pane.innerHTML='<span class="state-ic">'+I.errIc+'</span><h3>Saved data couldn’t be read</h3><p>The stored file system appears to be corrupted. You can restore the original sample file system to continue.</p><button class="btn" id="recover">Restore sample data</button>';
  scroll.appendChild(pane);
  el('recover').addEventListener('click', resetSample);
  el('resetBtn').addEventListener('click', resetSample);
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();
})();
</script>
</body>
