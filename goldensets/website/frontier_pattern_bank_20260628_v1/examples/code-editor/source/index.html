    let html = '<span class="crumb">'
      + '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6.5A1.5 1.5 0 0 1 5.5 5h3l1.5 2H18a1.5 1.5 0 0 1 1.5 1.5v8A1.5 1.5 0 0 1 18 18H6a1.5 1.5 0 0 1-1.5-1.5z" stroke="currentColor" stroke-width="1.6"/></svg>src</span>'
      + '<span class="sep">›</span>'
      + '<span class="crumb">' + file.name + '</span>';
    if (sym){
      html += '<span class="sep">›</span><span class="crumb sym">' + esc(sym.name) + '</span>';
    }
    dom.breadcrumb.innerHTML = html;
  }

  /* ============================================================
     COMMAND PALETTE
     ============================================================ */
  let paletteMode = 'command'; // 'command' | 'goto'
  const commands = [
    { id: 'find', title: 'Find in File', sub: 'Search the current file', key: '⌘F', icon: 'search', run: () => { closePalette(); openFind(); } },
    { id: 'goto', title: 'Go to Line…', sub: 'Jump to a line number', key: '⌘G', icon: 'goto', run: () => openGoto() },
    { id: 'wrap', title: 'Toggle Word Wrap', sub: 'Soft-wrap long lines', icon: 'wrap', run: () => { toggleWrap(); closePalette(); } },
    { id: 'minimap', title: 'Toggle Minimap', sub: 'Show or hide the minimap', icon: 'map', run: () => { toggleMinimap(); closePalette(); } },
    { id: 'sidebar', title: 'Toggle Sidebar', sub: 'Show or hide the side panel', key: '⌘B', icon: 'side', run: () => { toggleSidebar(); closePalette(); } },
    { id: 'outline', title: 'Show Symbols / Outline', sub: 'List functions and classes', icon: 'sym', run: () => { setView('symbols'); closePalette(); } },
  ];
  files.forEach((f) => {
    commands.push({ id: 'open:' + f.name, title: 'Open ' + f.name, sub: LANG_LABEL[f.lang] || f.lang, icon: 'file', lang: f.lang, run: () => { switchTo(f.name, true); closePalette(); } });
  });

  function pIcon(name){
    const I = {
      search: '<circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.7"/><path d="m16 16 4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>',
      goto: '<path d="M5 12h11m0 0-4-4m4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>',
      wrap: '<path d="M4 7h16M4 12h13a3 3 0 0 1 0 6h-3m0 0 2-2m-2 2 2 2M4 17h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>',
      map: '<path d="M5 6h9M5 10h6M5 14h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><rect x="17" y="5" width="3" height="14" rx="1" stroke="currentColor" stroke-width="1.4"/>',
      side: '<rect x="3" y="4" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M9 4v16" stroke="currentColor" stroke-width="1.6"/>',
      sym: '<circle cx="7" cy="7" r="2.2" stroke="currentColor" stroke-width="1.6"/><circle cx="17" cy="7" r="2.2" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="17" r="2.2" stroke="currentColor" stroke-width="1.6"/>',
      file: '<path d="M6 3h7l5 5v13H6z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M13 3v5h5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
    };
    return '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">' + (I[name] || I.file) + '</svg>';
  }

  function fuzzy(q, text){
    if (!q) return { ok: true, score: 0, hits: [] };
    q = q.toLowerCase(); const t = text.toLowerCase();
    let qi = 0, score = 0, hits = [], prev = -2;
    for (let i = 0; i < t.length && qi < q.length; i++){
      if (t[i] === q[qi]){
        hits.push(i);
        score += (i === prev + 1) ? 3 : 1;
        if (i === 0 || /[^a-z0-9]/.test(t[i-1])) score += 2;
        prev = i; qi++;
      }
    }
    return qi === q.length ? { ok: true, score, hits } : { ok: false };
  }
  function highlight(text, hits){
    if (!hits || !hits.length) return esc(text);
    let html = '', h = new Set(hits);
    for (let i = 0; i < text.length; i++){
      const ch = esc(text[i]);
      html += h.has(i) ? '<mark>' + ch + '</mark>' : ch;
    }
    return html;
  }

  let paletteItems = [], paletteSel = 0;
  function openPalette(){
    paletteMode = 'command';
    $('#palette-icon').innerHTML = '<path d="m8 9 3 3-3 3M13 15h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="4.5" width="18" height="15" rx="2.5" stroke="currentColor" stroke-width="1.5"/>';
    dom.paletteInput.value = '';
    dom.paletteInput.placeholder = 'Type a command, or search files…';
    dom.paletteOverlay.classList.add('open');
    renderPalette('');
    requestAnimationFrame(() => dom.paletteInput.focus());
  }
  function openGoto(){
    paletteMode = 'goto';
    $('#palette-icon').innerHTML = '<path d="M5 12h11m0 0-4-4m4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>';
    dom.paletteInput.value = '';
    dom.paletteInput.placeholder = 'Go to line (1–' + state.lines.length + ')…';
    dom.paletteOverlay.classList.add('open');
    dom.paletteList.innerHTML = '<div class="palette-empty">Type a line number between <b>1</b> and <b>' + state.lines.length + '</b></div>';
    requestAnimationFrame(() => dom.paletteInput.focus());
  }
  function closePalette(){
    dom.paletteOverlay.classList.remove('open');
    dom.input.focus();
  }
  function renderPalette(q){
    if (paletteMode === 'goto'){ return; }
    const scored = [];
    commands.forEach((c) => {
      const r = fuzzy(q, c.title);
      if (r.ok) scored.push({ c, score: r.score, hits: r.hits });
    });
    scored.sort((a, b) => b.score - a.score);
    paletteItems = scored;
    paletteSel = 0;
    if (!scored.length){
      dom.paletteList.innerHTML = '<div class="palette-empty">No commands match <b>' + esc(q) + '</b></div>';
      return;
    }
    let html = '';
    scored.forEach((s, i) => {
      html += '<li><button class="pcmd" role="option" data-i="' + i + '" aria-selected="' + (i === 0) + '">'
        + '<span class="pi">' + pIcon(s.c.icon) + '</span>'
        + '<span class="pl"><span class="pt">' + highlight(s.c.title, s.hits) + '</span><span class="psub">' + s.c.sub + '</span></span>'
        + (s.c.key ? '<span class="pk">' + s.c.key + '</span>' : '') + '</button></li>';
    });
    dom.paletteList.innerHTML = html;
  }
  function movePalette(dir){
    if (paletteMode === 'goto' || !paletteItems.length) return;
    paletteSel = (paletteSel + dir + paletteItems.length) % paletteItems.length;
    dom.paletteList.querySelectorAll('.pcmd').forEach((el, i) => {
      const on = i === paletteSel; el.setAttribute('aria-selected', String(on));
      if (on) el.scrollIntoView({ block: 'nearest' });
    });
  }
  function runPalette(){
    if (paletteMode === 'goto'){
      const n = parseInt(dom.paletteInput.value, 10);
      if (!isNaN(n)){
        const line = clamp(n - 1, 0, state.lines.length - 1);
        const val = dom.input.value; let off = 0, ln = 0;
        for (let i = 0; i < val.length && ln < line; i++){ if (val.charCodeAt(i) === 10){ ln++; off = i + 1; } }
        dom.input.scrollTop = clamp(line * LH - dom.viewport.clientHeight / 2, 0, dom.input.scrollHeight);
        setCaret(off);
      }
      closePalette(); dom.input.focus(); return;
    }
    const item = paletteItems[paletteSel];
    if (item) item.c.run();
  }

  /* ============================================================
     TOGGLES
     ============================================================ */
  function toggleSidebar(){
    const open = dom.body.dataset.sidebar !== 'closed' && dom.body.dataset.sidebar !== '';
    if (window.matchMedia('(max-width: 880px)').matches){
      dom.body.dataset.sidebar = dom.body.dataset.sidebar === 'open' ? 'closed' : 'open';
    } else {
      dom.body.dataset.sidebar = open ? 'closed' : 'open';
    }
    const isOpen = dom.body.dataset.sidebar === 'open';
    $('#btn-sidebar').setAttribute('aria-pressed', String(isOpen));
    $('#btn-sidebar').classList.toggle('on', isOpen);
    requestAnimationFrame(() => { measureLayout(); schedule({ tokens: true }); });
  }
  function toggleMinimap(){
    const off = dom.body.dataset.minimap === 'off';
    dom.body.dataset.minimap = off ? 'on' : 'off';
    dom.minimap.style.display = off ? '' : 'none';
    $('#btn-minimap').classList.toggle('on', off);
    $('#btn-minimap').setAttribute('aria-pressed', String(off));
    requestAnimationFrame(() => { measureLayout(); schedule({ tokens: true }); });
  }
  function toggleWrap(){
    const wrap = dom.editor.dataset.wrap === 'true';
    dom.editor.dataset.wrap = String(!wrap);
    $('#btn-wrap').setAttribute('aria-pressed', String(!wrap));
    $('#btn-wrap').classList.toggle('on', !wrap);
    requestAnimationFrame(() => schedule({ tokens: true }));
  }

  /* ============================================================
     LAYOUT MEASUREMENT
     ============================================================ */
  let visibleRows = 40;
  function measureLayout(){
    visibleRows = Math.ceil(dom.viewport.clientHeight / LH);
    buildMinimap();
  }

  /* ============================================================
     EDITING HELPERS (Tab indent, auto-pairs lite)
     ============================================================ */
  function handleEditKeys(e){
    const ta = dom.input;
    if (e.key === 'Tab'){
      e.preventDefault();
      const s = ta.selectionStart, en = ta.selectionEnd;
      const val = ta.value;
      if (s !== en && val.slice(s, en).includes('\n')){
        // indent/outdent block
        const lineStart = val.lastIndexOf('\n', s - 1) + 1;
        const block = val.slice(lineStart, en);
        if (e.shiftKey){
          const out = block.replace(/^( {1,2}|\t)/gm, '');
          ta.value = val.slice(0, lineStart) + out + val.slice(en);
          ta.setSelectionRange(lineStart, lineStart + out.length);
        } else {
          const ind = block.replace(/^/gm, '  ');
          ta.value = val.slice(0, lineStart) + ind + val.slice(en);
          ta.setSelectionRange(lineStart, lineStart + ind.length);
        }
      } else {
        insertText('  ');
      }
      onInput();
      return true;
    }
    if (e.key === 'Enter'){
      // auto-indent: copy leading whitespace, add one level after {([
      const s = ta.selectionStart, val = ta.value;
      const lineStart = val.lastIndexOf('\n', s - 1) + 1;
      const cur = val.slice(lineStart, s);
      const indent = (cur.match(/^[ \t]*/) || [''])[0];
      const extra = /[{([]$/.test(cur.trimEnd()) ? '  ' : '';
      e.preventDefault();
      insertText('\n' + indent + extra);
      onInput();
      return true;
    }
    return false;
  }
  function insertText(text){
    const ta = dom.input, s = ta.selectionStart, en = ta.selectionEnd;
    ta.value = ta.value.slice(0, s) + text + ta.value.slice(en);
    const p = s + text.length;
    ta.setSelectionRange(p, p);
  }

  /* ============================================================
     INPUT HANDLER
     ============================================================ */
  function onInput(){
    const file = fileByName(state.active);
    state.lines = dom.input.value.split('\n');
    if (file){
      file.content = dom.input.value;
      if (!file.dirty){ file.dirty = true; markDirty(); }
    }
    updateGutterWidth();
    schedule({ tokens: true });
    updateCaret();
    if (state.find.query) runFind();
    if (state.view === 'symbols'){ clearTimeout(symTimer); symTimer = setTimeout(renderSymbols, 250); }
  }
  function markDirty(){
    renderTabs();
    refreshExplorerDirty();
  }

  /* ============================================================
     EVENT WIRING
     ============================================================ */
  function wire(){
    // textarea
    dom.input.addEventListener('input', onInput);
    dom.input.addEventListener('scroll', () => schedule(), { passive: true });
    dom.input.addEventListener('keydown', (e) => {
      const mod = e.metaKey || e.ctrlKey;
      if (mod && e.key.toLowerCase() === 'f'){ e.preventDefault(); openFind(); return; }
      if (mod && e.key.toLowerCase() === 'g'){ e.preventDefault(); openGoto(); return; }
      if (mod && (e.key === 'k' || (e.shiftKey && e.key.toLowerCase() === 'p'))){ e.preventDefault(); openPalette(); return; }
      if (mod && e.key.toLowerCase() === 'b'){ e.preventDefault(); toggleSidebar(); return; }
      if (e.altKey && e.key.toLowerCase() === 'z'){ e.preventDefault(); toggleWrap(); return; }
      if (e.key === 'Escape'){
        if (dom.find.classList.contains('open')){ e.preventDefault(); closeFind(); return; }
        // escape hatch: move focus to active tab (avoids Tab keyboard trap)
        const t = dom.tabbar.querySelector('.tab[aria-selected="true"]');
        if (t){ e.preventDefault(); t.focus(); }
        return;
      }
      if (handleEditKeys(e)) return;
    });
    ['keyup','click','select','pointerup'].forEach((ev) =>
      dom.input.addEventListener(ev, () => updateCaret()));

    // tabs
    dom.tabbar.addEventListener('click', (e) => {
      const x = e.target.closest('.x');
      const tab = e.target.closest('.tab');
      if (!tab) return;
      if (x){ e.stopPropagation(); closeTab(tab.dataset.name); return; }
      switchTo(tab.dataset.name, true);
    });
    dom.tabbar.addEventListener('keydown', (e) => {
      const tabs = [...dom.tabbar.querySelectorAll('.tab')];
      const i = tabs.indexOf(document.activeElement);
      if (i === -1) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft'){
        e.preventDefault();
        const ni = (i + (e.key === 'ArrowRight' ? 1 : -1) + tabs.length) % tabs.length;
        tabs[ni].focus();
      } else if (e.key === 'Enter' || e.key === ' '){
        e.preventDefault(); switchTo(tabs[i].dataset.name, true);
      } else if (e.key === 'Delete' || e.key === 'Backspace'){
        e.preventDefault(); closeTab(tabs[i].dataset.name);
      }
    });

    // activity bar
    document.querySelectorAll('.act').forEach((a) =>
      a.addEventListener('click', () => setView(a.dataset.view)));

    // sidebar interactions (delegated)
    dom.sideScroll.addEventListener('click', (e) => {
      const tr = e.target.closest('.tree-row');
      if (tr && tr.dataset.name){ switchTo(tr.dataset.name, true); return; }
      const sr = e.target.closest('.sym-row');
      if (sr){
        const line = +sr.dataset.line;
        const val = dom.input.value; let off = 0, ln = 0;
        for (let i = 0; i < val.length && ln < line; i++){ if (val.charCodeAt(i) === 10){ ln++; off = i + 1; } }
        dom.input.scrollTop = clamp(line * LH - dom.viewport.clientHeight / 2, 0, dom.input.scrollHeight);
        setCaret(off); dom.input.focus(); return;
      }
      const tog = e.target.closest('.set-toggle');
      if (tog){
        const act = tog.dataset.action;
        if (act === 'wrap') toggleWrap();
        else if (act === 'minimap') toggleMinimap();
        renderSettings();
      }
    });

    // title bar buttons
    $('#btn-sidebar').addEventListener('click', toggleSidebar);
    $('#btn-minimap').addEventListener('click', toggleMinimap);
    $('#btn-wrap').addEventListener('click', toggleWrap);
    $('#btn-palette').addEventListener('click', openPalette);

    // status bar
    dom.stPos.addEventListener('click', openGoto);
    $('#st-lang').addEventListener('click', openPalette);

    // find widget
    dom.findInput.addEventListener('input', runFind);
    dom.findInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter'){ e.preventDefault(); stepFind(e.shiftKey ? -1 : 1); }
      else if (e.key === 'Escape'){ e.preventDefault(); closeFind(); }
    });
    dom.findPrev.addEventListener('click', () => stepFind(-1));
    dom.findNext.addEventListener('click', () => stepFind(1));
    dom.findClose.addEventListener('click', closeFind);
    dom.findCase.addEventListener('click', () => {
      state.find.caseSensitive = !state.find.caseSensitive;
      dom.findCase.classList.toggle('on', state.find.caseSensitive);
      dom.findCase.setAttribute('aria-pressed', String(state.find.caseSensitive));
      runFind();
    });

    // minimap
    dom.minimap.addEventListener('pointerdown', minimapPointerDown);
    dom.minimap.addEventListener('pointermove', minimapPointerMove);
    dom.minimap.addEventListener('pointerup', minimapPointerUp);
    dom.minimap.addEventListener('pointercancel', minimapPointerUp);

    // command palette
    dom.paletteInput.addEventListener('input', () => renderPalette(dom.paletteInput.value));
    dom.paletteInput.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown'){ e.preventDefault(); movePalette(1); }
      else if (e.key === 'ArrowUp'){ e.preventDefault(); movePalette(-1); }
      else if (e.key === 'Enter'){ e.preventDefault(); runPalette(); }
      else if (e.key === 'Escape'){ e.preventDefault(); closePalette(); }
    });
    dom.paletteList.addEventListener('click', (e) => {
      const b = e.target.closest('.pcmd'); if (!b) return;
      paletteSel = +b.dataset.i; runPalette();
    });
    dom.paletteList.addEventListener('pointermove', (e) => {
      const b = e.target.closest('.pcmd'); if (!b) return;
      paletteSel = +b.dataset.i;
      dom.paletteList.querySelectorAll('.pcmd').forEach((el, i) => el.setAttribute('aria-selected', String(i === paletteSel)));
    });
    dom.paletteOverlay.addEventListener('mousedown', (e) => { if (e.target === dom.paletteOverlay) closePalette(); });

    // global shortcuts (when editor not focused)
    document.addEventListener('keydown', (e) => {
      const mod = e.metaKey || e.ctrlKey;
      if (mod && (e.key === 'k' || (e.shiftKey && e.key.toLowerCase() === 'p'))){
        if (!dom.paletteOverlay.classList.contains('open')){ e.preventDefault(); openPalette(); }
      }
    });

    // resize
    let rT = 0;
    window.addEventListener('resize', () => {
      clearTimeout(rT);
      rT = setTimeout(() => { measureCW(); measureLayout(); schedule({ tokens: true }); }, 80);
    });
  }

  /* ============================================================
     BOOT
     ============================================================ */
  function boot(){
    measureCW();
    // At narrow widths the sidebar is an overlay drawer — start it closed so
    // the editor is visible on load; it opens via the toggle / activity bar.
    const narrow = window.matchMedia('(max-width: 880px)').matches;
    dom.body.dataset.sidebar = narrow ? 'closed' : 'open';
    $('#btn-sidebar').setAttribute('aria-pressed', String(!narrow));
    $('#btn-sidebar').classList.toggle('on', !narrow);
    renderTabs();
    renderExplorer();
    const first = fileByName(state.active);
    dom.input.value = first.content;
    dom.input.setSelectionRange(0, 0);   // open at the top, not the end
    dom.input.scrollTop = 0;
    state.lines = first.content.split('\n');
    dom.stLang.textContent = LANG_LABEL[first.lang];
    updateGutterWidth();
    wire();
    measureLayout();
    schedule({ tokens: true });
    updateCaret();
    updateBreadcrumb();
    // ensure first paint after fonts settle
    if (document.fonts && document.fonts.ready){
      document.fonts.ready.then(() => { measureCW(); updateGutterWidth(); schedule({ tokens: true }); });
    }
    requestAnimationFrame(() => { dom.input.focus(); dom.input.setSelectionRange(0, 0); });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();

  // expose a tiny hook for the self-test harness (read-only introspection)
  window.__meridian = {
    state,
    scrollTop: () => dom.input.scrollTop,
    setScroll: (v) => { dom.input.scrollTop = v; schedule(); },
    lineCount: () => state.lines.length,
    tokenTypesOnLine: (i) => (state.tokens[i] || []).map((s) => s.type),
    minimapBox: () => ({ top: parseFloat(dom.minimapBox.style.top) || 0, height: dom.minimapBox.getBoundingClientRect().height }),
    activeFile: () => state.active,
  };
})();
</script>
</body>
</html>
