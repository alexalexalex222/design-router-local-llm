    }
    renderNav(); renderSection();
    const off = bus.on('settings:change', ()=>{ renderSection(); });
    return { onClose(){ off(); } };
  }
};

/* ---------- Bricks (canvas game) ---------- */
Apps.bricks = { id:'bricks', title:'Bricks', icon:'game', single:true, size:{w:520, h:520}, min:{w:360, h:380},
  mount(w){
    const MAX_LEVEL = 5;
    const wrap = el('div',{class:'app app-game'});
    const gw = el('div',{class:'game-wrap'});
    const canvas = el('canvas',{class:'game-canvas'});
    const hud = el('div',{class:'game-hud', 'aria-hidden':'true'});
    const mk = (k)=>{ const i=el('div',{class:'hud-i'}, el('span',{class:'hud-k'},k), el('span',{class:'hud-v'},'0')); return i; };
    const hScore=mk('Score'), hLevel=mk('Level'), hLives=mk('Lives'), hHigh=mk('Best');
    hud.append(hScore, hLevel, el('span',{class:'hud-spacer'}), hLives, hHigh);
    const overlay = el('div',{class:'game-over', role:'dialog', 'aria-label':'Game status'});
    gw.append(canvas, hud, overlay); wrap.append(gw); w.bodyEl.append(wrap);

    const ctx = canvas.getContext('2d');
    let W=10, H=10, dpr=1;
    let state='ready', score=0, lives=3, level=1;
    let high = (store.get('bricks',{}).high)||0;
    let paddle, ball, bricks=[], particles=[], palette=[];
    const keys = { left:false, right:false };
    let raf=0, last=0, alive=true, shake=0;

    function hex2rgb(h){ h=(h||'').trim().replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join(''); if(h.length<6) return [224,137,42]; return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
    const mix=(a,b,t)=>a.map((v,i)=>Math.round(v+(b[i]-v)*t));
    const rgbs=c=>'rgb('+c[0]+','+c[1]+','+c[2]+')';
    function buildPalette(){
      const cs=getComputedStyle(document.documentElement);
      const acc=hex2rgb(cs.getPropertyValue('--accent')), strong=hex2rgb(cs.getPropertyValue('--accent-strong'));
      const light=mix(acc,[255,244,225],.45); palette=[strong,acc,mix(acc,light,.5),light];
    }
    function rr(x,y,wd,ht,r){ r=Math.min(r,wd/2,ht/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+wd,y,x+wd,y+ht,r); ctx.arcTo(x+wd,y+ht,x,y+ht,r); ctx.arcTo(x,y+ht,x,y,r); ctx.arcTo(x,y,x+wd,y,r); ctx.closePath(); }

    function layout(){
      const rect = gw.getBoundingClientRect();
      const nW = Math.max(120, rect.width), nH = Math.max(120, rect.height);
      const sx = W>10 ? nW/W : 1, sy = H>10 ? nH/H : 1;
      dpr = Math.min(2, window.devicePixelRatio||1);
      canvas.width = Math.round(nW*dpr); canvas.height = Math.round(nH*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      // rescale entities proportionally so a resize never breaks a game in progress
      if(paddle){ paddle.x*=sx; paddle.w=Math.max(60, Math.min(nW*0.26, paddle.w*sx)); paddle.y=nH-26; }
      if(ball){ ball.x*=sx; ball.y*=sy; ball.speed*=(sx+sy)/2; }
      bricks.forEach(b=>{ b.x*=sx; b.y*=sy; b.w*=sx; b.h*=sy; });
      W=nW; H=nH;
      if(paddle) paddle.x=clamp(paddle.x, paddle.w/2, W-paddle.w/2);
    }

    function makeLevel(){
      buildPalette();
      const cols = clamp(Math.floor(W/70), 5, 11);
      const rows = Math.min(3+level, 7);
      const padX=18, gap=7, top=58;
      const bw=(W-padX*2-gap*(cols-1))/cols, bh=Math.max(16, Math.min(26, H*0.045));
      bricks=[];
      for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
        const hp = r===0 ? 2 : 1;
        bricks.push({ x:padX+c*(bw+gap), y:top+r*(bh+gap), w:bw, h:bh, hp, maxhp:hp, alive:true, color:palette[r%palette.length] });
      }
    }
    function resetBall(){
      paddle = paddle || { w:Math.min(W*0.26,120), h:13, x:W/2, y:H-26 };
      paddle.x = W/2; paddle.y=H-26;
      const sp = 300 + level*26;
      ball = { x:W/2, y:paddle.y-12, r:8, vx:0, vy:0, speed:sp, stuck:true };
    }
    function launch(){ if(state!=='ready') return; const a=(-Math.PI/2)+(Math.random()*0.5-0.25); ball.vx=Math.cos(a)*ball.speed; ball.vy=Math.sin(a)*ball.speed; ball.stuck=false; state='play'; hideOverlay(); sound.blip(440,.06,'sine',.3); }

    function newGame(){ score=0; lives=3; level=1; makeLevel(); resetBall(); state='ready'; setHud(); showOverlay('Bricks','Move with the mouse or ← →. Clear every brick.','Launch', launch); }
    function nextLevel(){ if(level>=MAX_LEVEL){ win(); return; } level++; makeLevel(); resetBall(); state='ready'; setHud(); showOverlay('Level '+level,'Nice. The ball is a little faster now.','Continue', launch); }
    function loseLife(){ lives--; setHud(); if(lives<=0){ gameOver(); return; } state='ready'; resetBall(); showOverlay('Ball lost',''+lives+' '+(lives===1?'life':'lives')+' left.','Launch', launch); sound.blip(150,.18,'sawtooth',.3); }
    function gameOver(){ state='over'; saveHigh(); showOverlay('Game over','You scored '+score+'.'+(score>=high?' New best!':''),'Play again', newGame); sound.chord([330,247,196]); }
    function win(){ state='win'; saveHigh(); showOverlay('You cleared it','All '+MAX_LEVEL+' levels down — final score '+score+'.','Play again', newGame); sound.chord([523,659,784,1047]); }
    function saveHigh(){ if(score>high){ high=score; store.set('bricks',{high}); bus.emit('toast',{type:'good',msg:'New high score: '+score+'!'}); } setHud(); }

    function setHud(){ hScore.lastChild.textContent=score; hLevel.lastChild.textContent=level+'/'+MAX_LEVEL; hLives.lastChild.textContent=lives; hHigh.lastChild.textContent=high; }

    function showOverlay(title, sub, btnLabel, action){
      overlay.innerHTML='';
      const card=el('div',{class:'go-card'}, el('h3',{},title), el('p',{},sub));
      const btn=el('button',{class:'btn primary', type:'button'}, btnLabel);
      btn.addEventListener('click', e=>{ e.stopPropagation(); action(); });
      card.append(btn, el('div',{class:'go-key'},'Space to '+btnLabel.toLowerCase()));
      overlay.append(card); overlay.hidden=false;
      setTimeout(()=>{ try{ btn.focus({preventScroll:true}); }catch(_){} },0);
    }
    function hideOverlay(){ overlay.hidden=true; overlay.innerHTML=''; }
    function pause(){ if(state!=='play') return; state='paused'; showOverlay('Paused','','Resume', resume); }
    function resume(){ if(state!=='paused') return; state='play'; hideOverlay(); last=performance.now(); }
    function togglePause(){ if(state==='play') pause(); else if(state==='paused') resume(); }

    function spawnParticles(x,y,color){ for(let i=0;i<8;i++){ const a=Math.random()*Math.PI*2, s=40+Math.random()*120; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5,color}); } }

    function update(dt){
      // paddle (keyboard)
      const pSpeed=520; if(keys.left) paddle.x-=pSpeed*dt; if(keys.right) paddle.x+=pSpeed*dt;
      paddle.x=clamp(paddle.x, paddle.w/2, W-paddle.w/2);
      if(state!=='play'){ if(ball && ball.stuck){ ball.x=paddle.x; ball.y=paddle.y-ball.r-2; } stepParticles(dt); return; }
      // sub-stepped ball motion
      const dist=ball.speed*dt, steps=Math.max(1, Math.ceil(dist/(ball.r))); const sdt=dt/steps;
      for(let s=0;s<steps;s++){
        ball.x+=ball.vx*sdt; ball.y+=ball.vy*sdt;
        if(ball.x<ball.r){ ball.x=ball.r; ball.vx=Math.abs(ball.vx); sound.blip(300,.03,'sine',.18); }
        else if(ball.x>W-ball.r){ ball.x=W-ball.r; ball.vx=-Math.abs(ball.vx); sound.blip(300,.03,'sine',.18); }
        if(ball.y<ball.r){ ball.y=ball.r; ball.vy=Math.abs(ball.vy); sound.blip(300,.03,'sine',.18); }
        // paddle
        if(ball.vy>0 && ball.y+ball.r>=paddle.y && ball.y-ball.r<=paddle.y+paddle.h &&
           ball.x>=paddle.x-paddle.w/2-ball.r && ball.x<=paddle.x+paddle.w/2+ball.r){
          const hit=clamp((ball.x-paddle.x)/(paddle.w/2),-1,1), ang=hit*(Math.PI/3);
          ball.speed=Math.min(ball.speed*1.01, 640);
          ball.vx=ball.speed*Math.sin(ang); ball.vy=-ball.speed*Math.cos(ang); ball.y=paddle.y-ball.r-0.5; sound.blip(420,.04,'sine',.25);
        }
        // bricks (one per sub-step)
        for(let i=0;i<bricks.length;i++){ const b=bricks[i]; if(!b.alive) continue;
          if(ball.x+ball.r>b.x && ball.x-ball.r<b.x+b.w && ball.y+ball.r>b.y && ball.y-ball.r<b.y+b.h){
            const ox=Math.min(ball.x+ball.r-b.x, b.x+b.w-(ball.x-ball.r));
            const oy=Math.min(ball.y+ball.r-b.y, b.y+b.h-(ball.y-ball.r));
            if(ox<oy) ball.vx=-ball.vx; else ball.vy=-ball.vy;
            b.hp--; if(b.hp<=0){ b.alive=false; score+=10*level; spawnParticles(ball.x,ball.y,b.color); shake=Math.min(6,shake+3); sound.blip(520+Math.random()*120,.05,'triangle',.3); }
            else { b.color=mix(b.color,[255,250,240],.35); score+=5; sound.blip(360,.04,'square',.2); }
            setHud(); break;
          }
        }
        if(ball.y-ball.r>H){ stepParticles(dt); return loseLife(); }
      }
      if(!bricks.some(b=>b.alive)){ stepParticles(dt); return nextLevel(); }
      stepParticles(dt);
    }
    function stepParticles(dt){ for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=420*dt; p.life-=dt; } particles=particles.filter(p=>p.life>0); if(shake>0) shake=Math.max(0,shake-dt*24); }

    function render(){
      ctx.save();
      if(shake>0 && !RM()) ctx.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake);
      const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#1c1611'); g.addColorStop(1,'#120d09');
      ctx.fillStyle=g; ctx.fillRect(-8,-8,W+16,H+16);
      // bricks
      for(const b of bricks){ if(!b.alive) continue; ctx.fillStyle=rgbs(b.color); rr(b.x,b.y,b.w,b.h,5); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.16)'; rr(b.x+2,b.y+2,b.w-4,Math.max(3,b.h*0.32),3); ctx.fill(); }
      // particles
      for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life*2); ctx.fillStyle=rgbs(p.color); ctx.fillRect(p.x-2,p.y-2,4,4); } ctx.globalAlpha=1;
      // paddle
      ctx.fillStyle=rgbs(palette[1]||[224,137,42]); rr(paddle.x-paddle.w/2,paddle.y,paddle.w,paddle.h,6); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.22)'; rr(paddle.x-paddle.w/2+2,paddle.y+2,paddle.w-4,4,2); ctx.fill();
      // ball
      ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fillStyle='#f6ecdd'; ctx.fill();
      ctx.beginPath(); ctx.arc(ball.x-ball.r*0.3,ball.y-ball.r*0.3,ball.r*0.4,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fill();
      ctx.restore();
    }
    function loop(now){ if(!alive) return; const dt=Math.min(0.034,(now-last)/1000||0); last=now; update(dt); render(); raf=requestAnimationFrame(loop); }
    function start(){ if(raf||!alive) return; last=performance.now(); raf=requestAnimationFrame(loop); }
    function stop(){ if(raf){ cancelAnimationFrame(raf); raf=0; } }

    // input
    function onPointerMove(e){ const r=canvas.getBoundingClientRect(); paddle.x=clamp(e.clientX-r.left, paddle.w/2, W-paddle.w/2); }
    function onPointerDown(e){ sound.init(); sound.resume(); if(state==='ready') launch(); }
    canvas.addEventListener('pointermove', onPointerMove);
    canvas.addEventListener('pointerdown', onPointerDown);
    function isActive(){ return WM.activeId===w.id; }
    function kd(e){ if(!isActive()) return;
      if(e.target && e.target.closest && e.target.closest('.go-card')) return;
      if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){ keys.left=true; e.preventDefault(); }
      else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){ keys.right=true; e.preventDefault(); }
      else if(e.code==='Space'){ if(state==='ready') launch(); else togglePause(); e.preventDefault(); }
      else if(e.key==='p'||e.key==='P'){ togglePause(); e.preventDefault(); }
    }
    function ku(e){ if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false; if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false; }
    window.addEventListener('keydown', kd); window.addEventListener('keyup', ku);

    layout(); newGame(); setHud(); start();

    return {
      onResize(){ layout(); },
      onMinimize(){ stop(); if(state==='play') pause(); },
      onRestore(){ start(); },
      onBlur(){ if(state==='play') pause(); },
      onClose(){ alive=false; stop(); window.removeEventListener('keydown',kd); window.removeEventListener('keyup',ku); }
    };
  }
};

/* confirm modal (mounted inside a host so it scopes to the window) */
function confirmModal(host, opt){
  return new Promise(resolve=>{
    const wrap = el('div',{class:'modal-wrap'});
    const titleId = 'm'+uid();
    const modal = el('div',{class:'modal', role:'dialog', 'aria-modal':'true', 'aria-labelledby':titleId});
    const cancel = el('button',{class:'btn ghost', type:'button'}, 'Cancel');
    const ok = el('button',{class:'btn '+(opt.danger?'danger':'primary'), type:'button'}, opt.confirmLabel||'Confirm');
    modal.append(el('h3',{id:titleId}, opt.title), opt.msg?el('p',{}, opt.msg):null, el('div',{class:'modal-actions'}, cancel, ok));
    wrap.append(modal); host.append(wrap);
    const finish = v=>{ wrap.remove(); document.removeEventListener('keydown', onKey, true); resolve(v); };
    function onKey(e){
      if(e.key==='Escape'){ e.preventDefault(); e.stopPropagation(); finish(false); }
      else if(e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); finish(true); }
      else if(e.key==='Tab'){ const f=[cancel,ok]; const i=f.indexOf(document.activeElement); e.preventDefault(); f[(i+(e.shiftKey?-1:1)+2)%2].focus(); }
    }
    document.addEventListener('keydown', onKey, true);
    wrap.addEventListener('pointerdown', e=>{ if(e.target===wrap) finish(false); });
    cancel.addEventListener('click', ()=>finish(false));
    ok.addEventListener('click', ()=>finish(true));
    setTimeout(()=>{ (opt.danger?cancel:ok).focus(); }, 0);
  });
}

/* context menu */
const ctxEl = $('#ctxmenu'); let ctxIdx = -1;
function openCtx(x, y, items){
  closeCtx(); ctxEl.innerHTML=''; ctxIdx=-1;
  items.forEach(it=>{
    if(it.sep){ ctxEl.append(el('div',{class:'ctx-sep'})); return; }
    const b = el('button',{class:'ctx-item'+(it.danger?' danger':''), type:'button', role:'menuitem'}, el('span',{html:it.icon||''}), el('span',{}, it.label));
    b.addEventListener('click', ()=>{ closeCtx(); it.onClick(); });
    ctxEl.append(b);
  });
  ctxEl.hidden=false;
  const r = ctxEl.getBoundingClientRect();
  ctxEl.style.left = Math.max(8, Math.min(x, window.innerWidth - r.width - 8)) + 'px';
  ctxEl.style.top = Math.max(8, Math.min(y, window.innerHeight - r.height - 8)) + 'px';
  setTimeout(()=>document.addEventListener('pointerdown', ctxOutside, true), 0);
}
function ctxOutside(e){ if(!ctxEl.contains(e.target)) closeCtx(); }
function closeCtx(){ ctxEl.hidden=true; ctxEl.innerHTML=''; document.removeEventListener('pointerdown', ctxOutside, true); }
function ctxNav(dir){ const items=$$('.ctx-item', ctxEl); if(!items.length) return; ctxIdx=(ctxIdx+dir+items.length)%items.length; items.forEach((b,i)=>b.classList.toggle('kbd', i===ctxIdx)); items[ctxIdx].focus(); }

/* tray popovers (volume + calendar) */
const Popover = {
  el:null,
  _out(e){ if(Popover.el && !Popover.el.contains(e.target) && !(e.target.closest && e.target.closest('.tray-btn'))) Popover.close(); },
  close(){ if(this.el){ this.el.remove(); this.el=null; document.removeEventListener('pointerdown', this._out, true); } },
  open(anchor, key, build){
    const same = this.el && this.el.dataset.k===key; this.close(); if(same) return;
    const p = el('div',{class:'popover', role:'dialog'}); p.dataset.k=key; build(p); document.body.append(p); this.el=p;
    const ar=anchor.getBoundingClientRect(), pr=p.getBoundingClientRect();
    p.style.left = Math.max(8, Math.min(ar.right-pr.width, window.innerWidth-pr.width-8)) + 'px';
    p.style.top  = Math.max(8, ar.top - pr.height - 8) + 'px';
    setTimeout(()=>document.addEventListener('pointerdown', this._out, true), 0);
  },
  toggleVolume(anchor){ this.open(anchor,'vol', p=>{
    p.append(el('div',{class:'pop-title'},'Sound'));
    const rng = el('input',{class:'rng', type:'range', min:'0', max:'100', value:String(Math.round(Settings.data.volume*100)), 'aria-label':'Volume'});
    rng.style.setProperty('--fill', Math.round(Settings.data.volume*100)+'%'); rng.disabled = Settings.data.mute;
    rng.addEventListener('input', ()=>{ const v=+rng.value/100; rng.style.setProperty('--fill', rng.value+'%'); Settings.set('volume', v); });
    rng.addEventListener('change', ()=>sound.blip(560,.08,'sine',.4));
    const muteBtn = el('button',{class:'btn icon ghost', type:'button', 'aria-label':'Mute'});
    const syncMute=()=>{ muteBtn.innerHTML = Settings.data.mute?I.volumeMute:I.volume; muteBtn.style.color='var(--desk-ink)'; rng.disabled=Settings.data.mute; };
    syncMute();
    muteBtn.addEventListener('click', ()=>{ Settings.set('mute', !Settings.data.mute); syncMute(); });
    p.append(el('div',{class:'pop-row'}, muteBtn, rng));
  }); },
  toggleCalendar(anchor){ this.open(anchor,'cal', p=>{
    p.classList.add('cal'); const now=new Date(), y=now.getFullYear(), m=now.getMonth();
    p.append(el('div',{class:'pop-title'}, now.toLocaleDateString(undefined,{month:'long', year:'numeric'})));
    const grid=el('div',{class:'cal-grid'});
    ['S','M','T','W','T','F','S'].forEach(d=>grid.append(el('span',{class:'cal-dow'}, d)));
    const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
    for(let i=0;i<first;i++) grid.append(el('span',{}));
    for(let d=1; d<=days; d++){ const s=el('span',{}, String(d)); if(d===now.getDate()) s.className='cal-today'; grid.append(s); }
    p.append(grid);
    p.append(el('div',{class:'cal-meta'}, now.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'}) + ' · ' + WM.wins.size + ' window' + (WM.wins.size===1?'':'s') + ' open'));
  }); }
};

/* dock pins */
const PINNED = ['notes','files','calc','bricks','settings'];
const Rail = {
  pinsEl: $('#railApps'), pins:{},
  build(){ this.pinsEl.innerHTML=''; this.pins={};
    PINNED.forEach(id=>{ const app=Apps[id];
      const b=el('button',{class:'pin', type:'button', 'data-app':id, 'aria-label':app.title},
        el('span',{class:'pin-glyph', html:I[app.icon]}), el('span',{class:'pin-tip'}, app.title));
      b.addEventListener('click', ()=>this.activate(id)); this.pinsEl.append(b); this.pins[id]=b; });
  },
  // Every dock click results in a VISIBLE, focused window: open if closed,
  // restore if minimized, otherwise raise it to the front. Never minimize-on-click
  // (that would leave only a dock entry, with no window on the desktop).
  activate(id){ sound.init(); sound.resume();
    const ex=[...WM.wins.values()].find(w=>w.appId===id);
    if(!ex){ WM.open(id); return; }
    if(ex.state==='min') WM.restore(ex.id);
    else WM.focus(ex.id,{dom:true});
  },
  sync(){ const run={}; WM.wins.forEach(w=>run[w.appId]=w);
    Object.keys(this.pins).forEach(id=>{ const b=this.pins[id], w=run[id];
      b.classList.toggle('running', !!w); b.classList.toggle('active', !!w && WM.activeId===w.id && w.state!=='min'); });
    $$('.pin.extra', this.pinsEl).forEach(n=>n.remove());
    WM.wins.forEach(w=>{ if(PINNED.includes(w.appId)) return;
      const b=el('button',{class:'pin extra running', 'data-app':w.appId, type:'button', 'aria-label':w.app.title},
        el('span',{class:'pin-glyph', html:I[w.app.icon]}), el('span',{class:'pin-tip'}, w.app.title));
      b.classList.toggle('active', WM.activeId===w.id && w.state!=='min');
      b.addEventListener('click', ()=>this.activate(w.appId)); this.pinsEl.append(b); });
  }
};
window.Rail = Rail;

/* tray */
function buildTray(){
  const tray = $('#tray'); tray.innerHTML='';
  const net = el('button',{class:'tray-btn', type:'button'});
  const setNet=()=>{ const on=navigator.onLine; net.innerHTML = on?I.net:I.netOff; net.classList.toggle('warn', !on);
    net.title = on?'Online':'Offline'; net.setAttribute('aria-label','Network: '+(on?'online':'offline')); };
  setNet();
  window.addEventListener('online', ()=>{ setNet(); toast({type:'good', msg:'Back online.'}); });
  window.addEventListener('offline', ()=>{ setNet(); toast({type:'info', msg:'You are offline.'}); });
  net.addEventListener('click', e=>{ e.stopPropagation(); toast({type:'info', msg: navigator.onLine?'Connected to the network.':'No network connection.'}); });

  const vol = el('button',{class:'tray-btn', type:'button', 'aria-haspopup':'dialog'});
  const setVolIco=()=>{ vol.innerHTML = (Settings.data.mute||Settings.data.volume===0)?I.volumeMute:I.volume; vol.setAttribute('aria-label','Volume'); };
  setVolIco(); vol.addEventListener('click', e=>{ e.stopPropagation(); sound.init(); Popover.toggleVolume(vol); });

  const motion = el('button',{class:'tray-btn', type:'button'});
  const setMotionIco=()=>{ motion.innerHTML=I.motion; motion.classList.toggle('warn', Settings.data.reduceMotion);
    motion.title='Reduce motion: '+(Settings.data.reduceMotion?'on':'off'); motion.setAttribute('aria-label', motion.title); };
  setMotionIco(); motion.addEventListener('click', e=>{ e.stopPropagation(); Settings.set('reduceMotion', !Settings.data.reduceMotion); });

  tray.append(net, vol, motion); Clock.mount(tray);
  bus.on('settings:change', ()=>{ setVolIco(); setMotionIco(); });
}

/* launcher */
const LAUNCH = ['notes','files','calc','bricks','settings','welcome'];
const Launcher = {
  open:false, idx:-1, filtered:[],
  init(){
    $('#launcherBtn').addEventListener('click', ()=>this.toggle());
    $('#launcherBackdrop').addEventListener('click', ()=>this.close());
    $('#launcherSearchIco').innerHTML = I.search;
    const input=$('#launcherInput');
    input.addEventListener('input', ()=>this.render(input.value));
    input.addEventListener('keydown', e=>this.onKey(e));
    const foot=$('#launcherFoot');
    const mk=(label,fn)=>{ const b=el('button',{class:'lf-btn', type:'button'}, label); b.addEventListener('click', fn); return b; };
    foot.append(
      mk('Minimize all', ()=>{ WM.wins.forEach(w=>{ if(w.state!=='min') WM.minimize(w.id); }); this.close(); }),
      mk('Close all', ()=>{ const ids=[...WM.wins.keys()]; this.close(); ids.forEach(id=>WM.close(id)); }),
      mk('Restart', ()=>{ this.close(); location.reload(); })
    );
  },
  toggle(){ this.open?this.close():this.show(); },
  show(){ this.open=true; sound.init(); $('#launcher').hidden=false; $('#launcherBtn').setAttribute('aria-expanded','true');
    const input=$('#launcherInput'); input.value=''; this.render(''); setTimeout(()=>input.focus(), 0); },
  close(){ if(!this.open) return; this.open=false; $('#launcher').hidden=true; $('#launcherBtn').setAttribute('aria-expanded','false'); try{$('#launcherBtn').focus();}catch(e){} },
  render(q){ const grid=$('#launcherGrid'); grid.innerHTML=''; q=(q||'').trim().toLowerCase();
    this.filtered = LAUNCH.filter(id=>Apps[id].title.toLowerCase().includes(q));
    if(!this.filtered.length){ grid.append(el('div',{class:'launcher-empty'}, 'No apps match “'+q+'”.')); this.idx=-1; return; }
    this.filtered.forEach((id,i)=>{ const app=Apps[id];
      const b=el('button',{class:'launch-item', type:'button', role:'option', 'data-app':id},
        el('span',{class:'li-glyph', html:I[app.icon]}), el('span',{class:'li-label'}, app.title));
      b.addEventListener('click', ()=>this.launch(id));
      b.addEventListener('pointermove', ()=>{ this.idx=i; this.hl(); });
      grid.append(b); });
    this.idx = q?0:-1; this.hl();
  },
  hl(){ $$('.launch-item', $('#launcherGrid')).forEach((b,i)=>b.classList.toggle('kbd', i===this.idx)); },
  launch(id){ this.close(); WM.open(id); },
  cols(){ const g=$('#launcherGrid'), it=$('.launch-item', g); if(!it) return 1; return Math.max(1, Math.round(g.clientWidth/(it.offsetWidth+8))); },
  onKey(e){ const n=this.filtered.length; if(!n) return; const c=this.cols(); const cur=this.idx<0?0:this.idx;
    if(e.key==='ArrowDown'){ this.idx=Math.min(n-1, cur+c); this.hl(); e.preventDefault(); }
    else if(e.key==='ArrowUp'){ this.idx=Math.max(0, cur-c); this.hl(); e.preventDefault(); }
    else if(e.key==='ArrowRight'){ this.idx=Math.min(n-1, cur+1); this.hl(); e.preventDefault(); }
    else if(e.key==='ArrowLeft'){ this.idx=Math.max(0, cur-1); this.hl(); e.preventDefault(); }
    else if(e.key==='Enter'){ const id=this.filtered[cur]; if(id) this.launch(id); e.preventDefault(); }
  }
};

/* desktop icons */
function buildDeskIcons(){
  const ul=$('#deskIcons'); ul.innerHTML='';
  PINNED.forEach((id,i)=>{ const app=Apps[id];
    const b=el('button',{class:'desk-ico', type:'button', role:'option', 'data-app':id, 'aria-selected':'false', tabindex:i===0?'0':'-1'},
      el('span',{class:'di-glyph', html:I[app.icon]}), el('span',{class:'di-label'}, app.title));
    // single-click launches (and selects); double-click is a harmless no-op repeat
    b.addEventListener('click', ()=>{ selIcon(b); WM.open(id); });
    b.addEventListener('dblclick', ()=>WM.open(id));
    b.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); WM.open(id); } });
    b.addEventListener('contextmenu', e=>{ e.preventDefault(); selIcon(b); openCtx(e.clientX, e.clientY, [{label:'Open', icon:I[app.icon], onClick:()=>WM.open(id)}]); });
    ul.append(el('li',{}, b));
  });
  ul.addEventListener('keydown', e=>{
    const items=$$('.desk-ico', ul), cur=items.indexOf(document.activeElement); if(cur<0) return;
    let n=cur; if(e.key==='ArrowDown') n=Math.min(items.length-1, cur+1); else if(e.key==='ArrowUp') n=Math.max(0, cur-1); else return;
    e.preventDefault(); items.forEach(x=>x.tabIndex=-1); items[n].tabIndex=0; items[n].focus();
  });
}
function selIcon(b){ $$('.desk-ico', $('#deskIcons')).forEach(x=>x.setAttribute('aria-selected','false')); b.setAttribute('aria-selected','true'); }

const SCENE_ORDER = ['dusk','dawn','midnight','fog'];
function cycleScene(){ const i=SCENE_ORDER.indexOf(Settings.data.theme); const next=SCENE_ORDER[(i+1)%SCENE_ORDER.length]; Settings.set('theme', next); toast({type:'info', msg:'Scene: '+SCENE_LABELS[next]}); }

function wireDesktop(){
  const desk=$('#desktop');
  desk.addEventListener('contextmenu', e=>{ if(e.target.closest('.win')||e.target.closest('.desk-ico')) return; e.preventDefault();
    openCtx(e.clientX, e.clientY, [
      { label:'New note', icon:I.notes, onClick:()=>WM.open('notes',{create:true}) },
      { label:'Open Files', icon:I.files, onClick:()=>WM.open('files') },
      { sep:true },
      { label:'Change scene', icon:I.scene, onClick:cycleScene },
      { label:'Display settings', icon:I.settings, onClick:()=>WM.open('settings') },
      { sep:true },
      { label:'About Halcyon', icon:I.info, onClick:()=>WM.open('welcome') }
    ]);
  });
  desk.addEventListener('pointerdown', e=>{
    if(e.target===desk || e.target.closest('.wallpaper')){
      if(WM.activeId){ const w=WM.wins.get(WM.activeId); if(w){ w.el.classList.remove('is-active'); if(w.api&&w.api.onBlur){ try{w.api.onBlur();}catch(_){}} } WM.activeId=null; WM.syncRail(); }
      $$('.desk-ico', $('#deskIcons')).forEach(x=>x.setAttribute('aria-selected','false'));
      closeCtx(); Popover.close();
    }
  });
}

/* global keyboard */
window.addEventListener('keydown', e=>{
  if((e.metaKey||e.ctrlKey) && e.code==='Space'){ e.preventDefault(); Launcher.toggle(); return; }
  if(e.key==='Escape'){ if(Launcher.open){ Launcher.close(); return; } if(!ctxEl.hidden){ closeCtx(); return; } if(Popover.el){ Popover.close(); return; } }
  if(!ctxEl.hidden){ if(e.key==='ArrowDown'){ ctxNav(1); e.preventDefault(); return; } if(e.key==='ArrowUp'){ ctxNav(-1); e.preventDefault(); return; } }
  if((e.ctrlKey||e.metaKey) && e.key==='`'){ e.preventDefault(); WM.cycle(e.shiftKey?-1:1); return; }
  const t=e.target;
  if(t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.tagName==='SELECT'||t.isContentEditable||t.tagName==='BUTTON')) return;
  const w = WM.activeId && WM.wins.get(WM.activeId);
  if(w && w.api && w.api.onKey){ try{ if(w.api.onKey(e)) return; }catch(_){} }
});

/* first user gesture unlocks audio */
function firstGesture(){ sound.init(); sound.resume(); window.removeEventListener('pointerdown', firstGesture); window.removeEventListener('keydown', firstGesture); }
window.addEventListener('pointerdown', firstGesture); window.addEventListener('keydown', firstGesture);

/* responsive controller */
function setRailVar(){ document.documentElement.style.setProperty('--rail-h', $('#rail').offsetHeight+'px'); }
function onViewport(){
  const c = window.innerWidth<=760; WM.compact=c; document.body.classList.toggle('compact', c); setRailVar();
  if(c && (!WM.activeId || !WM.wins.has(WM.activeId))){ const top=WM.stack[WM.stack.length-1]; if(top){ const tw=WM.wins.get(top); if(tw && tw.state!=='min') WM.focus(top,{dom:false}); } }
  WM.wins.forEach(w=>{ if(!c){ if(w.state==='max') w.rect=WM.zoneRect('max'); else WM.clampInto(w); WM.applyRect(w); } if(w.api&&w.api.onResize){ try{ w.api.onResize(); }catch(e){} } });
}
let vpRaf=0;
window.addEventListener('resize', ()=>{ if(vpRaf) return; vpRaf=requestAnimationFrame(()=>{ vpRaf=0; onViewport(); }); });

/* build scene stars (midnight) once */
(function stars(){ const g=$('#sceneStars'); if(!g) return; let s='';
  for(let i=0;i<70;i++){ const x=(Math.random()*1440).toFixed(0), y=(Math.random()*460).toFixed(0), r=(Math.random()*1.3+0.3).toFixed(2), o=(Math.random()*0.6+0.2).toFixed(2);
    s+='<circle class="scene-star" cx="'+x+'" cy="'+y+'" r="'+r+'" opacity="'+o+'"/>'; }
  g.innerHTML=s; })();

/* ============================================================ boot ============== */
function init(){
  $('#bootMark').innerHTML = halcyonMark;
  Settings.apply();
  buildDeskIcons(); Rail.build(); buildTray(); Launcher.init(); wireDesktop();
  setRailVar(); onViewport();
  const restored = WM.restoreSession();
  if(!restored && !store.get('welcomeSeen', false)){ store.set('welcomeSeen', true); WM.open('welcome'); }
  WM.syncRail();
  setTimeout(()=>{ const s=$('#bootSub'); if(s) s.textContent='ready'; }, 380);
  setTimeout(()=>{ $('#boot').hidden=true; }, 660);
}
function boot(){ try{ init(); }catch(err){ const s=$('#bootSub'); if(s) s.textContent='startup error — reload the page'; setTimeout(()=>{ $('#boot').hidden=true; }, 500); } }
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();
</script>
