    head.append(h);
  }
  // head + all-day row share ONE sticky wrapper so the all-day band sticks below the header
  const wktop=el('div',{class:'wk-top'});wktop.append(head);

  // all-day row
  const {placed:abars,laneCount:aLanes}=packBars(ws,e=>e.allDay);
  const allrow=el('div',{class:'wk-allrow wk-cols'});
  allrow.append(el('div',{class:'wk-allgutter',text:'all-day'}));
  const allInner=el('div',{style:{gridColumn:'2 / 9',position:'relative'}});
  const aBg=el('div',{class:'wk-cols',style:{position:'absolute',inset:'0',gridTemplateColumns:'repeat(7,minmax(var(--daycol-min),1fr))'}});
  for(let i=0;i<7;i++){const d=addDays(ws,i),wknd=d.getDay()===0||d.getDay()===6;
    aBg.append(el('div',{class:'wk-allcell'+(wknd?' we':'')+(sameDay(d,today)?' today':''),dataset:{day:ymd(d),allday:'1'}}));}
  const aCells=el('div',{class:'wk-allcells',style:{minHeight:(Math.max(1,aLanes)*22+6)+'px'}});
  const aOverlay=el('div',{class:'allbars',style:{gridTemplateColumns:'repeat(7,minmax(var(--daycol-min),1fr))',gridTemplateRows:`repeat(${Math.max(1,aLanes)},22px)`}});
  for(const p of abars){
    const e=p.e,c=CAT[e.cat];const cls=['allbar'];if(p.contL)cls.push('cont-l');if(p.contR)cls.push('cont-r');if(!matchesQuery(e))cls.push('dim');
    aOverlay.append(el('div',{class:cls.join(' '),style:{'--cat':c.color,gridColumn:`${p.c0+1}/${p.c1+2}`,gridRow:String(p.lane+1)},
      role:'button',tabindex:'0',dataset:{id:e.id,allday:'1'},'aria-label':eventAria(e)},[
      el('span',{class:'cn',style:{overflow:'hidden',textOverflow:'ellipsis'},text:e.title||'(no title)'})]));
  }
  allInner.append(aBg);allInner.append(aCells);allInner.append(aOverlay);
  allrow.append(allInner);
  wktop.append(allrow);
  gridw.append(wktop);

  // body (time grid)
  const body=el('div',{class:'wk-body wk-cols',tabindex:'0',role:'grid','aria-label':'Week time grid — arrow keys move, Enter creates'});
  const gutter=el('div',{class:'wk-gutter',style:{height:H+'px'}});
  for(let h=1;h<24;h++){const t=new Date();t.setHours(h,0,0,0);
    gutter.append(el('div',{class:'hl',style:{top:(h*HOUR_H)+'px'},text:fmt(t,{hour:'numeric'})}));}
  body.append(gutter);
  const cols=[];
  for(let i=0;i<7;i++){
    const d=addDays(ws,i),wknd=d.getDay()===0||d.getDay()===6,isToday=sameDay(d,today);
    const col=el('div',{class:'wk-col'+(wknd?' we':'')+(isToday?' today':''),style:{height:H+'px'},
      dataset:{day:ymd(d),col:String(i)}});
    // timed events
    const items=timedForDay(d).map(ev=>{
      const a=evStart(ev),b=evEnd(ev),s0=startOfDay(d),e0=addDays(s0,1);
      const s=a<s0?0:minutesOf(a);let e=b>e0?DAY_MIN:minutesOf(b);if(e<=s)e=s+MIN_DUR;
      return {s,e,ev};
    });
    layoutDay(items);
    for(const it of items)col.append(weekEvent(it.ev,it.s,it.e,it.col,it.cols));
    if(isToday){
      const nl=el('div',{class:'nowline'});nl.append(el('div',{class:'ln'}));nl.append(el('div',{class:'dot'}));
      col.append(nl);col.dataset.nowhost='1';
    }
    col.append(el('div',{class:'grid-hint',dataset:{hint:'1'},style:{display:'none'}},[el('span',{text:'Drag any time to create an event'})]));
    body.append(col);cols.push(col);
  }
  // keyboard slot cursor
  const slotcur=el('div',{class:'slotcur'});body.append(slotcur);
  gridw.append(body);
  scroll.append(gridw);root.append(scroll);
  D.viewHost.replaceChildren(root);

  WK={ws,scroll,body,gutter,cols,slotcur,H};
  // empty hint per visible day
  cols.forEach((c,i)=>{const d=addDays(ws,i);const has=timedForDay(d).length;
    const hint=c.querySelector('[data-hint]');if(hint)hint.style.display=has?'none':'';});

  placeNow();
  nowTimer=setInterval(placeNow,30000);
  // initial scroll near now / morning
  const nowMin=sameDay(today,new Date())?minutesOf(new Date()):8*60;
  scroll.scrollTop=clamp((nowMin-90)*PXMIN,0,H-scroll.clientHeight);
}
function weekEvent(e,s,en,col,cols){
  const c=CAT[e.cat],dur=en-s,top=s*PXMIN,h=Math.max(dur*PXMIN,15);
  const node=el('div',{class:'evt'+(h<34?' short':'')+(matchesQuery(e)?'':' dim'),
    style:{'--cat':c.color,top:top+'px',height:h+'px',left:`calc(${(col/cols)*100}% + 2px)`,width:`calc(${100/cols}% - 4px)`},
    role:'button',tabindex:'0',dataset:{id:e.id},'aria-label':eventAria(e)});
  node.append(el('div',{class:'eh top',dataset:{resize:'top'}}));
  node.append(el('div',{class:'et',text:e.title||'(no title)'}));
  node.append(el('div',{class:'em',text:fmtRange(evStart(e),evEnd(e))}));
  node.append(el('div',{class:'eh bot',dataset:{resize:'bot'}}));
  return node;
}
function placeNow(){
  if(!WK)return;
  const now=new Date(),today=startOfDay(now);
  const idx=daysBetween(WK.ws,today);
  // gutter flag
  let flag=WK.gutter.querySelector('.nowflag');
  const min=minutesOf(now),y=min*PXMIN;
  if(idx>=0&&idx<7){
    const host=WK.cols[idx];const nl=host.querySelector('.nowline');
    if(nl)nl.style.top=y+'px';
    if(!flag){flag=el('div',{class:'nowflag'});WK.gutter.append(flag);}
    flag.style.top=y+'px';flag.style.right='6px';flag.textContent=fmtTime(now);flag.style.display='';
  }else if(flag){flag.style.display='none';}
}

/* ===================================================== INTERACTIONS: DRAG */
let lastCat='work';
let drag=null;
function mkDate(baseDay,min){const d=startOfDay(baseDay);d.setMinutes(min);return d;}
function minFromY(cy){if(!WK)return 0;const top=WK.cols[0].getBoundingClientRect().top;return clamp((cy-top)/PXMIN,0,DAY_MIN);}
function colFromX(cx){if(!WK)return 0;for(let i=0;i<7;i++){const r=WK.cols[i].getBoundingClientRect();if(cx>=r.left&&cx<r.right)return i;}return cx<WK.cols[0].getBoundingClientRect().left?0:6;}

function onPointerDown(ev){
  if(ev.button!==undefined&&ev.button>0)return;
  const t=ev.target;
  const evtNode=t.closest('.evt'),allNode=t.closest('.allbar'),mNode=t.closest('.mchip,.mbar'),col=t.closest('.wk-col'),mcell=t.closest('.mcell');
  if(t.closest('.mdate,.mmore'))return;                    // their own handlers
  let d=null;
  if(evtNode){
    const e=getEvent(evtNode.dataset.id);if(!e)return;
    const handle=t.closest('.eh');
    d={kind:handle?('resize-'+handle.dataset.resize):'evt-move',e,node:evtNode,
       x0:ev.clientX,y0:ev.clientY,moved:false,
       origStart:evStart(e),origEnd:evEnd(e),grabMin:minFromY(ev.clientY),grabCol:colFromX(ev.clientX)};
  }else if(allNode){
    const e=getEvent(allNode.dataset.id);if(!e)return;
    d={kind:'allmove',e,node:allNode,x0:ev.clientX,y0:ev.clientY,moved:false,grabDay:colFromX(ev.clientX)};
  }else if(mNode){
    const e=getEvent(mNode.dataset.id);if(!e)return;
    d={kind:'mmove',e,node:mNode,x0:ev.clientX,y0:ev.clientY,moved:false,
       origDay:startOfDay(evStart(e)),startCell:mNode.closest('.mcell')};
  }else if(col){
    d={kind:'create',colEl:col,colIdx:+col.dataset.col,x0:ev.clientX,y0:ev.clientY,moved:false,
       startMin:snap(minFromY(ev.clientY))};
  }else if(mcell){
    d={kind:'mcell',cell:mcell,x0:ev.clientX,y0:ev.clientY,moved:false};
  }else return;
  drag=d;
  window.addEventListener('pointermove',onPointerMove,{passive:false});
  window.addEventListener('pointerup',onPointerUp,{passive:false});
  window.addEventListener('pointercancel',onPointerUp);
  if(d.node)d.node.style.cursor='grabbing';
  ev.preventDefault();
}
function markMoved(ev){if(!drag.moved&&(Math.abs(ev.clientX-drag.x0)>DRAG_THRESH||Math.abs(ev.clientY-drag.y0)>DRAG_THRESH)){drag.moved=true;document.body.classList.add('dragging');}}
function onPointerMove(ev){
  if(!drag)return;ev.preventDefault();markMoved(ev);
  const k=drag.kind;
  if(k==='create'){
    if(!drag.moved)return;
    let m=snap(minFromY(ev.clientY));
    const a=Math.min(drag.startMin,m),b=Math.max(drag.startMin,m);
    const top=a*PXMIN,h=Math.max((b-a),MIN_DUR)*PXMIN;
    if(!drag.prev){drag.prev=el('div',{class:'preview'});drag.colEl.append(drag.prev);
      const hint=drag.colEl.querySelector('[data-hint]');if(hint)hint.style.display='none';}
    drag.prev.style.top=top+'px';drag.prev.style.height=h+'px';
    drag.prev.textContent=fmtRange(mkDate(addDays(WK.ws,drag.colIdx),a),mkDate(addDays(WK.ws,drag.colIdx),Math.max(b,a+MIN_DUR)));
  }else if(k==='evt-move'){
    if(!drag.moved)return;
    drag.node.classList.add('is-active');
    const dur=(drag.origEnd-drag.origStart)/60000;
    const dCol=colFromX(ev.clientX)-drag.grabCol;
    let sMin=snap(minutesOf(drag.origStart)+(minFromY(ev.clientY)-drag.grabMin));
    sMin=clamp(snap(sMin),0,DAY_MIN-dur);
    const newCol=clamp(daysBetween(WK.ws,drag.origStart)+dCol,0,6);
    drag.node.style.top=(sMin*PXMIN)+'px';
    drag.node.style.left='2px';drag.node.style.width='calc(100% - 4px)';
    if(WK.cols[newCol]!==drag.node.parentElement)WK.cols[newCol].append(drag.node);
    drag._commit={col:newCol,sMin,dur};
  }else if(k==='resize-bot'||k==='resize-top'){
    if(!drag.moved)return;
    drag.node.classList.add('is-active');
    const sMin0=minutesOf(drag.origStart),eMin0=Math.max(sMin0+MIN_DUR,(drag.origEnd-startOfDay(drag.origStart))/60000);
    let s=sMin0,e=eMin0,m=snap(minFromY(ev.clientY));
    if(k==='resize-bot')e=clamp(m,s+MIN_DUR,DAY_MIN);else s=clamp(m,0,e-MIN_DUR);
    drag.node.style.top=(s*PXMIN)+'px';drag.node.style.height=Math.max((e-s)*PXMIN,15)+'px';
    drag.node.classList.toggle('short',(e-s)*PXMIN<34);
    drag._commit={s,e};
  }else if(k==='mmove'){
    if(!drag.moved)return;drag.node.style.opacity='.5';
    const cell=document.elementFromPoint(ev.clientX,ev.clientY)?.closest?.('.mcell');
    if(drag._dropCell&&drag._dropCell!==cell)drag._dropCell.classList.remove('drop');
    if(cell){cell.classList.add('drop');drag._dropCell=cell;}
  }else if(k==='allmove'){
    if(!drag.moved)return;drag.node.style.opacity='.5';
    const cell=document.elementFromPoint(ev.clientX,ev.clientY)?.closest?.('.wk-allcell,.wk-col');
    if(drag._dropCell&&drag._dropCell!==cell)drag._dropCell.classList.remove('drop');
    if(cell){cell.classList.add('drop');drag._dropCell=cell;}
  }
}
function onPointerUp(ev){
  if(!drag)return;
  window.removeEventListener('pointermove',onPointerMove);
  window.removeEventListener('pointerup',onPointerUp);
  window.removeEventListener('pointercancel',onPointerUp);
  const k=drag.kind,moved=drag.moved;
  document.body.classList.remove('dragging');
  if(drag.node)drag.node.style.cursor='';
  if(drag._dropCell)drag._dropCell.classList.remove('drop');
  if(drag.prev)drag.prev.remove();

  if(!moved){
    // CLICK behaviors
    if(k==='evt-move'||k==='resize-bot'||k==='resize-top'||k==='allmove'||k==='mmove'){
      openEditor(drag.e,(drag.node||ev.target).getBoundingClientRect());
    }else if(k==='create'){
      const s=drag.startMin,e=Math.min(s+60,DAY_MIN);
      createTimed(addDays(WK.ws,drag.colIdx),s,Math.max(e,s+MIN_DUR));
    }else if(k==='mcell'){
      const day=parseDate(drag.cell.dataset.day+'T00:00');
      if(matchMedia('(max-width:560px)').matches&&eventsForDay(day).length)openAgenda(day,drag.cell);
      else createAllDay(day);
    }
    drag=null;return;
  }
  // DRAG commits
  if(k==='create'){
    let m=snap(minFromY(ev.clientY));const a=Math.min(drag.startMin,m),b=Math.max(drag.startMin,m);
    createTimed(addDays(WK.ws,drag.colIdx),a,Math.max(b,a+MIN_DUR));
  }else if(k==='evt-move'&&drag._commit){
    const c=drag._commit,base=addDays(WK.ws,c.col);
    drag.e.start=ymdhm(mkDate(base,c.sMin));drag.e.end=ymdhm(mkDate(base,c.sMin+c.dur));
    save();renderAll();toast('Event moved','move');
  }else if((k==='resize-bot'||k==='resize-top')&&drag._commit){
    const base=startOfDay(drag.origStart);
    drag.e.start=ymdhm(mkDate(base,drag._commit.s));drag.e.end=ymdhm(mkDate(base,drag._commit.e));
    save();renderAll();toast('Event resized','move');
  }else if(k==='mmove'&&drag._dropCell){
    const dd=daysBetween(drag.origDay,parseDate(drag._dropCell.dataset.day+'T00:00'));
    if(dd!==0)shiftEventDays(drag.e,dd);else renderAll();
  }else if(k==='allmove'&&drag._dropCell){
    const dd=daysBetween(startOfDay(evStart(drag.e)),parseDate(drag._dropCell.dataset.day+'T00:00'));
    if(dd!==0)shiftEventDays(drag.e,dd);else renderAll();
  }else renderAll();
  drag=null;
}
function shiftEventDays(e,dd){
  if(e.allDay){e.start=ymd(addDays(evStart(e),dd));e.end=ymd(addDays(evEnd(e),dd));}
  else{e.start=ymdhm(addDays(evStart(e),dd));e.end=ymdhm(addDays(evEnd(e),dd));}
  save();renderAll();toast('Event moved','move');
}
function createTimed(day,sMin,eMin){
  const e={id:uid(),title:'New event',cat:lastCat,start:ymdhm(mkDate(day,sMin)),end:ymdhm(mkDate(day,eMin)),allDay:false,location:'',notes:''};
  S.events.push(e);save();renderAll();
  const node=document.querySelector(`.evt[data-id="${e.id}"]`);
  openEditor(e,node?node.getBoundingClientRect():null,true);
}
function createAllDay(day){
  const e={id:uid(),title:'New event',cat:lastCat,start:ymd(day),end:ymd(day),allDay:true,location:'',notes:''};
  S.events.push(e);save();renderAll();
  const node=document.querySelector(`[data-id="${e.id}"]`);
  openEditor(e,node?node.getBoundingClientRect():null,true);
}
function newEventNow(){
  const base=new Date();const sMin=snap(minutesOf(base));
  const day=startOfDay(base);
  setAnchor(base);if(S.view==='month'){/* keep month, create timed today */}
  const e={id:uid(),title:'New event',cat:lastCat,start:ymdhm(mkDate(day,sMin)),end:ymdhm(mkDate(day,Math.min(sMin+60,DAY_MIN))),allDay:false,location:'',notes:''};
  S.events.push(e);save();renderAll();
  const node=document.querySelector(`[data-id="${e.id}"]`);
  openEditor(e,node?node.getBoundingClientRect():null,true);
}

/* ===================================================== TOASTS + DELETE/UNDO */
function toastIcon(k){return k==='err'?ICON.close:k==='del'?ICON.trash:(k==='move'?ICON.clock:ICON.check2);}
function toast(msg,kind,undoFn){
  const t=el('div',{class:'toast'+(kind==='err'?' err':''),role:kind==='err'?'alert':'status'});
  t.append(el('span',{class:'ti',html:toastIcon(kind),'aria-hidden':'true'}));
  t.append(el('span',{text:msg}));
  let to;const dismiss=()=>{clearTimeout(to);t.classList.remove('on');setTimeout(()=>t.remove(),250);};
  if(undoFn)t.append(el('button',{class:'undo',type:'button',text:'Undo',onclick:()=>{undoFn();dismiss();}}));
  D.toastHost.append(t);requestAnimationFrame(()=>t.classList.add('on'));
  to=setTimeout(dismiss,undoFn?6000:3200);
}
function deleteEvent(e){
  const idx=S.events.indexOf(e);if(idx<0)return;
  S.events.splice(idx,1);save();renderAll();
  toast('Event deleted','del',()=>{S.events.splice(Math.min(idx,S.events.length),0,e);save();renderAll();});
}

/* ===================================================== POPOVER CORE */
let popState=null;
function positionPopover(rect){
  const pop=D.popover;if(matchMedia('(max-width:640px)').matches)return;
  const pw=pop.offsetWidth,ph=pop.offsetHeight,m=10;
  let left,top;
  if(rect){left=rect.left;if(left+pw>innerWidth-m)left=rect.right-pw;left=clamp(left,m,innerWidth-pw-m);
    top=rect.bottom+8;if(top+ph>innerHeight-m)top=Math.max(m,rect.top-ph-8);}
  else{left=(innerWidth-pw)/2;top=Math.max(m,(innerHeight-ph)/2);}
  pop.style.left=left+'px';pop.style.top=top+'px';
}
function trapFocus(e){
  if(e.key==='Escape'){e.preventDefault();closePopover();return;}
  if(e.key!=='Tab')return;
  const f=[...D.popover.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),textarea,select,[tabindex]:not([tabindex="-1"])')].filter(x=>x.offsetParent!==null||x===document.activeElement);
  if(!f.length)return;const first=f[0],last=f[f.length-1];
  if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
  else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
}
function openPopover(buildFn,rect,onKey){
  closePopover(true);
  const pop=D.popover;pop.replaceChildren();pop.hidden=false;pop.style.left='-9999px';pop.style.top='0';
  buildFn(pop);
  D.popBackdrop.hidden=false;
  const lastFocus=document.activeElement;
  popState={lastFocus,onKey};
  pop.addEventListener('keydown',trapFocus);
  if(onKey)pop.addEventListener('keydown',onKey);
  D.popBackdrop.onclick=()=>closePopover();
  requestAnimationFrame(()=>{D.popBackdrop.classList.add('on');pop.classList.add('on');positionPopover(rect);});
}
function closePopover(immediate){
  const pop=D.popover;if(pop.hidden)return;
  pop.removeEventListener('keydown',trapFocus);
  if(popState&&popState.onKey)pop.removeEventListener('keydown',popState.onKey);
  const lf=popState&&popState.lastFocus;popState=null;
  pop.classList.remove('on');D.popBackdrop.classList.remove('on');D.popBackdrop.onclick=null;
  const fin=()=>{pop.hidden=true;D.popBackdrop.hidden=true;pop.replaceChildren();};
  if(immediate)fin();else setTimeout(fin,200);
  if(lf&&lf.focus&&!immediate)try{lf.focus();}catch(_){}
}

/* ===================================================== EVENT EDITOR */
function openEditor(e,rect,isNew){
  let cat=e.cat,allDay=!!e.allDay;
  const s=evStart(e),en=evEnd(e);
  let titleIn,catWrap,errEl,startDate,startTime,endDate,endTime,timeRows,allInput,locIn,noteIn;
  const build=pop=>{
    pop.style.setProperty('--cat',CAT[cat].color);
    pop.setAttribute('aria-label',isNew?'New event':'Edit event');
    const accent=el('div',{class:'pop-accent'});
    titleIn=el('input',{class:'pop-title',type:'text',value:e.title||'',placeholder:'Add title','aria-label':'Event title',maxlength:'120'});
    const closeBtn=el('button',{class:'pop-x',type:'button','aria-label':'Close',html:ICON.close,onclick:()=>closePopover()});
    const head=el('div',{class:'pop-head'},[titleIn,closeBtn]);
    // category
    catWrap=el('div',{class:'cat-picker',role:'group','aria-label':'Calendar'});
    CATS.forEach(c=>{const b=el('button',{class:'cat-swatch',type:'button',style:{'--cat':c.color},
      'aria-pressed':String(c.id===cat),'aria-label':c.name,title:c.name,html:ICON.check2,
      onclick:()=>{cat=c.id;[...catWrap.children].forEach(ch=>ch.setAttribute('aria-pressed',String(ch===b)));pop.style.setProperty('--cat',CAT[cat].color);accent.style.background=CAT[cat].color;}});catWrap.append(b);});
    // all-day switch
    allInput=el('input',{type:'checkbox',checked:allDay?true:null,'aria-label':'All day'});
    allInput.addEventListener('change',()=>{allDay=allInput.checked;timeRows.forEach(r=>r.style.display=allDay?'none':'');});
    const sw=el('label',{class:'allday-toggle'},[el('span',{text:'All-day'}),
      el('span',{class:'switch'},[allInput,el('span',{class:'track'}),el('span',{class:'knob'})])]);
    // date/time
    startDate=el('input',{class:'in in-date',type:'date',value:ymd(s),'aria-label':'Start date'});
    startTime=el('input',{class:'in in-time',type:'time',value:`${pad(s.getHours())}:${pad(s.getMinutes())}`,'aria-label':'Start time',step:'900'});
    endDate=el('input',{class:'in in-date',type:'date',value:ymd(en),'aria-label':'End date'});
    endTime=el('input',{class:'in in-time',type:'time',value:`${pad(en.getHours())}:${pad(en.getMinutes())}`,'aria-label':'End time',step:'900'});
    const stRow=el('div',{class:'dt-row'},[startDate,startTime]);
    const enRow=el('div',{class:'dt-row'},[endDate,endTime]);
    timeRows=[startTime,endTime];if(allDay)timeRows.forEach(r=>r.style.display='none');
    errEl=el('div',{class:'pop-err',role:'alert'},[el('span',{html:ICON.close}),el('span',{class:'errmsg'})]);
    locIn=el('input',{class:'in',type:'text',value:e.location||'',placeholder:'Add location','aria-label':'Location',maxlength:'120'});
    noteIn=el('textarea',{class:'in',placeholder:'Add notes','aria-label':'Notes',maxlength:'600'});noteIn.value=e.notes||'';
    const foot=el('div',{class:'pop-foot'});
    if(!isNew)foot.append(el('button',{class:'del-btn',type:'button','aria-label':'Delete event',html:ICON.trash,onclick:()=>{closePopover();deleteEvent(e);}}));
    foot.append(el('div',{class:'spacer'}));
    foot.append(el('button',{class:'btn ghost',type:'button',text:'Cancel',onclick:()=>closePopover()}));
    foot.append(el('button',{class:'btn primary',type:'button',text:isNew?'Create':'Save',onclick:doSave}));
    const bodyEl=el('div',{class:'pop-body'},[head,
      el('div',{class:'field'},[el('div',{class:'field-label',html:ICON.cal+'<span>Calendar</span>'}),catWrap]),
      el('div',{class:'field'},[sw]),
      el('div',{class:'field'},[el('div',{class:'field-label',html:ICON.clock+'<span>Starts</span>'}),stRow]),
      el('div',{class:'field'},[el('div',{class:'field-label',html:ICON.clock+'<span>Ends</span>'}),enRow]),
      errEl,
      el('div',{class:'field'},[el('div',{class:'field-label',html:ICON.pin+'<span>Location</span>'}),locIn]),
      el('div',{class:'field'},[el('div',{class:'field-label',html:ICON.note+'<span>Notes</span>'}),noteIn]),
      foot]);
    pop.append(accent,bodyEl);
  };
  function showErr(msg,field){errEl.querySelector('.errmsg').textContent=msg;errEl.classList.add('on');
    if(field){field.classList.add('err');field.focus();}}
  function clearErr(){errEl.classList.remove('on');[titleIn,startDate,endDate].forEach(x=>x&&x.classList.remove('err'));}
  function doSave(){
    clearErr();
    const title=titleIn.value.trim();
    if(!title){showErr('Add a title for this event.',titleIn);return;}
    let ns,ne;
    if(allDay){ns=parseDate(startDate.value+'T00:00');ne=parseDate(endDate.value+'T00:00');
      if(isNaN(ns)||isNaN(ne)){showErr('Pick valid dates.',startDate);return;}
      if(ne<ns){showErr('End date is before the start date.',endDate);return;}
      e.start=startDate.value;e.end=endDate.value;}
    else{ns=parseDate(startDate.value+'T'+startTime.value);ne=parseDate(endDate.value+'T'+endTime.value);
      if(isNaN(ns)||isNaN(ne)){showErr('Pick valid date and time.',startDate);return;}
      if(ne<=ns){showErr('End time must be after the start time.',endDate);return;}
      e.start=ymdhm(ns);e.end=ymdhm(ne);}
    e.title=title;e.cat=cat;e.allDay=allDay;e.location=locIn.value.trim();e.notes=noteIn.value.trim();
    lastCat=cat;save();renderAll();closePopover();toast(isNew?'Event created':'Event updated','ok');
  }
  const onKey=ev=>{if((ev.metaKey||ev.ctrlKey)&&ev.key==='Enter'){ev.preventDefault();doSave();}};
  openPopover(build,rect,onKey);
  requestAnimationFrame(()=>{titleIn.focus();if(isNew)titleIn.select();});
}

/* ===================================================== DAY AGENDA POPOVER */
function openAgenda(day,anchorEl){
  const build=pop=>{
    pop.style.setProperty('--cat',CAT.work.color);
    const list=eventsForDay(day).sort((a,b)=>(a.allDay?0:1)-(b.allDay?0:1)||evStart(a)-evStart(b));
    const head=el('div',{class:'agenda-head'},[
      el('h3',{text:fmt(day,{weekday:'long',month:'long',day:'numeric'})}),
      el('button',{class:'pop-x',type:'button','aria-label':'Close',html:ICON.close,onclick:()=>closePopover()})]);
    const ul=el('div',{class:'agenda-list'});
    if(!list.length)ul.append(el('div',{class:'agenda-empty',text:'No events. Click a day or drag in week view to add one.'}));
    for(const e of list){const c=CAT[e.cat];
      ul.append(el('button',{class:'agenda-item',type:'button',style:{'--cat':c.color},'aria-label':eventAria(e),
        onclick:()=>{const r=D.popover.getBoundingClientRect();closePopover(true);openEditor(e,r);}},[
        el('span',{class:'bar'}),
        el('span',{class:'ai-t',text:e.title||'(no title)'}),
        el('span',{class:'ai-m',text:e.allDay?'all-day':fmtTime(evStart(e))})]));}
    const foot=el('div',{class:'pop-foot',style:{marginTop:'12px'}},[el('div',{class:'spacer'}),
      el('button',{class:'btn primary',type:'button',text:'New event',onclick:()=>{closePopover(true);createAllDay(day);}})]);
    pop.append(el('div',{class:'pop-accent'}),el('div',{class:'pop-body'},[head,ul,foot]));
  };
  openPopover(build,anchorEl?anchorEl.getBoundingClientRect():null);
  requestAnimationFrame(()=>{const b=D.popover.querySelector('.agenda-item,.btn.primary');if(b)b.focus();});
}

/* ===================================================== KEYBOARD NAV */
let focusDay=null,focusSlot=null;
function applyMonthFocus(){
  document.querySelectorAll('.mcell.kf').forEach(c=>c.classList.remove('kf'));
  if(!focusDay)return;
  const cell=document.querySelector(`.mcell[data-day="${ymd(focusDay)}"]`);
  const grid=document.querySelector('.month-grid');
  if(cell){cell.classList.add('kf');if(grid){grid.setAttribute('aria-activedescendant',cell.id);grid.focus();}}
}
function setFocusDay(d){
  const first=startOfWeek(startOfMonth(anchorDate()));
  if(d<first||d>addDays(first,41)){setAnchor(d);miniAnchor=startOfMonth(d);focusDay=d;renderAll();applyMonthFocus();}
  else{focusDay=d;applyMonthFocus();}
}
function monthKey(e){
  const today=startOfDay(new Date());
  if(!focusDay)focusDay=sameDay(startOfMonth(anchorDate()),startOfMonth(today))?today:startOfWeek(startOfMonth(anchorDate()));
  let nf=null,handled=true;
  switch(e.key){
    case'ArrowLeft':nf=addDays(focusDay,-1);break;
    case'ArrowRight':nf=addDays(focusDay,1);break;
    case'ArrowUp':nf=addDays(focusDay,-7);break;
    case'ArrowDown':nf=addDays(focusDay,7);break;
    case'Home':nf=startOfWeek(focusDay);break;
    case'End':nf=addDays(startOfWeek(focusDay),6);break;
    case'PageUp':nf=addMonths(focusDay,-1);break;
    case'PageDown':nf=addMonths(focusDay,1);break;
    case'Enter':e.preventDefault();createAllDay(focusDay);return;
    case' ':e.preventDefault();openAgenda(focusDay,document.querySelector(`.mcell[data-day="${ymd(focusDay)}"]`));return;
    default:handled=false;
  }
  if(handled){e.preventDefault();setFocusDay(nf);}
}
function applyWeekFocus(){
  document.querySelectorAll('.wk-col.kf').forEach(c=>c.classList.remove('kf'));
  if(!WK||!focusSlot)return;
  const col=WK.cols[focusSlot.dayIdx];if(!col)return;col.classList.add('kf');
  const sc=WK.slotcur;sc.classList.add('on');sc.style.top=(focusSlot.min*PXMIN)+'px';sc.style.height=(SNAP*PXMIN)+'px';
  col.append(sc);
  const y=focusSlot.min*PXMIN;const top=WK.scroll.scrollTop,h=WK.scroll.clientHeight;
  if(y<top+10)WK.scroll.scrollTop=Math.max(0,y-10);else if(y>top+h-30)WK.scroll.scrollTop=y-h+40;
  WK.body.focus();
}
function weekKey(e){
  if(!WK)return;
  if(!focusSlot){const idx=clamp(daysBetween(WK.ws,startOfDay(new Date())),0,6);focusSlot={dayIdx:idx,min:9*60};}
  let handled=true;
  switch(e.key){
    case'ArrowUp':focusSlot.min=clamp(focusSlot.min-SNAP,0,DAY_MIN-SNAP);break;
    case'ArrowDown':focusSlot.min=clamp(focusSlot.min+SNAP,0,DAY_MIN-SNAP);break;
    case'ArrowLeft':if(focusSlot.dayIdx<=0){go(-1);focusSlot.dayIdx=6;}else focusSlot.dayIdx--;break;
    case'ArrowRight':if(focusSlot.dayIdx>=6){go(1);focusSlot.dayIdx=0;}else focusSlot.dayIdx++;break;
    case'Enter':e.preventDefault();createTimed(addDays(WK.ws,focusSlot.dayIdx),focusSlot.min,Math.min(focusSlot.min+60,DAY_MIN));return;
    default:handled=false;
  }
  if(handled){e.preventDefault();applyWeekFocus();}
}

/* ===================================================== GLOBAL KEYS */
function onKeyGlobal(e){
  if(!D.popover.hidden)return;                              // popover traps its own keys
  const tag=(e.target.tagName||'').toLowerCase();
  const typing=tag==='input'||tag==='textarea'||tag==='select'||e.target.isContentEditable;
  if(e.key==='?'||(e.shiftKey&&e.key==='/')){if(!typing){e.preventDefault();openShortcuts();}return;}
  if(typing){if(e.key==='Escape')e.target.blur();return;}
  const en=e.target.closest&&e.target.closest('.evt,.allbar,.mchip,.mbar');
  if(en){const ev=getEvent(en.dataset.id);
    if(e.key==='Enter'||e.key===' '){e.preventDefault();if(ev)openEditor(ev,en.getBoundingClientRect());return;}
    if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();if(ev)deleteEvent(ev);return;}}
  switch(e.key){
    case'm':case'M':setView('month');return;
    case'w':case'W':setView('week');return;
    case't':case'T':goToday();return;
    case'n':case'N':e.preventDefault();newEventNow();return;
    case'/':e.preventDefault();D.search.focus();return;
  }
  if(e.target.classList&&e.target.classList.contains('month-grid')){monthKey(e);return;}
  if(e.target.classList&&e.target.classList.contains('wk-body')){weekKey(e);return;}
  if(e.key==='ArrowLeft'&&(e.target===document.body||(e.target.closest&&e.target.closest('.main')))){e.preventDefault();go(-1);}
  if(e.key==='ArrowRight'&&(e.target===document.body||(e.target.closest&&e.target.closest('.main')))){e.preventDefault();go(1);}
}
function onFocusIn(e){
  if(e.target.classList&&e.target.classList.contains('month-grid')&&!focusDay){
    const today=startOfDay(new Date());
    focusDay=sameDay(startOfMonth(anchorDate()),startOfMonth(today))?today:startOfWeek(startOfMonth(anchorDate()));applyMonthFocus();}
  if(e.target.classList&&e.target.classList.contains('wk-body')&&!focusSlot){
    const idx=clamp(daysBetween(WK.ws,startOfDay(new Date())),0,6);focusSlot={dayIdx:idx,min:9*60};applyWeekFocus();}
}

/* ===================================================== SHORTCUTS OVERLAY */
function openShortcuts(){
  const rows=[['M','Month view'],['W','Week view'],['T','Go to today'],['← / →','Previous / next'],
    ['N','New event'],['Enter','Create / edit focused'],['Del','Delete focused event'],['/','Search'],
    ['Drag','Create in week grid'],['Esc','Close']];
  openPopover(pop=>{
    pop.style.setProperty('--cat',CAT.work.color);
    const grid=el('div',{class:'sc-grid'});
    rows.forEach(([k,d])=>grid.append(el('div',{class:'sc-item'},[el('span',{text:d}),el('kbd',{text:k})])));
    pop.append(el('div',{class:'pop-accent'}),el('div',{class:'pop-body sc-card'},[
      el('div',{class:'agenda-head'},[el('h3',{text:'Keyboard shortcuts'}),
        el('button',{class:'pop-x',type:'button','aria-label':'Close',html:ICON.close,onclick:()=>closePopover()})]),grid]));
  },null);
  requestAnimationFrame(()=>{const b=D.popover.querySelector('.pop-x');if(b)b.focus();});
}

/* ===================================================== SEARCH */
function updateSearchUI(){D.searchWrap.classList.toggle('has-q',!!query);}
let searchT=null;
function onSearch(){query=D.search.value.trim();clearTimeout(searchT);searchT=setTimeout(()=>renderAll(),120);}

/* ===================================================== WIRING + INIT */
function wire(){
  D.prevBtn.onclick=()=>go(-1);D.nextBtn.onclick=()=>go(1);
  D.todayBtn.onclick=goToday;D.newBtn.onclick=newEventNow;
  D.monthTab.onclick=()=>setView('month');D.weekTab.onclick=()=>setView('week');
  D.miniPrev.onclick=()=>{miniAnchor=addMonths(miniAnchor,-1);renderMini();};
  D.miniNext.onclick=()=>{miniAnchor=addMonths(miniAnchor,1);renderMini();};
  D.search.addEventListener('input',onSearch);
  D.searchClear.onclick=()=>{D.search.value='';query='';updateSearchUI();renderAll();D.search.focus();};
  D.menuBtn.onclick=()=>{const o=D.app.classList.toggle('nav-open');D.menuBtn.setAttribute('aria-expanded',String(o));};
  D.scrim.removeAttribute('hidden');
  D.scrim.onclick=()=>{D.app.classList.remove('nav-open');D.menuBtn.setAttribute('aria-expanded','false');};
  D.viewHost.addEventListener('pointerdown',onPointerDown);
  document.addEventListener('keydown',onKeyGlobal);
  document.addEventListener('focusin',onFocusIn);
  let rt=null;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{
    if(S.view==='month')clampMonthCells();else placeNow();},120);});
  window.addEventListener('visibilitychange',()=>{if(!document.hidden)placeNow();});
}
function showSkeleton(){
  const sk=el('div',{class:'skel','aria-hidden':'true'});
  for(let r=0;r<6;r++){const row=el('div',{class:'skel-row'});
    for(let c=0;c<7;c++)row.append(el('div',{class:'skel-cell shimmer'}));sk.append(row);}
  D.viewHost.replaceChildren(sk);
}
function init(){
  load();wire();
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const start=()=>{renderAll();if(loadError)toast('Couldn’t read saved data — started fresh.','err');};
  if(reduce){start();}else{showSkeleton();setTimeout(start,360);}
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
