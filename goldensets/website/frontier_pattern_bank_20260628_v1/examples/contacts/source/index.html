<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="description" content="Rolodex — a calm, beautifully typeset personal address book. Sample directory with illustrative data.">
<title>Rolodex — Address Book</title>
<style>
/* ============================================================================
   ROLODEX — a refined personal address book / directory
   Calm warm-paper surface · immaculate list rhythm · per-person avatar colors
   Tokens first. Everything is built only from these.
   ========================================================================== */
:root{
  /* --- Warm paper surfaces (canvas behind panels is a touch deeper) --- */
  --canvas:    #EFEBE3;   /* gaps / behind panels */
  --surface:   #FCFBF7;   /* panels: list, detail */
  --surface-2: #F4F1EA;   /* hover well */
  --surface-3: #EDE8DD;   /* selected row */
  --surface-raise:#FFFFFF;/* modal, popovers */

  /* --- Warm-tinted neutral ink ramp (>=4 steps) --- */
  --ink:   #25282C;   /* primary text */
  --ink-2: #4C5159;   /* secondary (AA 7+) */
  --ink-3: #6A6F77;   /* muted (AA 4.7 on surface) */
  --ink-4: #8C9099;   /* faint decor / disabled */
  --line:  #E4DFD4;   /* borders */
  --line-2:#EFEBE1;   /* hairlines */

  /* --- Accent: muted petrol / pine (restrained, calm-professional) --- */
  --accent:       #2F6E66;   /* fills w/ white text (AA 5.0) */
  --accent-strong:#23544D;   /* hover / active / link text */
  --accent-tint:  #E4EEEB;   /* selected wash */
  --accent-bar:   #2F6E66;   /* selected left rail */

  /* --- Functional --- */
  --gold:   #C2941A;   /* starred */
  --gold-soft:#F4E9C4;
  --danger: #B23A2E;
  --danger-tint:#F6E3DF;
  --focus:  #3C7FB0;   /* focus ring (distinct from accent) */

  /* --- Fluid type scale (minor third ~1.2, body >=16px) --- */
  --t-2xs: clamp(10.5px,.35vw + 9.4px, 11.5px);
  --t-xs:  clamp(11.5px,.25vw + 10.7px,12.5px);
  --t-sm:  clamp(13px, .25vw + 12px,  13.5px);
  --t-base:clamp(15px, .3vw  + 14px,  16px);
  --t-md:  clamp(16px, .45vw + 15px,  17.5px);
  --t-lg:  clamp(18px, .6vw  + 16px,  20px);
  --t-xl:  clamp(22px, 1.1vw + 18px,  27px);
  --t-2xl: clamp(27px, 2vw   + 19px,  36px);

  /* --- Type families: tuned system stacks (no network, premium on target) --- */
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,ui-serif,serif;
  --sans: -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif;
  --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;

  /* --- 4px spacing scale --- */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s7:32px; --s8:40px; --s9:56px;

  /* --- Named radii --- */
  --r-sm:8px; --r-md:12px; --r-lg:18px; --r-xl:24px; --r-full:999px;

  /* --- Elevation (<=3 tiers) --- */
  --e1:0 1px 2px rgba(40,36,28,.05), 0 1px 1px rgba(40,36,28,.04);
  --e2:0 6px 18px rgba(40,36,28,.10), 0 2px 6px rgba(40,36,28,.06);
  --e3:0 22px 60px rgba(33,30,24,.26), 0 6px 20px rgba(33,30,24,.16);

  /* --- Motion --- */
  --dur:180ms; --dur-lg:280ms;
  --ease:cubic-bezier(.2,.7,.2,1);

  --list-w: clamp(320px, 32vw, 392px);
}

*{box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  margin:0; background:var(--canvas); color:var(--ink);
  font-family:var(--sans); font-size:var(--t-base); line-height:1.5;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow:hidden;
}
:focus{outline:none}
:focus-visible{outline:2.5px solid var(--focus); outline-offset:2px; border-radius:6px}
button{font:inherit; color:inherit; cursor:pointer; background:none; border:none}
input,select,textarea{font:inherit; color:inherit}
mark{background:var(--gold-soft); color:var(--ink); border-radius:3px; padding:0 1px; box-decoration-break:clone}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.skip{position:fixed;left:50%;top:8px;transform:translate(-50%,-150%);z-index:200;background:var(--accent);color:#fff;
  padding:10px 16px;border-radius:var(--r-full);box-shadow:var(--e2);transition:transform var(--dur) var(--ease);font-size:var(--t-sm);font-weight:600}
.skip:focus-visible{transform:translate(-50%,0)}
svg{display:block}
.ic{width:18px;height:18px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
.ic--sm{width:15px;height:15px}

/* ============================== App shell ============================== */
.app{height:100dvh;display:flex;flex-direction:column}

.topbar{
  display:flex;align-items:center;gap:var(--s4);
  padding:var(--s3) var(--s5);
  background:var(--surface);border-bottom:1px solid var(--line);
  box-shadow:var(--e1);z-index:30;
}
.brand{display:flex;align-items:center;gap:var(--s3);flex:none}
.brand__mark{
  width:34px;height:34px;border-radius:10px;flex:none;
  background:linear-gradient(150deg,var(--accent),var(--accent-strong));
  display:grid;place-items:center;color:#fff;box-shadow:var(--e1)}
.brand__mark .ic{stroke-width:1.9}
.brand__txt{display:flex;flex-direction:column;line-height:1.05}
.brand__name{font-family:var(--serif);font-size:var(--t-lg);font-weight:600;letter-spacing:.1px}
.brand__sub{font-size:var(--t-2xs);color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase}

.search{position:relative;flex:1 1 auto;max-width:460px;margin-inline:auto}
.search__ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none}
.search input{
  width:100%;height:42px;border:1px solid var(--line);background:var(--surface-2);
  border-radius:var(--r-full);padding:0 40px 0 42px;color:var(--ink);font-size:var(--t-sm);
  transition:border-color var(--dur),background var(--dur),box-shadow var(--dur)}
.search input::placeholder{color:var(--ink-3)}
.search input:hover{border-color:#d9d3c6}
.search input:focus-visible{background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint);outline:none}
.search__kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-family:var(--mono);font-size:11px;color:var(--ink-3);border:1px solid var(--line);
  border-radius:6px;padding:1px 6px;background:var(--surface);pointer-events:none}
.search__clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:28px;height:28px;border-radius:var(--r-full);display:none;place-items:center;color:var(--ink-3)}
.search__clear:hover{background:var(--surface-3);color:var(--ink)}
.search.has-q .search__kbd{display:none}
.search.has-q .search__clear{display:grid}

.actions{display:flex;align-items:center;gap:var(--s2);flex:none}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:var(--s2);height:42px;padding:0 var(--s4);
  border-radius:var(--r-full);font-size:var(--t-sm);font-weight:600;border:1px solid transparent;
  transition:background var(--dur),border-color var(--dur),color var(--dur),box-shadow var(--dur),transform var(--dur);white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn--primary{background:var(--accent);color:#fff;box-shadow:var(--e1)}
.btn--primary:hover{background:var(--accent-strong)}
.btn--ghost{background:var(--surface);border-color:var(--line);color:var(--ink-2)}
.btn--ghost:hover{background:var(--surface-2);border-color:#d9d3c6;color:var(--ink)}
.btn--icon{width:42px;height:42px;padding:0;justify-content:center;border-radius:var(--r-full);background:var(--surface);border:1px solid var(--line);color:var(--ink-2)}
.btn--icon:hover{background:var(--surface-2);border-color:#d9d3c6;color:var(--ink)}
.btn--danger{background:var(--surface);border:1px solid var(--line);color:var(--danger)}
.btn--danger:hover{background:var(--danger-tint);border-color:#e7c6c0}
.btn[disabled]{opacity:.45;cursor:not-allowed;transform:none}
.btn__label--full{display:inline}

/* overflow menu */
.menu-wrap{position:relative}
.menu{position:absolute;right:0;top:calc(100% + 8px);min-width:204px;background:var(--surface-raise);
  border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--e2);padding:6px;z-index:60;
  display:none;animation:pop var(--dur) var(--ease)}
.menu.open{display:block}
.menu button{width:100%;display:flex;align-items:center;gap:var(--s3);padding:9px 10px;border-radius:var(--r-sm);
  font-size:var(--t-sm);color:var(--ink-2);text-align:left}
.menu button:hover{background:var(--surface-2);color:var(--ink)}
.menu .ic{color:var(--ink-3)}
.menu hr{border:none;border-top:1px solid var(--line-2);margin:5px 4px}
@keyframes pop{from{opacity:0;transform:translateY(-4px) scale(.98)}to{opacity:1;transform:none}}

/* ============================== Body / panes ============================== */
.body{flex:1 1 auto;display:flex;min-height:0;background:var(--canvas);gap:1px;position:relative;overflow:hidden}

.list-pane{
  width:var(--list-w);flex:none;display:flex;flex-direction:column;min-height:0;
  background:var(--surface);border-right:1px solid var(--line)}
.list-head{padding:var(--s3) var(--s4) var(--s2);border-bottom:1px solid var(--line-2);flex:none}
.filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border-radius:var(--r-full);
  font-size:var(--t-xs);font-weight:600;color:var(--ink-2);background:var(--surface-2);
  border:1px solid transparent;white-space:nowrap;transition:background var(--dur),color var(--dur),border-color var(--dur)}
.chip:hover{background:var(--surface-3)}
.chip[aria-pressed="true"]{background:var(--accent-tint);color:var(--accent-strong);border-color:#cfe1dc}
.chip .ic{width:14px;height:14px;stroke-width:2}
.chip__count{font-size:10px;font-weight:700;opacity:.7}
.list-meta{display:flex;align-items:center;justify-content:space-between;margin-top:var(--s2);padding:0 2px}
.list-count{font-size:var(--t-2xs);color:var(--ink-3);letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.sort-toggle{display:inline-flex;align-items:center;gap:5px;font-size:var(--t-xs);color:var(--ink-3);font-weight:600;padding:3px 6px;border-radius:var(--r-sm)}
.sort-toggle:hover{background:var(--surface-2);color:var(--ink-2)}

/* scroll region + A-Z rail */
.list-scroll-wrap{position:relative;flex:1 1 auto;min-height:0}
.list-scroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:0 26px var(--s8) 0;scroll-behavior:smooth}
.list-scroll::-webkit-scrollbar{width:9px}
.list-scroll::-webkit-scrollbar-thumb{background:#ddd6c8;border-radius:9px;border:2px solid var(--surface)}
.list-scroll::-webkit-scrollbar-thumb:hover{background:#cfc7b6}

.sec-head{position:sticky;top:0;z-index:5;
  font-family:var(--serif);font-size:var(--t-sm);font-weight:700;color:var(--accent-strong);
  padding:6px var(--s4) 6px var(--s5);
  background:linear-gradient(var(--surface) 70%,rgba(252,251,247,0));
  letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.sec-head::after{content:"";flex:1;height:1px;background:var(--line-2)}

.row{display:flex;align-items:center;gap:var(--s3);width:100%;text-align:left;
  padding:9px var(--s4) 9px var(--s5);position:relative;border-radius:0;
  transition:background var(--dur)}
.row::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:transparent;transition:background var(--dur)}
.row:hover{background:var(--surface-2)}
.row[aria-selected="true"]{background:var(--surface-3)}
.row[aria-selected="true"]::before{background:var(--accent-bar)}
.row.kbd-focus{background:var(--accent-tint)}
.row__av{flex:none}
.row__main{min-width:0;flex:1}
.row__name{font-size:var(--t-base);font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.row__name b{font-weight:600}
.row__sub{font-size:var(--t-xs);color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.row__star{flex:none;color:var(--gold);opacity:0}
.row.is-fav .row__star{opacity:1}

/* avatars */
.av{border-radius:var(--r-full);display:grid;place-items:center;font-weight:650;flex:none;
  font-family:var(--sans);letter-spacing:.2px;overflow:hidden;position:relative;line-height:1}
.av--sm{width:42px;height:42px;font-size:14.5px}
.av--lg{width:88px;height:88px;font-size:32px;box-shadow:var(--e1)}
.av img{width:100%;height:100%;object-fit:cover}
.av__ring{position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 0 0 1px rgba(40,36,28,.06)}

/* A-Z rail */
.rail{position:absolute;right:3px;top:6px;bottom:6px;width:20px;z-index:8;
  display:flex;flex-direction:column;justify-content:center;gap:0;
  user-select:none;-webkit-user-select:none;touch-action:none}
.rail button{flex:1 1 0;min-height:0;display:grid;place-items:center;
  font-size:10px;font-weight:700;color:var(--ink-3);border-radius:4px;width:100%;line-height:1;
  transition:color var(--dur),background var(--dur),transform var(--dur)}
.rail button:hover{color:var(--accent-strong)}
.rail button.active{background:var(--accent);color:#fff;transform:scale(1.05)}
.rail button[disabled]{color:var(--ink-4);opacity:.4;cursor:default;pointer-events:none}
.rail__bubble{position:absolute;right:30px;width:54px;height:54px;border-radius:var(--r-md);
  background:var(--ink);color:#fff;display:grid;place-items:center;font-family:var(--serif);
  font-size:26px;font-weight:700;box-shadow:var(--e2);opacity:0;transform:scale(.7);pointer-events:none;
  transition:opacity var(--dur),transform var(--dur)}
.rail__bubble.show{opacity:1;transform:scale(1)}

/* empty / no-match states */
.list-empty{padding:var(--s8) var(--s5);text-align:center;color:var(--ink-3);display:none}
.list-empty.show{display:block}
.list-empty .ic{width:34px;height:34px;margin:0 auto var(--s3);color:var(--ink-4);stroke-width:1.4}
.list-empty h3{margin:0 0 4px;font-size:var(--t-md);color:var(--ink-2);font-family:var(--serif)}
.list-empty p{margin:0;font-size:var(--t-sm)}
.list-empty button{margin-top:var(--s4)}

/* ============================== Detail ============================== */
.detail-pane{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;background:var(--surface);position:relative}
.detail-scroll{flex:1;overflow-y:auto;overflow-x:hidden}

.detail-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;color:var(--ink-3);padding:var(--s6);gap:var(--s4)}
.detail-empty__art{width:118px;height:118px;color:var(--ink-4)}
.detail-empty h2{margin:0;font-family:var(--serif);font-size:var(--t-lg);color:var(--ink-2);font-weight:600}
.detail-empty p{margin:0;max-width:34ch;font-size:var(--t-sm);line-height:1.6}

.dt{display:none}
.dt.show{display:block}
.dt__hero{position:relative;padding:var(--s7) var(--s7) var(--s5);
  background:radial-gradient(120% 140% at 0% 0%,var(--surface-2),var(--surface));border-bottom:1px solid var(--line-2)}
.dt__back{display:none}
.dt__toolbar{position:absolute;top:var(--s4);right:var(--s5);display:flex;gap:var(--s2)}
.dt__star{width:42px;height:42px;border-radius:var(--r-full);display:grid;place-items:center;
  border:1px solid var(--line);background:var(--surface);color:var(--ink-3);transition:all var(--dur)}
.dt__star:hover{background:var(--surface-2);color:var(--gold)}
.dt__star[aria-pressed="true"]{color:var(--gold);background:var(--gold-soft);border-color:#e8d491}
.dt__star[aria-pressed="true"] .ic{fill:var(--gold)}
.dt__id{display:flex;align-items:flex-end;gap:var(--s5);margin-top:var(--s2);max-width:720px}
.dt__name{font-family:var(--serif);font-size:var(--t-2xl);font-weight:600;line-height:1.05;letter-spacing:-.4px;margin:0}
.dt__role{margin-top:8px;font-size:var(--t-md);color:var(--ink-2)}
.dt__role b{color:var(--accent-strong);font-weight:600}
.dt__labels{display:flex;flex-wrap:wrap;gap:6px;margin-top:var(--s3)}
.tag{font-size:var(--t-2xs);font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  padding:3px 10px;border-radius:var(--r-full);background:var(--surface-3);color:var(--ink-2)}

.dt__quick{display:flex;gap:var(--s2);flex-wrap:wrap;margin-top:var(--s5);max-width:720px}
.quick{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 15px;border-radius:var(--r-full);
  background:var(--surface);border:1px solid var(--line);font-size:var(--t-xs);font-weight:600;color:var(--ink-2);
  transition:all var(--dur)}
.quick:hover{background:var(--accent-tint);border-color:#cfe1dc;color:var(--accent-strong)}
.quick .ic{width:15px;height:15px;color:var(--accent)}
.quick:hover .ic{color:var(--accent-strong)}

.dt__body{padding:var(--s6) var(--s7) var(--s8);max-width:768px}
.field-group{margin-bottom:var(--s6)}
.field-group__h{font-size:var(--t-2xs);font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-3);margin:0 0 var(--s3);padding-bottom:6px;border-bottom:1px solid var(--line-2)}
.info{display:flex;align-items:flex-start;gap:var(--s3);padding:10px 0;border-bottom:1px solid var(--line-2)}
.info:last-child{border-bottom:none}
.info__ic{width:34px;height:34px;border-radius:var(--r-sm);background:var(--surface-2);display:grid;place-items:center;color:var(--ink-3);flex:none;margin-top:1px}
.info__main{flex:1;min-width:0}
.info__type{font-size:var(--t-2xs);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}
.info__val{font-size:var(--t-md);color:var(--ink);word-break:break-word;line-height:1.4}
.info__val a{color:var(--accent-strong);text-decoration:none}
.info__val a:hover{text-decoration:underline}
.info__val.notes{font-size:var(--t-base);color:var(--ink-2);white-space:pre-wrap;line-height:1.65}
.info__copy{flex:none;width:34px;height:34px;border-radius:var(--r-sm);display:grid;place-items:center;color:var(--ink-4);opacity:0;transition:opacity var(--dur),color var(--dur),background var(--dur)}
.info:hover .info__copy{opacity:1}
.info__copy:hover{background:var(--surface-2);color:var(--accent)}
.info__copy.done{color:var(--accent);opacity:1}

/* ============================== Modal / form ============================== */
.scrim{position:fixed;inset:0;background:rgba(33,30,24,.42);backdrop-filter:blur(3px);z-index:100;
  display:none;align-items:flex-start;justify-content:center;padding:var(--s6) var(--s4);overflow-y:auto}
.scrim.open{display:flex;animation:fade var(--dur) var(--ease)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{width:min(640px,100%);background:var(--surface-raise);border-radius:var(--r-lg);box-shadow:var(--e3);
  margin:auto;animation:rise var(--dur-lg) var(--ease)}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
.modal__head{display:flex;align-items:center;justify-content:space-between;gap:var(--s4);
  padding:var(--s5) var(--s6);border-bottom:1px solid var(--line-2);position:sticky;top:0;background:var(--surface-raise);border-radius:var(--r-lg) var(--r-lg) 0 0;z-index:2}
.modal__title{font-family:var(--serif);font-size:var(--t-lg);font-weight:600;margin:0}
.modal__close{width:38px;height:38px;border-radius:var(--r-full);display:grid;place-items:center;color:var(--ink-3)}
.modal__close:hover{background:var(--surface-2);color:var(--ink)}
.modal__body{padding:var(--s5) var(--s6)}
.modal__foot{display:flex;align-items:center;justify-content:space-between;gap:var(--s3);
  padding:var(--s4) var(--s6);border-top:1px solid var(--line-2);position:sticky;bottom:0;background:var(--surface-raise);border-radius:0 0 var(--r-lg) var(--r-lg)}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4) var(--s4)}
.f{display:flex;flex-direction:column;gap:6px}
.f--full{grid-column:1/-1}
.f label{font-size:var(--t-xs);font-weight:600;color:var(--ink-2)}
.f .req{color:var(--danger)}
.ctrl{height:44px;border:1px solid var(--line);background:var(--surface);border-radius:var(--r-sm);
  padding:0 12px;font-size:var(--t-sm);color:var(--ink);width:100%;transition:border-color var(--dur),box-shadow var(--dur),background var(--dur)}
textarea.ctrl{height:auto;min-height:84px;padding:10px 12px;resize:vertical;line-height:1.55}

/* ====================================================================
   STATE + persistence
   ==================================================================== */
let contacts = load();
let sortBy = localStorage.getItem(SORT_KEY) || "last";   // "last" | "first"
let filter = "all";       // "all" | "fav"
let query = "";
let selectedId = null;
let kbdIndex = -1;        // keyboard-focused row index in flatVisible
let flatVisible = [];     // [{type:'head',letter} | {type:'row',contact,index}]
let rowContacts = [];     // contacts in current visible order

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){const a=JSON.parse(raw); if(Array.isArray(a)&&a.length) return a.map(normalize);}
  }catch(e){/* corrupt store — reseed below */}
  const s = seed();
  persist(s);
  return s;
}
function normalize(c){
  return {id:c.id||uid(),first:c.first||"",last:c.last||"",company:c.company||"",title:c.title||"",
    phones:Array.isArray(c.phones)?c.phones:[],emails:Array.isArray(c.emails)?c.emails:[],
    street:c.street||"",city:c.city||"",region:c.region||"",birthday:c.birthday||"",
    labels:Array.isArray(c.labels)?c.labels:[],favorite:!!c.favorite,notes:c.notes||"",photo:c.photo||""};
}
function persist(list){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(list||contacts)); }catch(e){ toast("Storage full — changes not saved"); } }

/* ====================================================================
   DERIVE: sort key, grouping, filtering, search
   ==================================================================== */
const sortKey = c => (sortBy==="last" ? ((c.last||c.first||"")+" "+(c.first||"")) : ((c.first||c.last||"")+" "+(c.last||""))).trim().toLowerCase();
const groupLetterOf = c => {
  const base = sortBy==="last" ? (c.last||c.first) : (c.first||c.last);
  const ch=(base||"").trim()[0];
  return ch && /[a-z]/i.test(ch) ? ch.toUpperCase() : "#";
};
function searchable(c){
  return [fullName(c),c.company,c.title,...c.emails.map(e=>e.value),...c.phones.map(p=>p.value),(c.labels||[]).join(" ")].join(" ").toLowerCase();
}
function visibleContacts(){
  let list = contacts.slice();
  if(filter==="fav") list = list.filter(c=>c.favorite);
  const q = query.trim().toLowerCase();
  if(q) list = list.filter(c=>searchable(c).includes(q));
  list.sort((a,b)=>sortKey(a).localeCompare(sortKey(b),undefined,{sensitivity:"base"}));
  return list;
}

/* ====================================================================
   RENDER: list, rail, detail
   ==================================================================== */
const $ = s => document.querySelector(s);
const listScroll=$("#listScroll"), rail=$("#rail"), railBubble=$("#railBubble");
const listEmpty=$("#listEmpty"), listCount=$("#listCount"), detailEmpty=$("#detailEmpty"), dt=$("#dt");

function highlight(text){
  const q=query.trim();
  if(!q) return esc(text);
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+"<mark>"+esc(text.slice(i,i+q.length))+"</mark>"+esc(text.slice(i+q.length));
}
function avatarHTML(c,size){
  const col=avColor(c);
  if(c.photo){
    return `<span class="av av--${size}"><img src="${esc(c.photo)}" alt="" width="${size==='lg'?88:42}" height="${size==='lg'?88:42}"><span class="av__ring"></span></span>`;
  }
  return `<span class="av av--${size}" style="background:${col.bg};color:${col.fg}" aria-hidden="true">${esc(initials(c))}<span class="av__ring"></span></span>`;
}

function renderList(){
  rowContacts = visibleContacts();
  flatVisible = [];
  const present = new Set();

  // counts for chips
  $('[data-count="all"]').textContent = contacts.length;
  $('[data-count="fav"]').textContent = contacts.filter(c=>c.favorite).length;

  if(rowContacts.length===0){
    listScroll.innerHTML = "";
    rail.style.display="none";
    showEmpty();
    listCount.textContent = "0 contacts";
    syncSelectionUI();
    return;
  }
  listEmpty.classList.remove("show");
  rail.style.display="";

  let html="", curLetter=null;
  rowContacts.forEach((c,idx)=>{
    const L=groupLetterOf(c);
    present.add(L);
    if(L!==curLetter){
      curLetter=L;
      html += `<h2 class="sec-head" id="sec-${L}" data-letter="${L}">${L}</h2>`;
      flatVisible.push({type:"head",letter:L});
    }
    const sub = c.company ? (c.title?`${c.title} · ${c.company}`:c.company) : (c.title || (c.emails[0]?c.emails[0].value:""));
    html += `<button class="row${c.favorite?' is-fav':''}" role="option" data-id="${c.id}" aria-selected="${c.id===selectedId}">
      ${avatarHTML(c,'sm')}
      <span class="row__main">
        <span class="row__name">${highlight(fullName(c))}</span>
        <span class="row__sub">${highlight(sub||" ")}</span>
      </span>
      <span class="row__star" aria-hidden="true"><svg class="ic ic--sm" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="m12 4 2.3 4.7 5.2.8-3.8 3.7.9 5.1L12 16l-4.6 2.4.9-5.1L4.5 9.5l5.2-.8z"/></svg></span>
    </button>`;
    flatVisible.push({type:"row",contact:c,index:idx});
  });
  listScroll.innerHTML = html;
  // Tail spacer (~one viewport) so any letter — including the last — can scroll
  // flush to the container top when jumped to. Standard A-Z jump-list behavior.
  const tailH = Math.max(120, listScroll.clientHeight - 72);
  listScroll.insertAdjacentHTML("beforeend", `<div aria-hidden="true" style="height:${tailH}px"></div>`);
  listCount.textContent = `${rowContacts.length} contact${rowContacts.length!==1?"s":""}`;
  renderRail(present);
  syncSelectionUI();
}

function renderRail(present){
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  if([...present].some(l=>l==="#")) letters.push("#");
  rail.innerHTML = letters.map(L=>{
    const on = present.has(L);
    return `<button type="button" data-letter="${L}" ${on?"":"disabled aria-disabled=\"true\""} aria-label="Jump to ${L}" tabindex="-1">${L}</button>`;
  }).join("");
}

function showEmpty(){
  const noMatch = !!query.trim() || filter==="fav";
  if(query.trim()){
    $("#emptyTitle").textContent="No matches";
    $("#emptyText").textContent=`No contacts match “${query.trim()}”.`;
    $("#emptyClear").textContent="Clear search"; $("#emptyClear").style.display="";
  }else if(filter==="fav"){
    $("#emptyTitle").textContent="No starred contacts";
    $("#emptyText").textContent="Star someone to keep them close at hand.";
    $("#emptyClear").textContent="Show all contacts"; $("#emptyClear").style.display="";
  }else{
    $("#emptyTitle").textContent="Your address book is empty";
    $("#emptyText").textContent="Add your first contact to get started.";
    $("#emptyClear").style.display="none";
  }
  listEmpty.classList.add("show");
}

function syncSelectionUI(){
  listScroll.querySelectorAll(".row").forEach(r=>{
    r.setAttribute("aria-selected", r.dataset.id===selectedId ? "true":"false");
    r.classList.remove("kbd-focus");
  });
  // keyboard focus marker
  const node = flatVisible[kbdIndex];
  if(node && node.type==="row"){
    const el=listScroll.querySelector(`.row[data-id="${node.contact.id}"]`);
    if(el) el.classList.add("kbd-focus");
  }
}

/* ---- detail ---- */
function fmtBirthday(iso){
  if(!iso) return "";
  const [y,m,d]=iso.split("-").map(Number);
  if(!y||!m||!d) return iso;
  const dt=new Date(y,m-1,d);
  const s=dt.toLocaleDateString(undefined,{month:"long",day:"numeric",year:"numeric"});
  // upcoming-age-agnostic: show date only
  return s;
}
function infoRow(icon,type,valHTML,copyVal){
  return `<div class="info">
    <span class="info__ic">${icon}</span>
    <span class="info__main">
      <span class="info__type">${esc(type)}</span>
      <span class="info__val">${valHTML}</span>
    </span>
    ${copyVal!=null?`<button class="info__copy" type="button" data-copy="${esc(copyVal)}" aria-label="Copy ${esc(type)}"><svg class="ic ic--sm" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg></button>`:""}
  </div>`;
}

function renderDetail(){
  const c = contacts.find(x=>x.id===selectedId);
  if(!c){ dt.classList.remove("show"); detailEmpty.style.display=""; return; }
  detailEmpty.style.display="none"; dt.classList.add("show");
  const role = c.title&&c.company ? `<b>${esc(c.title)}</b> at ${esc(c.company)}`
    : c.title ? `<b>${esc(c.title)}</b>` : c.company ? esc(c.company) : "";

  const quick=[];
  if(c.phones[0]) quick.push(`<a class="quick" href="tel:${esc(c.phones[0].value.replace(/[^0-9+]/g,''))}">${ICON.phone}Call</a>`);
  if(c.emails[0]) quick.push(`<a class="quick" href="mailto:${esc(c.emails[0].value)}">${ICON.mail}Email</a>`);
  // Edit lives in the toolbar; only surface it here when there are no comms actions.
  if(!quick.length) quick.push(`<button class="quick" type="button" id="quickEdit">${ICON.note}Edit details</button>`);

  let body="";
  if(c.phones.length){
    body+=`<div class="field-group"><h3 class="field-group__h">Phone</h3>`+
      c.phones.map(p=>infoRow(ICON.phone,p.type,`<a href="tel:${esc(p.value.replace(/[^0-9+]/g,''))}">${esc(p.value)}</a>`,p.value)).join("")+`</div>`;
  }
  if(c.emails.length){
    body+=`<div class="field-group"><h3 class="field-group__h">Email</h3>`+
      c.emails.map(em=>infoRow(ICON.mail,em.type,`<a href="mailto:${esc(em.value)}">${esc(em.value)}</a>`,em.value)).join("")+`</div>`;
  }
  const addr=[c.street,[c.city,c.region].filter(Boolean).join(", ")].filter(Boolean).join("\n");
  if(addr || c.birthday){
    body+=`<div class="field-group"><h3 class="field-group__h">Details</h3>`;
    if(addr) body+=infoRow(ICON.pin,"Address",`<span style="white-space:pre-line">${esc(addr)}</span>`,addr.replace(/\n/g,", "));
    if(c.birthday) body+=infoRow(ICON.cake,"Birthday",esc(fmtBirthday(c.birthday)),null);
    body+=`</div>`;
  }
  if(c.notes){
    body+=`<div class="field-group"><h3 class="field-group__h">Notes</h3>`+
      `<div class="info"><span class="info__ic">${ICON.note}</span><span class="info__main"><span class="info__val notes">${esc(c.notes)}</span></span></div></div>`;
  }

  dt.innerHTML = `
    <div class="dt__hero">
      <button class="dt__back" type="button" id="dtBack"><svg class="ic" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>All contacts</button>
      <div class="dt__toolbar">
        <button class="dt__star" id="dtStar" type="button" aria-pressed="${c.favorite}" aria-label="${c.favorite?'Remove star':'Add star'}">

        </button>
        <button class="btn btn--ghost" id="dtEdit" type="button"><svg class="ic" viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16z"/><path d="m13.5 6.5 4 4"/></svg><span class="btn__label--full">Edit</span></button>
      </div>
      <div class="dt__id">
        ${avatarHTML(c,'lg')}
        <div>
          <h1 class="dt__name">${esc(fullName(c))}</h1>
          ${role?`<div class="dt__role">${role}</div>`:""}
          ${(c.labels||[]).length?`<div class="dt__labels">${c.labels.map(l=>`<span class="tag">${esc(l)}</span>`).join("")}</div>`:""}
        </div>
      </div>
      <div class="dt__quick">${quick.join("")}</div>
    </div>
    <div class="dt__body">${body || '<p style="color:var(--ink-3)">No additional details yet. <button class="add-row" id="emptyEdit" type="button">Add details</button></p>'}</div>`;

  // wire detail buttons
  dt.querySelector("#dtStar").addEventListener("click",()=>toggleFav(c.id));
  dt.querySelector("#dtEdit").addEventListener("click",()=>openForm(c.id));
  const qe=dt.querySelector("#quickEdit"); if(qe) qe.addEventListener("click",()=>openForm(c.id));
  const ee=dt.querySelector("#emptyEdit"); if(ee) ee.addEventListener("click",()=>openForm(c.id));
  dt.querySelector("#dtBack").addEventListener("click",backToList);
  dt.querySelectorAll(".info__copy").forEach(b=>b.addEventListener("click",()=>copyVal(b)));
  $("#detailScroll").scrollTop=0;
}

/* ====================================================================
   ACTIONS
   ==================================================================== */
function selectContact(id,{fromKbd=false}={}){
  selectedId=id;
  renderDetail();
  syncSelectionUI();
  if(window.matchMedia("(max-width:768px)").matches){
    document.body.classList.add("view-detail");
  }
  const el=listScroll.querySelector(`.row[data-id="${id}"]`);
  if(el && !fromKbd) el.scrollIntoView({block:"nearest"});
}
function backToList(){
  document.body.classList.remove("view-detail");
}
function toggleFav(id){
  const c=contacts.find(x=>x.id===id); if(!c) return;
  c.favorite=!c.favorite; persist();
  renderList(); if(selectedId===id) renderDetail();
  toast(c.favorite?"Starred":"Removed star");
}
function jumpToLetter(L){
  const head=listScroll.querySelector(`#sec-${CSS.escape(L)}`);
  if(!head) return;
  // offsetParent is the positioned .list-scroll; offsetTop aligns the sticky
  // header flush with the container top (scrollIntoView under-shoots sticky heads).
  listScroll.scrollTo({top:head.offsetTop, behavior:"smooth"});
  rail.querySelectorAll("button").forEach(b=>b.classList.toggle("active",b.dataset.letter===L));
}

/* ---- copy ---- */
function copyVal(btn){
  const v=btn.dataset.copy;
  const done=()=>{ btn.classList.add("done"); setTimeout(()=>btn.classList.remove("done"),1100); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(v).then(done).catch(()=>fallbackCopy(v,done)); }
  else fallbackCopy(v,done);
}
function fallbackCopy(v,cb){ const t=document.createElement("textarea");t.value=v;document.body.appendChild(t);t.select();try{document.execCommand("copy");cb();}catch(e){}t.remove(); }

function pairRow(kind,type,value){
  const types = kind==="phone"?PHONE_TYPES:EMAIL_TYPES;
  const opts = types.map(t=>`<option ${t===type?"selected":""}>${t}</option>`).join("");
  const ph = kind==="phone"?"(555) 000-0000":"name@example.com";
  const div=document.createElement("div");
  div.className="row-pair"; div.dataset.kind=kind;
  div.innerHTML=`
    <select class="ctrl" aria-label="${kind} type">${opts}</select>
    <div class="f" style="gap:4px">
      <input class="ctrl" type="${kind==='email'?'email':'tel'}" value="${esc(value||'')}" placeholder="${ph}" aria-label="${kind} value" inputmode="${kind==='phone'?'tel':'email'}">
      <span class="f__err"><svg class="ic ic--sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>${kind==='email'?'Enter a valid email address.':'Enter a valid phone number.'}</span>
    </div>
    <button type="button" class="row-pair__del" aria-label="Remove ${kind}"><svg class="ic ic--sm" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>`;
  div.querySelector(".row-pair__del").addEventListener("click",()=>{div.remove();});
  div.querySelector("input").addEventListener("input",e=>{ e.target.closest(".f").classList.remove("invalid"); });
  return div;
}
function addPair(kind,type,value){ (kind==="phone"?phonesWrap:emailsWrap).appendChild(pairRow(kind,type,value)); }

function openForm(id){
  editingId=id||null;
  lastFocus=document.activeElement;
  form.reset();
  form.querySelectorAll(".f.invalid").forEach(f=>f.classList.remove("invalid"));
  phonesWrap.querySelectorAll(".row-pair").forEach(r=>r.remove());
  emailsWrap.querySelectorAll(".row-pair").forEach(r=>r.remove());

  const c = id ? contacts.find(x=>x.id===id) : null;
  $("#modalTitle").textContent = c ? "Edit contact" : "New contact";
  $("#deleteBtn").style.display = c ? "" : "none";
  $("#saveBtn").textContent = c ? "Save changes" : "Add contact";

  if(c){
    form.first.value=c.first; form.last.value=c.last; form.company.value=c.company; form.title.value=c.title;
    form.street.value=c.street; form.city.value=c.city; form.region.value=c.region;
    form.birthday.value=c.birthday; form.labels.value=(c.labels||[]).join(", "); form.notes.value=c.notes;
    form.favorite.checked=c.favorite;
    c.phones.forEach(p=>addPair("phone",p.type,p.value));
    c.emails.forEach(em=>addPair("email",em.type,em.value));
  }
  if(!phonesWrap.querySelector(".row-pair")) addPair("phone","Mobile","");
  if(!emailsWrap.querySelector(".row-pair")) addPair("email","Personal","");

  scrim.classList.add("open");
  document.body.style.overflow="hidden";
  setTimeout(()=>form.first.focus(),60);
}
function closeForm(){
  scrim.classList.remove("open");
  document.body.style.overflow="";
  if(lastFocus&&lastFocus.focus) lastFocus.focus();
}

function validEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function validPhone(v){ return v.replace(/[^0-9]/g,"").length>=7; }

function collectForm(){
  const phones=[], emails=[]; let ok=true;
  // names: at least one of first/last
  const first=form.first.value.trim(), last=form.last.value.trim();
  const fFirst=form.first.closest(".f");
  if(!first && !last){ fFirst.classList.add("invalid"); ok=false; } else fFirst.classList.remove("invalid");

  phonesWrap.querySelectorAll(".row-pair").forEach(r=>{
    const v=r.querySelector("input").value.trim(); const t=r.querySelector("select").value;
    const f=r.querySelector(".f");
    if(!v){ f.classList.remove("invalid"); return; }
    if(!validPhone(v)){ f.classList.add("invalid"); ok=false; } else { f.classList.remove("invalid"); phones.push({type:t,value:v}); }
  });
  emailsWrap.querySelectorAll(".row-pair").forEach(r=>{
    const v=r.querySelector("input").value.trim(); const t=r.querySelector("select").value;
    const f=r.querySelector(".f");
    if(!v){ f.classList.remove("invalid"); return; }
    if(!validEmail(v)){ f.classList.add("invalid"); ok=false; } else { f.classList.remove("invalid"); emails.push({type:t,value:v}); }
  });
  if(!ok) return null;
  return {
    first,last,company:form.company.value.trim(),title:form.title.value.trim(),
    phones,emails,street:form.street.value.trim(),city:form.city.value.trim(),region:form.region.value.trim(),
    birthday:form.birthday.value,labels:form.labels.value.split(",").map(s=>s.trim()).filter(Boolean),
    notes:form.notes.value.trim(),favorite:form.favorite.checked
  };
}

form.addEventListener("submit",e=>{
  e.preventDefault();
  const data=collectForm();
  if(!data){
    const firstBad=form.querySelector(".f.invalid .ctrl");
    if(firstBad) firstBad.focus();
    return;
  }
  if(editingId){
    const c=contacts.find(x=>x.id===editingId);
    Object.assign(c,data);
    persist(); selectedId=editingId; renderList(); renderDetail();
    toast("Contact updated");
  }else{
    const nc=normalize({id:uid(),...data});
    contacts.push(nc);
    persist();
    filter="all"; query=""; $("#search").value=""; $("#searchWrap").classList.remove("has-q");
    syncFilters();
    selectedId=nc.id; renderList(); selectContact(nc.id);
    toast("Contact added");
  }
  closeForm();
});

$("#deleteBtn").addEventListener("click",()=>{
  if(!editingId) return;
  const c=contacts.find(x=>x.id===editingId);
  if(!confirm(`Delete ${fullName(c)}? This can’t be undone.`)) return;
  contacts=contacts.filter(x=>x.id!==editingId);
  persist();
  if(selectedId===editingId){ selectedId=null; backToList(); }
  renderList(); renderDetail();
  closeForm(); toast("Contact deleted");
});

document.querySelectorAll("[data-add]").forEach(b=>b.addEventListener("click",()=>addPair(b.dataset.add,b.dataset.add==="phone"?"Mobile":"Personal","")));
$("#cancelBtn").addEventListener("click",closeForm);
$("#modalClose").addEventListener("click",closeForm);
scrim.addEventListener("mousedown",e=>{ if(e.target===scrim) closeForm(); });

/* ====================================================================
   IMPORT / EXPORT
   ==================================================================== */
$("#exportBtn").addEventListener("click",()=>{
  closeMenu();
  const blob=new Blob([JSON.stringify(contacts,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="rolodex-contacts.json"; a.click(); URL.revokeObjectURL(url);
  toast(`Exported ${contacts.length} contacts`);
});
$("#importBtn").addEventListener("click",()=>{ closeMenu(); $("#fileInput").click(); });
$("#fileInput").addEventListener("change",e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const arr=JSON.parse(reader.result);
      if(!Array.isArray(arr)) throw new Error("not an array");
      const incoming=arr.map(normalize);
      const ids=new Set(contacts.map(c=>c.id));
      let added=0;
      incoming.forEach(c=>{ if(!ids.has(c.id)){ contacts.push(c); added++; } });
      persist(); renderList();
      toast(added?`Imported ${added} contact${added!==1?"s":""}`:"No new contacts to import");
    }catch(err){ toast("Couldn’t read that file — expected JSON"); }
  };
  reader.readAsText(file);
  e.target.value="";
});
$("#resetBtn").addEventListener("click",()=>{
  closeMenu();
  if(!confirm("Restore the sample directory? Your current contacts will be replaced.")) return;
  contacts=seed(); persist(); selectedId=null; filter="all"; query=""; $("#search").value="";
  $("#searchWrap").classList.remove("has-q"); syncFilters(); renderList(); renderDetail(); backToList();
  toast("Sample data restored");
});

/* ====================================================================
   TOP-BAR wiring: search, filters, sort, menu
   ==================================================================== */
const search=$("#search"), searchWrap=$("#searchWrap");
search.addEventListener("input",()=>{
  query=search.value;
  searchWrap.classList.toggle("has-q",!!query);
  kbdIndex=-1;
  renderList();
});
$("#searchClear").addEventListener("click",()=>{ search.value="";query="";searchWrap.classList.remove("has-q");search.focus();renderList(); });
$("#emptyClear").addEventListener("click",()=>{
  if(query.trim()){ search.value="";query="";searchWrap.classList.remove("has-q"); }
  else { filter="all"; syncFilters(); }
  renderList();
});

function syncFilters(){
  document.querySelectorAll(".chip").forEach(ch=>ch.setAttribute("aria-pressed", ch.dataset.filter===filter ? "true":"false"));
}
document.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{
  filter=ch.dataset.filter; syncFilters(); kbdIndex=-1; renderList();
}));

$("#sortToggle").addEventListener("click",()=>{
  sortBy = sortBy==="last" ? "first" : "last";
  localStorage.setItem(SORT_KEY,sortBy);
  $("#sortLabel").textContent = sortBy==="last" ? "Last name" : "First name";
  renderList();
});

$("#addBtn").addEventListener("click",()=>openForm(null));

/* menu */
const moreBtn=$("#moreBtn"), moreMenu=$("#moreMenu");
function openMenu(){ moreMenu.classList.add("open"); moreBtn.setAttribute("aria-expanded","true"); }
function closeMenu(){ moreMenu.classList.remove("open"); moreBtn.setAttribute("aria-expanded","false"); }
moreBtn.addEventListener("click",e=>{ e.stopPropagation(); moreMenu.classList.contains("open")?closeMenu():openMenu(); });
document.addEventListener("click",e=>{ if(!moreMenu.contains(e.target)&&e.target!==moreBtn) closeMenu(); });

/* ====================================================================
   A-Z RAIL interaction (click + drag)
   ==================================================================== */
let railActive=false;
function railTouchTo(clientY){
  const btns=[...rail.querySelectorAll("button")];
  let target=null,min=Infinity;
  btns.forEach(b=>{ const r=b.getBoundingClientRect(); const c=r.top+r.height/2; const d=Math.abs(clientY-c); if(d<min){min=d;target=b;} });
  if(target && !target.disabled){
    const L=target.dataset.letter;
    jumpToLetter(L);
    railBubble.textContent=L; railBubble.classList.add("show");
    const r=target.getBoundingClientRect(); const wrap=rail.getBoundingClientRect();
    railBubble.style.top=(r.top-wrap.top+ (rail.offsetTop) - 14)+"px";
  }
}
rail.addEventListener("click",e=>{ const b=e.target.closest("button"); if(b&&!b.disabled) jumpToLetter(b.dataset.letter); });
rail.addEventListener("pointerdown",e=>{ railActive=true; rail.setPointerCapture(e.pointerId); railTouchTo(e.clientY); });
rail.addEventListener("pointermove",e=>{ if(railActive) railTouchTo(e.clientY); });
rail.addEventListener("pointerup",()=>{ railActive=false; setTimeout(()=>railBubble.classList.remove("show"),250); });
rail.addEventListener("pointercancel",()=>{ railActive=false; railBubble.classList.remove("show"); });

// active-letter highlight on scroll
let scrollRaf=null;
listScroll.addEventListener("scroll",()=>{
  if(scrollRaf) return;
  scrollRaf=requestAnimationFrame(()=>{
    scrollRaf=null;
    const heads=[...listScroll.querySelectorAll(".sec-head")];
    const top=listScroll.getBoundingClientRect().top;
    let cur=null;
    heads.forEach(h=>{ if(h.getBoundingClientRect().top - top <= 4) cur=h.dataset.letter; });
    if(cur) rail.querySelectorAll("button").forEach(b=>b.classList.toggle("active",b.dataset.letter===cur));
  });
});

/* ====================================================================
   LIST click + keyboard navigation
   ==================================================================== */
listScroll.addEventListener("click",e=>{
  const row=e.target.closest(".row"); if(!row) return;
  kbdIndex=flatVisible.findIndex(n=>n.type==="row"&&n.contact.id===row.dataset.id);
  selectContact(row.dataset.id);
});

function moveKbd(dir){
  const rows=flatVisible.map((n,i)=>n.type==="row"?i:-1).filter(i=>i>=0);
  if(!rows.length) return;
  let pos=rows.indexOf(kbdIndex);
  if(pos<0){ kbdIndex=dir>0?rows[0]:rows[rows.length-1]; }
  else { pos=Math.min(rows.length-1,Math.max(0,pos+dir)); kbdIndex=rows[pos]; }
  syncSelectionUI();
  const node=flatVisible[kbdIndex];
  const el=listScroll.querySelector(`.row[data-id="${node.contact.id}"]`);
  if(el) el.scrollIntoView({block:"nearest"});
}

document.addEventListener("keydown",e=>{
  // '/' focuses search
  if(e.key==="/" && !/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName)){
    e.preventDefault(); search.focus(); search.select(); return;
  }
  if(e.key==="Escape"){
    if(scrim.classList.contains("open")){ closeForm(); return; }
    if(moreMenu.classList.contains("open")){ closeMenu(); return; }
    if(document.activeElement===search && query){ search.value="";query="";searchWrap.classList.remove("has-q");renderList(); return; }
    if(document.body.classList.contains("view-detail")){ backToList(); return; }
  }
  if(scrim.classList.contains("open")) return;
  const inField=/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName) && document.activeElement!==search;
  if(inField) return;
  if(e.key==="ArrowDown"){ e.preventDefault(); moveKbd(1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); moveKbd(-1); }
  else if(e.key==="Enter"){
    const node=flatVisible[kbdIndex];
    if(node&&node.type==="row"){ e.preventDefault(); selectContact(node.contact.id,{fromKbd:true}); }
  }
});

// focus trap inside modal
scrim.addEventListener("keydown",e=>{
  if(e.key!=="Tab") return;
  const f=[...form.querySelectorAll('button,input,select,textarea,a[href]')].filter(el=>!el.disabled&&el.offsetParent!==null);
  if(!f.length) return;
  const first=f[0], last=f[f.length-1];
  if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
  else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
});

/* ====================================================================
   TOAST
   ==================================================================== */
let toastT=null;
function toast(msg){
  const t=$("#toast");
  t.innerHTML=`<svg class="ic ic--sm" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>${esc(msg)}`;
  t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ====================================================================
   INIT
   ==================================================================== */
$("#sortLabel").textContent = sortBy==="last" ? "Last name" : "First name";
syncFilters();
renderList();
renderDetail();
// expose a tiny hook for verification scripts (non-destructive)
window.__rolodex = { get count(){return contacts.length;}, get selected(){return selectedId;}, contacts:()=>contacts };
</script>
</body>
</html>
