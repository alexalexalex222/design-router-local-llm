<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Folio — a focused Markdown studio</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23a83e22'/%3E%3Cpath d='M7.5 16.5c1.7-1.9 3.4-1.9 5 0M7.5 12.5c1.7-1.9 3.4-1.9 5 0' stroke='%23fff' stroke-width='1.6' stroke-linecap='round' fill='none'/%3E%3C/svg%3E" />
<meta name="description" content="A calm, paper-grade Markdown editor with live sanitized preview, a writer's toolbar, synced scroll and autosave." />

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600&display=swap" />

<style>
/* ============================================================
   FOLIO — design tokens
   ============================================================ */
:root{
  /* type */
  --font-ui: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-read: "Newsreader", Iowan Old Style, "Palatino Linotype", Palatino, Georgia, serif;
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;

  /* fluid type scale (ratio-locked ~1.2) */
  --t-xs: clamp(0.72rem, 0.69rem + 0.13vw, 0.78rem);
  --t-sm: clamp(0.82rem, 0.78rem + 0.16vw, 0.9rem);
  --t-base: clamp(1rem, 0.96rem + 0.2vw, 1.08rem);
  --t-md: clamp(1.18rem, 1.1rem + 0.4vw, 1.33rem);
  --t-lg: clamp(1.45rem, 1.32rem + 0.66vw, 1.78rem);
  --t-xl: clamp(1.85rem, 1.62rem + 1.1vw, 2.45rem);
  --read-size: clamp(1.06rem, 1rem + 0.34vw, 1.2rem);

  /* spacing (4px) */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s8:32px; --s10:40px; --s12:48px;

  /* radii */
  --r-sm:6px; --r-md:10px; --r-lg:16px; --r-pill:999px;

  /* motion */
  --dur-1:160ms; --dur-2:220ms;
  --ease: cubic-bezier(.2,.6,.2,1);

  --maxread: 68ch;
}

/* ---- LIGHT (warm paper) ---- */
:root, [data-theme="light"]{
  --desk:#efe7d7;
  --bg:#f4eee2;
  --surface:#fbf7ef;
  --surface-2:#f6efe2;
  --paper:#fcf9f2;
  --ink:#2a251e;
  --ink-soft:#5a5246;
  --ink-faint:#8c8273;
  --line:#e7dcc8;
  --line-strong:#d9cdb4;
  --accent:#a83e22;       /* terracotta — links/brand */
  --accent-soft:#bd6a4a;
  --accent-bg:#f3e3d8;
  --good:#3f7d52;
  --sel:#f0d9a733;
  --code-bg:#f3ecdd;
  --code-ink:#7a4326;
  --shadow-1:0 1px 2px rgba(58,44,22,.06);
  --shadow-2:0 6px 22px -10px rgba(58,44,22,.28);
  --focus:#a83e22;
  color-scheme: light;
}

/* ---- DARK (calm study) ---- */
[data-theme="dark"]{
  --desk:#161310;
  --bg:#1b1814;
  --surface:#221e18;
  --surface-2:#1f1b16;
  --paper:#23201a;
  --ink:#ece4d4;
  --ink-soft:#b3a892;
  --ink-faint:#867c6c;
  --line:#322c23;
  --line-strong:#3e362a;
  --accent:#e0926a;
  --accent-soft:#d4845a;
  --accent-bg:#33271f;
  --good:#7bbf90;
  --sel:#e0926a26;
  --code-bg:#1c1813;
  --code-ink:#e0a079;
  --shadow-1:0 1px 2px rgba(0,0,0,.3);
  --shadow-2:0 10px 30px -12px rgba(0,0,0,.6);
  --focus:#e0926a;
  color-scheme: dark;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:var(--font-ui);
  font-size:var(--t-base);
  color:var(--ink);
  background:var(--desk);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}
}

button{font-family:inherit;color:inherit;cursor:pointer}
:focus-visible{outline:2.5px solid var(--focus);outline-offset:2px;border-radius:var(--r-sm)}
::selection{background:var(--accent);color:#fff}

.skip{
  position:absolute;left:var(--s3);top:-60px;z-index:60;
  background:var(--accent);color:#fff;padding:var(--s2) var(--s4);
  border-radius:var(--r-sm);text-decoration:none;font-size:var(--t-sm);font-weight:600;
  transition:top var(--dur-1) var(--ease);
}
.skip:focus{top:var(--s3)}

/* ============================================================ shell */
.app{
  height:100dvh;height:100vh;
  display:flex;flex-direction:column;
  background:var(--bg);
}

/* ---- top bar ---- */
.topbar{
  display:flex;align-items:center;gap:var(--s3);
  padding:var(--s2) var(--s4);
  background:var(--surface);
  border-bottom:1px solid var(--line);
  min-height:54px;
}
.brand{display:flex;align-items:center;gap:var(--s2);flex-shrink:0;text-decoration:none;color:var(--ink)}
.brand .mark{
  width:30px;height:30px;display:grid;place-items:center;
  background:var(--accent-bg);border-radius:var(--r-sm);color:var(--accent);
}
.brand .mark svg{width:19px;height:19px}
.brand b{font-weight:600;letter-spacing:-.01em;font-size:var(--t-md);font-family:var(--font-read)}
.brand .tag{font-size:var(--t-xs);color:var(--ink-faint);margin-top:1px}

.doc-title{
  flex:1 1 auto;min-width:60px;
  background:transparent;border:none;
  font-family:var(--font-read);font-size:var(--t-md);font-weight:500;
  color:var(--ink);padding:var(--s2) var(--s3);border-radius:var(--r-sm);
  transition:background var(--dur-1) var(--ease);
  text-overflow:ellipsis;
}
.doc-title::placeholder{color:var(--ink-faint)}
.doc-title:hover{background:var(--surface-2)}
.doc-title:focus{outline:none;background:var(--surface-2);box-shadow:inset 0 0 0 1.5px var(--line-strong)}

.top-actions{display:flex;align-items:center;gap:var(--s1);flex-shrink:0}

/* saved indicator */
.saved{
  display:inline-flex;align-items:center;gap:var(--s2);
  font-size:var(--t-xs);color:var(--ink-faint);
  padding:var(--s2) var(--s3);border-radius:var(--r-pill);
  white-space:nowrap;user-select:none;
}
.saved .dot{width:7px;height:7px;border-radius:50%;background:var(--good);transition:background var(--dur-1)}
.saved[data-state="editing"] .dot{background:var(--accent-soft)}
.saved[data-state="saving"] .dot{background:var(--accent-soft);animation:pulse 1s var(--ease) infinite}
.saved[data-state="error"] .dot{background:#c0392b}
@keyframes pulse{50%{opacity:.3}}
@media (max-width:560px){.saved .label{display:none}}

/* generic icon button */
.ibtn{
  display:inline-grid;place-items:center;
  width:38px;height:38px;border-radius:var(--r-sm);
  background:transparent;border:1px solid transparent;color:var(--ink-soft);
  transition:background var(--dur-1) var(--ease),color var(--dur-1) var(--ease),border-color var(--dur-1);
}
.ibtn svg{width:18px;height:18px;pointer-events:none}
.ibtn:hover{background:var(--surface-2);color:var(--ink)}
.ibtn:active{transform:translateY(.5px)}
.ibtn[aria-pressed="true"]{background:var(--accent-bg);color:var(--accent);border-color:transparent}

/* segmented view-mode control (desktop) */
.segmented{
  display:inline-flex;background:var(--surface-2);border:1px solid var(--line);
  border-radius:var(--r-pill);padding:3px;gap:2px;
}
.segmented button{
  display:inline-grid;place-items:center;width:34px;height:30px;
  border:none;background:transparent;border-radius:var(--r-pill);color:var(--ink-faint);
  transition:background var(--dur-1) var(--ease),color var(--dur-1);
}
.segmented button svg{width:16px;height:16px;pointer-events:none}
.segmented button:hover{color:var(--ink)}
.segmented button[aria-pressed="true"]{background:var(--paper);color:var(--accent);box-shadow:var(--shadow-1)}
.hide-mobile{display:flex}
@media (max-width:720px){.hide-mobile{display:none!important}}

/* export menu */
.menu-wrap{position:relative}
.menu{
  position:absolute;right:0;top:calc(100% + 6px);z-index:40;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
  box-shadow:var(--shadow-2);padding:var(--s2);min-width:206px;
  opacity:0;transform:translateY(-6px) scale(.98);pointer-events:none;
  transition:opacity var(--dur-1) var(--ease),transform var(--dur-1) var(--ease);
}
.menu[data-open="true"]{opacity:1;transform:none;pointer-events:auto}
.menu button{
  display:flex;align-items:center;gap:var(--s3);width:100%;
  padding:var(--s2) var(--s3);border:none;background:transparent;border-radius:var(--r-sm);
  font-size:var(--t-sm);color:var(--ink);text-align:left;
}
.menu button svg{width:16px;height:16px;color:var(--ink-faint);flex-shrink:0}
.menu button:hover{background:var(--surface-2)}
.menu button:hover svg{color:var(--accent)}
.menu .sep{height:1px;background:var(--line);margin:var(--s2) var(--s1)}

/* ---- toolbar ---- */
.toolbar{
  display:flex;align-items:center;gap:var(--s1);
  padding:var(--s2) var(--s4);
  background:var(--surface);border-bottom:1px solid var(--line);
  overflow-x:auto;scrollbar-width:thin;
}
.toolbar::-webkit-scrollbar{height:0}
.tbar-group{display:flex;align-items:center;gap:2px;flex-shrink:0}
.tbar-sep{width:1px;height:22px;background:var(--line);margin:0 var(--s2);flex-shrink:0}
.tbtn{
  position:relative;display:inline-grid;place-items:center;
  width:36px;height:36px;border-radius:var(--r-sm);
  background:transparent;border:1px solid transparent;color:var(--ink-soft);flex-shrink:0;
  transition:background var(--dur-1) var(--ease),color var(--dur-1) var(--ease);
}
.tbtn svg{width:18px;height:18px;pointer-events:none}
.tbtn:hover{background:var(--surface-2);color:var(--ink)}
.tbtn:active{transform:translateY(.5px)}
/* tooltip */
.tbtn .tip{
  position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(-3px);
  background:var(--ink);color:var(--surface);font-size:11px;font-weight:500;
  padding:5px 9px;border-radius:var(--r-sm);white-space:nowrap;z-index:30;
  opacity:0;pointer-events:none;transition:opacity var(--dur-1),transform var(--dur-1);
  box-shadow:var(--shadow-2);
}
.tbtn .tip kbd{font-family:var(--font-mono);font-size:10px;opacity:.7;margin-left:5px}
.tbtn:hover .tip,.tbtn:focus-visible .tip{opacity:1;transform:translateX(-50%)}
@media (max-width:720px){.tbtn{width:42px;height:42px}.tbtn .tip{display:none}}

/* ============================================================ workspace */
.workspace{flex:1 1 auto;display:flex;min-height:0;position:relative;background:var(--bg)}
.pane{flex:1 1 50%;min-width:0;display:flex;flex-direction:column;overflow:hidden;position:relative}
.pane-head{
  display:flex;align-items:center;gap:var(--s2);
  padding:var(--s2) var(--s5);
  font-size:var(--t-xs);letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;
  border-bottom:1px solid var(--line);background:var(--surface);
  user-select:none;min-height:34px;
}
.pane-head .kw{width:5px;height:5px;border-radius:50%;background:var(--accent-soft);opacity:.6}

/* ---- source editor ---- */
.editor-scroll{flex:1;overflow-y:auto;background:var(--surface)}
.editor{
  display:block;width:100%;min-height:100%;
  border:none;resize:none;outline:none;background:transparent;
  color:var(--ink);
  font-family:var(--font-mono);
  font-size:var(--read-size);line-height:1.75;
  padding:var(--s8) clamp(var(--s5),5vw,var(--s12));
  caret-color:var(--accent);
  tab-size:2;
}
.editor::placeholder{color:var(--ink-faint)}

/* divider */
.divider{
  width:1px;background:var(--line-strong);flex:0 0 1px;
  cursor:col-resize;position:relative;transition:background var(--dur-1);
}
.divider::after{content:"";position:absolute;inset:0 -5px;}
.divider:hover,.divider.drag{background:var(--accent-soft)}
@media (max-width:720px){.divider{display:none}}

/* ---- preview (editorial reading) ---- */
.preview-scroll{flex:1;overflow-y:auto;background:var(--paper)}
.preview{
  font-family:var(--font-read);
  font-size:var(--read-size);line-height:1.72;color:var(--ink);
  max-width:var(--maxread);
  margin:0 auto;
  padding:var(--s8) clamp(var(--s5),5vw,var(--s10)) var(--s12);
}
.preview > :first-child{margin-top:0}
.preview h1,.preview h2,.preview h3,.preview h4{
  font-family:var(--font-read);font-weight:600;line-height:1.18;letter-spacing:-.015em;
  color:var(--ink);margin:1.6em 0 .5em;
}
.preview h1{font-size:var(--t-xl);margin-top:0;letter-spacing:-.025em}
.preview h2{font-size:var(--t-lg);padding-bottom:.24em;border-bottom:1px solid var(--line)}
.preview h3{font-size:var(--t-md)}
.preview h4{font-size:var(--t-base);text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft)}
.preview p{margin:0 0 1.05em}
.preview a{color:var(--accent);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--accent) 35%,transparent);transition:border-color var(--dur-1)}
.preview a:hover{border-bottom-color:var(--accent)}
.preview strong{font-weight:600;color:var(--ink)}
.preview em{font-style:italic}
.preview del{color:var(--ink-faint)}
.preview ul,.preview ol{margin:0 0 1.05em;padding-left:1.5em}
.preview li{margin:.3em 0}
.preview li::marker{color:var(--accent-soft)}
.preview ul.contains-task-list,.preview .task-list-item{list-style:none}
.preview ul.contains-task-list{padding-left:.2em}
.preview .task-list-item{position:relative;padding-left:1.7em;list-style:none}
.preview .task-list-item input{
  position:absolute;left:0;top:.34em;width:17px;height:17px;margin:0;
  appearance:none;border:1.5px solid var(--line-strong);border-radius:5px;background:var(--surface);
  display:grid;place-items:center;transition:background var(--dur-1),border-color var(--dur-1);
}
.preview .task-list-item input:checked{background:var(--accent);border-color:var(--accent)}
.preview .task-list-item input:checked::after{content:"";width:9px;height:9px;background:#fff;clip-path:polygon(14% 47%,0 63%,40% 100%,100% 22%,84% 8%,38% 70%)}
.preview blockquote{
  margin:1.3em 0;padding:.4em 0 .4em 1.25em;
  border-left:3px solid var(--accent-soft);color:var(--ink-soft);font-style:italic;
}
.preview blockquote p:last-child{margin-bottom:0}
.preview hr{border:none;height:1px;background:var(--line-strong);margin:2em 0}
.preview code{
  font-family:var(--font-mono);font-size:.86em;
  background:var(--code-bg);color:var(--code-ink);
  padding:.12em .4em;border-radius:5px;
}
.preview pre{
  background:var(--code-bg);border:1px solid var(--line);border-radius:var(--r-md);
  padding:var(--s4) var(--s5);overflow-x:auto;margin:1.3em 0;line-height:1.6;
}
.preview pre code{background:none;color:var(--ink);padding:0;font-size:.85em}
.preview img{max-width:100%;height:auto;border-radius:var(--r-md);margin:1em 0;display:block}
.preview table{
  border-collapse:collapse;width:100%;margin:1.3em 0;font-family:var(--font-ui);font-size:.92em;
  display:block;overflow-x:auto;
}
.preview th,.preview td{border:1px solid var(--line);padding:.55em .85em;text-align:left}
.preview thead th{background:var(--surface-2);font-weight:600;color:var(--ink)}
.preview tbody tr:nth-child(even){background:var(--surface-2)}

/* hljs token colors (mapped to palette, both themes) */
.preview .hljs-comment,.preview .hljs-quote{color:var(--ink-faint);font-style:italic}
.preview .hljs-keyword,.preview .hljs-selector-tag,.preview .hljs-built_in{color:var(--accent)}
.preview .hljs-string,.preview .hljs-attr{color:var(--good)}
.preview .hljs-number,.preview .hljs-literal{color:var(--accent-soft)}
.preview .hljs-title,.preview .hljs-function .hljs-title,.preview .hljs-section{color:var(--code-ink);font-weight:600}
.preview .hljs-name,.preview .hljs-tag{color:var(--accent-soft)}

/* empty preview state */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;min-height:50vh;text-align:center;color:var(--ink-faint);
  padding:var(--s8);gap:var(--s4);
}
.empty svg{width:54px;height:54px;color:var(--line-strong)}
.empty h3{font-family:var(--font-read);font-size:var(--t-md);font-weight:500;color:var(--ink-soft);margin:0}
.empty p{font-size:var(--t-sm);margin:0;max-width:34ch;line-height:1.6}

/* ---- status bar ---- */
.statusbar{
  display:flex;align-items:center;gap:var(--s5);
  padding:var(--s2) var(--s5);
  background:var(--surface);border-top:1px solid var(--line);
  font-size:var(--t-xs);color:var(--ink-faint);min-height:34px;
  overflow-x:auto;scrollbar-width:none;
}
.statusbar::-webkit-scrollbar{display:none}
.statusbar .stat{display:inline-flex;align-items:center;gap:var(--s2);white-space:nowrap}
.statusbar .stat b{color:var(--ink-soft);font-weight:600;font-variant-numeric:tabular-nums}
.statusbar .spacer{flex:1}
.statusbar .toggle{
  display:inline-flex;align-items:center;gap:var(--s2);
  background:transparent;border:1px solid var(--line);border-radius:var(--r-pill);
  padding:3px var(--s3);color:var(--ink-faint);font-size:var(--t-xs);
  transition:color var(--dur-1),border-color var(--dur-1),background var(--dur-1);
}
.statusbar .toggle svg{width:13px;height:13px}
.statusbar .toggle[aria-pressed="true"]{color:var(--accent);border-color:var(--accent-soft);background:var(--accent-bg)}
.statusbar .toggle:hover{color:var(--ink)}

/* ---- find bar ---- */
.findbar{
  position:absolute;top:var(--s3);right:var(--s5);z-index:25;
  display:flex;align-items:center;gap:var(--s2);
  background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--r-md);
  box-shadow:var(--shadow-2);padding:var(--s2);
  transform:translateY(-12px) scale(.98);opacity:0;pointer-events:none;
  transition:transform var(--dur-1) var(--ease),opacity var(--dur-1) var(--ease);
}
.findbar[data-open="true"]{transform:none;opacity:1;pointer-events:auto}
.findbar input{
  border:none;background:var(--surface-2);border-radius:var(--r-sm);
  padding:var(--s2) var(--s3);font-size:var(--t-sm);color:var(--ink);
  font-family:var(--font-ui);width:180px;outline:none;
}
.findbar input:focus{box-shadow:inset 0 0 0 1.5px var(--accent-soft)}
.findbar .count{font-size:var(--t-xs);color:var(--ink-faint);min-width:42px;text-align:center;font-variant-numeric:tabular-nums}
.findbar .fbtn{width:30px;height:30px;border-radius:var(--r-sm);background:transparent;border:none;color:var(--ink-soft);display:grid;place-items:center}
.findbar .fbtn:hover{background:var(--surface-2);color:var(--ink)}
.findbar .fbtn svg{width:15px;height:15px}

/* error banner */
.banner{
  position:fixed;left:50%;bottom:var(--s5);transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--surface);padding:var(--s3) var(--s5);border-radius:var(--r-md);
  font-size:var(--t-sm);box-shadow:var(--shadow-2);z-index:60;opacity:0;pointer-events:none;
  transition:opacity var(--dur-2),transform var(--dur-2);max-width:90vw;
}
.banner[data-show="true"]{opacity:1;transform:translateX(-50%);pointer-events:auto}

/* toast (copy feedback) */
.toast{
  position:fixed;left:50%;bottom:var(--s5);transform:translateX(-50%) translateY(20px);
  background:var(--accent);color:#fff;padding:var(--s2) var(--s5);border-radius:var(--r-pill);
  font-size:var(--t-sm);font-weight:500;box-shadow:var(--shadow-2);z-index:60;
  opacity:0;pointer-events:none;transition:opacity var(--dur-1),transform var(--dur-1);
}
.toast[data-show="true"]{opacity:1;transform:translateX(-50%)}

/* ---- mobile pane toggle ---- */
.mobile-tabs{display:none}
@media (max-width:720px){
  .mobile-tabs{
    display:flex;gap:2px;padding:var(--s2) var(--s4);
    background:var(--surface);border-bottom:1px solid var(--line);
  }
  .mobile-tabs button{

<!-- pinned, SRI-verified pipeline: marked (MD→HTML) + DOMPurify (sanitize) + highlight.js -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.10.0/highlight.min.js" integrity="sha384-GdEWAbCjn+ghjX0gLx7/N1hyTVmPAjdC2OvoAA0RyNcAOhqwtT8qnbCxWle2+uJX" crossorigin="anonymous"></script>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  var editor = $('editor'), preview = $('preview'),
      editorScroll = $('editorScroll'), previewScroll = $('previewScroll'),
      docTitle = $('docTitle'), savedEl = $('saved'),
      banner = $('banner'), toast = $('toast');

  var KEY_DOC='folio.doc.v1', KEY_TITLE='folio.title.v1', KEY_THEME='folio.theme.v1';

  var hasLib = (typeof window.marked!=='undefined' && typeof window.DOMPurify!=='undefined');
  var hasHl  = (typeof window.hljs!=='undefined');

  /* ---------- storage helpers (degrade gracefully) ---------- */
  var storeOK = true;
  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ storeOK=false; return null; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ storeOK=false; return false; } }

  /* ---------- banner / toast ---------- */
  var bannerT;
  function showBanner(msg){ banner.textContent=msg; banner.dataset.show='true'; clearTimeout(bannerT); bannerT=setTimeout(function(){banner.dataset.show='false';},5000); }
  var toastT;
  function showToast(msg){ toast.textContent=msg; toast.dataset.show='true'; clearTimeout(toastT); toastT=setTimeout(function(){toast.dataset.show='false';},1800); }

  /* ---------- markdown pipeline ---------- */
  if(hasLib){
    window.marked.setOptions({ gfm:true, breaks:false, headerIds:false, mangle:false });
  }
  // allow task-list checkboxes through the sanitizer; forbid handlers implicitly (default)
  var PURIFY_CFG = { ADD_ATTR:['target','rel'], ADD_TAGS:[], ALLOWED_URI_REGEXP:/^(?:(?:https?|mailto|tel|ftp):|[^a-z]|[a-z+.-]+(?:[^a-z+.\-:]|$))/i };
  if(hasLib){
    // harden links after sanitize
    DOMPurify.addHook('afterSanitizeAttributes', function(node){
      if(node.tagName==='A' && node.getAttribute('href')){
        node.setAttribute('target','_blank');
        node.setAttribute('rel','noopener noreferrer nofollow');
      }
    });
  }

  function renderMarkdown(src){
    if(!hasLib) return '';
    var raw = window.marked.parse(src);
    return window.DOMPurify.sanitize(raw, PURIFY_CFG);
  }

  var EMPTY_HTML =
    '<div class="empty">'+
    '<svg viewBox="0 0 24 24" fill="none"><path d="M5 4.5h9.5L19 9v10.5H5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M14.5 4.5V9H19" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M8 13h8M8 16h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>'+
    '<h3>Nothing to preview yet</h3>'+
    '<p>Start typing Markdown in the editor and your formatted document will appear here.</p>'+
    '</div>';

  function paint(){
    var src = editor.value;
    if(src.trim()===''){ preview.innerHTML = EMPTY_HTML; return; }
    if(!hasLib){ preview.textContent = src; return; }
    preview.innerHTML = renderMarkdown(src);
    if(hasHl){
      var blocks = preview.querySelectorAll('pre code');
      for(var i=0;i<blocks.length;i++){ try{ window.hljs.highlightElement(blocks[i]); }catch(e){} }
    }
  }

  /* ---------- counts ---------- */
  function updateCounts(){
    var text = editor.value;
    var words = (text.trim().match(/\S+/g)||[]).length;
    $('stWords').textContent = words.toLocaleString();
    $('stChars').textContent = text.length.toLocaleString();
    var mins = Math.max(1, Math.round(words/200));
    $('stRead').textContent = mins + ' min';
  }
  function updateCursor(){
    var pos = editor.selectionStart;
    var before = editor.value.slice(0,pos);
    var line = before.split('\n').length;
    var col = pos - before.lastIndexOf('\n');
    $('stCursor').textContent = 'Ln '+line+', Col '+col;
  }

  /* ---------- autosave ---------- */
  var saveT, savedStateT;
  function setSaved(state){ savedEl.dataset.state=state;
    var lbl = savedEl.querySelector('.label');
    lbl.textContent = state==='saved'?'Saved':state==='saving'?'Saving…':state==='error'?'Not saved':'Editing…';
  }
  function scheduleSave(){
    setSaved('editing');
    clearTimeout(saveT);
    saveT = setTimeout(function(){
      setSaved('saving');
      var ok1 = lsSet(KEY_DOC, editor.value);
      var ok2 = lsSet(KEY_TITLE, docTitle.value);
      clearTimeout(savedStateT);
      savedStateT = setTimeout(function(){
        setSaved((ok1&&ok2)?'saved':'error');
      }, 280);
    }, 600);
  }

  /* ---------- debounced render ---------- */
  var renderT;
  function scheduleRender(){
    clearTimeout(renderT);
    renderT = setTimeout(function(){ paint(); }, 120);
  }

  function onInput(){ scheduleRender(); updateCounts(); scheduleSave(); }

  /* ---------- toolbar: selection commands ---------- */
  function focusKeep(){ editor.focus(); }

  function replaceRange(start,end,text,selStart,selEnd){
    editor.setRangeText(text, start, end, 'preserve');
    if(selStart!=null){ editor.selectionStart=selStart; editor.selectionEnd=(selEnd==null?selStart:selEnd); }
    onInput(); updateCursor();
  }

  function wrapInline(marker){
    var s=editor.selectionStart, e=editor.selectionEnd, v=editor.value, ml=marker.length;
    var sel=v.slice(s,e);
    // unwrap if markers are inside the selection
    if(sel.length>=2*ml && sel.slice(0,ml)===marker && sel.slice(-ml)===marker){
      var inner=sel.slice(ml,sel.length-ml);
      replaceRange(s,e,inner,s,s+inner.length); return;
    }
    // unwrap if markers sit immediately outside the selection
    if(v.slice(s-ml,s)===marker && v.slice(e,e+ml)===marker){
      replaceRange(s-ml,e+ml,sel,s-ml,s-ml+sel.length); return;
    }
    if(sel.length===0){
      replaceRange(s,e,marker+marker,s+ml,s+ml); return; // caret between markers
    }
    replaceRange(s,e,marker+sel+marker,s+ml,s+ml+sel.length); // keep word selected, markers outside
  }

  function eachLine(transform){
    var v=editor.value, s=editor.selectionStart, e=editor.selectionEnd;
    var ls=v.lastIndexOf('\n',s-1)+1;
    var le=v.indexOf('\n',e); if(le===-1) le=v.length;
    var block=v.slice(ls,le);
    var lines=block.split('\n');
    var out=transform(lines).join('\n');
    replaceRange(ls,le,out, ls, ls+out.length);
  }

  function togglePrefix(prefix){
    eachLine(function(lines){
      var all = lines.every(function(l){ return l.indexOf(prefix)===0; });
      return lines.map(function(l){
        if(all) return l.slice(prefix.length);
        return prefix + l.replace(/^#{1,6}\s+|^>\s+|^[-*]\s+|^\d+\.\s+|^- \[[ x]\]\s+/,'');
      });
    });
  }
  function ordered(){
    eachLine(function(lines){
      var all = lines.every(function(l,i){ return new RegExp('^'+(i+1)+'\\. ').test(l) || l.trim()===''; });
      var n=0;
      return lines.map(function(l){
        if(all) return l.replace(/^\d+\.\s+/,'');
        n++; return n+'. '+l.replace(/^#{1,6}\s+|^>\s+|^[-*]\s+|^\d+\.\s+/,'');
      });
    });
  }
  function heading(level){
    var p='#'.repeat(level)+' ';
    eachLine(function(lines){
      var all=lines.every(function(l){ return l.indexOf(p)===0; });
      return lines.map(function(l){
        var stripped=l.replace(/^#{1,6}\s+/,'');
        return all? stripped : p+stripped;
      });
    });
  }

  function insertBlock(text){
    var s=editor.selectionStart, e=editor.selectionEnd, v=editor.value;
    var pre = (s>0 && v[s-1]!=='\n') ? '\n\n' : (s>0 ? '\n' : '');
    var post = (e<v.length && v[e]!=='\n') ? '\n\n' : '';
    var full=pre+text+post;
    replaceRange(s,e, full, s+pre.length, s+pre.length+text.length);
  }

  function linkOrImage(isImg){
    var s=editor.selectionStart, e=editor.selectionEnd, sel=editor.value.slice(s,e);
    var label = sel || (isImg?'alt text':'link text');
    var snippet = (isImg?'!':'')+'['+label+'](url)';
    var urlStart = s + snippet.length - 4; // position of "url"
    replaceRange(s,e,snippet, urlStart, urlStart+3);
  }

  var COMMANDS = {
    bold:   function(){ wrapInline('**'); },
    italic: function(){ wrapInline('*'); },
    strike: function(){ wrapInline('~~'); },
    code:   function(){ wrapInline('`'); },
    h1:     function(){ heading(1); },
    h2:     function(){ heading(2); },
    quote:  function(){ togglePrefix('> '); },
    ul:     function(){ togglePrefix('- '); },
    ol:     function(){ ordered(); },
    task:   function(){ togglePrefix('- [ ] '); },
    link:   function(){ linkOrImage(false); },
    image:  function(){ linkOrImage(true); },
    codeblock: function(){
      var s=editor.selectionStart, e=editor.selectionEnd, sel=editor.value.slice(s,e);
      insertBlock('```\n'+(sel||'code here')+'\n```');
    },
    table:  function(){
      insertBlock('| Column | Column |\n| --- | --- |\n| Cell | Cell |\n| Cell | Cell |');
    },
    hr:     function(){ insertBlock('---'); }
  };

  function runCommand(cmd){
    if(!COMMANDS[cmd]) return;
    focusKeep();
    COMMANDS[cmd]();
  }

  $('toolbar').addEventListener('click', function(ev){
    var btn = ev.target.closest('[data-cmd]'); if(!btn) return;
    runCommand(btn.getAttribute('data-cmd'));
  });

  /* ---------- Tab key in textarea ---------- */
  editor.addEventListener('keydown', function(ev){
    if(ev.key==='Tab' && !ev.metaKey && !ev.ctrlKey){
      ev.preventDefault();
      var s=editor.selectionStart, e=editor.selectionEnd;
      if(s!==e && editor.value.slice(s,e).indexOf('\n')>=0){
        eachLine(function(lines){ return lines.map(function(l){
          return ev.shiftKey ? l.replace(/^  /,'') : '  '+l;
        }); });
      } else {
        replaceRange(s,e,'  ',s+2,s+2);
      }
    }
  });

  /* ---------- keyboard shortcuts ---------- */
  document.addEventListener('keydown', function(ev){
    var mod = ev.metaKey || ev.ctrlKey;
    if(!mod) {
      if(ev.key==='Escape'){
        if($('findbar').dataset.open==='true'){ closeFind(); }
        else if(document.body.dataset.view==='zen'){ setView('split'); }
        else if($('exportMenu').dataset.open==='true'){ toggleMenu(false); }
      }
      return;
    }
    var k = ev.key.toLowerCase();
    if(k==='b'){ ev.preventDefault(); runCommand('bold'); }
    else if(k==='i'){ ev.preventDefault(); runCommand('italic'); }
    else if(k==='k'){ ev.preventDefault(); runCommand('link'); }
    else if(k==='1'){ ev.preventDefault(); runCommand('h1'); }
    else if(k==='2'){ ev.preventDefault(); runCommand('h2'); }
    else if(k==='s'){ ev.preventDefault(); clearTimeout(saveT); setSaved('saving');
      var ok=lsSet(KEY_DOC,editor.value)&&lsSet(KEY_TITLE,docTitle.value);
      setTimeout(function(){ setSaved(ok?'saved':'error'); },200); showToast(ok?'Saved':'Could not save'); }
    else if(k==='f'){ ev.preventDefault(); openFind(); }
    else if(ev.key==='Enter'){ ev.preventDefault(); setView(document.body.dataset.view==='zen'?'split':'zen'); }
  });

  /* ---------- view modes ---------- */
  function setView(mode){
    document.body.dataset.view = mode;
    ['source','split','preview'].forEach(function(m){
      var b=$('vm-'+m); if(b) b.setAttribute('aria-pressed', String(m===mode));
    });
    if(mode!=='zen' && mode!=='source') paint();
  }
  $('vm-source').addEventListener('click',function(){ setView('source'); });
  $('vm-split').addEventListener('click', function(){ setView('split'); });
  $('vm-preview').addEventListener('click',function(){ setView('preview'); paint(); });
  $('zenBtn').addEventListener('click', function(){ setView(document.body.dataset.view==='zen'?'split':'zen'); });
  $('zenExit').addEventListener('click', function(){ setView('split'); });

  /* ---------- mobile pane toggle ---------- */
  function setMPane(p){ document.body.dataset.mpane=p;
    $('mt-source').setAttribute('aria-pressed',String(p==='source'));
    $('mt-preview').setAttribute('aria-pressed',String(p==='preview'));
    if(p==='preview') paint();
  }
  $('mt-source').addEventListener('click',function(){ setMPane('source'); });
  $('mt-preview').addEventListener('click',function(){ setMPane('preview'); });

  /* ---------- theme ---------- */
  function setTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    $('themeBtn').querySelector('.ico-sun').style.display = t==='dark'?'none':'block';
    $('themeBtn').querySelector('.ico-moon').style.display = t==='dark'?'block':'none';
    lsSet(KEY_THEME,t);
  }
  $('themeBtn').addEventListener('click', function(){
    setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
  });

  /* ---------- export menu ---------- */
  function toggleMenu(open){
    var m=$('exportMenu');
    var willOpen = (open==null) ? m.dataset.open!=='true' : open;
    m.dataset.open=String(willOpen);
    $('exportBtn').setAttribute('aria-expanded',String(willOpen));
  }
  $('exportBtn').addEventListener('click', function(e){ e.stopPropagation(); toggleMenu(); });
  document.addEventListener('click', function(e){
    if(!e.target.closest('.menu-wrap')) toggleMenu(false);
  });

  function download(filename, text, type){
    var blob=new Blob([text],{type:type});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); },1000);
  }
  function slug(){ return (docTitle.value.trim()||'untitled').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'untitled'; }
  function fullHtmlDoc(){
    return '<!DOCTYPE html>\n<html><head><meta charset="utf-8"><title>'+
      docTitle.value.replace(/[<>&]/g,'')+'</title></head>\n<body>\n'+renderMarkdown(editor.value)+'\n</body></html>';
  }
  function copyText(text, label){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){ showToast(label+' copied'); },
        function(){ showToast('Copy failed'); });
    } else { showToast('Clipboard unavailable'); }
  }
  $('exportMenu').addEventListener('click', function(ev){
    var b=ev.target.closest('[data-act]'); if(!b) return;
    var act=b.getAttribute('data-act');
    if(act==='dl-md') download(slug()+'.md', editor.value, 'text/markdown');
    else if(act==='dl-html') download(slug()+'.html', fullHtmlDoc(), 'text/html');
    else if(act==='copy-md') copyText(editor.value,'Markdown');
    else if(act==='copy-html') copyText(renderMarkdown(editor.value),'HTML');
    toggleMenu(false);
  });

  /* ---------- find ---------- */
  var matches=[], matchIdx=-1;
  function openFind(){ $('findbar').dataset.open='true'; $('findInput').focus(); $('findInput').select(); runFind(); }
  function closeFind(){ $('findbar').dataset.open='false'; focusKeep(); }
  function runFind(){
    var q=$('findInput').value; matches=[]; matchIdx=-1;
    if(q){
      var v=editor.value.toLowerCase(), ql=q.toLowerCase(), i=0;
      while((i=v.indexOf(ql,i))!==-1){ matches.push(i); i+=ql.length; }
    }
    $('findCount').textContent = matches.length? '1/'+matches.length : '0/0';
    if(matches.length){ matchIdx=0; gotoMatch(); }
  }
  function gotoMatch(){
    if(!matches.length) return;
    var q=$('findInput').value, pos=matches[matchIdx];
    editor.focus();
    editor.setSelectionRange(pos, pos+q.length);
    // bring into view
    var ratio = pos/Math.max(1,editor.value.length);
    editorScroll.scrollTop = ratio*(editor.scrollHeight-editorScroll.clientHeight);
    $('findCount').textContent=(matchIdx+1)+'/'+matches.length;
    updateCursor();
  }
  $('findInput').addEventListener('input', runFind);
  $('findInput').addEventListener('keydown', function(e){
    if(e.key==='Enter'){ e.preventDefault(); if(matches.length){ matchIdx=(matchIdx+(e.shiftKey?-1:1)+matches.length)%matches.length; gotoMatch(); } }
    if(e.key==='Escape'){ e.preventDefault(); closeFind(); }
  });
  $('findNext').addEventListener('click', function(){ if(matches.length){ matchIdx=(matchIdx+1)%matches.length; gotoMatch(); } });
  $('findPrev').addEventListener('click', function(){ if(matches.length){ matchIdx=(matchIdx-1+matches.length)%matches.length; gotoMatch(); } });
  $('findClose').addEventListener('click', closeFind);

  /* ---------- synced scroll ---------- */
  var syncOn=true, lock=false;
  $('syncBtn').addEventListener('click', function(){
    syncOn=!syncOn; this.setAttribute('aria-pressed',String(syncOn));
  });
  function syncFrom(src, dst){
    if(!syncOn || lock) return;
    lock=true;
    var sh=src.scrollHeight-src.clientHeight;
    var ratio = sh>0 ? src.scrollTop/sh : 0;
    dst.scrollTop = ratio*(dst.scrollHeight-dst.clientHeight);
    requestAnimationFrame(function(){ lock=false; });
  }
  editorScroll.addEventListener('scroll', function(){ syncFrom(editorScroll, previewScroll); });
  previewScroll.addEventListener('scroll', function(){ syncFrom(previewScroll, editorScroll); });

  /* ---------- divider drag ---------- */
  var dragging=false;
  var divider=$('divider'), workspace=document.querySelector('.workspace');
  function startDrag(e){ dragging=true; divider.classList.add('drag'); e.preventDefault(); }
  function moveDrag(e){
    if(!dragging) return;
    var rect=workspace.getBoundingClientRect();
    var x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    var pct=Math.min(80,Math.max(20, x/rect.width*100));
    document.querySelector('.pane-source').style.flex='0 0 '+pct+'%';
    document.querySelector('.pane-preview').style.flex='1 1 auto';
  }
  function endDrag(){ dragging=false; divider.classList.remove('drag'); }
  divider.addEventListener('mousedown', startDrag);
  divider.addEventListener('touchstart', startDrag, {passive:false});
  window.addEventListener('mousemove', moveDrag);
  window.addEventListener('touchmove', moveDrag, {passive:false});
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);
  divider.addEventListener('keydown', function(e){
    var src=document.querySelector('.pane-source');
    var cur=parseFloat(src.style.flexBasis)|| (src.getBoundingClientRect().width/workspace.getBoundingClientRect().width*100);
    if(e.key==='ArrowLeft'){ src.style.flex='0 0 '+Math.max(20,cur-4)+'%'; }
    if(e.key==='ArrowRight'){ src.style.flex='0 0 '+Math.min(80,cur+4)+'%'; }
  });

  /* ---------- wiring ---------- */
  editor.addEventListener('input', onInput);
  editor.addEventListener('keyup', updateCursor);
  editor.addEventListener('click', updateCursor);
  editor.addEventListener('select', updateCursor);
  docTitle.addEventListener('input', scheduleSave);

  /* ---------- boot ---------- */
  var SAMPLE = [
    '# Welcome to Folio',
    '',
    'A calm, **paper-grade** Markdown studio. Write on the left — watch it bloom, *beautifully typeset*, on the right.',
    '',
    '## Why writers stay',
    '',
    '- Live preview, sanitized and safe',
    '- A toolbar for the syntax you forget',
    '- Autosave that just works',
    '',
    '> "The first draft of anything is the structure. Folio keeps it out of your way."',
    '',
    '### A few things it handles',
    '',
    '1. GitHub-flavored tables',
    '2. Fenced code with highlighting',
    '3. Task lists you can check',
    '',
    '- [x] Render Markdown',
    '- [x] Sanitize HTML',
    '- [ ] Write something wonderful',
    '',
    '| Feature | Shortcut |',
    '| --- | --- |',
    '| Bold | ⌘B |',
    '| Italic | ⌘I |',
    '| Focus mode | ⌘⏎ |',
    '',
    '```js',
    'function greet(name) {',
    '  return `Hello, ${name} — happy writing.`;',
    '}',
    '```',
    '',
    'Add a [link](https://example.com), an image, or a divider below.',
    '',
    '---',
    ''
  ].join('\n');

  function boot(){
    if(!hasLib){ showBanner('Preview engine could not load — editing and autosave still work.'); }
    var savedDoc = lsGet(KEY_DOC);
    var savedTitle = lsGet(KEY_TITLE);
    var savedTheme = lsGet(KEY_THEME);
    setTheme(savedTheme==='dark'?'dark':(savedTheme==='light'?'light':
      (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')));
    editor.value = (savedDoc!==null) ? savedDoc : SAMPLE;
    if(savedTitle!==null) docTitle.value=savedTitle;
    if(!storeOK) showBanner('Local storage is unavailable — your work will not be saved on reload.');
    paint(); updateCounts(); updateCursor(); setSaved('saved');
  }
  boot();
})();
</script>
</body>
