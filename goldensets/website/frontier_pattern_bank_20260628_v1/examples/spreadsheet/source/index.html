        else if (typeof target === "number") { total += target; count++; }
      }
    });
    if (mode === "count") return count;
    if (mode === "avg") return count ? total / count : new CellError(ERR.DIV0);
    return total;
  }

  /* =====================================================================
     SHEET MODEL + DEPENDENCY DAG
     ===================================================================== */
  // cell: { raw, isFormula, ast, value, format, decimals, precedents:Set, dependents:Set, evals }
  const cells = new Map();     // key -> cell (only non-default cells stored)
  const state = { evalCount: 0 };

  function getCell(r, c) { return cells.get(cellKey(r, c)); }
  function ensureCell(r, c) {
    const k = cellKey(r, c);
    let cell = cells.get(k);
    if (!cell) { cell = { r, c, raw: "", isFormula: false, ast: null, value: null, format: "general", decimals: null, precedents: new Set(), dependents: new Set(), evals: 0 }; cells.set(k, cell); }
    return cell;
  }
  function cellValue(r, c) {            // for ref evaluation
    if (!inBounds(r, c)) return new CellError(ERR.REF);
    const cell = getCell(r, c);
    return cell ? cell.value : null;
  }

  /* ---- classify a literal cell input ---- */
  function classifyLiteral(raw) {
    const s = raw.trim();
    if (s === "") return { value: null, format: "general", decimals: null };
    let m;
    if ((m = /^(-?)(?:\$\s?)(\d[\d,]*\.?\d*)$/.exec(s))) {   // $1,234.50
      const num = parseFloat((m[1] || "") + m[2].replace(/,/g, ""));
      if (!isNaN(num)) return { value: num, format: "currency", decimals: 2 };
    }
    if ((m = /^(-?\d*\.?\d+)\s?%$/.exec(s))) {               // 12.5%
      const num = parseFloat(m[1]) / 100;
      if (!isNaN(num)) return { value: num, format: "percent", decimals: countDecimals(m[1]) };
    }
    if (/^-?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {     // plain number
      const num = Number(s);
      if (!isNaN(num)) return { value: num, format: "preserve", decimals: null };
    }
    const up = s.toUpperCase();
    if (up === "TRUE") return { value: true, format: "general", decimals: null };
    if (up === "FALSE") return { value: false, format: "general", decimals: null };
    return { value: raw, format: "text", decimals: null };    // string (keep original, incl. leading spaces)
  }
  function countDecimals(s) { const i = s.indexOf("."); return i < 0 ? 0 : (s.length - i - 1); }

  /* ---- set a cell's raw content; updates DAG; recomputes the subtree ---- */
  function setCellRaw(r, c, raw, opts) {
    opts = opts || {};
    if (!inBounds(r, c)) return;
    const cell = ensureCell(r, c);

    // remove old DAG edges
    cell.precedents.forEach((pk) => { const p = cells.get(pk); if (p) p.dependents.delete(cell.r * NCOLS + cell.c); });
    cell.precedents.clear();

    cell.raw = raw;
    cell.isFormula = raw.length > 0 && raw[0] === "=";

    if (cell.isFormula) {
      const body = raw.slice(1);
      try {
        cell.ast = parse(body);
        cell.parseError = null;
        collectPrecedents(cell.ast, cell.precedents);
        // add reverse edges
        cell.precedents.forEach((pk) => { const p = cells.get(pk) || (() => { const nr = Math.floor(pk / NCOLS), nc = pk % NCOLS; return ensureCell(nr, nc); })(); p.dependents.add(cellKey(r, c)); });
        cell.value = undefined;   // pending eval
      } catch (e) {
        cell.ast = null;
        cell.parseError = e.message || "Could not parse formula";
        cell.value = new CellError(ERR.PARSE, cell.parseError);
      }
      // formula keeps current display format unless still general
    } else {
      cell.ast = null; cell.parseError = null;
      const lit = classifyLiteral(raw);
      cell.value = lit.value;
      // A typed $ / % literal sets that display format; a plain number keeps the cell's
      // existing numeric format (or clears a stale "text" one); text/boolean leave it be.
      if (lit.format === "currency" || lit.format === "percent") { cell.format = lit.format; cell.decimals = lit.decimals; }
      else if (lit.format === "preserve") { if (cell.format === "text") cell.format = "general"; }
    }

    // Recompute this cell + its dependency subtree. When called silently the caller
    // (applyEdits / load / restore) owns a single recompute over the union of edits, so
    // we defer — recomputing here too would evaluate every dependent twice per edit.
    if (!opts.silent) { recompute(closure([cellKey(r, c)])); afterMutation(opts); }
  }

  /* ---- the dependency subtree to recompute: edited cells + all transitive dependents ---- */
  function closure(rootKeys) {
    const dirty = new Set(rootKeys);
    const stack = [...rootKeys];
    while (stack.length) {
      const k = stack.pop();
      const cell = cells.get(k);
      if (!cell) continue;
      cell.dependents.forEach((dk) => { if (!dirty.has(dk)) { dirty.add(dk); stack.push(dk); } });
    }
    return dirty;
  }

  /* ---- Kahn topological recalc over the dirty set; leftovers => cycle => #CIRCULAR ---- */
  function recompute(dirty) {
    // induced subgraph in-degrees (precedents that are themselves dirty)
    const indeg = new Map();
    dirty.forEach((k) => {
      const cell = cells.get(k);
      let d = 0;
      if (cell) cell.precedents.forEach((pk) => { if (dirty.has(pk)) d++; });
      indeg.set(k, d);
    });
    const queue = [];
    indeg.forEach((d, k) => { if (d === 0) queue.push(k); });
    const order = [];
    while (queue.length) {
      const k = queue.shift();
      order.push(k);
      const cell = cells.get(k);
      if (cell) cell.dependents.forEach((dk) => {
        if (indeg.has(dk)) { const nd = indeg.get(dk) - 1; indeg.set(dk, nd); if (nd === 0) queue.push(dk); }
      });
    }
    const inOrder = new Set(order);
    // cycle members
    dirty.forEach((k) => { if (!inOrder.has(k)) { const cell = cells.get(k); if (cell) cell.value = new CellError(ERR.CIRC, "This formula refers back to itself"); } });
    // evaluate the acyclic part in dependency order
    for (const k of order) {
      const cell = cells.get(k);
      if (!cell) continue;
      if (cell.isFormula) cell.value = evalCell(cell);
      // literal cells already have value set by setCellRaw
    }
  }

  /* ---- evaluate one formula cell (counts toward the eval counter) ---- */
  function evalCell(cell) {
    cell.evals++; state.evalCount++;
    if (!cell.ast) return new CellError(ERR.PARSE, cell.parseError || "");
    try {
      const v = evalNode(cell.ast);
      if (isRange(v)) return new CellError(ERR.VALUE, "a range is not a single value");
      return v;
    } catch (e) {
      return new CellError(ERR.PARSE, e.message || "evaluation error");
    }
  }

  /* ---- AST evaluator ---- */
  function evalNode(node) {
    switch (node.type) {
      case "num":  return node.value;
      case "str":  return node.value;
      case "bool": return node.value;
      case "err":  return node.value;
      case "ref": {
        if (!inBounds(node.r, node.c)) return new CellError(ERR.REF);
        return cellValue(node.r, node.c);
      }
      case "range": {
        const r1 = Math.min(node.a.r, node.b.r), r2 = Math.max(node.a.r, node.b.r);
        const c1 = Math.min(node.a.c, node.b.c), c2 = Math.max(node.a.c, node.b.c);
        if (!inBounds(r1, c1) || !inBounds(r2, c2)) return new CellError(ERR.REF);
        const list = [];
        for (let r = r1; r <= r2; r++) for (let c = c1; c <= c2; c++) list.push({ r, c, v: cellValue(r, c) });
        return { isRange: true, cells: list, r1, c1, r2, c2 };
      }
      case "unary": {
        const v = toNum(evalNode(node.arg));
        if (isErr(v)) return v;
        return node.op === "-" ? -v : +v;
      }
      case "postfix": {     // percent
        const v = toNum(evalNode(node.arg));
        return isErr(v) ? v : v / 100;
      }
      case "binary": return evalBinary(node);
      case "call":   return evalCall(node);
    }
    return new CellError(ERR.VALUE);
  }

  function evalBinary(node) {
    const op = node.op;
    const L = evalNode(node.left);
    if (isErr(L)) return L;
    const R = evalNode(node.right);
    if (isErr(R)) return R;
    if (isRange(L) || isRange(R)) return new CellError(ERR.VALUE);
    if (op === "&") { const a = toStr(L), b = toStr(R); if (isErr(a)) return a; if (isErr(b)) return b; return a + b; }
    if ("=<>".includes(op) || op === "<>" || op === "<=" || op === ">=") return compare(op, L, R);
    // arithmetic
    const a = toNum(L), b = toNum(R);
    if (isErr(a)) return a; if (isErr(b)) return b;
    switch (op) {
      case "+": return a + b;
      case "-": return a - b;
      case "*": return a * b;
      case "/": return b === 0 ? new CellError(ERR.DIV0, "division by zero") : a / b;
      case "^": return numGuard(Math.pow(a, b));
    }
    return new CellError(ERR.VALUE);
  }
  function compare(op, L, R) {
    let a = L, b = R, cmp;
    const bothNum = typeof a === "number" && typeof b === "number";
    if (bothNum) cmp = a < b ? -1 : a > b ? 1 : 0;
    else {
      // Excel: number < text < FALSE < TRUE; case-insensitive text compare
      const rank = (v) => typeof v === "number" ? 0 : typeof v === "string" ? 1 : v === false ? 2 : 3;
      const ra = rank(a), rb = rank(b);
      if (ra !== rb) cmp = ra < rb ? -1 : 1;
      else if (typeof a === "string") { const x = a.toLowerCase(), y = b.toLowerCase(); cmp = x < y ? -1 : x > y ? 1 : 0; }
      else cmp = (a === b) ? 0 : (a ? 1 : -1);
    }
    switch (op) {
      case "=":  return cmp === 0;
      case "<>": return cmp !== 0;
      case "<":  return cmp < 0;
      case ">":  return cmp > 0;
      case "<=": return cmp <= 0;
      case ">=": return cmp >= 0;
    }
  }
  function evalCall(node) {
    const def = FUNCS[node.name];
    if (!def) return new CellError(ERR.NAME, "Unknown function " + node.name + "()");
    if (def.lazy) return def.fn(node.args, (n) => evalNode(n));
    const args = node.args.map((a) => evalNode(a));
    for (const a of args) if (isErr(a)) { /* let each fn decide; most propagate via helpers */ }
    return def.fn(args);
  }

  /* ---------------------------------------------------------------
     SERIALIZE AST back to a formula string (for fill-down ref shift)
     --------------------------------------------------------------- */
  const SER_PREC = { "=": 1, "<>": 1, "<": 1, ">": 1, "<=": 1, ">=": 1, "&": 2, "+": 3, "-": 3, "*": 4, "/": 4, "^": 5 };
  function refStr(n) { return (n.absC ? "$" : "") + indexToCol(n.c) + (n.absR ? "$" : "") + (n.r + 1); }
  function serialize(node, parentPrec, isRight) {
    parentPrec = parentPrec || 0;
    switch (node.type) {
      case "num":  return numToStr(node.value);
      case "str":  return '"' + String(node.value).replace(/"/g, '""') + '"';
      case "bool": return node.value ? "TRUE" : "FALSE";
      case "err":  return node.value.type;
      case "ref":  return node.bad ? "#REF!" : refStr(node);
      case "range": return (node.a.bad ? "#REF!" : refStr(node.a)) + ":" + (node.b.bad ? "#REF!" : refStr(node.b));
      case "unary":   return node.op + serialize(node.arg, 6, false);
      case "postfix": return serialize(node.arg, 6, false) + "%";
      case "call":    return node.name + "(" + node.args.map((a) => serialize(a, 0, false)).join(",") + ")";
      case "binary": {
        const p = SER_PREC[node.op];
        const s = serialize(node.left, p, false) + node.op + serialize(node.right, p, true);
        const wrap = p < parentPrec || (p === parentPrec && isRight);
        return wrap ? "(" + s + ")" : s;
      }
    }
    return "";
  }
  function numToStr(n) { return Number(n.toPrecision(15)).toString(); }

  function shiftRefNode(n, dr, dc) {
    const nr = n.absR ? n.r : n.r + dr;
    const nc = n.absC ? n.c : n.c + dc;
    const bad = !inBounds(nr, nc);
    return { r: nr, c: nc, absR: n.absR, absC: n.absC, bad };
  }
  function shiftAst(node, dr, dc) {
    switch (node.type) {
      case "ref":   return Object.assign({ type: "ref" }, shiftRefNode(node, dr, dc));
      case "range": return { type: "range", a: shiftRefNode(node.a, dr, dc), b: shiftRefNode(node.b, dr, dc) };
      case "unary":   return { type: "unary", op: node.op, arg: shiftAst(node.arg, dr, dc) };
      case "postfix": return { type: "postfix", op: node.op, arg: shiftAst(node.arg, dr, dc) };
      case "binary":  return { type: "binary", op: node.op, left: shiftAst(node.left, dr, dc), right: shiftAst(node.right, dr, dc) };
      case "call":    return { type: "call", name: node.name, args: node.args.map((a) => shiftAst(a, dr, dc)) };
      default:        return node;
    }
  }

  /* =====================================================================
     NUMBER FORMATTING / DISPLAY
     ===================================================================== */
  function fmtGeneral(n) {
    if (typeof n !== "number") return String(n);
    if (!isFinite(n)) return n > 0 ? "∞" : "-∞";
    if (n === 0) return "0";
    // kill floating-point noise (0.1+0.2) by rounding to 12 significant digits
    const cleaned = Number(n.toPrecision(12));
    const a = Math.abs(cleaned);
    if (a !== 0 && (a >= 1e12 || a < 1e-9)) return cleaned.toExponential(6).replace(/\.?0+e/, "e");
    return cleaned.toString();
  }
  function formatValue(cell) {
    const v = cell.value;
    if (v == null || v === "") return { text: "", cls: "t-text" };
    if (isErr(v)) return { text: v.type, cls: "t-err", err: v };
    if (typeof v === "boolean") return { text: v ? "TRUE" : "FALSE", cls: "t-bool" };
    if (typeof v === "string") return { text: v, cls: "t-text" };
    // number
    const fmt = cell.format || "general";
    const d = cell.decimals;
    let text;
    try {
      if (fmt === "percent") text = (v * 100).toLocaleString("en-US", { minimumFractionDigits: d ?? 1, maximumFractionDigits: d ?? 1 }) + "%";
      else if (fmt === "currency") text = v.toLocaleString("en-US", { style: "currency", currency: "USD", minimumFractionDigits: d ?? 2, maximumFractionDigits: d ?? 2 });
      else if (fmt === "number") text = v.toLocaleString("en-US", { minimumFractionDigits: d ?? 2, maximumFractionDigits: d ?? 2 });
      else text = fmtGeneral(v);    // general
    } catch (e) { text = fmtGeneral(v); }
    return { text, cls: "t-num" };
  }
  const FORMAT_LABEL = { general: "General", number: "Number", percent: "Percent", currency: "Currency", text: "General" };

  /* =====================================================================
     RENDER — build the grid once, then patch cells/selection on change
     ===================================================================== */
  const sheetEl = document.getElementById("sheet");
  const frame = document.getElementById("grid-frame");
  const selRect = document.getElementById("sel-rect");
  const activeRect = document.getElementById("active-rect");
  const fillHandle = document.getElementById("fill-handle");
  const cellInput = document.getElementById("cell-input");
  const finput = document.getElementById("finput");
  const namebox = document.getElementById("namebox");
  const tooltip = document.getElementById("tooltip");
  const ariaLive = document.getElementById("aria-live");
  const emptyState = document.getElementById("empty-state");
  const saveStatusEl = document.getElementById("save-status");
  const saveTextEl = document.getElementById("save-text");
  const samplePill = document.getElementById("sample-pill");
  const statusSel = document.getElementById("status-sel");
  const statusStats = document.getElementById("status-stats");
  const statusMeta = document.getElementById("status-meta");

  const cellEls = [];     // cellEls[r][c]
  const chEls = [];       // column headers
  const rhEls = [];       // row headers

  function buildGrid() {
    sheetEl.style.gridTemplateColumns = `var(--rowhead-w) repeat(${NCOLS}, var(--col-w))`;
    const frag = document.createDocumentFragment();

    // header row
    const corner = document.createElement("div");
    corner.className = "corner"; corner.id = "corner"; corner.setAttribute("role", "presentation");
    corner.title = "Select all";
    corner.innerHTML = `<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M3 9 9 3M9 3v4M9 3H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    frag.appendChild(corner);

    for (let c = 0; c < NCOLS; c++) {
      const ch = document.createElement("div");
      ch.className = "ch"; ch.textContent = indexToCol(c);
      ch.setAttribute("role", "columnheader"); ch.dataset.c = c;
      ch.style.gridColumn = (c + 2); ch.style.gridRow = 1;
      chEls.push(ch); frag.appendChild(ch);
    }

    for (let r = 0; r < NROWS; r++) {
      const rh = document.createElement("div");
      rh.className = "rh"; rh.textContent = (r + 1);
      rh.setAttribute("role", "rowheader"); rh.dataset.r = r;
      rh.style.gridColumn = 1; rh.style.gridRow = (r + 2);
      rhEls.push(rh); frag.appendChild(rh);

      const row = [];
      for (let c = 0; c < NCOLS; c++) {
        const el = document.createElement("div");
        el.className = "cell t-text";
        el.setAttribute("role", "gridcell");
        el.tabIndex = -1;
        el.dataset.r = r; el.dataset.c = c;
        el.style.gridColumn = (c + 2); el.style.gridRow = (r + 2);
        el.setAttribute("aria-label", a1(r, c));
        row.push(el); frag.appendChild(el);
      }
      cellEls.push(row);
    }
    // overlays must remain last children for stacking; re-append them
    sheetEl.insertBefore(frag, selRect);
  }

  function renderCell(r, c) {
    const el = cellEls[r][c];
    const cell = getCell(r, c);
    if (!cell || (cell.raw === "" && cell.value == null)) {
      el.textContent = "";
      el.className = "cell t-text" + (isInRange(r, c) ? " in-range" : "");
      el.removeAttribute("title");
      return;
    }
    const f = formatValue(cell);
    el.textContent = f.text;
    let cls = "cell " + f.cls;
    if (isInRange(r, c)) cls += " in-range";
    el.className = cls;
    if (f.err) {
      el.title = f.err.type + (f.err.message ? " — " + f.err.message : "");
    } else el.removeAttribute("title");
  }

  function renderCells(keys) {
    keys.forEach((k) => { const r = Math.floor(k / NCOLS), c = k % NCOLS; if (cellEls[r]) renderCell(r, c); });
  }
  function renderAll() {
    for (let r = 0; r < NROWS; r++) for (let c = 0; c < NCOLS; c++) renderCell(r, c);
  }

  /* =====================================================================
     SELECTION
     ===================================================================== */
  const sel = { ar: 0, ac: 0, fr: 0, fc: 0 };   // anchor + focus
  let editing = null;                            // { r, c, from:'cell'|'bar' } | null

  const selBox = () => ({ r1: Math.min(sel.ar, sel.fr), r2: Math.max(sel.ar, sel.fr),
                          c1: Math.min(sel.ac, sel.fc), c2: Math.max(sel.ac, sel.fc) });
  function isInRange(r, c) { const b = selBox(); return r >= b.r1 && r <= b.r2 && c >= b.c1 && c <= b.c2; }

  let prevRangeKeys = new Set();
  function paintSelection() {
    // range wash: clear previous, set new
    const b = selBox();
    const newKeys = new Set();
    for (let r = b.r1; r <= b.r2; r++) for (let c = b.c1; c <= b.c2; c++) newKeys.add(cellKey(r, c));
    prevRangeKeys.forEach((k) => { if (!newKeys.has(k)) { const r = Math.floor(k / NCOLS), c = k % NCOLS; cellEls[r][c].classList.remove("in-range"); } });
    newKeys.forEach((k) => { const r = Math.floor(k / NCOLS), c = k % NCOLS; cellEls[r][c].classList.add("in-range"); });
    prevRangeKeys = newKeys;

    // headers
    chEls.forEach((el, c) => { el.classList.toggle("hl", c >= b.c1 && c <= b.c2); el.classList.toggle("active", c === sel.fc); });
    rhEls.forEach((el, r) => { el.classList.toggle("hl", r >= b.r1 && r <= b.r2); el.classList.toggle("active", r === sel.fr); });

    // overlays
    const af = cellEls[sel.fr][sel.fc];
    activeRect.classList.remove("hidden");
    activeRect.style.transform = `translate(${af.offsetLeft}px, ${af.offsetTop}px)`;
    activeRect.style.width = af.offsetWidth + "px";
    activeRect.style.height = af.offsetHeight + "px";

    const tl = cellEls[b.r1][b.c1], br = cellEls[b.r2][b.c2];
    const single = (b.r1 === b.r2 && b.c1 === b.c2);
    selRect.classList.toggle("hidden", single);
    if (!single) {
      selRect.style.transform = `translate(${tl.offsetLeft}px, ${tl.offsetTop}px)`;
      selRect.style.width = (br.offsetLeft + br.offsetWidth - tl.offsetLeft) + "px";
      selRect.style.height = (br.offsetTop + br.offsetHeight - tl.offsetTop) + "px";
    }
    // fill handle at bottom-right of the selection
    if (!editing) {
      fillHandle.classList.remove("hidden");
      fillHandle.style.transform = `translate(${br.offsetLeft + br.offsetWidth - 5}px, ${br.offsetTop + br.offsetHeight - 5}px)`;
    } else fillHandle.classList.add("hidden");

    // roving tabindex
    if (lastFocusCell && lastFocusCell !== af) lastFocusCell.tabIndex = -1;
    af.tabIndex = 0;
    lastFocusCell = af;

    // gridcell aria-selected
    updateAriaSelected(newKeys);

    syncFormulaBar();
    updateStatus();
    refreshToolbarState();   // keep format buttons in sync with the active cell
  }
  let lastFocusCell = null;
  let prevSelectedAria = new Set();
  function updateAriaSelected(newKeys) {
    prevSelectedAria.forEach((k) => { if (!newKeys.has(k)) { const r = Math.floor(k / NCOLS), c = k % NCOLS; cellEls[r][c].removeAttribute("aria-selected"); } });
    newKeys.forEach((k) => { const r = Math.floor(k / NCOLS), c = k % NCOLS; cellEls[r][c].setAttribute("aria-selected", "true"); });
    prevSelectedAria = newKeys;
  }

  function setSelection(ar, ac, fr, fc, opts) {
    opts = opts || {};
    sel.ar = clamp(ar, 0, NROWS - 1); sel.ac = clamp(ac, 0, NCOLS - 1);
    sel.fr = clamp(fr === undefined ? ar : fr, 0, NROWS - 1);
    sel.fc = clamp(fc === undefined ? ac : fc, 0, NCOLS - 1);
    paintSelection();
    if (opts.focus !== false) { try { cellEls[sel.fr][sel.fc].focus({ preventScroll: true }); } catch (e) {} }
    ensureVisible(sel.fr, sel.fc);
    announceSelection();
  }
  const clamp = (x, lo, hi) => Math.max(lo, Math.min(hi, x));

  function ensureVisible(r, c) {
    const el = cellEls[r][c];
    const headW = rhEls[0] ? rhEls[0].offsetWidth : 50;
    const headH = chEls[0] ? chEls[0].offsetHeight : 30;
    const left = el.offsetLeft, top = el.offsetTop, w = el.offsetWidth, h = el.offsetHeight;
    if (left - headW < frame.scrollLeft) frame.scrollLeft = left - headW;
    else if (left + w > frame.scrollLeft + frame.clientWidth) frame.scrollLeft = left + w - frame.clientWidth;
    if (top - headH < frame.scrollTop) frame.scrollTop = top - headH;
    else if (top + h > frame.scrollTop + frame.clientHeight) frame.scrollTop = top + h - frame.clientHeight;
  }

  /* =====================================================================
     FORMULA BAR + STATUS
     ===================================================================== */
  function activeRaw() { const cell = getCell(sel.fr, sel.fc); return cell ? cell.raw : ""; }
  function syncFormulaBar() {
    namebox.textContent = a1(sel.fr, sel.fc);
    if (!editing || editing.from === "cell") finput.value = activeRaw();
  }
  function announceSelection() {
    const cell = getCell(sel.fr, sel.fc);
    let val = "";
    if (cell && cell.value != null && cell.value !== "") {
      val = isErr(cell.value) ? cell.value.type : formatValue(cell).text;
    }
    const raw = cell && cell.isFormula ? (", formula " + cell.raw) : "";
    ariaLive.textContent = a1(sel.fr, sel.fc) + (val ? ", " + val : ", empty") + raw;
  }

  function updateStatus() {
    const b = selBox();
    const count = (b.r2 - b.r1 + 1) * (b.c2 - b.c1 + 1);
    if (count === 1) {
      const cell = getCell(sel.fr, sel.fc);
      statusSel.textContent = a1(sel.fr, sel.fc);
      const typeLabel = cell && cell.isFormula ? "Formula" : (cell && typeof cell.value === "number" ? FORMAT_LABEL[cell.format] || "Number" : (cell && typeof cell.value === "string" && cell.value !== "" ? "Text" : (cell && typeof cell.value === "boolean" ? "Boolean" : "Empty")));
      statusStats.innerHTML = "";
      addStat("Type", typeLabel);
    } else {
      statusSel.textContent = a1(b.r1, b.c1) + ":" + a1(b.r2, b.c2) + "  ·  " + count + " cells";
      // aggregate numeric values in the selection
      const nums = [];
      for (let r = b.r1; r <= b.r2; r++) for (let c = b.c1; c <= b.c2; c++) {
        const cl = getCell(r, c);
        if (cl && typeof cl.value === "number") nums.push(cl.value);
      }
      statusStats.innerHTML = "";
      if (nums.length) {
        const sum = nums.reduce((s, x) => s + x, 0);
        addStat("Sum", fmtGeneral(sum));
        addStat("Avg", fmtGeneral(sum / nums.length));
        addStat("Min", fmtGeneral(Math.min(...nums)));
        addStat("Max", fmtGeneral(Math.max(...nums)));
      }
      addStat("Count", String(nums.length));
    }
    statusMeta.textContent = "evals " + state.evalCount.toLocaleString("en-US");
  }
  function addStat(k, v) {
    const s = document.createElement("span"); s.className = "stat";
    s.innerHTML = `<span class="k">${k}</span><span class="v">${escapeHtml(v)}</span>`;
    statusStats.appendChild(s);
  }
  function escapeHtml(s) { return String(s).replace(/[&<>]/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[m])); }

  /* =====================================================================
     EDITING
     ===================================================================== */
  function beginEdit(mode, initialChar) {
    const r = sel.fr, c = sel.fc;
    editing = { r, c, from: "cell" };
    const el = cellEls[r][c];
    cellInput.classList.remove("hidden");
    cellInput.style.transform = `translate(${el.offsetLeft}px, ${el.offsetTop}px)`;
    cellInput.style.height = el.offsetHeight + "px";
    cellInput.style.minWidth = el.offsetWidth + "px";
    fillHandle.classList.add("hidden");
    let val;
    if (mode === "replace") val = (initialChar !== undefined ? initialChar : "");
    else val = activeRaw();
    cellInput.value = val;
    finput.value = val;
    cellInput.focus();
    if (mode === "replace") cellInput.setSelectionRange(val.length, val.length);
    else { const L = val.length; cellInput.setSelectionRange(L, L); }
    highlightRefs(val);
  }
  function syncEditors(srcVal, from) {
    if (from === "cell") finput.value = srcVal; else cellInput.value = srcVal;
    if (editing) editing.from = from;
    highlightRefs(srcVal);
  }
  function commitEdit(moveDir) {
    if (!editing) return;
    const { r, c } = editing;
    const raw = (editing.from === "bar" ? finput.value : cellInput.value);
    clearRefHighlights();
    cellInput.classList.add("hidden");
    editing = null;
    applyEdits([{ r, c, raw }]);          // records undo + recomputes
    // move
    if (moveDir === "down") setSelection(r + 1, c);
    else if (moveDir === "up") setSelection(r - 1, c);
    else if (moveDir === "right") setSelection(r, c + 1);
    else if (moveDir === "left") setSelection(r, c - 1);
    else setSelection(r, c);
    frame.focus({ preventScroll: true });
    if (sel.fr === r && sel.fc === c) cellEls[r][c].focus({ preventScroll: true });
  }
  function cancelEdit() {
    if (!editing) return;
    clearRefHighlights();
    cellInput.classList.add("hidden");
    const { r, c } = editing; editing = null;
    syncFormulaBar();
    paintSelection();
    cellEls[r][c].focus({ preventScroll: true });
  }

  /* ---- reference highlighting while editing a formula ---- */
  let refHlEls = [];
  function clearRefHighlights() { refHlEls.forEach((el) => { el.classList.remove("ref-hl"); el.style.removeProperty("--ref-c"); }); refHlEls = []; }
  const REF_COLORS = ["var(--ref-1)", "var(--ref-2)", "var(--ref-3)", "var(--ref-4)", "var(--ref-5)", "var(--ref-6)"];
  function highlightRefs(buffer) {
    clearRefHighlights();
    if (!buffer || buffer[0] !== "=") return;
    let toks;
    try { toks = tokenize(buffer.slice(1)); } catch (e) { return; }   // tolerant: partial formulas still highlight
    const seen = new Map(); let colorIdx = 0;
    const mark = (r1, c1, r2, c2) => {
      const id = r1 + "," + c1 + "," + r2 + "," + c2;
      let color = seen.get(id);
      if (color === undefined) { color = REF_COLORS[colorIdx % REF_COLORS.length]; colorIdx++; seen.set(id, color); }
      for (let r = Math.min(r1, r2); r <= Math.max(r1, r2); r++)
        for (let c = Math.min(c1, c2); c <= Math.max(c1, c2); c++)
          if (inBounds(r, c)) { const el = cellEls[r][c]; el.classList.add("ref-hl"); el.style.setProperty("--ref-c", color); refHlEls.push(el); }
    };
    for (let i = 0; i < toks.length; i++) {
      const tk = toks[i];
      if (tk.t === T.REF) {
        const p = parseA1(tk.v); if (!p) continue;
        if (toks[i + 1] && toks[i + 1].t === T.COLON && toks[i + 2] && toks[i + 2].t === T.REF) {
          const q = parseA1(toks[i + 2].v); if (q) { mark(p.r, p.c, q.r, q.c); i += 2; continue; }
        }
        mark(p.r, p.c, p.r, p.c);
      }
    }
  }

  /* =====================================================================
     MUTATIONS + UNDO/REDO
     ===================================================================== */
  const undoStack = [], redoStack = [];
  const MAX_UNDO = 200;

  function snapshotCell(r, c) {
    const cell = getCell(r, c);
    return { r, c, raw: cell ? cell.raw : "", format: cell ? cell.format : "general", decimals: cell ? cell.decimals : null };
  }
  // edits: [{r,c,raw,(format),(decimals)}]
  function applyEdits(edits, opts) {
    opts = opts || {};
    const before = edits.map((e) => snapshotCell(e.r, e.c));
    const changedRoots = [];
    edits.forEach((e) => {
      if (e.raw !== undefined) { setCellRaw(e.r, e.c, e.raw, { silent: true }); }
      if (e.format !== undefined) { const cell = ensureCell(e.r, e.c); cell.format = e.format; if (e.decimals !== undefined) cell.decimals = e.decimals; }
      changedRoots.push(cellKey(e.r, e.c));
    });
    // recompute union subtree of all roots (covers multi-cell edits like fill/clear)
    recompute(closure(changedRoots));
    if (!opts.noUndo) {
      undoStack.push({ before, after: edits.map((e) => snapshotCell(e.r, e.c)) });
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      redoStack.length = 0;
    }
    renderAll();
    paintSelection();
    afterMutation();
    refreshToolbarState();
  }
  function restoreSnapshots(list) {
    const roots = [];
    list.forEach((s) => {
      const cell = ensureCell(s.r, s.c);
      setCellRaw(s.r, s.c, s.raw, { silent: true });
      cell.format = s.format; cell.decimals = s.decimals;
      roots.push(cellKey(s.r, s.c));
    });
    recompute(closure(roots));
    renderAll();
  }
  function undo() {
    const op = undoStack.pop(); if (!op) return;
    restoreSnapshots(op.before);
    redoStack.push(op);
    paintSelection(); afterMutation(); refreshToolbarState();
    flashAria("Undo");
  }
  function redo() {
    const op = redoStack.pop(); if (!op) return;
    restoreSnapshots(op.after);
    undoStack.push(op);
    paintSelection(); afterMutation(); refreshToolbarState();
    flashAria("Redo");
  }
  function flashAria(msg) { ariaLive.textContent = msg; }

  /* =====================================================================
     PERSISTENCE
     ===================================================================== */
  let saveTimer = null, isSampleLoaded = false;
  function afterMutation() {
    updateEmptyState();
    scheduleSave();
  }
  function scheduleSave() {
    saveStatusEl.classList.add("saving"); saveTextEl.textContent = "Saving…";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNow, 350);
  }
  function saveNow() {
    try {
      const data = { v: 1, sample: isSampleLoaded, cells: {} };
      cells.forEach((cell, k) => {
        if (cell.raw !== "" || cell.format !== "general" || cell.decimals != null) {
          data.cells[k] = { raw: cell.raw, format: cell.format, decimals: cell.decimals };
        }
      });
      data.sel = { ar: sel.ar, ac: sel.ac, fr: sel.fr, fc: sel.fc };
      localStorage.setItem(LS_KEY, JSON.stringify(data));
    } catch (e) { /* storage may be unavailable; degrade silently */ }
    saveStatusEl.classList.remove("saving"); saveStatusEl.classList.add("flash");
    saveTextEl.textContent = "Saved";
    setTimeout(() => saveStatusEl.classList.remove("flash"), 280);
  }
  function loadFromStorage() {
    let data;
    try { data = JSON.parse(localStorage.getItem(LS_KEY)); } catch (e) { data = null; }
    if (!data || !data.cells) return false;
    isSampleLoaded = !!data.sample;
    // set literals first, then formulas, so refs resolve; but recompute handles order anyway
    const keys = Object.keys(data.cells);
    keys.forEach((k) => {
      const r = Math.floor(k / NCOLS), c = k % NCOLS;
      if (!inBounds(r, c)) return;
      const d = data.cells[k];
      const cell = ensureCell(r, c);
      setCellRaw(r, c, d.raw || "", { silent: true });
      if (d.format) cell.format = d.format;
      if (d.decimals !== undefined) cell.decimals = d.decimals;
    });
    recompute(closure([...cells.keys()]));
    if (data.sel) { sel.ar = data.sel.ar; sel.ac = data.sel.ac; sel.fr = data.sel.fr; sel.fc = data.sel.fc; }
    return true;
  }

  /* =====================================================================
     SAMPLE SHEET  (clearly labeled demo content — not real data)
     ===================================================================== */
  function loadSample(opts) {
    cells.clear(); state.evalCount = 0;
    const S = [
      // header row
      ["A1", "Item (sample)"], ["B1", "Qty"], ["C1", "Unit price"], ["D1", "Line total"], ["E1", "Share"],
      ["A2", "Notebook"],  ["B2", "3"],  ["C2", "$4.50"],  ["D2", "=B2*C2"], ["E2", "=D2/$D$7"],
      ["A3", "Pen pack"],  ["B3", "5"],  ["C3", "$2.20"],  ["D3", "=B3*C3"], ["E3", "=D3/$D$7"],
      ["A4", "Folder"],    ["B4", "8"],  ["C4", "$1.10"],  ["D4", "=B4*C4"], ["E4", "=D4/$D$7"],
      ["A5", "Marker set"],["B5", "2"],  ["C5", "$6.75"],  ["D5", "=B5*C5"], ["E5", "=D5/$D$7"],
      ["A6", "Tape"],      ["B6", "4"],  ["C6", "$3.00"],  ["D6", "=B6*C6"], ["E6", "=D6/$D$7"],
      // totals
      ["A7", "Total"], ["B7", "=SUM(B2:B6)"], ["C7", "=AVERAGE(C2:C6)"], ["D7", "=SUM(D2:D6)"], ["E7", "=SUM(E2:E6)"],
      // a couple of demonstrative formulas
      ["A9", "Avg line total"], ["D9", "=ROUND(AVERAGE(D2:D6),2)"],
      ["A10", "Over $15?"],     ["D10", "=IF(D7>15,\"Yes\",\"No\")"],
      ["A11", "Items counted"], ["D11", "=COUNT(D2:D6)"]
    ];
    // set formats for currency/percent display
    S.forEach(([ref, raw]) => { const p = parseA1(ref); setCellRaw(p.r, p.c, raw, { silent: true }); });
    // apply percent format to the Share column + currency where natural
    for (let r = 1; r <= 5; r++) { const cell = ensureCell(r, 4); cell.format = "percent"; cell.decimals = 1; }
    { const e7 = ensureCell(6, 4); e7.format = "percent"; e7.decimals = 1; }
    for (let r = 1; r <= 6; r++) { const d = ensureCell(r, 3); d.format = "currency"; d.decimals = 2; }
    { const d7 = ensureCell(6, 3); d7.format = "currency"; d7.decimals = 2; }
    { const c7 = ensureCell(6, 2); c7.format = "currency"; c7.decimals = 2; }
    { const d9 = ensureCell(8, 3); d9.format = "currency"; d9.decimals = 2; }
    recompute(closure([...cells.keys()]));
    isSampleLoaded = true;
    undoStack.length = 0; redoStack.length = 0;
    renderAll();
    setSelection(0, 0);
    if (!(opts && opts.silent)) { saveNow(); }
    updateEmptyState(); refreshToolbarState();
  }

  function clearSheet(record) {
    const before = [];
    cells.forEach((cell, k) => { if (cell.raw !== "" || cell.format !== "general" || cell.decimals != null) before.push(snapshotCell(cell.r, cell.c)); });
    cells.clear(); state.evalCount = 0;
    isSampleLoaded = false;
    if (record !== false && before.length) {
      undoStack.push({ before, after: before.map((s) => ({ r: s.r, c: s.c, raw: "", format: "general", decimals: null })) });
      redoStack.length = 0;
    }
    renderAll();
    setSelection(0, 0);
    afterMutation(); refreshToolbarState();
  }

  function updateEmptyState() {
    let any = false;
    cells.forEach((cell) => { if (cell.raw !== "") any = true; });
    emptyState.classList.toggle("show", !any);
    samplePill.style.display = isSampleLoaded ? "" : "none";
  }

  /* =====================================================================
     TOOLBAR ACTIONS
     ===================================================================== */
  const fmtButtons = {
    general: document.getElementById("fmt-general"),
    number: document.getElementById("fmt-number"),
    percent: document.getElementById("fmt-percent"),
    currency: document.getElementById("fmt-currency")
  };
  function applyFormatToSelection(fmt) {
    const b = selBox(); const edits = [];
    const defDec = fmt === "percent" ? 1 : (fmt === "currency" || fmt === "number") ? 2 : null;
    for (let r = b.r1; r <= b.r2; r++) for (let c = b.c1; c <= b.c2; c++) {
      const cur = getCell(r, c);
      const dec = (cur && cur.decimals != null && fmt !== "general") ? cur.decimals : defDec;
      edits.push({ r, c, raw: cur ? cur.raw : "", format: fmt, decimals: dec });
    }
    applyEdits(edits);
  }
  function changeDecimals(delta) {
    const b = selBox(); const edits = [];
    for (let r = b.r1; r <= b.r2; r++) for (let c = b.c1; c <= b.c2; c++) {
      const cur = ensureCell(r, c);
      let fmt = cur.format;
      if (fmt === "general" || fmt === "text") fmt = "number";   // adding decimals implies a numeric format
      let dec = cur.decimals; if (dec == null) dec = (fmt === "percent" ? 1 : 2);
      dec = clamp(dec + delta, 0, 10);
      edits.push({ r, c, raw: cur.raw, format: fmt, decimals: dec });
    }
    applyEdits(edits);
  }
  function refreshToolbarState() {
    const cell = getCell(sel.fr, sel.fc);
    const fmt = cell ? (cell.format === "text" ? "general" : cell.format) : "general";
    Object.keys(fmtButtons).forEach((k) => fmtButtons[k].setAttribute("aria-pressed", String(k === fmt)));
    document.getElementById("btn-undo").disabled = undoStack.length === 0;
    document.getElementById("btn-redo").disabled = redoStack.length === 0;
  }
  function fillDown() {
    const b = selBox();
    if (b.r1 === b.r2) return;                  // need >1 row
    const edits = [];
    for (let c = b.c1; c <= b.c2; c++) {
      const src = getCell(b.r1, c);
      const srcRaw = src ? src.raw : "";
      const srcFmt = src ? src.format : "general";
      const srcDec = src ? src.decimals : null;
      for (let r = b.r1 + 1; r <= b.r2; r++) {
        let raw = srcRaw;
        if (srcRaw && srcRaw[0] === "=" && src.ast) {
          try { raw = "=" + serialize(shiftAst(src.ast, r - b.r1, 0)); } catch (e) { raw = srcRaw; }
        }
        edits.push({ r, c, raw, format: srcFmt, decimals: srcDec });
      }
    }
    applyEdits(edits);
  }
  function clearSelectionContents() {
    const b = selBox(); const edits = [];
    for (let r = b.r1; r <= b.r2; r++) for (let c = b.c1; c <= b.c2; c++) {
      const cur = getCell(r, c);
      if (cur && cur.raw !== "") edits.push({ r, c, raw: "", format: cur.format, decimals: cur.decimals });
    }
    if (edits.length) applyEdits(edits);
  }

  /* =====================================================================
     EVENTS
     ===================================================================== */
  // --- mouse: select / drag-select / edit ---
  let dragging = false, fillDrag = null;
  sheetEl.addEventListener("pointerdown", (e) => {
    const cellEl = e.target.closest(".cell");
    const chEl = e.target.closest(".ch");
    const rhEl = e.target.closest(".rh");
    const cornerEl = e.target.closest(".corner");
    if (e.target === fillHandle) {
      e.preventDefault();
      fillDrag = { startBox: selBox() };
      sheetEl.setPointerCapture(e.pointerId);
      return;
    }
    if (editing) commitEdit(null);
    if (cornerEl) { setSelection(0, 0, NROWS - 1, NCOLS - 1); return; }
    if (chEl) { const c = +chEl.dataset.c; setSelection(0, c, NROWS - 1, c); return; }
    if (rhEl) { const r = +rhEl.dataset.r; setSelection(r, 0, r, NCOLS - 1); return; }
    if (!cellEl) return;
    const r = +cellEl.dataset.r, c = +cellEl.dataset.c;
    if (e.shiftKey) { setSelection(sel.ar, sel.ac, r, c); }
    else { setSelection(r, c); dragging = true; sheetEl.setPointerCapture(e.pointerId); }
  });
  sheetEl.addEventListener("pointermove", (e) => {
    if (!dragging && !fillDrag) return;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const cellEl = el && el.closest && el.closest(".cell");
    if (!cellEl) return;
    const r = +cellEl.dataset.r, c = +cellEl.dataset.c;
    if (fillDrag) {
      // preview the fill target as an extended selection (single column-band downward)
      const sb = fillDrag.startBox;
      const rr = Math.max(sb.r2, r);
      setSelection(sb.r1, sb.c1, rr, sb.c2, { focus: false });
    } else {
      setSelection(sel.ar, sel.ac, r, c, { focus: false });
    }
  });
  sheetEl.addEventListener("pointerup", (e) => {
    if (fillDrag) { fillDown(); fillDrag = null; try { sheetEl.releasePointerCapture(e.pointerId); } catch (x) {} }
    dragging = false;
  });
  sheetEl.addEventListener("dblclick", (e) => {
    const cellEl = e.target.closest(".cell"); if (!cellEl) return;
    const r = +cellEl.dataset.r, c = +cellEl.dataset.c;
    setSelection(r, c); beginEdit("edit");
  });

  // --- keyboard on the grid ---
  frame.addEventListener("keydown", (e) => {
    if (editing) return;            // editor handles its own keys
    const k = e.key;
    const ext = e.shiftKey;
    const stepRow = (dr) => { if (ext) setSelection(sel.ar, sel.ac, sel.fr + dr, sel.fc); else setSelection(sel.fr + dr, sel.fc); };
    const stepCol = (dc) => { if (ext) setSelection(sel.ar, sel.ac, sel.fr, sel.fc + dc); else setSelection(sel.fr, sel.fc + dc); };

    if (k === "ArrowUp")    { e.preventDefault(); stepRow(-1); return; }
    if (k === "ArrowDown")  { e.preventDefault(); stepRow(1); return; }
    if (k === "ArrowLeft")  { e.preventDefault(); stepCol(-1); return; }
    if (k === "ArrowRight") { e.preventDefault(); stepCol(1); return; }
    if (k === "Tab")        { e.preventDefault(); setSelection(sel.fr, sel.fc + (ext ? -1 : 1)); return; }
    if (k === "Enter")      { e.preventDefault(); if (ext) setSelection(sel.fr - 1, sel.fc); else beginEdit("edit"); return; }
    if (k === "F2")         { e.preventDefault(); beginEdit("edit"); return; }
    if (k === "Home")       { e.preventDefault(); if (e.ctrlKey || e.metaKey) setSelection(0, 0); else setSelection(sel.fr, 0); return; }
    if (k === "End")        { e.preventDefault(); if (e.ctrlKey || e.metaKey) setSelection(NROWS - 1, NCOLS - 1); else setSelection(sel.fr, NCOLS - 1); return; }
    if (k === "PageUp")     { e.preventDefault(); setSelection(sel.fr - 10, sel.fc); return; }
    if (k === "PageDown")   { e.preventDefault(); setSelection(sel.fr + 10, sel.fc); return; }
    if (k === "Delete" || k === "Backspace") { e.preventDefault(); clearSelectionContents(); return; }

    if ((e.ctrlKey || e.metaKey) && !e.altKey) {
      const lk = k.toLowerCase();
      if (lk === "z") { e.preventDefault(); if (e.shiftKey) redo(); else undo(); return; }
      if (lk === "y") { e.preventDefault(); redo(); return; }
      if (lk === "d") { e.preventDefault(); fillDown(); return; }
      if (lk === "a") { e.preventDefault(); setSelection(0, 0, NROWS - 1, NCOLS - 1); return; }
      return;
    }
    // printable char -> start replace-edit
    if (k.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault(); beginEdit("replace", k);
    }
  });

  // --- in-cell editor keys ---
  // NOTE: stopPropagation is essential — the editor lives inside the grid frame, so a
  // committing Enter/Tab would otherwise bubble to the grid handler (now editing===null)
  // and immediately reopen an edit on the cell we just moved to.
  cellInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); e.stopPropagation(); commitEdit(e.shiftKey ? "up" : "down"); }
    else if (e.key === "Tab") { e.preventDefault(); e.stopPropagation(); commitEdit(e.shiftKey ? "left" : "right"); }
    else if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); cancelEdit(); }
  });
  cellInput.addEventListener("input", () => syncEditors(cellInput.value, "cell"));

  // --- formula bar ---
  finput.addEventListener("focus", () => { if (!editing) { editing = { r: sel.fr, c: sel.fc, from: "bar" }; highlightRefs(finput.value); } });
  finput.addEventListener("input", () => { if (editing) syncEditors(finput.value, "bar"); });
  finput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); commitEdit("down"); }
    else if (e.key === "Tab") { e.preventDefault(); commitEdit(e.shiftKey ? "left" : "right"); }
    else if (e.key === "Escape") { e.preventDefault(); cancelEdit(); }
  });
  finput.addEventListener("blur", () => {
    // commit when focus leaves the bar for something other than the cell editor
    if (editing && editing.from === "bar") { setTimeout(() => { if (editing && editing.from === "bar" && document.activeElement !== cellInput) commitEdit(null); }, 0); }
  });

  // --- toolbar wiring ---
  document.getElementById("btn-undo").addEventListener("click", undo);
  document.getElementById("btn-redo").addEventListener("click", redo);
  fmtButtons.general.addEventListener("click", () => applyFormatToSelection("general"));
  fmtButtons.number.addEventListener("click", () => applyFormatToSelection("number"));
  fmtButtons.percent.addEventListener("click", () => applyFormatToSelection("percent"));
  fmtButtons.currency.addEventListener("click", () => applyFormatToSelection("currency"));
  document.getElementById("dec-less").addEventListener("click", () => changeDecimals(-1));
  document.getElementById("dec-more").addEventListener("click", () => changeDecimals(1));
  document.getElementById("btn-fill").addEventListener("click", fillDown);
  document.getElementById("btn-clear").addEventListener("click", clearSelectionContents);
  document.getElementById("btn-reset").addEventListener("click", () => clearSheet(true));
  document.getElementById("btn-sample").addEventListener("click", () => loadSample());
  document.getElementById("empty-load-sample").addEventListener("click", () => loadSample());

  // --- error tooltip on hover over an error cell ---
  sheetEl.addEventListener("pointerover", (e) => {
    const cellEl = e.target.closest(".cell.t-err"); if (!cellEl) return;
    const r = +cellEl.dataset.r, c = +cellEl.dataset.c; const cell = getCell(r, c);
    if (!cell || !isErr(cell.value)) return;
    const msg = cell.value.message || defaultErrMsg(cell.value.type);
    tooltip.innerHTML = `<strong>${cell.value.type}</strong>${msg ? " — " + escapeHtml(msg) : ""}`;
    const rect = cellEl.getBoundingClientRect();
    tooltip.style.left = Math.min(rect.left, window.innerWidth - 270) + "px";
    tooltip.style.top = (rect.bottom + 6) + "px";
    tooltip.classList.add("show");
  });
  sheetEl.addEventListener("pointerout", (e) => { if (e.target.closest(".cell.t-err")) tooltip.classList.remove("show"); });
  function defaultErrMsg(type) {
    return ({
      "#DIV/0!": "division by zero", "#REF!": "reference is out of range",
      "#NAME?": "unknown name or function", "#VALUE!": "wrong type of value",
      "#CIRCULAR": "this formula refers back to itself", "#ERROR!": "the formula could not be parsed"
    })[type] || "";
  }

  // --- scroll shadows under sticky headers ---
  frame.addEventListener("scroll", () => {
    frame.classList.toggle("scrolled-y", frame.scrollTop > 0);
    frame.classList.toggle("scrolled-x", frame.scrollLeft > 0);
  }, { passive: true });

  // keep overlays aligned if the viewport resizes (token col widths change at breakpoints)
  let resizeRaf = 0;
  window.addEventListener("resize", () => { cancelAnimationFrame(resizeRaf); resizeRaf = requestAnimationFrame(() => paintSelection()); });

  /* =====================================================================
     TEST API  (drives the headless self-test; never used by the UI)
     ===================================================================== */
  window.__lattice = {
    setRaw(ref, raw) { const p = parseA1(ref); if (!p) throw new Error("bad ref " + ref); applyEdits([{ r: p.r, c: p.c, raw }]); },
    getRaw(ref) { const p = parseA1(ref); const cell = getCell(p.r, p.c); return cell ? cell.raw : ""; },
    getDisplay(ref) { const p = parseA1(ref); const cell = getCell(p.r, p.c); if (!cell) return ""; return formatValue(cell).text; },
    getValue(ref) { const p = parseA1(ref); const cell = getCell(p.r, p.c); if (!cell) return null; return isErr(cell.value) ? cell.value.type : cell.value; },
    evalCountOf(ref) { const p = parseA1(ref); const cell = getCell(p.r, p.c); return cell ? cell.evals : 0; },
    totalEvals() { return state.evalCount; },
    select(ref) { const p = parseA1(ref); setSelection(p.r, p.c); },
    formulaBarValue() { return finput.value; },
    nameBoxValue() { return namebox.textContent; },
    clearAll() { try { localStorage.removeItem(LS_KEY); } catch (e) {} clearSheet(false); },
    loadSample() { loadSample(); },
    flush() { clearTimeout(saveTimer); saveNow(); },
    isSample() { return isSampleLoaded; }
  };

  /* =====================================================================
     BOOT
     ===================================================================== */
  buildGrid();
  const restored = loadFromStorage();
  if (!restored) loadSample({ silent: false });
  else { renderAll(); setSelection(sel.ar, sel.ac, sel.fr, sel.fc); updateEmptyState(); refreshToolbarState(); }
  // initial scroll-shadow state
  frame.classList.toggle("scrolled-y", frame.scrollTop > 0);
  frame.classList.toggle("scrolled-x", frame.scrollLeft > 0);
})();
</script>
</body>
</html>
