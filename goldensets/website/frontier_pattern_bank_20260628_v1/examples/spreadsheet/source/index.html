<!DOCTYPE html>
<html lang="en" data-theme="lattice">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light" />
<title>Lattice — Formula Spreadsheet</title>
<meta name="description" content="A precise, calm spreadsheet with a real hand-rolled formula engine: A1 references, ranges, functions, a dependency graph with topological recalc, and cycle detection." />
<style>
  /* ============================================================
     LATTICE — design tokens
     A precise, calm, modern spreadsheet. Warm paper neutrals,
     one cool-ink accent, crisp hairline gridlines, tabular figures.
     ============================================================ */
  :root {
    color-scheme: light;

    /* --- paper / surface ramp (warm neutral, 6 steps) --- */
    --paper-0:   #ffffff;   /* cell field */
    --paper-1:   #faf9f6;   /* app background */
    --paper-2:   #f3f1ec;   /* headers, toolbar, name-box */
    --paper-3:   #ebe8e1;   /* hover header / pressed surface */
    --paper-4:   #e2ded4;   /* active header band */

    /* --- hairlines --- */
    --line:        #e6e2d9;  /* gridlines */
    --line-2:      #d8d3c7;  /* stronger dividers */
    --line-faint:  #efece5;  /* whisper divider */

    /* --- ink / text ramp (>=4 steps, AA-checked on paper) --- */
    --ink:        #1c1f25;   /* primary cell text (16.5:1 on cells) */
    --ink-2:      #3c414b;   /* secondary UI text (9:1 on toolbar) */
    --muted:      #5f636b;   /* header glyphs / labels (5.3:1 on paper-2, AA) */
    --faint:      #747883;   /* supplementary / disabled / decorative (~4:1) */

    /* --- signature accent: a confident cool ink-blue --- */
    --accent:        #2f5fd9;
    --accent-press:  #2249b8;
    --accent-bright: #4574ec;
    --accent-wash:   rgba(47, 95, 217, 0.10);   /* range fill */
    --accent-wash-2: rgba(47, 95, 217, 0.16);   /* header-in-range */
    --accent-edge:   rgba(47, 95, 217, 0.62);   /* range outline */
    --accent-soft:   rgba(47, 95, 217, 0.12);   /* focus tint */

    /* --- semantic --- */
    --err:        #c0392b;
    --err-wash:   rgba(192, 57, 43, 0.075);
    --err-edge:   rgba(192, 57, 43, 0.42);
    --ok:         #2f9e6e;
    --warn:       #c77a17;

    /* --- reference-highlight palette (formula editing) --- */
    --ref-1: #2f5fd9;  --ref-2: #2f9e6e;  --ref-3: #c77a17;
    --ref-4: #8b5cf6;  --ref-5: #d6457f;  --ref-6: #0e9bb0;

    /* --- fluid UI type scale (ratio ~1.2; body >=16px) --- */
    --fs-xs:   clamp(0.6875rem, 0.665rem + 0.09vw, 0.75rem);
    --fs-sm:   clamp(0.8125rem, 0.79rem + 0.09vw, 0.875rem);
    --fs-base: clamp(1rem,      0.97rem + 0.13vw, 1.0625rem);
    --fs-md:   clamp(1.125rem,  1.07rem + 0.22vw, 1.25rem);
    --fs-lg:   clamp(1.375rem,  1.25rem + 0.5vw,  1.75rem);

    /* --- grid metrics (fixed px for pixel-true overlay alignment) --- */
    --col-w:     96px;
    --row-h:     30px;
    --rowhead-w: 50px;
    --cell-fs:   13px;

    /* --- spacing (4px base) --- */
    --sp-1: 0.25rem; --sp-2: 0.5rem; --sp-3: 0.75rem; --sp-4: 1rem;
    --sp-5: 1.25rem; --sp-6: 1.5rem; --sp-8: 2rem;

    /* --- radii --- */
    --r-1: 6px; --r-2: 9px; --r-3: 13px; --r-full: 999px;

    /* --- elevation (<=3 tiers) --- */
    --sh-1: 0 1px 2px rgba(28,31,37,.06);
    --sh-2: 0 10px 30px -12px rgba(28,31,37,.20), 0 3px 8px -4px rgba(28,31,37,.12);
    --sh-3: 0 26px 64px -20px rgba(28,31,37,.30), 0 8px 20px -10px rgba(28,31,37,.16);
    --sh-head: 0 8px 10px -10px rgba(28,31,37,.32);   /* under sticky header when scrolled */

    /* --- motion --- */
    --dur-1: 140ms; --dur-2: 200ms; --dur-3: 240ms;
    --ease:    cubic-bezier(.2,.7,.2,1);
    --ease-io: cubic-bezier(.55,0,.25,1);

    --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-mono: "SF Mono", "SFMono-Regular", ui-monospace, "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;

    --tnum: "tnum" 1, "cv01" 1, "ss01" 1;
  }

  /* ============================================================
     RESET / BASE
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--font-sans);
    font-size: var(--fs-base);
    color: var(--ink);
    background: var(--paper-1);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;            /* the app owns scroll; the grid frame scrolls internally */
  }
  button { font: inherit; color: inherit; }
  input { font: inherit; }
  :focus { outline: none; }

  /* tabular figures wherever numbers live */
  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: var(--tnum); }

  .visually-hidden {
    position: absolute !important; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0);
    white-space: nowrap; border: 0;
  }
  .skip-link {
    position: absolute; left: var(--sp-2); top: -60px; z-index: 200;
    background: var(--paper-0); color: var(--accent);
    padding: 10px 14px; border-radius: var(--r-1);
    box-shadow: var(--sh-2); font-weight: 600; font-size: var(--fs-sm);
    transition: top var(--dur-2) var(--ease);
  }
  .skip-link:focus-visible { top: var(--sp-2); }

  /* ============================================================
     APP SHELL
     ============================================================ */
  .app {
    display: flex; flex-direction: column;
    height: 100dvh; min-height: 0; width: 100%;
    background: var(--paper-1);
  }

  /* --- brand / title bar --- */
  .brandbar {
    display: flex; align-items: center; gap: var(--sp-3);
    padding: 10px clamp(12px, 2.4vw, 22px);
    border-bottom: 1px solid var(--line);
    background: var(--paper-1);
    min-width: 0;
  }
  .mark {
    width: 30px; height: 30px; flex: 0 0 auto;
    border-radius: 8px; background: var(--paper-0);
    border: 1px solid var(--line-2); box-shadow: var(--sh-1);
    display: grid; place-items: center;
  }
  .mark svg { display: block; }
  .brandtext { display: flex; flex-direction: column; min-width: 0; }
  .brandname {
    font-size: var(--fs-md); font-weight: 650; letter-spacing: -0.012em;
    line-height: 1.05; color: var(--ink);
  }
  .brandsub {
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--faint); font-weight: 600; line-height: 1.4;
  }
  .brand-spacer { flex: 1 1 auto; min-width: 0; }
  .sample-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: var(--fs-xs); font-weight: 600; letter-spacing: .02em;
    color: var(--accent-press); background: var(--accent-soft);
    border: 1px solid var(--accent-edge); border-radius: var(--r-full);
    padding: 4px 11px; white-space: nowrap;
  }
  .sample-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .save-status {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: var(--fs-xs); color: var(--muted); white-space: nowrap;
    min-width: 86px; justify-content: flex-end;
  }
  .save-status .sdot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--ok);
    box-shadow: 0 0 0 0 rgba(47,158,110,.5);
  }
  .save-status.saving .sdot { background: var(--warn); }
  .save-status.flash .sdot { animation: pulse var(--dur-3) var(--ease); }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(47,158,110,.45); }
    100% { box-shadow: 0 0 0 7px rgba(47,158,110,0); }
  }

  /* ============================================================
     TOOLBAR
     ============================================================ */
  .toolbar {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 7px clamp(10px, 2.4vw, 20px);
    background: var(--paper-2);
    border-bottom: 1px solid var(--line);
    min-width: 0;
  }
  .tgroup { display: flex; align-items: center; gap: 3px; }
  .tdiv { width: 1px; align-self: stretch; background: var(--line-2); margin: 4px 5px; }

  .tbtn {
    appearance: none; border: 1px solid transparent; background: transparent;
    min-width: 44px; height: 44px; padding: 0 9px;
    border-radius: var(--r-1); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    color: var(--ink-2); font-size: var(--fs-sm); font-weight: 560;
    transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease),
                border-color var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
  }
  .tbtn svg { display: block; }
  .tbtn .tlabel { font-variant-numeric: tabular-nums; }
  .tbtn:hover { background: var(--paper-3); color: var(--ink); }
  .tbtn:active { transform: translateY(0.5px); background: var(--paper-4); }
  .tbtn:focus-visible { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .tbtn[aria-pressed="true"] {
    background: var(--accent); color: #fff; border-color: var(--accent-press);
    box-shadow: var(--sh-1);
  }
  .tbtn[aria-pressed="true"]:hover { background: var(--accent-press); color:#fff; }
  .tbtn:disabled { color: var(--faint); cursor: not-allowed; background: transparent; transform: none; }
  .tbtn.icon-only { padding: 0; }
  .tbtn.ghost-danger:hover { color: var(--err); background: var(--err-wash); }

  /* segmented number-format control */
  .segmented { display: inline-flex; background: var(--paper-0); border: 1px solid var(--line-2);
               border-radius: var(--r-2); padding: 2px; box-shadow: var(--sh-1); }
  .segmented .tbtn { height: 40px; min-width: 42px; border-radius: 7px; font-weight: 600; }
  .segmented .tbtn[aria-pressed="true"] { box-shadow: var(--sh-1); }

  /* ============================================================
     FORMULA BAR
     ============================================================ */
  .formulabar {
    display: flex; align-items: stretch; gap: 0;
    padding: 8px clamp(10px, 2.4vw, 20px);
    background: var(--paper-1);
    border-bottom: 1px solid var(--line);
    min-width: 0;
  }
  .namebox {
    flex: 0 0 auto; width: 88px; min-width: 72px;
    display: flex; align-items: center; justify-content: center;
    background: var(--paper-2); border: 1px solid var(--line-2);
    border-radius: var(--r-1) 0 0 var(--r-1); border-right: none;
    font-weight: 650; font-size: var(--fs-sm); color: var(--ink);
    font-variant-numeric: tabular-nums; letter-spacing: .01em;
    user-select: none;
  }
  .fx {
    flex: 0 0 auto; width: 38px;
    display: grid; place-items: center;
    background: var(--paper-0); border: 1px solid var(--line-2); border-left: none; border-right: none;
    color: var(--muted);
  }
  .fx svg { display: block; }
  .fwrap { position: relative; flex: 1 1 auto; min-width: 0; display: flex; }
  .finput {
    flex: 1 1 auto; min-width: 0;
    border: 1px solid var(--line-2);
    border-radius: 0 var(--r-1) var(--r-1) 0; border-left: none;
    background: var(--paper-0); color: var(--ink);
    padding: 9px 12px; font-size: var(--fs-sm);
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    transition: box-shadow var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease);
  }
  .finput::placeholder { color: var(--faint); font-family: var(--font-sans); }
  .formulabar:focus-within .namebox { border-color: var(--accent); color: var(--accent-press); }
  .formulabar:focus-within .fx { border-color: var(--accent); color: var(--accent); }
  .finput:focus-visible { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  /* ============================================================
     GRID
     ============================================================ */
  .grid-frame {
    position: relative; flex: 1 1 auto; min-height: 0; min-width: 0;
    overflow: auto; background: var(--paper-1);
    scrollbar-width: thin; scrollbar-color: var(--line-2) transparent;
    overscroll-behavior: contain;
  }
  .grid-frame::-webkit-scrollbar { width: 12px; height: 12px; }
  .grid-frame::-webkit-scrollbar-thumb {
    background: var(--line-2); border-radius: 10px;
    border: 3px solid var(--paper-1); background-clip: padding-box;
  }
  .grid-frame::-webkit-scrollbar-thumb:hover { background: #c8c2b4; background-clip: padding-box; }
  .grid-frame::-webkit-scrollbar-corner { background: var(--paper-1); }

  .sheet {
    position: relative;
    display: grid;
    grid-auto-rows: var(--row-h);
    width: max-content;
    background: var(--paper-0);
    font-variant-numeric: tabular-nums; font-feature-settings: var(--tnum);
  }

  .corner, .ch, .rh {
    position: sticky; user-select: none;
    background: var(--paper-2); color: var(--muted);
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    display: flex; align-items: center; justify-content: center;
  }
  .corner {
    top: 0; left: 0; z-index: 5;
    border-right: 1px solid var(--line-2); border-bottom: 1px solid var(--line-2);
    cursor: pointer;
  }
  .corner svg { color: var(--faint); }
  .corner:hover svg { color: var(--accent); }
  .ch {
    top: 0; z-index: 3;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line-2);
    text-transform: none; cursor: pointer;
    transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
  }
  .rh {
    left: 0; z-index: 3;
    border-right: 1px solid var(--line-2);
    border-bottom: 1px solid var(--line);
    font-variant-numeric: tabular-nums; cursor: pointer;
    transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
  }
  .ch:hover, .rh:hover { background: var(--paper-3); color: var(--ink-2); }
  .ch.hl, .rh.hl { background: var(--accent-wash-2); color: var(--accent-press); }
  .ch.active, .rh.active { background: var(--accent); color: #fff; }
  /* depth cue under sticky headers when scrolled */
  .grid-frame.scrolled-y .ch { box-shadow: var(--sh-head); }
  .grid-frame.scrolled-x .rh { box-shadow: 8px 0 10px -10px rgba(28,31,37,.32); }
  .grid-frame.scrolled-y.scrolled-x .corner { box-shadow: var(--sh-head); }

  .cell {
    position: relative; z-index: 0;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 0 7px;
    display: flex; align-items: center;
    font-size: var(--cell-fs); color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: cell; background: var(--paper-0);
  }
  .cell.t-num   { justify-content: flex-end; }
  .cell.t-text  { justify-content: flex-start; }
  .cell.t-bool  { justify-content: center; color: var(--ink-2); font-weight: 600; letter-spacing: .04em; }
  .cell.t-err {
    justify-content: center; color: var(--err); font-weight: 650;
    background: var(--err-wash); font-size: 12px; letter-spacing: .01em;
  }
  .cell.in-range { background: var(--accent-wash); }
  .cell.t-err.in-range { background: var(--err-wash); }
  /* reference highlight while editing a formula */
  .cell.ref-hl {
    box-shadow: inset 0 0 0 2px var(--ref-c, var(--accent));
    border-radius: 2px; z-index: 2;
  }
  .cell.ref-hl::after {
    content: ""; position: absolute; inset: 0;
    background: var(--ref-c, var(--accent)); opacity: .08; pointer-events: none;
  }

  /* selection / active overlays (crisp single rectangles, pointer-transparent) */
  .ov { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 4; }
  .sel-rect {
    border: 1.5px solid var(--accent-edge);
    background: transparent; border-radius: 2px;
    transition: transform var(--dur-1) var(--ease), width var(--dur-1) var(--ease), height var(--dur-1) var(--ease);
  }
  .active-rect {
    border: 2px solid var(--accent);
    border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(255,255,255,.85) inset, var(--sh-1);
    transition: transform var(--dur-1) var(--ease), width var(--dur-1) var(--ease), height var(--dur-1) var(--ease);
  }
  .active-rect.hidden, .sel-rect.hidden { display: none; }
  /* fill handle */
  .fill-handle {
    position: absolute; width: 8px; height: 8px; z-index: 6;
    background: var(--accent); border: 1.5px solid #fff; border-radius: 2px;
    box-shadow: var(--sh-1); cursor: crosshair; pointer-events: auto;
    transition: transform var(--dur-1) var(--ease);
  }
  .fill-handle.hidden { display: none; }

  /* in-cell editor */
  .cell-input {
    position: absolute; top: 0; left: 0; z-index: 8;
    border: 2px solid var(--accent);
    background: var(--paper-0); color: var(--ink);
    padding: 0 6px; font-size: var(--cell-fs);
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    box-shadow: var(--sh-2); border-radius: 2px;
    min-width: var(--col-w);
  }
  .cell-input.hidden { display: none; }

  /* error tooltip */
  .tooltip {
    position: fixed; z-index: 60; max-width: 260px;
    background: var(--ink); color: #fff;
    font-size: var(--fs-xs); line-height: 1.4;
    padding: 7px 10px; border-radius: var(--r-1);
    box-shadow: var(--sh-2); pointer-events: none;
    opacity: 0; transform: translateY(3px);
    transition: opacity var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
  }
  .tooltip.show { opacity: 1; transform: translateY(0); }
  .tooltip code { font-family: var(--font-mono); color: #ffd9a0; }

  /* empty-state overlay */
  .empty-state {
    position: absolute; inset: 0; z-index: 7;
    display: none; place-items: center; pointer-events: none;
    background: linear-gradient(var(--paper-1), rgba(250,249,246,.0) 40%);
  }
  .empty-state.show { display: grid; }
  .empty-card {
    pointer-events: auto; text-align: center; max-width: 340px;
    padding: var(--sp-6); margin-top: 8vh;
  }
  .empty-card .em-mark { margin: 0 auto var(--sp-4); width: 52px; height: 52px;
    display: grid; place-items: center; border-radius: 14px;
    background: var(--paper-0); border: 1px solid var(--line-2); box-shadow: var(--sh-1); }
  .empty-card h2 { margin: 0 0 6px; font-size: var(--fs-md); font-weight: 650; letter-spacing: -.01em; }
  .empty-card p { margin: 0 0 var(--sp-4); color: var(--muted); font-size: var(--fs-sm); }
  .btn-primary {
    appearance: none; border: 1px solid var(--accent-press); cursor: pointer;
    background: var(--accent); color: #fff; font-weight: 600; font-size: var(--fs-sm);
    padding: 10px 18px; border-radius: var(--r-1); box-shadow: var(--sh-1);
    transition: background var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
    min-height: 44px;
  }
  .btn-primary:hover { background: var(--accent-press); }
  .btn-primary:active { transform: translateY(.5px); }
  .btn-primary:focus-visible { box-shadow: 0 0 0 3px var(--accent-soft); }

  /* ============================================================
     STATUS BAR
     ============================================================ */
  .statusbar {
    display: flex; align-items: center; gap: var(--sp-4);
    padding: 7px clamp(10px, 2.4vw, 20px);
    background: var(--paper-2); border-top: 1px solid var(--line);
    font-size: var(--fs-xs); color: var(--muted);
    min-width: 0; overflow-x: auto; scrollbar-width: none;
  }
  .statusbar::-webkit-scrollbar { display: none; }
  .status-sel {
    font-weight: 600; color: var(--ink-2); white-space: nowrap;
    font-variant-numeric: tabular-nums;
    flex: 0 0 auto;
  }
  .status-stats { display: flex; align-items: center; gap: var(--sp-4); flex: 1 1 auto; min-width: 0; }
  .stat { display: inline-flex; align-items: baseline; gap: 5px; white-space: nowrap; }
  .stat .k { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .stat .v { font-weight: 650; color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .status-spacer { flex: 1 1 auto; }
  .status-meta { white-space: nowrap; color: var(--faint); flex: 0 0 auto; font-variant-numeric: tabular-nums; }
  .status-hint { white-space: nowrap; color: var(--faint); flex: 0 0 auto; }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 640px) {
    :root { --col-w: 84px; --rowhead-w: 42px; }
    .brandsub { display: none; }
    .toolbar .tlabel { display: none; }   /* icon-only toolbar */
    .toolbar .tbtn { padding: 0; min-width: 44px; }
    .segmented .tbtn { min-width: 40px; }
    .namebox { width: 64px; min-width: 56px; }
    .status-hint { display: none; }
  }
  @media (max-width: 420px) {
    .sample-pill .ptext { display: none; }
    .sample-pill { padding: 6px; }
    .save-status .stext { display: none; }
    .save-status { min-width: 0; }
    .status-meta { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
    }
  }
  @media (prefers-contrast: more) {
    :root { --line: #c9c4b8; --line-2: #b4ae9f; --muted: #54585f; }
  }
</style>
</head>
<body>

  <div class="tooltip" id="tooltip" role="status" aria-live="polite"></div>
  <div class="visually-hidden" id="aria-live" aria-live="polite" role="status"></div>

<script>
"use strict";
/* =====================================================================
   LATTICE — a real formula engine + a calm spreadsheet UI (vanilla JS)
   Pipeline: tokenizer -> Pratt/precedence-climbing parser -> AST ->
   evaluator with a function table; A1<->(row,col); a dependency DAG with
   Kahn topological recalc (only the edited cell's dependency subtree is
   recomputed) and cycle detection -> #CIRCULAR.
   ===================================================================== */
(function () {
  const NROWS = 50, NCOLS = 26;          // sheet bounds (A..Z, 1..50)
  const LS_KEY = "lattice.sheet.v1";

  /* ---------------------------------------------------------------
     A1 <-> (row, col)
     --------------------------------------------------------------- */
  function colToIndex(letters) {         // "A"->0, "Z"->25, "AA"->26
    let n = 0;
    for (let i = 0; i < letters.length; i++) n = n * 26 + (letters.charCodeAt(i) - 64);
    return n - 1;
  }
  function indexToCol(i) {                // 0->"A"
    let s = "", x = i + 1;
    while (x > 0) { const r = (x - 1) % 26; s = String.fromCharCode(65 + r) + s; x = Math.floor((x - 1) / 26); }
    return s;
  }
  const cellKey = (r, c) => r * NCOLS + c;
  const a1 = (r, c) => indexToCol(c) + (r + 1);
  function parseA1(ref) {                 // "A1" / "$A$1" -> {r,c,absR,absC} | null
    const m = /^(\$?)([A-Za-z]+)(\$?)(\d+)$/.exec(ref);
    if (!m) return null;
    const c = colToIndex(m[2].toUpperCase());
    const r = parseInt(m[4], 10) - 1;
    return { r, c, absR: m[3] === "$", absC: m[1] === "$" };
  }
  const inBounds = (r, c) => r >= 0 && r < NROWS && c >= 0 && c < NCOLS;

  /* ---------------------------------------------------------------
     Errors — first-class values that propagate through evaluation
     --------------------------------------------------------------- */
  const ERR = {
    DIV0: "#DIV/0!", REF: "#REF!", NAME: "#NAME?", VALUE: "#VALUE!",
    CIRC: "#CIRCULAR", NA: "#N/A", NUM: "#NUM!", PARSE: "#ERROR!"
  };
  class CellError {
    constructor(type, msg) { this.type = type; this.message = msg || ""; this.isError = true; }
    toString() { return this.type; }
  }
  const isErr = (v) => v instanceof CellError;
  const isRange = (v) => v && v.isRange === true;

  /* ---------------------------------------------------------------
     TOKENIZER
     --------------------------------------------------------------- */
  const T = { NUM:"num", STR:"str", BOOL:"bool", REF:"ref", IDENT:"ident",
              OP:"op", LP:"lp", RP:"rp", COMMA:"comma", COLON:"colon",
              PERCENT:"percent", ERRLIT:"errlit", EOF:"eof" };

  function tokenize(src) {
    const toks = []; let i = 0; const n = src.length;
    const peek = () => src[i];
    while (i < n) {
      const ch = src[i];
      if (ch === " " || ch === "\t" || ch === "\n" || ch === "\r") { i++; continue; }
      // number (incl. leading dot + scientific)
      if ((ch >= "0" && ch <= "9") || (ch === "." && src[i + 1] >= "0" && src[i + 1] <= "9")) {
        let j = i;
        while (j < n && src[j] >= "0" && src[j] <= "9") j++;
        if (src[j] === ".") { j++; while (j < n && src[j] >= "0" && src[j] <= "9") j++; }
        if (src[j] === "e" || src[j] === "E") {
          let k = j + 1; if (src[k] === "+" || src[k] === "-") k++;
          if (src[k] >= "0" && src[k] <= "9") { j = k; while (j < n && src[j] >= "0" && src[j] <= "9") j++; }
        }
        toks.push({ t: T.NUM, v: parseFloat(src.slice(i, j)) }); i = j; continue;
      }
      // string
      if (ch === '"') {
        let j = i + 1, out = "";
        while (j < n) {
          if (src[j] === '"') { if (src[j + 1] === '"') { out += '"'; j += 2; continue; } break; }
          out += src[j++];
        }
        if (j >= n) throw new SyntaxError("Unterminated string");
        toks.push({ t: T.STR, v: out }); i = j + 1; continue;
      }
      // error literal (#DIV/0! etc.)
      if (ch === "#") {
        const m = /^#(DIV\/0!|REF!|NAME\?|VALUE!|N\/A|NUM!|CIRCULAR|ERROR!)/.exec(src.slice(i));
        if (m) { toks.push({ t: T.ERRLIT, v: "#" + m[1] }); i += m[0].length; continue; }
        throw new SyntaxError("Unexpected '#'");
      }
      // identifier / cell-ref / boolean / function name
      if (/[A-Za-z_]/.test(ch)) {
        let j = i + 1;
        while (j < n && /[A-Za-z0-9_.]/.test(src[j])) j++;
        const word = src.slice(i, j);
        const up = word.toUpperCase();
        // a cell ref is letters+digits NOT immediately followed by '(' (function call)
        let k = j; while (k < n && (src[k] === " " || src[k] === "\t")) k++;
        if (/^[A-Za-z]+[0-9]+$/.test(word) && src[k] !== "(") {
          toks.push({ t: T.REF, v: up }); i = j; continue;
        }
        if (up === "TRUE" || up === "FALSE") { toks.push({ t: T.BOOL, v: up === "TRUE" }); i = j; continue; }
        toks.push({ t: T.IDENT, v: up }); i = j; continue;
      }
      // multi-char operators
      const two = src.slice(i, i + 2);
      if (two === "<>" || two === "<=" || two === ">=") { toks.push({ t: T.OP, v: two }); i += 2; continue; }
      // single-char
      if ("+-*/^&=<>".includes(ch)) { toks.push({ t: T.OP, v: ch }); i++; continue; }
      if (ch === "(") { toks.push({ t: T.LP }); i++; continue; }
      if (ch === ")") { toks.push({ t: T.RP }); i++; continue; }
      if (ch === ",") { toks.push({ t: T.COMMA }); i++; continue; }
      if (ch === ":") { toks.push({ t: T.COLON }); i++; continue; }
      if (ch === "%") { toks.push({ t: T.PERCENT }); i++; continue; }
      if (ch === "$") {  // part of an absolute ref like $A$1
        const m = /^(\$[A-Za-z]+\$?[0-9]+|\$?[A-Za-z]+\$[0-9]+)/.exec(src.slice(i));
        if (m) { toks.push({ t: T.REF, v: m[0].toUpperCase() }); i += m[0].length; continue; }
        throw new SyntaxError("Unexpected '$'");
      }
      throw new SyntaxError("Unexpected character '" + ch + "'");
    }
    toks.push({ t: T.EOF });
    return toks;
  }

  /* ---------------------------------------------------------------
     PARSER  (precedence climbing)
     Unary +/- bind tighter than ^ (Excel: -2^2 = 4). All binary ops
     are left-associative.
     --------------------------------------------------------------- */
  const INFIX_BP = {
    "=": 1, "<>": 1, "<": 1, ">": 1, "<=": 1, ">=": 1,   // comparison
    "&": 2,                                               // concat
    "+": 3, "-": 3,                                       // additive
    "*": 4, "/": 4,                                       // multiplicative
    "^": 5                                                // power (left-assoc here)
  };

  function makeRefNode(word) {
    const p = parseA1(word);
    return { type: "ref", r: p.r, c: p.c, absR: p.absR, absC: p.absC };
  }

  function parse(src) {
    const toks = tokenize(src);
    let pos = 0;
    const peek = () => toks[pos];
    const next = () => toks[pos++];
    const expect = (t) => { if (peek().t !== t) throw new SyntaxError("Expected " + t); return next(); };

    function parseExpr(minBp) {
      let left = parseOperand();
      for (;;) {
        const tk = peek();
        if (tk.t !== T.OP) break;
        const bp = INFIX_BP[tk.v];
        if (bp == null || bp < minBp) break;
        next();
        const right = parseExpr(bp + 1);             // left-assoc
        left = { type: "binary", op: tk.v, left, right };
      }
      return left;
    }
    // operand = unary signs (tightest) -> postfix % -> primary
    function parseOperand() {
      const tk = peek();
      if (tk.t === T.OP && (tk.v === "+" || tk.v === "-")) {
        next();
        return { type: "unary", op: tk.v, arg: parseOperand() };
      }
      return parsePostfix();
    }
    function parsePostfix() {
      let node = parsePrimary();
      while (peek().t === T.PERCENT) { next(); node = { type: "postfix", op: "%", arg: node }; }
      return node;
    }
    function parsePrimary() {
      const tk = next();
      switch (tk.t) {
        case T.NUM:    return { type: "num", value: tk.v };
        case T.STR:    return { type: "str", value: tk.v };
        case T.BOOL:   return { type: "bool", value: tk.v };
        case T.ERRLIT: return { type: "err", value: new CellError(tk.v) };
        case T.LP: {
          const e = parseExpr(0); expect(T.RP); return e;
        }
        case T.REF: {
          const a = makeRefNode(tk.v);
          if (peek().t === T.COLON) {
            next();
            const rt = next();
            if (rt.t !== T.REF) throw new SyntaxError("Expected cell after ':'");
            const b = makeRefNode(rt.v);
            return { type: "range", a, b };
          }
          return a;
        }
        case T.IDENT: {
          // function call
          if (peek().t === T.LP) {
            next();
            const args = [];
            if (peek().t !== T.RP) {
              args.push(parseExpr(0));
              while (peek().t === T.COMMA) { next(); args.push(parseExpr(0)); }
            }
            expect(T.RP);
            return { type: "call", name: tk.v, args };
          }
          // bare name (e.g. PI) -> zero-arg function if known, else #NAME?
          return { type: "call", name: tk.v, args: [], bare: true };
        }
        default:
          throw new SyntaxError("Unexpected token");
      }
    }

    const ast = parseExpr(0);
    if (peek().t !== T.EOF) throw new SyntaxError("Unexpected trailing input");
    return ast;
  }

  /* ---------------------------------------------------------------
     Collect the precedent cell keys a formula reads (ranges expanded
     and clamped to the sheet) — drives the dependency DAG.
     --------------------------------------------------------------- */
  function collectPrecedents(ast, set) {
    if (!ast || typeof ast !== "object") return;
    switch (ast.type) {
      case "ref":
        if (inBounds(ast.r, ast.c)) set.add(cellKey(ast.r, ast.c));
        break;
      case "range": {
        const r1 = Math.min(ast.a.r, ast.b.r), r2 = Math.max(ast.a.r, ast.b.r);
        const c1 = Math.min(ast.a.c, ast.b.c), c2 = Math.max(ast.a.c, ast.b.c);
        for (let r = r1; r <= r2; r++) for (let c = c1; c <= c2; c++)
          if (inBounds(r, c)) set.add(cellKey(r, c));
        break;
      }
      case "unary": case "postfix": collectPrecedents(ast.arg, set); break;
      case "binary": collectPrecedents(ast.left, set); collectPrecedents(ast.right, set); break;
      case "call": ast.args.forEach((a) => collectPrecedents(a, set)); break;
    }
  }

  /* ---------------------------------------------------------------
     VALUE COERCION
     --------------------------------------------------------------- */
  function toNum(v) {
    if (isErr(v)) return v;
    if (v == null || v === "") return 0;          // empty cell behaves as 0 in arithmetic
    if (typeof v === "number") return v;
    if (typeof v === "boolean") return v ? 1 : 0;
    if (typeof v === "string") {
      const s = v.trim();
      if (s === "") return 0;
      const n = Number(s);
      return isNaN(n) ? new CellError(ERR.VALUE, "‘" + v + "’ is not a number") : n;
    }
    return new CellError(ERR.VALUE);
  }
  function toStr(v) {
    if (isErr(v)) return v;
    if (v == null) return "";
    if (typeof v === "boolean") return v ? "TRUE" : "FALSE";
    if (typeof v === "number") return fmtGeneral(v);
    return String(v);
  }
  function toBool(v) {
    if (isErr(v)) return v;
    if (typeof v === "boolean") return v;
    if (typeof v === "number") return v !== 0;
    if (v == null || v === "") return false;
    if (typeof v === "string") {
      const s = v.trim().toUpperCase();
      if (s === "TRUE") return true; if (s === "FALSE") return false;
      const n = Number(s); if (!isNaN(n)) return n !== 0;
    }
    return new CellError(ERR.VALUE);
  }

  /* ---------------------------------------------------------------
     FUNCTION TABLE
     --------------------------------------------------------------- */
  // flatten args to a numeric list; returns CellError if any error present.
  function numericList(args, opts) {
    opts = opts || {};
    const out = [];
    for (const a of args) {
      if (isErr(a)) return a;
      if (isRange(a)) {
        for (const cell of a.cells) {
          const v = cell.v;
          if (isErr(v)) return v;
          if (typeof v === "number") out.push(v);
          else if (typeof v === "boolean" && opts.boolInRange) out.push(v ? 1 : 0);
          // text & blank inside ranges are ignored (Excel behavior)
        }
      } else {
        if (a == null || a === "") { if (opts.keepBlankScalar) out.push(0); continue; }
        const n = toNum(a);
        if (isErr(n)) return n;
        out.push(n);
      }
    }
    return out;
  }
  function flattenAll(args) {     // every value (for COUNTA / CONCAT), errors propagate
    const out = [];
    for (const a of args) {
      if (isErr(a)) return a;
      if (isRange(a)) { for (const cell of a.cells) { if (isErr(cell.v)) return cell.v; out.push(cell.v); } }
      else out.push(a);
    }
    return out;
  }
  const numGuard = (x) => (isFinite(x) ? x : new CellError(ERR.NUM));

  function matchCriteria(value, crit) {
    // crit like ">5", "<=3", "<>x", "=foo", or a bare value
    let op = "=", rhs = crit;
    const m = /^(<=|>=|<>|<|>|=)?\s*(.*)$/s.exec(String(crit));
    if (m && m[1]) { op = m[1]; rhs = m[2]; }
    const rn = Number(rhs);
    const numeric = rhs !== "" && !isNaN(rn) && typeof value === "number";
    if (numeric) {
      switch (op) { case "=": return value === rn; case "<>": return value !== rn;
        case "<": return value < rn; case ">": return value > rn;
        case "<=": return value <= rn; case ">=": return value >= rn; }
    }
    const a = (value == null ? "" : String(value)).toLowerCase();
    const b = String(rhs).toLowerCase();
    switch (op) { case "=": return a === b; case "<>": return a !== b;
      case "<": return a < b; case ">": return a > b; case "<=": return a <= b; case ">=": return a >= b; }
    return false;
  }

  const FUNCS = {
    // --- aggregation ---
    SUM:     { fn: (a) => { const l = numericList(a); return isErr(l) ? l : l.reduce((s, x) => s + x, 0); } },
    PRODUCT: { fn: (a) => { const l = numericList(a); return isErr(l) ? l : l.reduce((s, x) => s * x, 1); } },
    AVERAGE: { fn: (a) => { const l = numericList(a); if (isErr(l)) return l; return l.length ? l.reduce((s, x) => s + x, 0) / l.length : new CellError(ERR.DIV0); } },
    MIN:     { fn: (a) => { const l = numericList(a); if (isErr(l)) return l; return l.length ? Math.min(...l) : 0; } },
    MAX:     { fn: (a) => { const l = numericList(a); if (isErr(l)) return l; return l.length ? Math.max(...l) : 0; } },
    MEDIAN:  { fn: (a) => { const l = numericList(a); if (isErr(l)) return l; if (!l.length) return new CellError(ERR.NUM); const s = [...l].sort((x, y) => x - y); const m = s.length >> 1; return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2; } },
    COUNT:   { fn: (a) => { const l = numericList(a); return isErr(l) ? l : l.length; } },
    COUNTA:  { fn: (a) => { const l = flattenAll(a); if (isErr(l)) return l; return l.filter((v) => v != null && v !== "").length; } },
    COUNTBLANK: { fn: (a) => { const l = flattenAll(a); if (isErr(l)) return l; return l.filter((v) => v == null || v === "").length; } },

    // --- conditional aggregation ---
    SUMIF:   { fn: (a) => condAgg(a, "sum") },
    COUNTIF: { fn: (a) => condAgg(a, "count") },
    AVERAGEIF: { fn: (a) => condAgg(a, "avg") },

    // --- logic (lazy where useful) ---
    IF:      { lazy: true, fn: (n, ev) => { const c = ev(n[0]); if (isErr(c)) return c; const b = toBool(c); if (isErr(b)) return b; return b ? ev(n[1]) : (n[2] !== undefined ? ev(n[2]) : false); } },
    IFERROR: { lazy: true, fn: (n, ev) => { const v = ev(n[0]); return isErr(v) ? (n[1] !== undefined ? ev(n[1]) : "") : v; } },
    AND:     { lazy: true, fn: (n, ev) => { for (const node of n) { const b = toBool(ev(node)); if (isErr(b)) return b; if (!b) return false; } return true; } },
    OR:      { lazy: true, fn: (n, ev) => { for (const node of n) { const b = toBool(ev(node)); if (isErr(b)) return b; if (b) return true; } return false; } },
    NOT:     { fn: (a) => { const b = toBool(a[0]); return isErr(b) ? b : !b; } },
    TRUE:    { fn: () => true },
    FALSE:   { fn: () => false },
    ISERROR: { lazy: true, fn: (n, ev) => isErr(ev(n[0])) },
    ISBLANK: { lazy: true, fn: (n, ev) => { const v = ev(n[0]); return v == null || v === ""; } },
    ISNUMBER:{ fn: (a) => typeof a[0] === "number" },

    // --- math ---
    ABS:   { fn: (a) => { const n = toNum(a[0]); return isErr(n) ? n : Math.abs(n); } },
    ROUND: { fn: (a) => roundTo(a, "round") },
    ROUNDUP:   { fn: (a) => roundTo(a, "up") },
    ROUNDDOWN: { fn: (a) => roundTo(a, "down") },
    INT:   { fn: (a) => { const n = toNum(a[0]); return isErr(n) ? n : Math.floor(n); } },
    TRUNC: { fn: (a) => { const n = toNum(a[0]); return isErr(n) ? n : Math.trunc(n); } },
    SIGN:  { fn: (a) => { const n = toNum(a[0]); return isErr(n) ? n : Math.sign(n); } },
    SQRT:  { fn: (a) => { const n = toNum(a[0]); if (isErr(n)) return n; return n < 0 ? new CellError(ERR.NUM, "sqrt of a negative") : Math.sqrt(n); } },
    POWER: { fn: (a) => { const x = toNum(a[0]), y = toNum(a[1]); if (isErr(x)) return x; if (isErr(y)) return y; return numGuard(Math.pow(x, y)); } },
    EXP:   { fn: (a) => { const n = toNum(a[0]); return isErr(n) ? n : numGuard(Math.exp(n)); } },
    LN:    { fn: (a) => { const n = toNum(a[0]); if (isErr(n)) return n; return n <= 0 ? new CellError(ERR.NUM) : Math.log(n); } },
    LOG10: { fn: (a) => { const n = toNum(a[0]); if (isErr(n)) return n; return n <= 0 ? new CellError(ERR.NUM) : Math.log10(n); } },
    LOG:   { fn: (a) => { const n = toNum(a[0]); if (isErr(n)) return n; const b = a[1] !== undefined ? toNum(a[1]) : 10; if (isErr(b)) return b; return n <= 0 ? new CellError(ERR.NUM) : Math.log(n) / Math.log(b); } },
    MOD:   { fn: (a) => { const x = toNum(a[0]), y = toNum(a[1]); if (isErr(x)) return x; if (isErr(y)) return y; if (y === 0) return new CellError(ERR.DIV0); return x - Math.floor(x / y) * y; } },
    FLOOR: { fn: (a) => { const x = toNum(a[0]); const s = a[1] !== undefined ? toNum(a[1]) : 1; if (isErr(x)) return x; if (isErr(s)) return s; if (s === 0) return new CellError(ERR.DIV0); return Math.floor(x / s) * s; } },
    CEILING:{ fn: (a) => { const x = toNum(a[0]); const s = a[1] !== undefined ? toNum(a[1]) : 1; if (isErr(x)) return x; if (isErr(s)) return s; if (s === 0) return new CellError(ERR.DIV0); return Math.ceil(x / s) * s; } },
    PI:    { fn: () => Math.PI },
    SUMPRODUCT: { fn: (a) => { const l = numericList(a); return isErr(l) ? l : l.reduce((s, x) => s + x, 0); } },

    // --- text ---
    CONCAT:      { fn: (a) => concatFn(a) },
    CONCATENATE: { fn: (a) => concatFn(a) },
    LEN:   { fn: (a) => { const s = toStr(a[0]); return isErr(s) ? s : s.length; } },
    LEFT:  { fn: (a) => { const s = toStr(a[0]); if (isErr(s)) return s; const n = a[1] !== undefined ? toNum(a[1]) : 1; return isErr(n) ? n : s.slice(0, Math.max(0, n)); } },
    RIGHT: { fn: (a) => { const s = toStr(a[0]); if (isErr(s)) return s; const n = a[1] !== undefined ? toNum(a[1]) : 1; return isErr(n) ? n : (n <= 0 ? "" : s.slice(-n)); } },
    MID:   { fn: (a) => { const s = toStr(a[0]); if (isErr(s)) return s; const st = toNum(a[1]), ln = toNum(a[2]); if (isErr(st)) return st; if (isErr(ln)) return ln; return s.substr(Math.max(0, st - 1), Math.max(0, ln)); } },
    UPPER: { fn: (a) => { const s = toStr(a[0]); return isErr(s) ? s : s.toUpperCase(); } },
    LOWER: { fn: (a) => { const s = toStr(a[0]); return isErr(s) ? s : s.toLowerCase(); } },
    TRIM:  { fn: (a) => { const s = toStr(a[0]); return isErr(s) ? s : s.replace(/\s+/g, " ").trim(); } },
    REPT:  { fn: (a) => { const s = toStr(a[0]); if (isErr(s)) return s; const n = toNum(a[1]); if (isErr(n)) return n; return n > 0 ? s.repeat(Math.min(n, 10000)) : ""; } },
    VALUE: { fn: (a) => { const n = toNum(a[0]); return n; } }
  };

  function concatFn(args) {
    const flat = flattenAll(args);
    if (isErr(flat)) return flat;
    let out = "";
    for (const v of flat) { const s = toStr(v); if (isErr(s)) return s; out += s; }
    return out;
  }
  function roundTo(args, mode) {
    const n = toNum(args[0]); if (isErr(n)) return n;
    let d = args[1] !== undefined ? toNum(args[1]) : 0; if (isErr(d)) return d;
    d = Math.trunc(d);
    const f = Math.pow(10, d);
    const x = n * f;
    let r;
    if (mode === "up") r = (x < 0 ? -Math.ceil(-x) : Math.ceil(x));
    else if (mode === "down") r = Math.trunc(x);

  }
  function condAgg(args, mode) {
    const rangeVal = args[0];

    if (isErr(crit)) return crit;
    const sumRange = args[2];
    let total = 0, count = 0;
    rangeVal.cells.forEach((cell, idx) => {
      if (isErr(cell.v)) return;
      if (matchCriteria(cell.v, crit)) {
        let target = cell.v;
        if (mode !== "count" && isRange(sumRange) && sumRange.cells[idx]) target = sumRange.cells[idx].v;
