<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark light" />
<title>Lumen — a modern web terminal</title>
<meta name="description" content="Lumen: a sleek, keyboard-first browser terminal with a real in-memory filesystem, piped commands, ANSI color, tab-completion and command history." />
<!-- Apply persisted theme before first paint to avoid a flash of the wrong theme -->
<script>
  try {
    var t = localStorage.getItem('lumen.theme');
    if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
    else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) document.documentElement.dataset.theme = 'light';
  } catch (e) {}
</script>
<style>
/* ============================================================
   LUMEN — design tokens
   ============================================================ */
:root {
  color-scheme: dark;

  /* desktop backdrop behind the floating window */
  --backdrop-a: #06070d;
  --backdrop-b: #0a0c16;
  --backdrop-glow: rgba(124, 122, 255, .14);

  /* window surfaces */
  --chrome:       #0b0e17;
  --screen:       #0d101a;
  --screen-2:     #10131f;
  --block-hover:  #121726;
  --status:       #090c14;

  /* borders (soft → strong) */
  --line:         #1a2030;
  --line-soft:    #141a28;
  --line-strong:  #28304409;
  --line-strong:  #283044;

  /* neutral text ramp (4 steps + dim) */
  --text:         #e7ebf5;
  --text-muted:   #9aa4ba;
  --text-subtle:  #6f7a92;
  --text-faint:   #4a5468;

  /* brand accent (iris) + secondary glow (cyan) */
  --accent:       #9d8cff;
  --accent-2:     #58e2c8;
  --accent-strong:#b6a9ff;
  --accent-soft:  #1c1c33;
  --accent-line:  #322f55;
  --accent-ink:   #0a0a14;

  --ok:           #6fe0a0;
  --warn:         #ffcf8a;
  --err:          #ff8198;

  --sel:          rgba(157,140,255,.30);
  --caret:        #b6a9ff;

  /* ANSI 16 — dark (Lumen palette, AA-tuned on --screen) */
  --a-black:#3b4255;   --a-red:#ff6e87;     --a-green:#8fe388;   --a-yellow:#f0c674;
  --a-blue:#7aa2ff;    --a-magenta:#c79bff; --a-cyan:#67d9e8;    --a-white:#c7cee0;
  --a-bblack:#5a6379;  --a-bred:#ff95a6;    --a-bgreen:#aff0a0;  --a-byellow:#ffd98c;
  --a-bblue:#9cbcff;   --a-bmagenta:#d8bcff;--a-bcyan:#92e9f4;   --a-bwhite:#f1f4fb;

  /* mono + ui type */
  --font-mono: "SFMono-Regular", ui-monospace, "JetBrains Mono", "Cascadia Code", "Fira Code", "Menlo", "Consolas", monospace;
  --font-ui:   ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;

  /* fluid type scale (~1.2). Terminal mono is intentionally dense (≥14px). */
  --fs-term: clamp(0.875rem, 0.83rem + 0.2vw, 0.9375rem); /* 14 → 15px */
  --fs-xs:   clamp(0.6875rem, 0.66rem + 0.1vw, 0.75rem);
  --fs-sm:   clamp(0.75rem, 0.72rem + 0.12vw, 0.8125rem);
  --fs-ui:   clamp(0.8125rem, 0.78rem + 0.14vw, 0.875rem);
  --fs-lg:   clamp(1.0625rem, 1rem + 0.3vw, 1.25rem);

  /* spacing (4px base) */
  --sp-1:.25rem; --sp-2:.5rem; --sp-3:.75rem; --sp-4:1rem; --sp-5:1.25rem; --sp-6:1.5rem; --sp-8:2rem;

  /* radii */
  --r-xs:.25rem; --r-sm:.375rem; --r-md:.625rem; --r-lg:.875rem; --r-xl:1.125rem; --r-full:999px;

  /* elevation (3 tiers) */
  --e1: 0 1px 2px rgba(0,0,0,.4);
  --e2: 0 8px 24px -10px rgba(0,0,0,.6), 0 2px 6px -2px rgba(0,0,0,.5);
  --e3: 0 40px 80px -24px rgba(0,0,0,.7), 0 16px 40px -16px rgba(0,0,0,.55);

  /* motion */
  --dur-1:130ms; --dur-2:190ms; --dur-3:240ms;
  --ease: cubic-bezier(.22,.8,.3,1);
  --ease-io: cubic-bezier(.6,0,.25,1);

  --line-h: 1.55;
}

[data-theme="light"] {
  color-scheme: light;

  --backdrop-a: #e7e8f1;
  --backdrop-b: #dfe1ee;
  --backdrop-glow: rgba(90,75,214,.10);

  --chrome:       #f4f5fa;
  --screen:       #ffffff;
  --screen-2:     #f7f8fc;
  --block-hover:  #f3f3fb;
  --status:       #eef0f7;

  --line:         #e2e4ee;
  --line-soft:    #edeef5;
  --line-strong:  #cdd1df;

  --text:         #1b1e2a;
  --text-muted:   #555d70;
  --text-subtle:  #717a8d;
  --text-faint:   #a0a7b8;

  --accent:       #5a4bd6;
  --accent-2:     #0c8f86;
  --accent-strong:#4a3bc4;
  --accent-soft:  #efedfb;
  --accent-line:  #ddd8f6;
  --accent-ink:   #ffffff;

  --ok:           #1f8a55;
  --warn:         #9a6b00;
  --err:          #c4314b;

  --sel:          rgba(90,75,214,.22);
  --caret:        #5a4bd6;

  /* ANSI 16 — light (darkened, AA-tuned on white) */
  --a-black:#2c303d;   --a-red:#c4314b;     --a-green:#2f8f4e;   --a-yellow:#8a6400;
  --a-blue:#2f5fd0;    --a-magenta:#8a3fce; --a-cyan:#0c7c8c;    --a-white:#4b5160;
  --a-bblack:#565d6e;  --a-bred:#b02540;    --a-bgreen:#247a3f;  --a-byellow:#7a5800;
  --a-bblue:#274fbb;   --a-bmagenta:#7634b8;--a-bcyan:#0a6675;   --a-bwhite:#2c303d;

  --e1: 0 1px 2px rgba(20,22,40,.06);
  --e2: 0 10px 28px -12px rgba(30,32,60,.22), 0 2px 6px -2px rgba(30,32,60,.12);
  --e3: 0 36px 80px -28px rgba(30,32,60,.30), 0 14px 36px -18px rgba(30,32,60,.20);
}

/* ============================================================
   reset / base
   ============================================================ */
*,*::before,*::after { box-sizing:border-box; }
html,body { height:100%; }
body {
  margin:0;
  font-family:var(--font-ui);
  color:var(--text);
  background:
    radial-gradient(120% 90% at 78% -8%, var(--backdrop-glow), transparent 60%),
    linear-gradient(160deg, var(--backdrop-a), var(--backdrop-b));
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
::selection { background:var(--sel); }
button { font:inherit; color:inherit; }
:focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:var(--r-xs); }

.sr-only {
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}
.skip {
  position:absolute; left:50%; top:-3rem; transform:translateX(-50%);
  background:var(--accent); color:var(--accent-ink); padding:.5rem .9rem;
  border-radius:var(--r-md); z-index:50; transition:top var(--dur-2) var(--ease); font-size:var(--fs-ui); font-weight:600;
}
.skip:focus { top:.6rem; }

/* ============================================================
   window shell
   ============================================================ */
.app {
  height:100dvh; width:100vw;
  display:grid; place-items:center;
  padding:clamp(0px, 2.2vw, 28px);
}
.win {
  width:min(1180px, 100%);
  height:min(880px, 100%);
  display:flex; flex-direction:column;
  background:var(--screen);
  border:1px solid var(--line);
  border-radius:var(--r-xl);
  box-shadow:var(--e3);
  overflow:hidden;
  position:relative;
  isolation:isolate;
}

/* top chrome / tab bar */
.chrome {
  flex:0 0 auto;
  display:flex; align-items:center; gap:var(--sp-3);
  padding:0 var(--sp-3);
  height:46px;
  background:var(--chrome);
  border-bottom:1px solid var(--line);
}
.dots { display:flex; gap:8px; padding:0 var(--sp-1); }
.dots i { width:12px; height:12px; border-radius:var(--r-full); display:block; box-shadow:inset 0 0 0 1px rgba(0,0,0,.18); }
.dots i:nth-child(1){ background:#ff5f57; }
.dots i:nth-child(2){ background:#febc2e; }
.dots i:nth-child(3){ background:#28c840; }

.tab {
  display:flex; align-items:center; gap:var(--sp-2);
  font-size:var(--fs-sm); color:var(--text-muted);
  background:var(--screen-2);
  border:1px solid var(--line);
  border-radius:var(--r-md);
  padding:.32rem .7rem;
  max-width:min(60%, 420px);
}
.tab .lambda { color:var(--accent); flex:0 0 auto; }
.tab .tab-path { font-family:var(--font-mono); color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tab .tab-name { color:var(--text-subtle); flex:0 0 auto; }
.spacer { flex:1 1 auto; }

.chrome-actions { display:flex; align-items:center; gap:var(--sp-1); }
.icbtn {
  display:grid; place-items:center;
  min-width:34px; min-height:34px; width:34px; height:34px;
  border:1px solid transparent; border-radius:var(--r-md);
  background:transparent; color:var(--text-subtle); cursor:pointer;
  transition:background var(--dur-1) var(--ease), color var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
}
.icbtn:hover { background:var(--screen-2); color:var(--text); border-color:var(--line); }
.icbtn:active { transform:translateY(1px); }
.icbtn svg { width:17px; height:17px; }

/* ============================================================
   screen / scrollback
   ============================================================ */
.screen {
  flex:1 1 auto; min-height:0;
  overflow-y:auto; overflow-x:hidden;
  background:linear-gradient(180deg, var(--screen), var(--screen));
  scrollbar-width:thin; scrollbar-color:var(--line-strong) transparent;
  scroll-behavior:auto;
  cursor:text;
}
.screen::-webkit-scrollbar { width:11px; }
.screen::-webkit-scrollbar-thumb { background:var(--line-strong); border-radius:99px; border:3px solid var(--screen); }
.screen::-webkit-scrollbar-thumb:hover { background:var(--text-faint); }

.scrollback {
  padding:var(--sp-4) var(--sp-5) var(--sp-3);
  font-family:var(--font-mono);
  font-size:var(--fs-term);
  line-height:var(--line-h);
  font-variant-ligatures:none;
}

/* command block (Warp-style) */
.block {
  margin:0 0 var(--sp-2);
  border:1px solid transparent;
  border-radius:var(--r-md);
  transition:background var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease);
  scroll-margin-top:var(--sp-4);
}
.block:hover { background:var(--block-hover); border-color:var(--line-soft); }
.block:focus-within { background:var(--block-hover); border-color:var(--accent-line); }
.block.is-running { border-color:var(--accent-line); }

.block-head {
  display:flex; align-items:center; gap:var(--sp-2);
  padding:.34rem var(--sp-2) .34rem .4rem;
}
.gutter { flex:0 0 auto; width:16px; display:grid; place-items:center; }
.dot { width:7px; height:7px; border-radius:var(--r-full); background:var(--text-faint); box-shadow:0 0 0 0 transparent; }
.dot.ok { background:var(--ok); }
.dot.err { background:var(--err); }
.dot.run { background:var(--warn); animation:pulse 1.1s var(--ease-io) infinite; }
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }

.cmdline { flex:1 1 auto; min-width:0; display:flex; align-items:baseline; gap:.5ch; flex-wrap:wrap; }
.echo-cmd { color:var(--text); white-space:pre-wrap; overflow-wrap:anywhere; word-break:break-word; }

.block-meta { flex:0 0 auto; display:flex; align-items:center; gap:var(--sp-2); font-family:var(--font-ui); font-size:var(--fs-xs); color:var(--text-faint); }
.block-meta .dur { font-variant-numeric:tabular-nums; }

.block-actions { flex:0 0 auto; display:flex; gap:2px; opacity:0; transition:opacity var(--dur-1) var(--ease); }
.block:hover .block-actions, .block:focus-within .block-actions { opacity:1; }
.minibtn {
  display:grid; place-items:center; width:26px; height:26px;
  border:1px solid transparent; border-radius:var(--r-sm);
  background:transparent; color:var(--text-subtle); cursor:pointer;
  transition:background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
}
.minibtn:hover { background:var(--screen-2); color:var(--text); }
.minibtn svg { width:14px; height:14px; }

.block-body {
  padding:0 var(--sp-2) .45rem 2.05rem;
  overflow:hidden;
}
.block.collapsed .block-body { display:none; }
.out {
  margin:0; font-family:var(--font-mono); font-size:var(--fs-term); line-height:var(--line-h);
  color:var(--text-muted);
  white-space:pre-wrap; overflow-wrap:anywhere; word-break:break-word;
}
.out .err { color:var(--err); }

/* prompt segments (shared by blocks + live input) */
.pmt { display:inline-flex; align-items:center; gap:.45ch; white-space:nowrap; flex:0 1 auto; min-width:0; }
.seg-path {
  color:var(--accent-strong); font-weight:500;
  max-width:46ch; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.seg-git { display:inline-flex; align-items:center; gap:.4ch; color:var(--ok); }
.seg-git svg { width:11px; height:11px; }
.chev { color:var(--accent); font-weight:700; }

/* welcome / MOTD block */
.welcome {
  margin:0 0 var(--sp-4); padding:var(--sp-4);
  border:1px solid var(--line); border-radius:var(--r-lg);
  background:
    radial-gradient(120% 140% at 100% 0%, var(--accent-soft), transparent 55%),
    var(--screen-2);
}
.welcome .brand { display:flex; align-items:center; gap:var(--sp-3); margin-bottom:var(--sp-3); }
.welcome .mark { flex:0 0 auto; color:var(--accent); filter:drop-shadow(0 4px 14px rgba(124,122,255,.35)); }
.welcome h1 { margin:0; font-size:var(--fs-lg); letter-spacing:-.01em; color:var(--text); }
.welcome .ver { font-family:var(--font-mono); font-size:var(--fs-xs); color:var(--text-subtle); margin-top:2px; }
.welcome p { margin:.2rem 0 0; font-size:var(--fs-ui); color:var(--text-muted); line-height:1.55; max-width:62ch; }
.welcome .kbd { color:var(--accent-strong); font-family:var(--font-mono); }
.chips { display:flex; flex-wrap:wrap; gap:var(--sp-2); margin-top:var(--sp-4); }
.chip {
  font-family:var(--font-mono); font-size:var(--fs-sm);
  color:var(--text-muted); background:var(--screen);
  border:1px solid var(--line); border-radius:var(--r-full);
  padding:.32rem .7rem; cursor:pointer;
  transition:border-color var(--dur-1) var(--ease), color var(--dur-1) var(--ease), background var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
}
.chip:hover { color:var(--text); border-color:var(--accent-line); background:var(--accent-soft); }
.chip:active { transform:translateY(1px); }
.chip b { color:var(--accent-strong); font-weight:600; }

/* ============================================================
   composer (keybar + input line)
   ============================================================ */
.composer { flex:0 0 auto; background:var(--screen); border-top:1px solid var(--line); }

.keybar {
  display:flex; align-items:center; gap:var(--sp-1);
  padding:.4rem var(--sp-4);
  overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--line-soft);
}
.keybar::-webkit-scrollbar { display:none; }
.keybar .kbgroup { display:flex; gap:var(--sp-1); }
.keybar .sep { width:1px; height:18px; background:var(--line); margin:0 var(--sp-1); flex:0 0 auto; }
.softkey {
  flex:0 0 auto;
  font-family:var(--font-mono); font-size:var(--fs-xs); line-height:1;
  color:var(--text-subtle); background:var(--screen-2);
  border:1px solid var(--line); border-radius:var(--r-sm);
  padding:.4rem .55rem; min-height:30px; cursor:pointer; white-space:nowrap;
  transition:color var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease), background var(--dur-1) var(--ease);
}
.softkey:hover { color:var(--text); border-color:var(--accent-line); }
.softkey:active { background:var(--accent-soft); }
.softkey[aria-pressed="true"] { color:var(--accent-strong); border-color:var(--accent-line); background:var(--accent-soft); }

.inputline {
  display:flex; align-items:flex-start; gap:.55ch;
  padding:.65rem var(--sp-5) .8rem;
  font-family:var(--font-mono); font-size:var(--fs-term); line-height:var(--line-h);
}
.inputline.is-busy { opacity:.55; }
.input-wrap { position:relative; flex:1 1 auto; min-width:0; }
#cmdin {
  width:100%; border:0; margin:0; padding:0; background:transparent;
  font-family:inherit; font-size:inherit; line-height:inherit; color:var(--text);
  caret-color:transparent; /* custom block caret drawn below */
  outline:none; resize:none; overflow:hidden; white-space:pre;
}
#cmdin::placeholder { color:var(--text-faint); }
.ghost {
  position:absolute; left:0; top:0; pointer-events:none;
  font-family:inherit; font-size:inherit; line-height:inherit;
  color:var(--text-faint); white-space:pre; opacity:.7;
}
.bcaret {
  position:absolute; top:.08em; left:0; width:.62ch; height:1.18em;
  background:var(--caret); border-radius:1px; opacity:.92;
  transform:translateX(0); pointer-events:none;
  animation:blink 1.05s steps(1,end) infinite;
}
.bcaret.hidden { display:none; }
@keyframes blink { 0%,49%{opacity:.92;} 50%,100%{opacity:0;} }

/* reverse-search bar (replaces prompt while active) */
.rsearch { display:none; align-items:center; gap:.5ch; flex:0 0 auto; color:var(--text-muted); white-space:nowrap; }
.inputline.searching .pmt { display:none; }
.inputline.searching .rsearch { display:inline-flex; }
.rsearch .rs-label { color:var(--accent-strong); }
.rsearch .rs-q { color:var(--text); }
.rsearch .rs-q::after { content:"_"; color:var(--text-faint); }

/* ============================================================
   status bar
   ============================================================ */
.statusbar {
  flex:0 0 auto;
  display:flex; align-items:center; gap:var(--sp-3);
  height:30px; padding:0 var(--sp-4);
  background:var(--status); border-top:1px solid var(--line);
  font-family:var(--font-ui); font-size:var(--fs-xs); color:var(--text-subtle);
}
.statusbar .si { display:inline-flex; align-items:center; gap:.45ch; white-space:nowrap; }
.statusbar .si svg { width:12px; height:12px; }
.statusbar .si.branch { color:var(--ok); }
.statusbar .si.path { color:var(--text-muted); font-family:var(--font-mono); overflow:hidden; text-overflow:ellipsis; }
.statusbar .accentdot { width:7px; height:7px; border-radius:99px; background:var(--accent); box-shadow:0 0 8px var(--accent); }
.statusbar .si.clock { font-variant-numeric:tabular-nums; }

/* toast */
.toast {
  position:absolute; bottom:48px; left:50%; transform:translateX(-50%) translateY(8px);
  background:var(--text); color:var(--screen); font-size:var(--fs-sm); font-weight:600;
  padding:.45rem .8rem; border-radius:var(--r-md); box-shadow:var(--e2);
  opacity:0; pointer-events:none; transition:opacity var(--dur-2) var(--ease), transform var(--dur-2) var(--ease);
  z-index:30; display:flex; align-items:center; gap:.5ch;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast svg { width:14px; height:14px; color:var(--ok); }

/* block reveal motion */
.block.reveal { animation:rise var(--dur-3) var(--ease) both; }
@keyframes rise { from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:none; } }

/* ANSI helpers */
.b{font-weight:700;} .dim{opacity:.62;} .it{font-style:italic;} .un{text-decoration:underline;}
.inv{} /* inverse handled inline */

/* ============================================================
   responsive
   ============================================================ */
@media (max-width:720px) {
  .app { padding:0; }
  .win { width:100vw; height:100dvh; border-radius:0; border:0; }
  .scrollback { padding:var(--sp-3) var(--sp-3) var(--sp-2); }
  .inputline { padding:.6rem var(--sp-3) .7rem; }
  .keybar { padding:.4rem var(--sp-3); }
  .statusbar { padding:0 var(--sp-3); gap:var(--sp-2); }
  .tab { display:none; }
  .block-body { padding-left:1.7rem; }
  .seg-path { max-width:32ch; }
  .hide-sm { display:none !important; }
}
@media (pointer:coarse) {
  .softkey { min-height:44px; padding:.5rem .7rem; }
  .icbtn { min-width:44px; min-height:44px; width:44px; height:44px; }
  .block-actions { opacity:1; } /* no hover on touch */
  .minibtn { width:34px; height:34px; }
}
@media (max-width:380px) {
  .seg-path { max-width:18ch; }
}

@media (prefers-reduced-motion:reduce) {
  *,*::before,*::after { animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important; }
  .bcaret { animation:none; opacity:.92; }
  .dot.run { animation:none; }
}
</style>
</head>
<body>
<a href="#cmdin" class="skip">Skip to terminal input</a>

<div class="app">
  <section class="win" role="application" aria-label="Lumen web terminal" aria-roledescription="terminal emulator">
    <!-- top chrome -->
    <header class="chrome">
      <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>
      <div class="tab" aria-hidden="true">

<script>

  /* ============================================================

     ============================================================ */

                "## Try it\n" +
                "  ls -l            list this directory in long form\n" +
                "  ls | grep .js    pipe output into grep\n" +
                "  echo hi > out.txt  redirect stdout to a file\n" +
                "  tree             see the whole tree\n" +
                "  color            render the ANSI palette\n\n" +
                "This is a demo project. Files live in your browser's localStorage.\n"

              "package.json": f(
                '{\n  "name": "lumen",\n  "version": "1.0.0",\n  "type": "module",\n' +
                '  "bin": { "lumen": "src/main.js" },\n  "scripts": { "start": "lumen" },\n' +

                "main.js": f(

                "shell.js": f("// shell loop (demo source)\nexport function boot(cfg){ /* ... */ }\n")

            sandbox: d({

          docs: d({
            "guide.md": f("# Guide\n\nType `help` for the command list, or `man <cmd>` for details.\n"),
            "keys.md": f(
              "# Keyboard\n\n" +
              "Enter       run the current line\n" +
              "Up / Down   walk command history\n" +

  var fs, cwd;
  function loadFS() {

    if (raw) { try { fs = JSON.parse(raw); } catch (e) { fs = seedFS(); } }
    else fs = seedFS();

    cwd = c ? JSON.parse(c) : HOME.concat(["projects", "lumen"]);

    if (!nodeAt(cwd)) cwd = HOME.slice();
  }
  function saveFS() { lsSet("lumen.fs", JSON.stringify(fs)); lsSet("lumen.cwd", JSON.stringify(cwd)); }

  function nodeAt(parts) {
    var n = fs;
    for (var i = 0; i < parts.length; i++) {
      if (!n || n.type !== "dir" || !n.children) return null;
      n = n.children[parts[i]];
    }
    return n || null;
  }
  // Normalize a path string into absolute parts (no existence check)
  function toParts(p) {
    var parts;
    if (p === "~" || p === "") parts = (p === "~") ? HOME.slice() : cwd.slice();
    else if (p[0] === "/") parts = p.split("/").filter(Boolean);
    else if (p === "~" ) parts = HOME.slice();
    else if (p.slice(0, 2) === "~/") parts = HOME.concat(p.slice(2).split("/").filter(Boolean));
    else parts = cwd.concat(p.split("/").filter(Boolean));

    for (var i = 0; i < parts.length; i++) {

  }
  function basename(parts) { return parts.length ? parts[parts.length - 1] : "/"; }

  /* ============================================================

     ============================================================ */
  var ANSI16 = ["--a-black","--a-red","--a-green","--a-yellow","--a-blue","--a-magenta","--a-cyan","--a-white",

  // wrap escaped text; input MUST already be html-escaped
  function ansiToHtml(escaped) {

    var st = { fg: null, bg: null, bold: false, dim: false, it: false, un: false, inv: false };
    var open = false;
    function spanFor() {
      var cls = [], style = [];
      var fg = st.fg, bg = st.bg;
      if (st.inv) { var t = fg; fg = bg || "var(--screen)"; bg = t || "var(--text)"; }
      if (fg) style.push("color:" + fg);
      if (bg) style.push("background:" + bg);
      if (st.bold) cls.push("b");
      if (st.dim) cls.push("dim");
      if (st.it) cls.push("it");
      if (st.un) cls.push("un");
      return '<span' + (cls.length ? ' class="' + cls.join(" ") + '"' : "") + (style.length ? ' style="' + style.join(";") + '"' : "") + '>';
    }
    function flush(txt) {
      if (!txt) return;
      var plain = st.fg == null && st.bg == null && !st.bold && !st.dim && !st.it && !st.un && !st.inv;
      out += plain ? txt : (spanFor() + txt + "</span>");
    }
    while ((m = re.exec(escaped))) {
      flush(escaped.slice(last, m.index));
      last = re.lastIndex;
      var codes = m[1] === "" ? [0] : m[1].split(";").map(Number);
      for (var i = 0; i < codes.length; i++) {
        var c = codes[i];
        if (c === 0) { st = { fg: null, bg: null, bold: false, dim: false, it: false, un: false, inv: false }; }
        else if (c === 1) st.bold = true;
        else if (c === 2) st.dim = true;
        else if (c === 3) st.it = true;
        else if (c === 4) st.un = true;
        else if (c === 7) st.inv = true;
        else if (c === 22) { st.bold = false; st.dim = false; }
        else if (c === 23) st.it = false;
        else if (c === 24) st.un = false;
        else if (c === 27) st.inv = false;
        else if (c >= 30 && c <= 37) st.fg = "var(" + ANSI16[c - 30] + ")";
        else if (c >= 90 && c <= 97) st.fg = "var(" + ANSI16[c - 90 + 8] + ")";
        else if (c >= 40 && c <= 47) st.bg = "var(" + ANSI16[c - 40] + ")";
        else if (c >= 100 && c <= 107) st.bg = "var(" + ANSI16[c - 100 + 8] + ")";

        else if (c === 49) st.bg = null;

     INLINE SVGS
     ============================================================ */

    rerun: '<svg viewBox="0 0 24 24" fill="none"><path d="M5 12a7 7 0 1 1 2.1 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M7 20v-4H3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    chev: '<svg viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none"><path d="m5 12.5 4.2 4.2L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',

  /* ============================================================
     COMMAND PIPELINE
     ============================================================ */
  // tokenize a single stage into argv with quote handling; returns array of {v, sq}

  // split a full command line by top-level pipes, capture trailing redirect
  function parseLine(line) {

  var ENV = {};
  function refreshEnv() {

  /* ---------- command registry ---------- */
  var CMDS = {};

  function fmtSize(b) {

    if (b < 1048576) return (b / 1024).toFixed(b < 10240 ? 1 : 0) + "K";

  }
  function fmtMtime(t) {

    if (name[0] === ".") return paint(2, name);

    if (/\.(js|mjs|json|css|html)$/.test(name)) return paint(36, name);

  }

  reg("help", {
    usage: "help [command]",

    if (key === "ctrl") { ctrlArmed = !ctrlArmed; syncCtrl(); focusInput(); return; }
    if (key === "tab") { complete(); }
    else if (key === "up") { histPrev(); }
    else if (key === "down") { histNext(); }
    else if (key === "left") { setCaret(Math.max(0, input.selectionStart - 1)); updateCaret(); }
    else if (key === "right") { if (!acceptGhost()) { setCaret(Math.min(input.value.length, input.selectionStart + 1)); updateCaret(); } }
    else if (key === "cancel") { cancelLine(); }
    else if (key === "search") { enterRSearch(); }
    else if (key === "clear") { sb.innerHTML = ""; }
    focusInput();
  });
  function syncCtrl() { $("kCtrl").setAttribute("aria-pressed", ctrlArmed ? "true" : "false"); }
  function insertAtCaret(txt) {
    var s = input.selectionStart, e2 = input.selectionEnd;
    input.value = input.value.slice(0, s) + txt + input.value.slice(e2);
    setCaret(s + txt.length); updateGhost(); updateCaret();
  }

  /* ---------- chrome buttons ---------- */
  $("btnTheme").addEventListener("click", function () { applyTheme(curTheme() === "dark" ? "light" : "dark", true); focusInput(); });
  $("btnClear").addEventListener("click", function () { sb.innerHTML = ""; focusInput(); });
  $("btnSearch").addEventListener("click", function () { focusInput(); enterRSearch(); });
  $("btnHelp").addEventListener("click", function () { input.value = "help"; submit(); });

  // prevent form submit reload
  inputline.addEventListener("submit", function (e) { e.preventDefault(); });

  window.addEventListener("resize", function () { measureCharW(); updateCaret(); });

  /* ============================================================
     BOOT
     ============================================================ */
  function boot() {
    applyTheme(curTheme(), false);
    loadFS(); loadHistory(); refreshEnv(); updateChrome();
    measureCharW();
    printWelcome();
    tickClock(); setInterval(tickClock, 15000);
    updateGhost();
    // focus after layout settles
    requestAnimationFrame(function () { focusInput(); updateCaret(); });
  }
  boot();

  // expose a tiny hook for verification (read-only); no console noise
  window.__lumen = {
    run: function (line) { input.value = line; submit(); },
    state: function () { return { cwd: dispPath(cwd), theme: curTheme(), blocks: sb.querySelectorAll(".block").length, history: history.slice() }; }
  };
})();
</script>
</body>
