  fields+=`<div><p class="insp-sect-t" style="margin-bottom:9px">Connections</p>
    ${conns.length? `<div class="conn-list">${conns.map(c=>`<div class="conn"><span class="pcdot" style="background:${TYPECOL[c.type]}"></span><span class="ct">${c.label}</span><span class="cx">${c.type}</span></div>`).join("")}</div>`
     : `<div class="conn" style="color:var(--tx-3)">No connections yet</div>`}</div>`;
  fields+=`<div class="insp-meta">
     <div class="meta-cell"><div class="mk">Node ID</div><div class="mv">${node.id}</div></div>
     <div class="meta-cell"><div class="mk">Position</div><div class="mv">${Math.round(node.x)}, ${Math.round(node.y)}</div></div>
     <div class="meta-cell"><div class="mk">Inputs</div><div class="mv">${inC} / ${def.inputs.length}</div></div>
     <div class="meta-cell"><div class="mk">Outputs</div><div class="mv">${outC}</div></div>
   </div>`;
  return inspHead(def.cat, def.icon, node.label, def.name+" · "+def.desc)
    + `<div class="insp-body">${fields}</div>`
    + `<div class="insp-foot"><button class="btn" id="inspDup">Duplicate</button><button class="btn danger" id="inspDelete">${ico('trash')} Delete</button></div>`;
}
function sliderField(label,key,min,max,step,val,connected){
  const pct=((val-min)/(max-min)*100)||0;
  return `<div class="field"><label>${label}${connected?` <span style="color:var(--t-number);font-size:10px">● driven by input</span>`:""}<span class="fv" data-ival="${key}">${fmt(val)}</span></label>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${val}" data-iparam="${key}" style="--p:${pct}%" ${connected?'disabled':''} aria-label="${label}"></div>`;
}
function segField(label,key,opts,cur){
  return `<div class="field"><label>${label}</label><div class="seg" data-iseg="${key}" role="group" aria-label="${label}">`+
    opts.map(([v,s])=>`<button data-opt="${v}" aria-pressed="${cur===v}">${s}</button>`).join("")+`</div></div>`;
}
function inputConnected(node,pid){ return !!inputOccupied(node.id,pid); }
function connectionsFor(node){
  const out=[];
  state.edges.forEach(e=>{
    if(e.to[0]===node.id){ const src=state.nodes.get(e.from[0]); out.push({dir:"in",type:e.type,label:`${e.to[1]} ← ${src.label}`}); }
    if(e.from[0]===node.id){ const dst=state.nodes.get(e.to[0]); out.push({dir:"out",type:e.type,label:`${e.from[1]} → ${dst.label}`}); }
  });
  return out;
}

/* ====================================================================
   HISTORY (undo / redo)
   ==================================================================== */
let past=[], future=[];
function snapshot(){
  return JSON.stringify({
    nodes:[...state.nodes.values()].map(n=>({id:n.id,type:n.type,x:n.x,y:n.y,params:n.params,label:n.label})),
    edges:[...state.edges.values()].map(e=>({id:e.id,from:e.from,to:e.to,type:e.type})),
    uid
  });
}
let lastSnap=null;
function pushHistory(beforeOverride){
  // capture state BEFORE the mutation that just happened: we snapshot current as the new baseline,
  // pushing the previous baseline to the past stack.
  if(lastSnap!=null){ past.push(lastSnap); if(past.length>60) past.shift(); future.length=0; }
  lastSnap=snapshot();
  updateHistoryBtns();
}
function restore(json){
  const data=JSON.parse(json);
  // clear
  state.nodes.forEach(n=>n.el.remove()); state.nodes.clear();
  state.edges.forEach(e=>e.el.g.remove()); state.edges.clear();
  state.sel.clear(); state.selEdges.clear();
  uid=data.uid||uid;
  data.nodes.forEach(d=>{ const n=addNode(d.type,d.x,d.y,d.params,d.label,d.id); });
  data.edges.forEach(d=>{ const e={id:d.id,from:d.from,to:d.to,type:d.type}; state.edges.set(e.id,e); renderEdge(e); markPort(e.from[0],"out",e.from[1]); markPort(e.to[0],"in",e.to[1]); });
  evaluate(); refreshFlow(); renderInspector(); updateDeleteBtn(); drawMinimap();
}
function undo(){ if(!past.length)return; future.push(lastSnap); lastSnap=past.pop(); restore(lastSnap); updateHistoryBtns(); }
function redo(){ if(!future.length)return; past.push(lastSnap); lastSnap=future.pop(); restore(lastSnap); updateHistoryBtns(); }
function updateHistoryBtns(){ $("#btnUndo").disabled=!past.length; $("#btnRedo").disabled=!future.length; }

}

/* ====================================================================
   KEYBOARD
   ==================================================================== */
window.addEventListener("keydown",(e)=>{
  const tag=(e.target.tagName||"").toLowerCase();
  const typing = tag==="input"||tag==="textarea"||tag==="select"||e.target.isContentEditable;
  const dlg=$("#helpDlg");
  if(typing){ return; }
  const mod=e.metaKey||e.ctrlKey;
  if(mod && (e.key==="z"||e.key==="Z")){ e.preventDefault(); e.shiftKey?redo():undo(); return; }
  if(mod && (e.key==="y")){ e.preventDefault(); redo(); return; }
  if(e.key==="Delete"||e.key==="Backspace"){ e.preventDefault(); deleteSelection(); return; }
  if(e.key==="f"||e.key==="F"){ fitView(); return; }
  if(e.key==="="||e.key==="+"){ zoomCenter(1.2); return; }
  if(e.key==="-"||e.key==="_"){ zoomCenter(1/1.2); return; }
  if(e.key==="v"||e.key==="V"){ setMode("pan"); return; }
  if(e.key==="b"||e.key==="B"){ setMode("select"); return; }
  if(e.key==="?"){ openHelp(); return; }
  if(e.key==="Escape"){ if(connectKb){ document.querySelector(".port.hot")?.classList.remove("hot"); connectKb=null; toast("Cancelled","info"); } clearSelection(); renderInspector(); updateDeleteBtn(); return; }
  if(mod && (e.key==="a"||e.key==="A")){ e.preventDefault(); selectAll(); return; }
  // node focus nav
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)){
    if(e.shiftKey && state.sel.size){ nudgeSelection(e.key); e.preventDefault(); }
    else { moveFocus(e.key); e.preventDefault(); }
    return;
  }
  if((e.key==="Enter"||e.key===" ") && state.focusId){ e.preventDefault(); selectNode(state.focusId, e.shiftKey); return; }
  if((e.key==="c"||e.key==="C") && state.focusId){ startKbConnectFromNode(state.focusId); return; }
});
function selectAll(){ clearSelection(); state.nodes.forEach(n=>{ state.sel.add(n.id); n.el.classList.add("sel"); }); renderInspector(); updateDeleteBtn(); }
function nudgeSelection(key){
  pushHistory();
  const d=12, dx=key==="ArrowLeft"?-d:key==="ArrowRight"?d:0, dy=key==="ArrowUp"?-d:key==="ArrowDown"?d:0;
  state.sel.forEach(id=>{ const n=state.nodes.get(id); n.x+=dx; n.y+=dy; updateNodeTransform(n); updateEdgesFor(id); });
  drawMinimap();
}
function moveFocus(key){
  const list=[...state.nodes.values()]; if(!list.length)return;
  if(!state.focusId){ setFocus(list[0].id); ensureVisible(list[0]); return; }
  const cur=state.nodes.get(state.focusId); let best=null,bestD=1e18;
  list.forEach(n=>{ if(n.id===cur.id)return;
    const dx=n.x-cur.x, dy=n.y-cur.y;
    const ok = key==="ArrowRight"?dx>1: key==="ArrowLeft"?dx<-1: key==="ArrowDown"?dy>1: dy<-1;
    if(!ok)return;
    const along=Math.abs((key==="ArrowLeft"||key==="ArrowRight")?dx:dy);
    const off=Math.abs((key==="ArrowLeft"||key==="ArrowRight")?dy:dx);
    const d=along+off*2; if(d<bestD){bestD=d;best=n;}
  });
  if(best){ setFocus(best.id); ensureVisible(best); }
}
function setFocus(id){
  if(state.focusId){ state.nodes.get(state.focusId)?.el.classList.remove("kbfocus"); state.nodes.get(state.focusId)?.el.setAttribute("tabindex","-1"); }
  state.focusId=id; const n=state.nodes.get(id); if(n){ n.el.classList.add("kbfocus"); n.el.tabIndex=0; n.el.focus({preventScroll:true}); }
}
function ensureVisible(n){
  const r=stageRect();
  const sx=state.view.x+n.x*state.view.k, sy=state.view.y+n.y*state.view.k;
  const m=80;
  let nx=state.view.x, ny=state.view.y, ch=false;
  if(sx<m){nx+=m-sx;ch=true;} if(sx>r.width-m-NODE_W*state.view.k){nx-=sx-(r.width-m-NODE_W*state.view.k);ch=true;}
  if(sy<m){ny+=m-sy;ch=true;} if(sy>r.height-m-100){ny-=sy-(r.height-m-100);ch=true;}
  if(ch){ state.view.x=nx; state.view.y=ny; applyView(); }
}
function startKbConnectFromNode(id){
  const n=state.nodes.get(id); const out=TYPES[n.type].outputs[0];
  if(!out){ toast("This node has no output","info"); return; }
  const portEl=n.el.querySelector(`.port[data-side="out"][data-port="${out.id}"]`);
  kbPortActivate(n, portEl);
  toast("Connect: focus a node and press C on its input, or Enter on a port","info");
}

/* ====================================================================
   STRESS TEST — async surface with loading + success
   ==================================================================== */
function stressTest(){
  const busy=$("#busy"); $("#busyText").textContent="Generating 220 nodes…"; busy.classList.add("on");
  $("#btnStress").disabled=true;
  // defer so the loading state actually paints before the heavy work
  setTimeout(()=>{
    pushHistory();
    const cols=20, rows=11, gapX=290, gapY=190;
    const baseX=600, baseY=-300;
    const created=[];
    const palette=["oscillator","value","math","gain","shaper","blend"];
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const t=palette[(r*cols+c)%palette.length];
      const n=addNode(t, baseX+c*gapX, baseY+r*gapY, t==="value"?{value:Math.random()}:t==="oscillator"?{freq:1+(c%6),wave:["sine","saw","square","tri"][r%4]}:undefined);
      created.push(n);
    }
    created.forEach(n=>measureNode(n));
    // wire some compatible neighbours (signal->signal, number->number)
    let made=0;
    for(let i=0;i<created.length && made<150;i++){
      const a=created[i], b=created[i+1]; if(!b)continue;
      const outs=TYPES[a.type].outputs, ins=TYPES[b.type].inputs;
      const o=outs[0]; const match=ins.find(p=>p.type===o.type);
      if(o&&match){ const v=canConnect([a.id,o.id],[b.id,match.id]); if(v.ok){ addEdge([a.id,o.id],[b.id,match.id],true); made++; } }
    }
    evaluate(); refreshFlow(); drawMinimap(); fitView();
    busy.classList.remove("on"); $("#btnStress").disabled=false;
    toast(`Generated ${created.length} nodes · ${made} new edges`,"ok");
    renderInspector();
  }, 60);
}

/* ====================================================================
   DEMO PATCH
   ==================================================================== */
function loadDemo(){
  state.nodes.forEach(n=>n.el.remove()); state.nodes.clear();
  state.edges.forEach(e=>e.el.g.remove()); state.edges.clear();
  clearSelection(); uid=0; spawnOffset=0;
  const C=[0,300,600,900,1180]; // column x
  const oscA=addNode("oscillator",C[1],-40,{wave:"sine",freq:1,amp:1},"Carrier");
  const oscB=addNode("oscillator",C[1],230,{wave:"saw",freq:2,amp:.8},"Modulator");
  const vFreq=addNode("value",C[0],-30,{value:3,min:1,max:8,step:1},"Freq");
  const vMix=addNode("value",C[0],250,{value:.42,min:0,max:1,step:.01},"Morph");
  const blend=addNode("blend",C[2],70,{mix:.42},"Blend");
  const vDrive=addNode("value",C[1],470,{value:2.4,min:.1,max:6,step:.05},"Drive");
  const shaper=addNode("shaper",C[3],70,{drive:2.4},"Wavefold");
  const vLevel=addNode("value",C[2],330,{value:.85,min:0,max:1.5,step:.01},"Level");
  const gain=addNode("gain",C[4]-120,70,{gain:.85},"Output Gain");
  const vHue=addNode("value",C[3],330,{value:.6,min:0,max:1,step:.01},"Hue");
  const ramp=addNode("colorramp",C[3],440,{c0:"#5b8cff",c1:"#ff79c6",t:.6},"Trace Color");
  const scope=addNode("scope",C[4]+90,90,{},"Oscilloscope");
  [...state.nodes.values()].forEach(measureNode);
  // wire
  const E=(a,ap,b,bp)=>addEdge([a.id,ap],[b.id,bp],true);
  E(vFreq,"out",oscA,"freq");
  E(oscA,"out",blend,"a");
  E(oscB,"out",blend,"b");
  E(vMix,"out",blend,"mix");
  E(blend,"out",shaper,"in");
  E(vDrive,"out",shaper,"drive");
  E(shaper,"out",gain,"in");
  E(vLevel,"out",gain,"gain");
  E(gain,"out",scope,"in");
  E(vHue,"out",ramp,"t");
  E(ramp,"out",scope,"tint");
  evaluate(); refreshFlow(); renderInspector(); updateDeleteBtn();
  requestAnimationFrame(()=>{ fitView(false); drawMinimap(); });
}

}
function init(){
  injectIcons();
  buildPalette();
  setMode("pan");
  loadDemo();
  lastSnap=snapshot(); updateHistoryBtns();
  startScopeLoop();
  window.addEventListener("resize",()=>{ applyView(); });
  // expose a tiny hook for automated verification (read-only state introspection)
  window.__flux={ state, fitView, evaluate, addEdge, canConnect, nodesBBox, portPos, applyView, zoomCenter, get nodeCount(){return state.nodes.size;}, get edgeCount(){return state.edges.size;} };
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();
