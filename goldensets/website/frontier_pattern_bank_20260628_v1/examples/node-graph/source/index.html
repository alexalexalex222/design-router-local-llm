<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="color-scheme" content="dark">
<title>Fluxgraph — Signal Flow Editor</title>
<style>
/* ============================================================ TOKENS */
:root{
  color-scheme: dark;
  /* neutral ink ramp (slate → ink) */
  --ink-0:#05070e;     /* deepest */
  --ink-1:#080b14;     /* canvas */
  --ink-2:#0c1019;     /* rail */
  --ink-3:#11161f;     /* panel */
  --ink-4:#161c28;     /* node body */
  --ink-5:#1d2433;     /* node header / raised */
  --ink-6:#28303f;     /* hover surface */
  --line:#1b2231;      /* hairline */
  --line-2:#27303f;    /* stronger line */
  --line-3:#3a4456;    /* focus-ish line */
  /* text ramp */
  --tx-0:#eef2fb;
  --tx-1:#bcc6dc;
  --tx-2:#8390a8;
  --tx-3:#586176;
  --tx-4:#3e4658;
  /* brand accent — electric aqua */
  --acc:#34e3c8;
  --acc-2:#19c7b4;
  --acc-deep:#0c2f2b;
  --acc-ring:rgba(52,227,200,.55);
  /* port / data types */
  --t-signal:#34e3c8;  /* aqua  */
  --t-number:#f6b042;  /* amber */
  --t-color:#ff79c6;   /* pink  */
  /* status */
  --ok:#46d39a; --warn:#ffcf5c; --err:#ff6b75; --info:#5b9dff;
  --ok-bg:rgba(70,211,154,.12); --err-bg:rgba(255,107,117,.12); --warn-bg:rgba(255,207,92,.12);
  /* radii */
  --r-1:6px; --r-2:9px; --r-3:13px; --r-4:18px; --r-pill:999px;
  /* elevation */
  --e-1:0 1px 2px rgba(0,0,0,.5);
  --e-2:0 8px 24px -8px rgba(0,0,0,.6), 0 2px 6px rgba(0,0,0,.45);
  --e-3:0 24px 60px -16px rgba(0,0,0,.78), 0 8px 20px rgba(0,0,0,.5);
  /* motion */
  --d-1:120ms; --d-2:180ms; --d-3:240ms;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  /* type */
  --font:"Inter var",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  --fs-xs:11px; --fs-sm:12px; --fs-13:13px; --fs-base:16px; --fs-lg:clamp(18px,2.2vw,21px);
  /* geometry shared with JS */
  --node-w:230px;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; background:var(--ink-1); color:var(--tx-1);
  font-family:var(--font); font-size:var(--fs-base); line-height:1.5;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow:hidden; overscroll-behavior:none;
}
:focus{outline:none}
:focus-visible{outline:2px solid var(--acc); outline-offset:2px; border-radius:4px}
button{font:inherit; color:inherit; cursor:pointer}
::selection{background:rgba(52,227,200,.28)}

.skip{position:absolute; left:8px; top:-44px; z-index:120; background:var(--acc); color:#04201d;
  font-weight:650; padding:9px 14px; border-radius:var(--r-2); transition:top var(--d-2) var(--ease)}
.skip:focus{top:8px}

/* ============================================================ SHELL */
.app{
  display:grid;
  grid-template-columns:248px 1fr 304px;
  grid-template-rows:54px 1fr;
  grid-template-areas:"top top top" "rail stage inspector";
  height:100dvh; width:100vw;
}

/* ---- top bar ---- */
.topbar{
  grid-area:top; display:flex; align-items:center; gap:14px;
  padding:0 14px; background:linear-gradient(180deg,var(--ink-2),var(--ink-1));
  border-bottom:1px solid var(--line); z-index:40; min-width:0;
}
.brand{display:flex; align-items:center; gap:10px; min-width:0}
.brand .mark{width:30px; height:30px; flex:0 0 auto; filter:drop-shadow(0 0 10px rgba(52,227,200,.35))}
.brand .wm{display:flex; flex-direction:column; line-height:1.05; min-width:0}
.brand .nm{font-weight:700; letter-spacing:-.02em; color:var(--tx-0); font-size:15px; white-space:nowrap}
.brand .nm em{color:var(--acc); font-style:normal}
.brand .sub{font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--tx-3); font-weight:600; white-space:nowrap}
.top-status{display:flex; align-items:center; gap:8px; padding:5px 11px; margin-left:6px;
  background:var(--ink-3); border:1px solid var(--line-2); border-radius:var(--r-pill); font-size:var(--fs-13); color:var(--tx-1); white-space:nowrap}
.top-status .dot{width:8px; height:8px; border-radius:50%; background:var(--ok); box-shadow:0 0 0 3px rgba(70,211,154,.18); flex:0 0 auto}
.top-status.is-empty .dot{background:var(--tx-3); box-shadow:none}
.top-status.is-error .dot{background:var(--err); box-shadow:0 0 0 3px rgba(255,107,117,.18)}
.top-status b{color:var(--tx-0); font-variant-numeric:tabular-nums; font-weight:650}
.top-spacer{flex:1 1 auto; min-width:8px}
.top-actions{display:flex; align-items:center; gap:6px}

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  height:36px; min-width:36px; padding:0 12px; border-radius:var(--r-2);
  background:var(--ink-3); border:1px solid var(--line-2); color:var(--tx-1);
  font-size:var(--fs-13); font-weight:550; letter-spacing:.01em;
  transition:background var(--d-1) var(--ease), border-color var(--d-1) var(--ease), color var(--d-1) var(--ease), transform var(--d-1) var(--ease);
}
.btn svg{width:17px; height:17px; flex:0 0 auto}
.btn:hover{background:var(--ink-5); border-color:var(--line-3); color:var(--tx-0)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none; background:var(--ink-3); border-color:var(--line); color:var(--tx-2)}
.btn.icon{padding:0; width:36px}
.btn.primary{background:linear-gradient(180deg,var(--acc),var(--acc-2)); color:#04201d; border-color:transparent; font-weight:650; box-shadow:0 4px 14px -4px rgba(52,227,200,.5)}
.btn.primary:hover{filter:brightness(1.06)}
.btn.primary:disabled{background:var(--ink-3); color:var(--tx-2); filter:none; box-shadow:none}
.btn.ghost{background:transparent; border-color:transparent}
.btn.ghost:hover{background:var(--ink-4)}

/* ============================================================ LEFT RAIL / PALETTE */
.rail{
  grid-area:rail; background:var(--ink-2); border-right:1px solid var(--line);
  display:flex; flex-direction:column; min-height:0; z-index:35;
}
.rail-head{padding:13px 15px 9px; display:flex; align-items:baseline; justify-content:space-between}
.rail-head h2{margin:0; font-size:11px; letter-spacing:.13em; text-transform:uppercase; color:var(--tx-2); font-weight:700}
.rail-head .hint{font-size:10.5px; color:var(--tx-3)}
.palette{flex:1 1 auto; overflow-y:auto; padding:4px 11px 14px; display:flex; flex-direction:column; gap:6px; scrollbar-width:thin; scrollbar-color:var(--line-3) transparent}
.palette::-webkit-scrollbar{width:9px} .palette::-webkit-scrollbar-thumb{background:var(--line-2); border-radius:9px; border:3px solid var(--ink-2)}

.pal-item{
  display:grid; grid-template-columns:34px 1fr auto; align-items:center; gap:11px;
  width:100%; text-align:left; padding:9px 10px; border-radius:var(--r-2);
  background:var(--ink-3); border:1px solid var(--line); color:var(--tx-1);
  transition:background var(--d-1) var(--ease), border-color var(--d-1) var(--ease), transform var(--d-1) var(--ease);
}
.pal-item:hover{background:var(--ink-4); border-color:var(--line-3); transform:translateX(2px)}
.pal-item:active{transform:translateX(2px) scale(.99)}
.pal-item[aria-grabbed="true"]{opacity:.5}
.pal-ico{width:34px; height:34px; border-radius:var(--r-1); display:grid; place-items:center; background:var(--ink-5); border:1px solid var(--line-2)}
.pal-ico svg{width:19px; height:19px}
.pal-meta{min-width:0}
.pal-name{font-size:var(--fs-13); font-weight:600; color:var(--tx-0); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.pal-desc{font-size:10.5px; color:var(--tx-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.type-chip{font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; padding:2px 6px; border-radius:5px; font-weight:600; white-space:nowrap}
.type-chip.signal{color:var(--t-signal); background:rgba(52,227,200,.1); border:1px solid rgba(52,227,200,.25)}
.type-chip.number{color:var(--t-number); background:rgba(246,176,66,.1); border:1px solid rgba(246,176,66,.25)}
.type-chip.color{color:var(--t-color); background:rgba(255,121,198,.1); border:1px solid rgba(255,121,198,.25)}
.type-chip.sink{color:var(--tx-2); background:var(--ink-5); border:1px solid var(--line-2)}

.rail-foot{padding:11px 13px; border-top:1px solid var(--line); display:flex; gap:7px; flex-wrap:wrap}
.rail-foot .btn{flex:1 1 auto; height:34px; font-size:12px}

/* ============================================================ STAGE / CANVAS */
.stage{
  grid-area:stage; position:relative; overflow:hidden; background:var(--ink-1);
  touch-action:none; user-select:none; -webkit-user-select:none;
  cursor:default;
}
.stage.mode-pan{cursor:grab}
.stage.mode-pan.is-panning{cursor:grabbing}
.stage.connecting{cursor:crosshair}

/* dot-grid + major grid; tracked by JS via custom props */
.grid{
  position:absolute; inset:0; pointer-events:none; z-index:0;
  --gx:0px; --gy:0px; --g:22px; --gM:110px;
  background-color:var(--ink-1);
  background-image:
    radial-gradient(circle at center, rgba(255,255,255,.5) .9px, transparent 1.1px),
    linear-gradient(rgba(255,255,255,.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.4) 1px, transparent 1px);
  background-size: var(--g) var(--g), var(--gM) var(--gM), var(--gM) var(--gM);
  background-position: var(--gx) var(--gy), var(--gx) var(--gy), var(--gx) var(--gy);
  opacity:.5;
}
/* vignette for depth */
.stage::after{content:""; position:absolute; inset:0; pointer-events:none; z-index:1;
  background:radial-gradient(120% 90% at 50% 0%, transparent 55%, rgba(0,0,0,.32) 100%);}

.edges{position:absolute; inset:0; width:100%; height:100%; z-index:2; overflow:visible; pointer-events:none}
.edges .hit{pointer-events:stroke; stroke:transparent; fill:none; stroke-width:18; cursor:pointer}
.edge-halo{fill:none; stroke-width:6; vector-effect:non-scaling-stroke; stroke-linecap:round; opacity:.22}
.edge-line{fill:none; stroke-width:2; vector-effect:non-scaling-stroke; stroke-linecap:round;
  transition:stroke-width var(--d-1) var(--ease)}
.edge.sel .edge-line{stroke-width:3}
.edge.sel .edge-halo{opacity:.5; stroke-width:10}
.edge.hov .edge-line{stroke-width:2.6}
.edge-line.flow{stroke-dasharray:7 9; animation:flow 1s linear infinite}
@keyframes flow{to{stroke-dashoffset:-16}}
.ghost-line{fill:none; stroke:var(--acc); stroke-width:2.2; vector-effect:non-scaling-stroke; stroke-dasharray:6 6; stroke-linecap:round; opacity:.9}
.ghost-halo{fill:none; stroke:var(--acc); stroke-width:7; vector-effect:non-scaling-stroke; opacity:.18; stroke-linecap:round}

.world{position:absolute; top:0; left:0; transform-origin:0 0; z-index:3; will-change:transform}

/* ---- node card ---- */
.node{
  position:absolute; top:0; left:0; width:var(--node-w);
  background:linear-gradient(180deg,var(--ink-4),var(--ink-3));
  border:1px solid var(--line-2); border-radius:var(--r-3);
  box-shadow:var(--e-2); will-change:transform;
  transition:box-shadow var(--d-1) var(--ease), border-color var(--d-1) var(--ease);
}
.node:hover{border-color:var(--line-3)}
.node.sel{border-color:var(--acc); box-shadow:var(--e-3), 0 0 0 1px var(--acc), 0 0 22px -4px var(--acc-ring)}
.node.dragging{box-shadow:var(--e-3); cursor:grabbing; z-index:5}
.node.kbfocus{outline:2px dashed var(--acc); outline-offset:3px}
.node.eval-err{border-color:var(--err)}
.node.eval-err.sel{box-shadow:var(--e-3), 0 0 0 1px var(--err), 0 0 22px -4px rgba(255,107,117,.5)}

.node-head{
  display:flex; align-items:center; gap:8px; height:38px; padding:0 10px;
  background:linear-gradient(180deg,var(--ink-5),var(--ink-4));
  border-bottom:1px solid var(--line-2); cursor:grab; position:relative;
  border-radius:12px 12px 0 0; overflow:hidden; /* clip accent bar to rounded top; ports live outside the header so stay unclipped */
}
.node.dragging .node-head{cursor:grabbing}
.node-head::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--cat,var(--acc))}
.node-ico{width:22px; height:22px; border-radius:6px; display:grid; place-items:center; flex:0 0 auto;
  background:color-mix(in srgb, var(--cat) 16%, var(--ink-5)); color:var(--cat)}
.node-ico svg{width:14px; height:14px}
.node-title{font-size:var(--fs-13); font-weight:650; color:var(--tx-0); flex:1 1 auto; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-.01em}
.node-badge{flex:0 0 auto; width:18px; height:18px; border-radius:50%; display:none; place-items:center; background:var(--err-bg); color:var(--err)}
.node.eval-err .node-badge{display:grid}
.node-badge svg{width:12px; height:12px}

.ports{position:relative}
.port-row{position:absolute; display:flex; align-items:center; gap:7px; height:26px}
.port-row.in{left:0; padding-left:14px}
.port-row.out{right:0; padding-right:14px; flex-direction:row-reverse}
.port{
  position:absolute; width:12px; height:12px; border-radius:50%;
  background:var(--ink-2); border:2px solid var(--pc,var(--acc));
  cursor:crosshair; z-index:4;
  transition:transform var(--d-1) var(--ease), box-shadow var(--d-1) var(--ease), background var(--d-1) var(--ease);
}
.port-row.in .port{left:-6px} .port-row.out .port{right:-6px}
.port::after{content:""; position:absolute; inset:-9px; border-radius:50%} /* hit target ≥30px */
.port:hover,.port.hot{transform:scale(1.35); background:var(--pc); box-shadow:0 0 0 4px color-mix(in srgb,var(--pc) 28%, transparent)}
.port.connected{background:var(--pc)}
.port.cand{box-shadow:0 0 0 4px color-mix(in srgb,var(--pc) 35%, transparent); animation:cand 1.1s ease-in-out infinite}
.port.dim{opacity:.32}
@keyframes cand{50%{box-shadow:0 0 0 7px color-mix(in srgb,var(--pc) 12%, transparent)}}
.port-label{font-size:11px; color:var(--tx-2); font-weight:500; white-space:nowrap; max-width:84px; overflow:hidden; text-overflow:ellipsis}
.port-row.out .port-label{text-align:right}

.node-body{padding:9px 11px 11px; display:flex; flex-direction:column; gap:9px}
.ctrl{display:flex; flex-direction:column; gap:5px}
.ctrl-row{display:flex; align-items:center; gap:8px}
.ctrl label{font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--tx-3); font-weight:600}
.ctrl .val{margin-left:auto; font-family:var(--mono); font-size:11.5px; color:var(--acc); font-weight:600}
.seg{display:flex; gap:3px; background:var(--ink-2); border:1px solid var(--line); border-radius:7px; padding:3px}
.seg button{flex:1 1 0; height:24px; border-radius:5px; background:transparent; border:0; color:var(--tx-2); font-size:11px; font-weight:600;
  display:grid; place-items:center; transition:background var(--d-1) var(--ease), color var(--d-1) var(--ease)}
.seg button svg{width:15px; height:15px}
.seg button:hover{color:var(--tx-0); background:var(--ink-4)}
.seg button[aria-pressed="true"]{background:color-mix(in srgb,var(--cat) 22%, var(--ink-5)); color:var(--cat)}

input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:4px;
  background:linear-gradient(90deg,var(--cat,var(--acc)) var(--p,50%), var(--line-2) var(--p,50%)); cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--tx-0);
  border:2px solid var(--cat,var(--acc)); box-shadow:0 1px 3px rgba(0,0,0,.5); cursor:grab; transition:transform var(--d-1) var(--ease)}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.18); cursor:grabbing}
input[type=range]::-moz-range-thumb{width:14px; height:14px; border-radius:50%; background:var(--tx-0); border:2px solid var(--cat,var(--acc)); cursor:grab}
input[type=range]:focus-visible{outline:2px solid var(--acc); outline-offset:4px}

.scope-wrap{position:relative; border-radius:var(--r-2); overflow:hidden; background:radial-gradient(120% 120% at 50% 0,#0a1620,#06090f);
  border:1px solid var(--line-2)}
canvas.scope{display:block; width:100%; height:88px}
canvas.spark{display:block; width:100%; height:36px}
.scope-empty{position:absolute; inset:0; display:grid; place-items:center; text-align:center; gap:4px; font-size:11px; color:var(--tx-3)}
.scope-tag{position:absolute; top:6px; left:8px; font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx-3)}
.node-readout{font-family:var(--mono); font-size:18px; font-weight:600; color:var(--tx-0); text-align:center; padding:4px 0; letter-spacing:-.01em}
.node-readout.err{color:var(--err); font-size:13px}

/* marquee */
.marquee{position:absolute; z-index:6; border:1.5px solid var(--acc); background:rgba(52,227,200,.1);
  border-radius:3px; pointer-events:none; display:none}

/* ============================================================ STAGE OVERLAYS */
.ov{position:absolute; z-index:10}
.zoomctl{left:16px; bottom:16px; display:flex; flex-direction:column; background:var(--ink-3); border:1px solid var(--line-2);
  border-radius:var(--r-3); box-shadow:var(--e-2); overflow:hidden}
.zoomctl button{width:42px; height:42px; display:grid; place-items:center; background:transparent; border:0; color:var(--tx-1); border-bottom:1px solid var(--line)}
.zoomctl button:last-child{border-bottom:0}
.zoomctl button svg{width:18px; height:18px}
.zoomctl button:hover{background:var(--ink-5); color:var(--tx-0)}
.zoomctl button:active{background:var(--ink-6)}
.zoomctl button:disabled{opacity:.35; cursor:not-allowed; background:transparent; color:var(--tx-2)}
.zoom-read{font-family:var(--mono); font-size:11px; color:var(--tx-2); text-align:center; padding:7px 0; border-bottom:1px solid var(--line); cursor:default; min-width:42px}

.modetog{left:16px; bottom:calc(16px + 244px); display:flex; flex-direction:column; background:var(--ink-3); border:1px solid var(--line-2); border-radius:var(--r-3); box-shadow:var(--e-2); overflow:hidden}
.modetog button{width:42px; height:42px; display:grid; place-items:center; background:transparent; border:0; color:var(--tx-2); border-bottom:1px solid var(--line)}
.modetog button:last-child{border-bottom:0}
.modetog button svg{width:18px;height:18px}
.modetog button:hover{background:var(--ink-5); color:var(--tx-0)}
.modetog button[aria-pressed="true"]{background:color-mix(in srgb,var(--acc) 20%, var(--ink-5)); color:var(--acc)}

/* minimap */
.minimap{right:16px; bottom:16px; width:212px; height:142px; background:rgba(8,11,20,.86); backdrop-filter:blur(8px);
  border:1px solid var(--line-2); border-radius:var(--r-3); box-shadow:var(--e-2); overflow:hidden; cursor:crosshair}
.minimap svg{display:block; width:100%; height:100%}
.mm-node{rx:1.5}
.mm-view{fill:rgba(52,227,200,.1); stroke:var(--acc); stroke-width:1.5; cursor:grab}
.minimap .mm-label{position:absolute; top:7px; left:9px; font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--tx-3); pointer-events:none}

/* canvas empty state */
.canvas-empty{position:absolute; inset:0; z-index:8; display:none; place-items:center; pointer-events:none}
.stage.is-empty .canvas-empty{display:grid}
.canvas-empty .ce-inner{display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center; max-width:300px; padding:24px}
.canvas-empty .ce-art{width:90px; height:90px; opacity:.85}
.canvas-empty h3{margin:0; font-size:17px; color:var(--tx-1); font-weight:650}
.canvas-empty p{margin:0; font-size:13px; color:var(--tx-3); line-height:1.5}

/* toast */
.toasts{position:absolute; left:50%; bottom:18px; transform:translateX(-50%); z-index:60; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none}
.toast{display:flex; align-items:center; gap:9px; padding:9px 14px; border-radius:var(--r-pill); background:var(--ink-5);
  border:1px solid var(--line-2); box-shadow:var(--e-3); font-size:var(--fs-13); color:var(--tx-0); font-weight:550;
  animation:toastin var(--d-3) var(--ease-out); max-width:90vw}
.toast svg{width:16px; height:16px; flex:0 0 auto}
.toast.err{border-color:rgba(255,107,117,.4)} .toast.err svg{color:var(--err)}
.toast.ok svg{color:var(--ok)} .toast.info svg{color:var(--info)}
@keyframes toastin{from{opacity:0; transform:translateY(10px)}}

/* loading overlay (stress gen) */
.busy{position:absolute; inset:0; z-index:70; display:none; place-items:center; background:rgba(5,7,14,.6); backdrop-filter:blur(2px)}
.busy.on{display:grid}
.busy .box{display:flex; flex-direction:column; align-items:center; gap:13px; padding:26px 34px; background:var(--ink-4); border:1px solid var(--line-2); border-radius:var(--r-3); box-shadow:var(--e-3)}
.spin{width:30px; height:30px; border-radius:50%; border:3px solid var(--line-2); border-top-color:var(--acc); animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.busy .box span{font-size:13px; color:var(--tx-1)}

/* ============================================================ INSPECTOR */
.inspector{
  grid-area:inspector; background:var(--ink-2); border-left:1px solid var(--line);
  display:flex; flex-direction:column; min-height:0; z-index:35;
}
.insp-head{padding:13px 15px 10px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:9px}
.insp-head .ih-ico{width:30px; height:30px; border-radius:7px; display:grid; place-items:center; flex:0 0 auto;
  background:color-mix(in srgb,var(--cat,var(--acc)) 16%, var(--ink-5)); color:var(--cat,var(--acc))}
.insp-head .ih-ico svg{width:17px; height:17px}
.insp-head .ih-tt{min-width:0; flex:1 1 auto}
.insp-head h2{margin:0; font-size:14px; color:var(--tx-0); font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.insp-head .ih-sub{font-size:10.5px; color:var(--tx-3); font-family:var(--mono); letter-spacing:.04em}
.insp-body{flex:1 1 auto; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:16px; scrollbar-width:thin; scrollbar-color:var(--line-3) transparent}
.insp-body::-webkit-scrollbar{width:9px} .insp-body::-webkit-scrollbar-thumb{background:var(--line-2); border-radius:9px; border:3px solid var(--ink-2)}

.field{display:flex; flex-direction:column; gap:7px}
.field > label{font-size:11px; letter-spacing:.04em; color:var(--tx-2); font-weight:600; display:flex; justify-content:space-between; align-items:center}
.field > label .fv{font-family:var(--mono); color:var(--acc); font-size:11.5px; font-weight:600}
.text-in{height:36px; padding:0 11px; border-radius:var(--r-2); background:var(--ink-3); border:1px solid var(--line-2); color:var(--tx-0); font-size:var(--fs-13); width:100%;
  transition:border-color var(--d-1) var(--ease), background var(--d-1) var(--ease)}
.text-in:hover{border-color:var(--line-3)}
.text-in:focus-visible{outline:none; border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-deep)}
.field .seg{padding:4px}
.field .seg button{height:30px; font-size:12px}
.swatches{display:flex; gap:8px; align-items:center}
.swatch{width:34px; height:34px; border-radius:8px; border:2px solid var(--line-2); padding:0; overflow:hidden; cursor:pointer; position:relative}
.swatch input{position:absolute; inset:-4px; width:calc(100% + 8px); height:calc(100% + 8px); opacity:0; cursor:pointer}
.swatch:focus-within{border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-deep)}
.ramp-prev{flex:1 1 auto; height:34px; border-radius:8px; border:1px solid var(--line-2)}

.insp-meta{display:grid; grid-template-columns:1fr 1fr; gap:9px}
.meta-cell{background:var(--ink-3); border:1px solid var(--line); border-radius:var(--r-2); padding:9px 11px}
.meta-cell .mk{font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--tx-3); font-weight:600}
.meta-cell .mv{font-family:var(--mono); font-size:13px; color:var(--tx-0); margin-top:3px; font-weight:600}
.conn-list{display:flex; flex-direction:column; gap:6px}
.conn{display:flex; align-items:center; gap:8px; font-size:12px; padding:7px 9px; background:var(--ink-3); border:1px solid var(--line); border-radius:var(--r-2)}
.conn .pcdot{width:9px; height:9px; border-radius:50%; flex:0 0 auto}
.conn .ct{color:var(--tx-1); flex:1 1 auto; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.conn .cx{margin-left:auto; color:var(--tx-3); font-family:var(--mono); font-size:10px}
.insp-sect-t{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx-2); font-weight:700; margin:0}
.err-note{display:flex; gap:8px; align-items:flex-start; padding:10px 12px; background:var(--err-bg); border:1px solid rgba(255,107,117,.3); border-radius:var(--r-2); font-size:12px; color:#ffb3b8}
.err-note svg{width:15px; height:15px; flex:0 0 auto; color:var(--err); margin-top:1px}
.insp-foot{padding:12px 15px; border-top:1px solid var(--line); display:flex; gap:8px}
.insp-foot .btn{flex:1 1 auto}
.btn.danger{color:#ffb3b8} .btn.danger:hover{background:var(--err-bg); border-color:rgba(255,107,117,.4); color:#fff}

/* inspector empty state */
.insp-empty{display:flex; flex-direction:column; gap:18px; padding:6px}
.insp-empty .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.insp-empty .stat{background:var(--ink-3); border:1px solid var(--line); border-radius:var(--r-2); padding:13px}
.insp-empty .stat .n{font-family:var(--mono); font-size:24px; color:var(--tx-0); font-weight:650; line-height:1}
.insp-empty .stat .l{font-size:11px; color:var(--tx-3); margin-top:5px}
.insp-empty .stat.acc .n{color:var(--acc)}
.tips{display:flex; flex-direction:column; gap:9px}
.tip{display:flex; gap:10px; align-items:flex-start; font-size:12.5px; color:var(--tx-2); line-height:1.45}
.tip kbd{font-family:var(--mono); font-size:10.5px; background:var(--ink-4); border:1px solid var(--line-2); border-bottom-width:2px; border-radius:5px; padding:2px 6px; color:var(--tx-1); white-space:nowrap; flex:0 0 auto}
.tip .tk{display:flex; gap:3px; flex:0 0 auto}

/* mobile sheet handle + backdrop */
.sheet-grip{display:none}
.scrim{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:30; opacity:0; visibility:hidden; transition:opacity var(--d-2) var(--ease), visibility var(--d-2)}
.mobile-bar{display:none}

/* ============================================================ RESPONSIVE */
@media (max-width:1080px){
  .app{grid-template-columns:212px 1fr 268px}
}
@media (max-width:860px){
  .app{grid-template-columns:1fr; grid-template-rows:54px 1fr; grid-template-areas:"top" "stage"}
  .rail,.inspector{
    position:fixed; top:0; bottom:0; width:min(86vw,330px); z-index:50;
    transition:transform var(--d-3) var(--ease-out); box-shadow:var(--e-3);
  }
  .rail{left:0; transform:translateX(-102%); border-right:1px solid var(--line-2)}
  .inspector{right:0; transform:translateX(102%); border-left:1px solid var(--line-2)}
  body.sheet-rail .rail{transform:none}
  body.sheet-insp .inspector{transform:none}
  body.sheet-rail .scrim, body.sheet-insp .scrim{opacity:1; visibility:visible}
  .sheet-grip{display:flex; align-items:center; justify-content:space-between; padding:11px 14px; border-bottom:1px solid var(--line)}
  .sheet-grip h2{margin:0; font-size:13px; color:var(--tx-0); font-weight:650}
  .sheet-grip .gx{width:34px; height:34px; display:grid; place-items:center; border-radius:8px; background:var(--ink-3); border:1px solid var(--line-2); color:var(--tx-1)}
  .sheet-grip .gx svg{width:17px; height:17px}
  .minimap{display:none}
  .modetog{bottom:calc(16px + 244px)}
  /* mobile toolbar to open sheets */
  .mobile-bar{display:flex; gap:8px; margin-left:auto}
  .desk-only{display:none !important}
  .topbar .btn{height:44px; min-width:44px}   /* ≥44px touch targets on mobile */
  .sheet-grip .gx{width:42px; height:42px}
}
@media (max-width:560px){
  .brand .sub{display:none}
  .top-status{display:none}
  .zoomctl button,.modetog button{width:46px; height:46px}
}
@media (max-width:400px){
  .topbar{gap:8px; padding:0 10px}
  .zoomctl{left:12px; bottom:12px}
  .modetog{left:12px}
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important}
  .edge-line.flow{stroke-dasharray:none; animation:none}
}
</style>
</head>
<body>
<a class="skip" href="#stage">Skip to canvas</a>
<div class="app">

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="brand">
      <svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="1" y="1" width="30" height="30" rx="8" fill="#0c1019" stroke="#27303f"/>
        <circle cx="9" cy="11" r="2.4" fill="#34e3c8"/>
        <circle cx="9" cy="21" r="2.4" fill="#f6b042"/>
        <circle cx="23" cy="16" r="2.4" fill="#ff79c6"/>
        <path d="M11.2 11.4C16 12 16 16 21 15.7" stroke="#34e3c8" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M11.2 20.6C16 20 16 16 21 16.3" stroke="#f6b042" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <div class="wm">
        <span class="nm">Flux<em>graph</em></span>
        <span class="sub">Signal Flow Editor</span>
      </div>
    </div>
    <div class="top-status" id="status" role="status" aria-live="polite">
      <span class="dot"></span><span id="statusText">Live · 12 nodes</span>
    </div>
    <div class="top-spacer"></div>
    <div class="top-actions">
      <button class="btn ghost icon desk-only" id="btnUndo" title="Undo (⌘Z)" aria-label="Undo" disabled></button>
      <button class="btn ghost icon desk-only" id="btnRedo" title="Redo (⌘⇧Z)" aria-label="Redo" disabled></button>
      <button class="btn desk-only" id="btnStress" title="Generate a large graph to stress-test performance"></button>
      <button class="btn desk-only" id="btnHelp" aria-label="Keyboard shortcuts" title="Shortcuts (?)"></button>
      <button class="btn primary" id="btnFit" title="Fit graph to view (F)"></button>
      <!-- mobile sheet toggles -->
      <div class="mobile-bar">
        <button class="btn icon" id="mbRail" aria-label="Open node palette"></button>
        <button class="btn icon" id="mbInsp" aria-label="Open inspector"></button>
      </div>
    </div>
  </header>

  <!-- ============ LEFT RAIL / PALETTE ============ -->
  <aside class="rail" id="rail" aria-label="Node palette">
    <div class="sheet-grip"><h2>Add node</h2><button class="gx" data-close="rail" aria-label="Close palette"></button></div>
    <div class="rail-head">
      <h2>Nodes</h2><span class="hint">click or drag →</span>
    </div>
    <div class="palette" id="palette"></div>
    <div class="rail-foot">
      <button class="btn" id="btnClear" title="Remove every node">Clear</button>
      <button class="btn" id="btnReset" title="Reload the demo patch">Reset patch</button>
    </div>
  </aside>

  <!-- ============ STAGE ============ -->
  <main class="stage mode-pan" id="stage" tabindex="0" aria-label="Graph canvas. Arrow keys move focus between nodes; Enter selects; C connects; Delete removes.">
    <div class="grid" id="grid"></div>
    <svg class="edges" id="edges" aria-hidden="true">
      <defs>
        <marker id="ar-signal" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1L7 4.5L1 8Z" fill="var(--t-signal)"/></marker>
        <marker id="ar-number" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1L7 4.5L1 8Z" fill="var(--t-number)"/></marker>
        <marker id="ar-color" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1L7 4.5L1 8Z" fill="var(--t-color)"/></marker>
      </defs>
      <g id="edgeWorld"></g>
      <g id="ghostWorld"></g>
    </svg>
    <div class="world" id="world"></div>
    <div class="marquee" id="marquee"></div>

    <!-- empty state -->
    <div class="canvas-empty">
      <div class="ce-inner">
        <svg class="ce-art" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <rect x="4" y="22" width="20" height="14" rx="3" stroke="#3a4456" stroke-width="2" stroke-dasharray="3 3"/>
          <rect x="40" y="12" width="20" height="14" rx="3" stroke="#3a4456" stroke-width="2" stroke-dasharray="3 3"/>
          <rect x="40" y="38" width="20" height="14" rx="3" stroke="#3a4456" stroke-width="2" stroke-dasharray="3 3"/>
          <path d="M24 29C33 29 31 19 40 19M24 31C33 31 31 45 40 45" stroke="#28303f" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h3>Empty canvas</h3>
        <p>Add a node from the palette, or press <b style="color:var(--tx-1)">Reset patch</b> to load the demo signal graph.</p>
      </div>
    </div>

    <!-- overlays -->
    <div class="ov modetog" role="group" aria-label="Pointer mode">
      <button id="modePan" aria-pressed="true" title="Pan mode — drag canvas to pan (V)" aria-label="Pan mode"></button>
      <button id="modeSel" aria-pressed="false" title="Select mode — drag to marquee-select (B)" aria-label="Select mode"></button>
    </div>

    <div class="ov zoomctl" role="group" aria-label="Zoom controls">
      <button id="zoomIn" aria-label="Zoom in" title="Zoom in (+)"></button>
      <div class="zoom-read" id="zoomRead" aria-live="off">100%</div>
      <button id="zoomOut" aria-label="Zoom out" title="Zoom out (−)"></button>
      <button id="zoomFit" aria-label="Fit to view" title="Fit (F)"></button>
    </div>

    <div class="ov minimap" id="minimap" aria-hidden="true">
      <span class="mm-label">Map</span>
      <svg id="mmSvg" viewBox="0 0 212 142" preserveAspectRatio="none"></svg>
    </div>

    <div class="toasts" id="toasts" aria-live="polite"></div>
    <div class="busy" id="busy"><div class="box"><div class="spin"></div><span id="busyText">Working…</span></div></div>
  </main>

  <!-- ============ INSPECTOR ============ -->
  <aside class="inspector" id="inspector" aria-label="Inspector">
    <div class="sheet-grip"><h2>Inspector</h2><button class="gx" data-close="insp" aria-label="Close inspector"></button></div>
    <div id="inspMount" style="display:contents"></div>
  </aside>

</div>
<div class="scrim" id="scrim"></div>

<!-- help dialog -->
<dialog id="helpDlg" style="border:1px solid var(--line-2); background:var(--ink-3); color:var(--tx-1); border-radius:14px; padding:0; max-width:440px; width:92vw; box-shadow:var(--e-3)">
  <form method="dialog" style="margin:0">
    <div style="display:flex; align-items:center; justify-content:space-between; padding:15px 18px; border-bottom:1px solid var(--line)">
      <strong style="font-size:15px; color:var(--tx-0)">Keyboard &amp; gestures</strong>
      <button class="gx" value="x" aria-label="Close" style="width:32px;height:32px;display:grid;place-items:center;border-radius:8px;background:var(--ink-4);border:1px solid var(--line-2);color:var(--tx-1)"></button>
    </div>
    <div id="helpBody" style="padding:16px 18px; display:flex; flex-direction:column; gap:11px; max-height:60vh; overflow:auto"></div>
  </form>
</dialog>

<script>
"use strict";
/* ====================================================================
   Fluxgraph — a vanilla typed dataflow node editor.
   No dependencies. World-space model: nodes/edges store world coords;
   pan/zoom is a single CSS transform; edges are SVG beziers in the same
   transform (non-scaling-stroke). DOM geometry is never read during
   drag/pan — every endpoint is pure math from the model -> 200+ nodes
   stay smooth.
   ==================================================================== */
(function(){
const $ = (s,r=document)=>r.querySelector(s);
const NS = "http://www.w3.org/2000/svg";
const svgEl = (n,a={})=>{const e=document.createElementNS(NS,n); for(const k in a) e.setAttribute(k,a[k]); return e;};

const reduceMotion = matchMedia("(prefers-reduced-motion:reduce)").matches;

/* ---------- geometry constants (kept in sync with CSS) ---------- */
const NODE_W = 230, HEAD_H = 38, PORT_ROW_H = 26, PORT_GAP_TOP = 8;
const portY = (i)=> HEAD_H + PORT_GAP_TOP + i*PORT_ROW_H + PORT_ROW_H/2;
const SIGLEN = 110;            // samples per signal
const MIN_Z = 0.2, MAX_Z = 2.2;

/* ---------- icons (bespoke inline SVG) ---------- */
const I = {
  osc:'<path d="M2 12C4 5 6 5 8 12s4 7 6 0 4-7 6 0" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round"/>',

  math:'<path d="M5 9h6M8 6v6M14 17h5M14 13h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>',

  plus:'<path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>',

  fit:'<path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round"/>',

  marq:'<rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6" stroke-dasharray="3 3" fill="none"/>',

  trash:'<path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
  layers:'<path d="M12 3l9 5-9 5-9-5 9-5Z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><path d="M3 13l9 5 9-5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/>',
  // waveforms (seg)
  wSine:'<path d="M2 8C4 3 5 3 7 8s3 5 5 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>',
  wSquare:'<path d="M2 11V5h4v6h4V5h4" stroke="currentColor" stroke-width="1.5" fill="none"/>',
  wSaw:'<path d="M2 11L7 4v7l5-7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
  wTri:'<path d="M2 10l3-6 4 12 3-6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
};
const ico = (k,extra="")=>`<svg viewBox="0 0 24 24" ${extra} aria-hidden="true">${I[k]||""}</svg>`;
const wIco = (k)=>`<svg viewBox="0 0 14 14" aria-hidden="true">${I[k]}</svg>`;

/* ---------- color utils ---------- */
function hexRgb(h){h=h.replace('#',''); if(h.length===3)h=h.split('').map(c=>c+c).join(''); const n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255];}
const rgbHex=(r,g,b)=>'#'+[r,g,b].map(v=>clamp(Math.round(v),0,255).toString(16).padStart(2,'0')).join('');
function mixHex(a,b,t){const x=hexRgb(a),y=hexRgb(b);return rgbHex(lerp(x[0],y[0],t),lerp(x[1],y[1],t),lerp(x[2],y[2],t));}

/* ---------- waveform generators ---------- */
const WAVES = {
  sine:(p)=>Math.sin(p*Math.PI*2),
  square:(p)=>Math.sin(p*Math.PI*2)>=0?1:-1,
  saw:(p)=>2*((p%1+1)%1)-1,
  tri:(p)=>{const x=(p%1+1)%1; return x<.5?(4*x-1):(3-4*x);},
};
function makeSignal(fn){const a=new Float32Array(SIGLEN); for(let i=0;i<SIGLEN;i++) a[i]=fn(i/SIGLEN); return a;}

/* ====================================================================
   NODE TYPE REGISTRY — typed ports + compute()
   port type ∈ {signal, number, color}.  cat = accent color of the node.
   ==================================================================== */
const TYPECOL = {signal:'var(--t-signal)', number:'var(--t-number)', color:'var(--t-color)'};
const TYPEHEX = {signal:'#34e3c8', number:'#f6b042', color:'#ff79c6'};

const TYPES = {
  oscillator:{
    name:"Oscillator", icon:"osc", cat:"var(--t-signal)", desc:"wave generator", outChip:"signal",
    inputs:[{id:"freq",label:"freq",type:"number"},{id:"amp",label:"amp",type:"number"}],
    outputs:[{id:"out",label:"signal",type:"signal"}],
    params:{wave:"sine", freq:1, amp:1},
    preview:"spark",
    compute(p,inp){
      const freq = inp.freq!=null?clamp(inp.freq,0,16):p.freq;
      const amp  = inp.amp!=null?clamp(inp.amp,0,2):p.amp;
      const w = WAVES[p.wave]||WAVES.sine;
      return {out: makeSignal(t=>amp*w(t*freq))};
    }
  },
  value:{
    name:"Value", icon:"value", cat:"var(--t-number)", desc:"numeric constant", outChip:"number",
    inputs:[], outputs:[{id:"out",label:"number",type:"number"}],
    params:{value:0.5, min:0, max:1, step:0.01},
    preview:"readout",
    compute(p){return {out: p.value};}
  },
  math:{
    name:"Math", icon:"math", cat:"var(--t-number)", desc:"a ∘ b", outChip:"number",
    inputs:[{id:"a",label:"a",type:"number"},{id:"b",label:"b",type:"number"}],
    outputs:[{id:"out",label:"result",type:"number"}],
    params:{op:"add", a:1, b:1},
    preview:"readout",
    compute(p,inp){
      const a=inp.a!=null?inp.a:p.a, b=inp.b!=null?inp.b:p.b;
      switch(p.op){
        case "add":return {out:a+b};
        case "sub":return {out:a-b};
        case "mul":return {out:a*b};
        case "div": if(b===0) return {out:0, error:"Division by zero"}; return {out:a/b};
      }
      return {out:0};
    }
  },
  gain:{
    name:"Gain", icon:"gain", cat:"var(--t-signal)", desc:"amplify signal", outChip:"signal",
    inputs:[{id:"in",label:"signal",type:"signal"},{id:"gain",label:"gain",type:"number"}],
    outputs:[{id:"out",label:"signal",type:"signal"}],
    params:{gain:1},
    preview:"spark",
    compute(p,inp){
      const g = inp.gain!=null?inp.gain:p.gain;
      if(!inp.in) return {out:null};
      const o=new Float32Array(SIGLEN); for(let i=0;i<SIGLEN;i++) o[i]=clamp(inp.in[i]*g,-2,2); return {out:o};
    }
  },
  blend:{
    name:"Blend", icon:"blend", cat:"var(--t-signal)", desc:"crossfade A↔B", outChip:"signal",
    inputs:[{id:"a",label:"A",type:"signal"},{id:"b",label:"B",type:"signal"},{id:"mix",label:"mix",type:"number"}],
    outputs:[{id:"out",label:"signal",type:"signal"}],
    params:{mix:0.5},
    preview:"spark",
    compute(p,inp){
      const m=clamp(inp.mix!=null?inp.mix:p.mix,0,1);
      const A=inp.a, B=inp.b;
      if(!A&&!B) return {out:null};
      const o=new Float32Array(SIGLEN);
      for(let i=0;i<SIGLEN;i++) o[i]=(A?A[i]:0)*(1-m)+(B?B[i]:0)*m;
      return {out:o};
    }
  },
  shaper:{
    name:"Shaper", icon:"shaper", cat:"var(--t-signal)", desc:"wavefold / drive", outChip:"signal",
    inputs:[{id:"in",label:"signal",type:"signal"},{id:"drive",label:"drive",type:"number"}],
    outputs:[{id:"out",label:"signal",type:"signal"}],
    params:{drive:2},
    preview:"spark",
    compute(p,inp){
      const d=Math.max(0.01,inp.drive!=null?inp.drive:p.drive);
      if(!inp.in) return {out:null};
      const k=Math.tanh(d)||1, o=new Float32Array(SIGLEN);
      for(let i=0;i<SIGLEN;i++) o[i]=Math.tanh(inp.in[i]*d)/k;
      return {out:o};
    }
  },
  colorramp:{
    name:"Color Ramp", icon:"ramp", cat:"var(--t-color)", desc:"number → color", outChip:"color",
    inputs:[{id:"t",label:"t",type:"number"}],
    outputs:[{id:"out",label:"color",type:"color"}],
    params:{c0:"#5b8cff", c1:"#34e3c8", t:0.5},
    preview:"ramp",
    compute(p,inp){
      const t=clamp(inp.t!=null?inp.t:p.t,0,1);
      return {out: mixHex(p.c0,p.c1,t)};
    }
  },
  scope:{
    name:"Scope", icon:"scope", cat:"#7c89a8", desc:"signal monitor", outChip:"sink",
    inputs:[{id:"in",label:"signal",type:"signal"},{id:"tint",label:"tint",type:"color"}],
    outputs:[],
    params:{},
    preview:"scope",
    compute(p,inp){ return {_sig:inp.in||null, _tint:inp.tint||null}; }
  }
};

/* ====================================================================
   STATE
   ==================================================================== */
const state = {
  nodes:new Map(),   // id -> {id,type,x,y,h,params,label,_out,error,el,ports}
  edges:new Map(),   // id -> {id, from:[nid,pid], to:[nid,pid], type, el}
  sel:new Set(),     // selected node ids
  selEdges:new Set(),
  view:{x:0,y:0,k:1},
  mode:"pan",
  focusId:null,
};
let uid=0; const nid=(p)=>p+(++uid);
let connectKb=null;   // keyboard-connect pending {nid,pid}

/* dom refs */
const stage=$("#stage"), world=$("#world"), edgeWorld=$("#edgeWorld"), ghostWorld=$("#ghostWorld"),
      grid=$("#grid"), marqEl=$("#marquee"), inspMount=$("#inspMount"), toasts=$("#toasts");

/* ====================================================================
   COORD MATH
   ==================================================================== */
function stageRect(){return stage.getBoundingClientRect();}
function screenToWorld(sx,sy){const r=stageRect();return {x:(sx-r.left-state.view.x)/state.view.k, y:(sy-r.top-state.view.y)/state.view.k};}
function portPos(nodeId, side, idx){
  const n=state.nodes.get(nodeId); if(!n) return {x:0,y:0};
  return {x:n.x+(side==="out"?NODE_W:0), y:n.y+portY(idx)};
}
function portIndex(type, side, portId){
  const def=TYPES[type]; const list=side==="out"?def.outputs:def.inputs;
  return list.findIndex(p=>p.id===portId);
}

/* ====================================================================
   VIEW / TRANSFORM
   ==================================================================== */
function applyView(){
  const {x,y,k}=state.view;
  const t=`translate(${x}px,${y}px) scale(${k})`;
  world.style.transform=t;
  edgeWorld.setAttribute("transform",`translate(${x} ${y}) scale(${k})`);
  ghostWorld.setAttribute("transform",`translate(${x} ${y}) scale(${k})`);
  // grid tracks pan+zoom
  const g=22*k, gM=110*k;
  grid.style.setProperty("--g",g+"px"); grid.style.setProperty("--gM",gM+"px");
  grid.style.setProperty("--gx",x+"px"); grid.style.setProperty("--gy",y+"px");
  $("#zoomRead").textContent=Math.round(k*100)+"%";
  $("#zoomIn").disabled=k>=MAX_Z-1e-3; $("#zoomOut").disabled=k<=MIN_Z+1e-3;
  drawMinimap();
}
function zoomAt(sx,sy,factor){
  const r=stageRect(); const cx=sx-r.left, cy=sy-r.top;
  const k0=state.view.k, k1=clamp(k0*factor,MIN_Z,MAX_Z);
  if(k1===k0) return;
  const wx=(cx-state.view.x)/k0, wy=(cy-state.view.y)/k0;
  state.view.x=cx-wx*k1; state.view.y=cy-wy*k1; state.view.k=k1;
  applyView();
}
function zoomCenter(factor){const r=stageRect(); zoomAt(r.left+r.width/2, r.top+r.height/2, factor);}

function nodesBBox(){
  if(state.nodes.size===0) return null;
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  state.nodes.forEach(n=>{ x0=Math.min(x0,n.x); y0=Math.min(y0,n.y); x1=Math.max(x1,n.x+NODE_W); y1=Math.max(y1,n.y+(n.h||120)); });
  return {x0,y0,x1,y1,w:x1-x0,h:y1-y0};
}
function fitView(animate=true){
  const bb=nodesBBox(); const r=stageRect();
  if(!bb){ state.view={x:r.width/2,y:r.height/2,k:1}; applyView(); return; }
  const pad=70;
  const k=clamp(Math.min((r.width-pad*2)/bb.w,(r.height-pad*2)/bb.h), MIN_Z, 1.4);
  const x=(r.width-bb.w*k)/2 - bb.x0*k;
  const y=(r.height-bb.h*k)/2 - bb.y0*k;
  if(animate && !reduceMotion) animateView(x,y,k); else { state.view={x,y,k}; applyView(); }
}
let viewAnim=null;
function animateView(x,y,k){
  if(viewAnim) cancelAnimationFrame(viewAnim);
  const s={...state.view}, t0=performance.now(), dur=320;
  const ease=t=>1-Math.pow(1-t,3);
  (function step(now){
    const t=clamp((now-t0)/dur,0,1), e=ease(t);
    state.view.x=lerp(s.x,x,e); state.view.y=lerp(s.y,y,e); state.view.k=lerp(s.k,k,e);
    applyView();
    if(t<1) viewAnim=requestAnimationFrame(step); else viewAnim=null;
  })(t0);
}

/* ====================================================================
   NODE RENDER
   ==================================================================== */
function addNode(type, x, y, params, label, id){
  const def=TYPES[type];
  const node={ id:id||nid("n"), type, x, y, h:120,
    params:Object.assign({}, def.params, params||{}),
    label:label||def.name, _out:{}, error:null };
  state.nodes.set(node.id, node);
  renderNode(node);
  return node;
}
function renderNode(node){
  const def=TYPES[node.type];
  const el=document.createElement("div");
  el.className="node"; el.dataset.id=node.id; el.tabIndex=-1;
  el.style.setProperty("--cat", def.cat);
  el.style.transform=`translate(${node.x}px,${node.y}px)`;
  el.setAttribute("role","group");
  el.setAttribute("aria-label",`${node.label} node`);

  const rows=Math.max(def.inputs.length, def.outputs.length);
  const portsH = rows>0 ? (PORT_GAP_TOP + rows*PORT_ROW_H) : 6;

  let portsHTML="";
  def.inputs.forEach((p,i)=>{
    portsHTML+=`<div class="port-row in" style="top:${PORT_GAP_TOP+i*PORT_ROW_H}px">
      <span class="port" data-port="${p.id}" data-side="in" data-ptype="${p.type}" style="--pc:${TYPECOL[p.type]}; top:${PORT_ROW_H/2-6}px" role="button" tabindex="-1" aria-label="${p.label} input, ${p.type}"></span>
      <span class="port-label">${p.label}</span></div>`;
  });
  def.outputs.forEach((p,i)=>{
    portsHTML+=`<div class="port-row out" style="top:${PORT_GAP_TOP+i*PORT_ROW_H}px">
      <span class="port" data-port="${p.id}" data-side="out" data-ptype="${p.type}" style="--pc:${TYPECOL[p.type]}; top:${PORT_ROW_H/2-6}px" role="button" tabindex="-1" aria-label="${p.label} output, ${p.type}"></span>
      <span class="port-label">${p.label}</span></div>`;
  });

  el.innerHTML=`
    <div class="node-head">
      <span class="node-ico">${ico(def.icon)}</span>
      <span class="node-title">${escapeHtml(node.label)}</span>
      <span class="node-badge" title="evaluation error">${ico('warn')}</span>
    </div>
    <div class="ports" style="height:${portsH}px">${portsHTML}</div>
    <div class="node-body">${nodeControls(node)}</div>`;
  world.appendChild(el);
  node.el=el;
  bindNodeEvents(node);
  measureNode(node);
  paintNodePreview(node);
}
function measureNode(node){ node.h=node.el.offsetHeight; }

function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* inline node controls (mirror inspector) */
function nodeControls(node){
  const def=TYPES[node.type], p=node.params;
  let h="";
  if(node.type==="oscillator"){
    h+=segWave(node);
    h+=miniSlider(node,"freq","Freq",1,8,1);
    h+=miniSlider(node,"amp","Amp",0,2,0.01);
  } else if(node.type==="value"){
    h+=miniSlider(node,"value","Value",p.min,p.max,p.step);
  } else if(node.type==="math"){
    h+=segOp(node);
    h+=miniSlider(node,"a","A",-5,5,0.1);
    h+=miniSlider(node,"b","B",-5,5,0.1);
  } else if(node.type==="gain"){
    h+=miniSlider(node,"gain","Gain",0,3,0.01);
  } else if(node.type==="blend"){
    h+=miniSlider(node,"mix","Mix",0,1,0.01);
  } else if(node.type==="shaper"){
    h+=miniSlider(node,"drive","Drive",0.1,6,0.05);
  } else if(node.type==="colorramp"){
    h+=`<div class="ctrl"><div class="ctrl-row"><label>Stops</label></div>
      <div class="swatches">
        <span class="swatch" style="background:${p.c0}"><input type="color" value="${p.c0}" data-cp="c0" aria-label="Stop 0"></span>
        <span class="ramp-prev" data-ramp style="background:linear-gradient(90deg,${p.c0},${p.c1})"></span>
        <span class="swatch" style="background:${p.c1}"><input type="color" value="${p.c1}" data-cp="c1" aria-label="Stop 1"></span>
      </div></div>`;
    h+=miniSlider(node,"t","Position",0,1,0.01);
  }
  // preview
  if(def.preview==="spark") h+=`<div class="scope-wrap"><canvas class="spark" data-prev></canvas></div>`;
  else if(def.preview==="scope") h+=`<div class="scope-wrap"><span class="scope-tag">OUT</span><canvas class="scope" data-prev></canvas><div class="scope-empty" data-empty hidden>${ico('scope',"style='width:22px;height:22px;opacity:.5'")}<span>no signal</span></div></div>`;
  else if(def.preview==="readout") h+=`<div class="node-readout" data-prev>—</div>`;
  return h;
}
function miniSlider(node,key,label,min,max,step){
  const v=node.params[key];
  const pct=((v-min)/(max-min)*100)||0;
  return `<div class="ctrl"><div class="ctrl-row"><label>${label}</label><span class="val" data-val="${key}">${fmt(v)}</span></div>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${v}" data-slider="${key}" style="--p:${pct}%" aria-label="${label}"></div>`;
}
function segWave(node){
  const cur=node.params.wave;
  const opts=[["sine","wSine"],["square","wSquare"],["saw","wSaw"],["tri","wTri"]];
  return `<div class="seg" data-seg="wave" role="group" aria-label="Waveform">`+
    opts.map(([v,i])=>`<button data-opt="${v}" aria-pressed="${cur===v}" aria-label="${v}" title="${v}">${wIco(i)}</button>`).join("")+`</div>`;
}
function segOp(node){
  const cur=node.params.op;
  const opts=[["add","+"],["sub","−"],["mul","×"],["div","÷"]];
  return `<div class="seg" data-seg="op" role="group" aria-label="Operation">`+
    opts.map(([v,s])=>`<button data-opt="${v}" aria-pressed="${cur===v}" aria-label="${v}">${s}</button>`).join("")+`</div>`;
}
const fmt=(v)=> (Math.abs(v)>=100||Number.isInteger(v))?String(Math.round(v*100)/100):v.toFixed(2);

/* update node DOM transform only (drag/pan-safe) */
function updateNodeTransform(node){ node.el.style.transform=`translate(${node.x}px,${node.y}px)`; }

/* ====================================================================
   EDGES
   ==================================================================== */
function bezier(x1,y1,x2,y2){
  const dx=Math.max(40,Math.abs(x2-x1)*0.5);
  return `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
}
function edgeEndpoints(e){
  const fi=portIndex(state.nodes.get(e.from[0]).type,"out",e.from[1]);
  const ti=portIndex(state.nodes.get(e.to[0]).type,"in",e.to[1]);
  const a=portPos(e.from[0],"out",fi), b=portPos(e.to[0],"in",ti);
  return [a.x,a.y,b.x,b.y];
}
function renderEdge(e){
  const g=svgEl("g",{class:"edge","data-id":e.id});
  const [x1,y1,x2,y2]=edgeEndpoints(e);
  const d=bezier(x1,y1,x2,y2);
  const halo=svgEl("path",{class:"edge-halo",d,stroke:TYPECOL[e.type]});
  const line=svgEl("path",{class:"edge-line"+(e.type==="signal"?" flow":""),d,stroke:TYPECOL[e.type],"marker-end":`url(#ar-${e.type})`});
  const hit=svgEl("path",{class:"hit",d});
  g.append(halo,line,hit);
  edgeWorld.appendChild(g);
  e.el={g,halo,line,hit};
  hit.addEventListener("pointerdown",(ev)=>{ ev.stopPropagation(); selectEdge(e.id, ev.shiftKey); });
  g.addEventListener("pointerenter",()=>g.classList.add("hov"));
  g.addEventListener("pointerleave",()=>g.classList.remove("hov"));
}
function updateEdge(e){
  const [x1,y1,x2,y2]=edgeEndpoints(e);
  const d=bezier(x1,y1,x2,y2);
  e.el.halo.setAttribute("d",d); e.el.line.setAttribute("d",d); e.el.hit.setAttribute("d",d);
}
function updateEdgesFor(nodeId){
  state.edges.forEach(e=>{ if(e.from[0]===nodeId||e.to[0]===nodeId) updateEdge(e); });
}
function refreshFlow(){
  const many = state.nodes.size>46;
  edgeWorld.classList.toggle("no-flow", many);
  document.querySelectorAll(".edge-line.flow").forEach(l=>{ l.style.animationPlayState=(many||reduceMotion)?"paused":"running"; });
}

/* ====================================================================
   CONNECT VALIDATION
   ==================================================================== */
function inputOccupied(nodeId,portId){ for(const e of state.edges.values()) if(e.to[0]===nodeId&&e.to[1]===portId) return e; return null; }
function portType(nodeId,side,portId){const def=TYPES[state.nodes.get(nodeId).type];const l=side==="out"?def.outputs:def.inputs;const p=l.find(p=>p.id===portId);return p&&p.type;}
function wouldCycle(srcNode,dstNode){
  // adding src->dst makes a cycle iff dst already reaches src (data direction)
  if(srcNode===dstNode) return true;
  const seen=new Set(); const stack=[dstNode];
  while(stack.length){ const cur=stack.pop(); if(cur===srcNode) return true; if(seen.has(cur))continue; seen.add(cur);
    state.edges.forEach(e=>{ if(e.from[0]===cur) stack.push(e.to[0]); }); }
  return false;
}
function canConnect(from,to){ // from:[nid,pid] out ; to:[nid,pid] in
  if(from[0]===to[0]) return {ok:false,why:"same node"};
  const ft=portType(from[0],"out",from[1]), tt=portType(to[0],"in",to[1]);
  if(ft!==tt) return {ok:false,why:`type mismatch · ${ft} → ${tt}`};
  if(wouldCycle(from[0],to[0])) return {ok:false,why:"would create a cycle"};
  return {ok:true};
}
function addEdge(from,to,silent){
  const occ=inputOccupied(to[0],to[1]); if(occ) removeEdge(occ.id);
  const type=portType(from[0],"out",from[1]);
  const e={id:nid("e"),from,to,type};
  state.edges.set(e.id,e);
  renderEdge(e);
  markPort(from[0],"out",from[1]); markPort(to[0],"in",to[1]);
  if(!silent){ pushHistory(); evaluate(); refreshFlow(); }
  return e;
}
function removeEdge(id){
  const e=state.edges.get(id); if(!e) return;
  e.el.g.remove(); state.edges.delete(id); state.selEdges.delete(id);
  markPort(e.from[0],"out",e.from[1]); markPort(e.to[0],"in",e.to[1]);
}
function markPort(nodeId,side,portId){
  const n=state.nodes.get(nodeId); if(!n||!n.el) return;
  const occupied = side==="out"
    ? [...state.edges.values()].some(e=>e.from[0]===nodeId&&e.from[1]===portId)
    : !!inputOccupied(nodeId,portId);
  const el=n.el.querySelector(`.port[data-port="${portId}"][data-side="${side}"]`);
  if(el) el.classList.toggle("connected",occupied);
}

/* ====================================================================
   EVALUATION (topological)
   ==================================================================== */
function topoOrder(){
  const indeg=new Map(), adj=new Map(); state.nodes.forEach((_,id)=>{indeg.set(id,0);adj.set(id,[]);});
  state.edges.forEach(e=>{ adj.get(e.from[0]).push(e.to[0]); indeg.set(e.to[0],indeg.get(e.to[0])+1); });
  const q=[]; indeg.forEach((d,id)=>{if(d===0)q.push(id);}); const order=[];
  while(q.length){ const id=q.shift(); order.push(id); adj.get(id).forEach(t=>{indeg.set(t,indeg.get(t)-1); if(indeg.get(t)===0)q.push(t);}); }
  // any left (shouldn't happen, cycles prevented) appended best-effort
  state.nodes.forEach((_,id)=>{ if(!order.includes(id)) order.push(id); });
  return order;
}
function resolveInputs(node){
  const def=TYPES[node.type], inp={};
  def.inputs.forEach(p=>{
    const e=inputOccupied(node.id,p.id);
    if(e){ const src=state.nodes.get(e.from[0]); inp[p.id]= src._out ? src._out[e.from[1]] : undefined; }
  });
  return inp;
}
let evalScheduled=false;
function evaluate(){ if(evalScheduled)return; evalScheduled=true; requestAnimationFrame(runEval); }
function runEval(){
  evalScheduled=false;
  let errCount=0;
  topoOrder().forEach(id=>{
    const node=state.nodes.get(id); if(!node) return;
    const def=TYPES[node.type];
    const inp=resolveInputs(node);
    let res; try{ res=def.compute(node.params,inp)||{}; }catch(err){ res={error:String(err.message||err)}; }
    node._out=res; node.error=res.error||null;
    node.el.classList.toggle("eval-err",!!node.error);
    if(node.error) errCount++;
    paintNodePreview(node);
  });
  updateStatus(errCount);
  if(state.sel.size===1) renderInspector();   // keep readouts fresh
}
function updateStatus(errCount){
  const st=$("#status"), t=$("#statusText"), n=state.nodes.size;
  st.classList.remove("is-empty","is-error");
  if(n===0){ st.classList.add("is-empty"); t.textContent="Empty graph"; }
  else if(errCount>0){ st.classList.add("is-error"); t.textContent=`${errCount} error${errCount>1?"s":""} · ${n} nodes`; }
  else { t.textContent=`Live · ${n} node${n>1?"s":""}`; }
  stage.classList.toggle("is-empty", n===0);
}

/* ====================================================================
   PREVIEW PAINTING (sparkline / scope / readout)
   ==================================================================== */
function paintNodePreview(node){
  const def=TYPES[node.type];
  if(def.preview==="readout"){
    const el=node.el.querySelector("[data-prev]"); if(!el)return;
    if(node.error){ el.classList.add("err"); el.textContent=node.error; }
    else { el.classList.remove("err"); const v=node._out.out; el.textContent=(v==null)?"—":fmt(v); }
    return;
  }
  if(def.preview==="ramp"){ return; }
  if(def.preview==="spark"){
    const cv=node.el.querySelector("[data-prev]"); if(!cv)return;
    drawWave(cv, node._out.out, TYPEHEX.signal, false);
    return;
  }
  if(def.preview==="scope"){
    const cv=node.el.querySelector("[data-prev]"); const empty=node.el.querySelector("[data-empty]");
    const sig=node._out._sig, tint=node._out._tint;
    if(empty) empty.hidden=!!sig;
    if(cv) cv.style.opacity=sig?"1":"0";
    drawWave(cv, sig, tint||TYPEHEX.signal, true, scopePhase);
  }
}
function drawWave(cv, sig, color, big, phase=0){
  if(!cv) return;
  const dpr=Math.min(2,devicePixelRatio||1);
  const w=cv.clientWidth||(NODE_W-22), h=cv.clientHeight||(big?88:36);
  if(cv.width!==Math.round(w*dpr)){cv.width=Math.round(w*dpr); cv.height=Math.round(h*dpr);}
  const ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,w,h);
  if(!sig){ return; }
  // midline + grid for scope
  if(big){
    ctx.strokeStyle="rgba(255,255,255,.06)"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2); ctx.stroke();
    ctx.strokeStyle="rgba(255,255,255,.04)";
    for(let gx=0; gx<w; gx+=Math.max(18,w/6)){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,h); ctx.stroke(); }
  }
  const pad=big?10:4, amp=(h/2-pad);
  const reps = big?2:1;                       // tile periods for an oscilloscope feel
  ctx.lineJoin="round"; ctx.lineCap="round";
  // glow underlay
  ctx.beginPath();
  for(let px=0; px<=w; px++){
    const u=(px/w)*reps + phase;             // 0..reps across width
    const idx=((u%1)+1)%1*SIGLEN;
    const i0=Math.floor(idx)%SIGLEN, i1=(i0+1)%SIGLEN, fr=idx-Math.floor(idx);
    const v=lerp(sig[i0],sig[i1],fr);
    const y=h/2 - clamp(v,-1.6,1.6)*amp/1.0;
    px===0?ctx.moveTo(px,y):ctx.lineTo(px,y);
  }
  if(big){ ctx.strokeStyle=color; ctx.globalAlpha=.22; ctx.lineWidth=5; ctx.stroke(); ctx.globalAlpha=1; }
  ctx.strokeStyle=color; ctx.lineWidth=big?2:1.6; ctx.stroke();
}

/* animated scope sweep */
let scopePhase=0, rafScope=null;
function loopScopes(){
  scopePhase=(scopePhase+0.006)%1;
  state.nodes.forEach(n=>{ if(n.type==="scope"&&n._out&&n._out._sig) paintNodePreview(n); });
  rafScope=requestAnimationFrame(loopScopes);
}
function startScopeLoop(){ if(reduceMotion||rafScope) return; rafScope=requestAnimationFrame(loopScopes); }

/* ====================================================================
   SELECTION
   ==================================================================== */
function clearSelection(){ state.sel.forEach(id=>state.nodes.get(id)?.el.classList.remove("sel")); state.sel.clear();
  state.selEdges.forEach(id=>state.edges.get(id)?.el.g.classList.remove("sel")); state.selEdges.clear(); }
function selectNode(id, add){
  if(!add){ clearSelection(); }
  state.selEdges.forEach(eid=>state.edges.get(eid)?.el.g.classList.remove("sel")); state.selEdges.clear();
  if(add && state.sel.has(id)){ state.sel.delete(id); state.nodes.get(id).el.classList.remove("sel"); }
  else { state.sel.add(id); state.nodes.get(id).el.classList.add("sel"); state.focusId=id; }
  renderInspector(); updateDeleteBtn();
}
function selectEdge(id, add){
  if(!add) clearSelection();
  state.selEdges.add(id); state.edges.get(id).el.g.classList.add("sel");
  renderInspector(); updateDeleteBtn();
}
function deleteSelection(){
  if(state.sel.size===0 && state.selEdges.size===0) return;
  pushHistory();
  state.selEdges.forEach(removeEdge);
  state.sel.forEach(id=>{
    [...state.edges.values()].forEach(e=>{ if(e.from[0]===id||e.to[0]===id) removeEdge(e.id); });
    state.nodes.get(id)?.el.remove(); state.nodes.delete(id);
  });
  const removed=state.sel.size;
  state.sel.clear(); state.selEdges.clear(); state.focusId=null;
  renderInspector(); updateDeleteBtn(); evaluate(); refreshFlow();
  toast(`Removed ${removed||1} ${removed>1?"items":"item"}`, "info");
}
function updateDeleteBtn(){ const has=state.sel.size||state.selEdges.size; const b=$("#inspDelete"); if(b) b.disabled=!has; }

/* ====================================================================
   NODE INTERACTION (drag, ports, focus)
   ==================================================================== */
function bindNodeEvents(node){
  const head=node.el.querySelector(".node-head");
  head.addEventListener("pointerdown",(e)=>startNodeDrag(e,node));
  node.el.addEventListener("pointerdown",(e)=>{
    if(e.target.closest(".port")||e.target.closest("input,button,.seg")) return;
    if(!e.target.closest(".node-head")){ // body click selects (controls excluded above)
      if(!state.sel.has(node.id)) selectNode(node.id, e.shiftKey);
    }
  });
  // ports
  node.el.querySelectorAll(".port").forEach(p=>{
    p.addEventListener("pointerdown",(e)=>startPortDrag(e,node,p));
    p.addEventListener("pointerenter",()=>{ hoverPort={node,port:p}; });
    p.addEventListener("pointerleave",()=>{ if(hoverPort&&hoverPort.port===p) hoverPort=null; });
    p.addEventListener("keydown",(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); kbPortActivate(node,p);} });
  });
  // inline controls
  bindControls(node);
}

let drag=null;
function startNodeDrag(e,node){
  if(e.button!==0) return;
  e.preventDefault();
  if(!state.sel.has(node.id)) selectNode(node.id, e.shiftKey);
  const ids=[...state.sel];
  const start=screenToWorld(e.clientX,e.clientY);
  drag={ids, last:start, moved:false, before:ids.map(id=>({id,x:state.nodes.get(id).x,y:state.nodes.get(id).y}))};
  ids.forEach(id=>state.nodes.get(id).el.classList.add("dragging"));
  window.addEventListener("pointermove",onNodeDrag);
  window.addEventListener("pointerup",endNodeDrag,{once:true});
}
function onNodeDrag(e){
  if(!drag)return;
  const w=screenToWorld(e.clientX,e.clientY);
  const dx=w.x-drag.last.x, dy=w.y-drag.last.y; drag.last=w;
  if(Math.abs(dx)+Math.abs(dy)>0) drag.moved=true;
  drag.ids.forEach(id=>{ const n=state.nodes.get(id); n.x+=dx; n.y+=dy; updateNodeTransform(n); updateEdgesFor(id); });
  drawMinimap();
}
function endNodeDrag(){
  if(!drag)return;
  drag.ids.forEach(id=>state.nodes.get(id).el.classList.remove("dragging"));
  if(drag.moved){ pushHistory(drag.before); }
  drag=null;
  window.removeEventListener("pointermove",onNodeDrag);
}

/* ---- port / edge creation drag ---- */
let conn=null, hoverPort=null;
function startPortDrag(e,node,portEl){
  if(e.button!==0)return;
  e.preventDefault(); e.stopPropagation();
  const side=portEl.dataset.side, pid=portEl.dataset.port;
  // dragging an occupied input re-wires the existing edge
  if(side==="in"){
    const occ=inputOccupied(node.id,pid);
    if(occ){ const from=occ.from; removeEdge(occ.id); evaluate(); beginConn(from[0],from[1],"out",e); return; }
    // start from an input: we still draw, treating it as the destination anchor
    beginConn(node.id,pid,"in",e); return;
  }
  beginConn(node.id,pid,"out",e);
}
function beginConn(nodeId,portId,side,e){
  const type=portType(nodeId,side,portId);
  conn={anchor:{nodeId,portId,side},type};
  stage.classList.add("connecting");
  // ghost
  conn.line=svgEl("path",{class:"ghost-line"}); conn.halo=svgEl("path",{class:"ghost-halo"});
  ghostWorld.append(conn.halo,conn.line);
  highlightCandidates(nodeId,portId,side,type);
  moveGhost(e.clientX,e.clientY);
  window.addEventListener("pointermove",onConnMove);
  window.addEventListener("pointerup",endConn,{once:true});
}
function highlightCandidates(nodeId,portId,side,type){
  const tgtSide = side==="out"?"in":"out";
  state.nodes.forEach(n=>{
    TYPES[n.type][tgtSide==="in"?"inputs":"outputs"].forEach((p)=>{
      const el=n.el.querySelector(`.port[data-port="${p.id}"][data-side="${tgtSide}"]`); if(!el)return;
      let ok = p.type===type && n.id!==nodeId;
      if(ok){ const from = side==="out"?[nodeId,portId]:[n.id,p.id]; const to = side==="out"?[n.id,p.id]:[nodeId,portId];
        ok = canConnect(from,to).ok; }
      el.classList.toggle("cand",ok); el.classList.toggle("dim",!ok);
    });
    // dim same-side ports too
    TYPES[n.type][side==="in"?"inputs":"outputs"].forEach((p)=>{
      const el=n.el.querySelector(`.port[data-port="${p.id}"][data-side="${side}"]`); if(el && !(n.id===nodeId&&p.id===portId)) el.classList.add("dim");
    });
  });
}
function clearCandidates(){ document.querySelectorAll(".port.cand,.port.dim").forEach(p=>p.classList.remove("cand","dim")); }
function moveGhost(cx,cy){
  const a=conn.anchor; const ai=portIndex(state.nodes.get(a.nodeId).type,a.side,a.portId);
  const pa=portPos(a.nodeId,a.side,ai); const w=screenToWorld(cx,cy);
  const d = a.side==="out"?bezier(pa.x,pa.y,w.x,w.y):bezier(w.x,w.y,pa.x,pa.y);
  conn.line.setAttribute("d",d); conn.halo.setAttribute("d",d);
}
function onConnMove(e){ if(conn) moveGhost(e.clientX,e.clientY); }
function endConn(e){
  window.removeEventListener("pointermove",onConnMove);
  stage.classList.remove("connecting"); clearCandidates();
  if(!conn){return;}
  conn.halo.remove(); conn.line.remove();
  const a=conn.anchor;
  // find drop target port
  let tgt=hoverPort && hoverPort.port;
  if(!tgt){ const el=document.elementFromPoint(e.clientX,e.clientY); tgt = el && el.closest && el.closest(".port"); }
  if(tgt){
    const tNode=state.nodes.get(tgt.closest(".node").dataset.id);
    const tSide=tgt.dataset.side, tPid=tgt.dataset.port;
    const from = a.side==="out"?[a.nodeId,a.portId]:[tNode.id,tPid];
    const to   = a.side==="out"?[tNode.id,tPid]:[a.nodeId,a.portId];
    if((a.side==="out"&&tSide==="in")||(a.side==="in"&&tSide==="out")){
      const v=canConnect(from,to);
      if(v.ok){ addEdge(from,to); toast("Connected","ok"); }
      else { toast("Can't connect — "+v.why,"err"); }
    } else { toast("Connect an output to an input","err"); }
  }
  conn=null;
}

/* keyboard port activate: click output then input */
function kbPortActivate(node,portEl){
  const side=portEl.dataset.side, pid=portEl.dataset.port;
  if(!connectKb){
    if(side!=="out"){ toast("Start from an output port","info"); return; }
    connectKb={nodeId:node.id,portId:pid}; portEl.classList.add("hot");
    toast("Now activate a compatible input port (Enter)","info");
  } else {
    if(side!=="in"){ toast("Finish on an input port","info"); return; }
    const from=[connectKb.nodeId,connectKb.portId], to=[node.id,pid];
    const v=canConnect(from,to);
    document.querySelector(`.node[data-id="${connectKb.nodeId}"] .port.hot`)?.classList.remove("hot");
    connectKb=null;
    if(v.ok){ addEdge(from,to); toast("Connected","ok"); } else toast("Can't connect — "+v.why,"err");
  }
}

/* ====================================================================
   INLINE CONTROLS BINDING
   ==================================================================== */
function bindControls(node){
  const el=node.el;
  el.querySelectorAll("[data-slider]").forEach(s=>{
    s.addEventListener("input",()=>{ setParam(node, s.dataset.slider, parseFloat(s.value)); });
    s.addEventListener("change",()=>pushHistory());
    s.addEventListener("pointerdown",e=>e.stopPropagation());
  });
  el.querySelectorAll("[data-seg]").forEach(seg=>{
    seg.addEventListener("pointerdown",e=>e.stopPropagation());
    seg.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
      setParam(node, seg.dataset.seg, b.dataset.opt); pushHistory();
      seg.querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed", x===b));
    }));
  });
  el.querySelectorAll("[data-cp]").forEach(c=>{
    c.addEventListener("pointerdown",e=>e.stopPropagation());
    c.addEventListener("input",()=>{ setParam(node,c.dataset.cp,c.value); });
    c.addEventListener("change",()=>pushHistory());
  });
}
function setParam(node,key,val){
  node.params[key]=val;
  // reflect inline UI
  const valEl=node.el.querySelector(`[data-val="${key}"]`); if(valEl) valEl.textContent=fmt(val);
  const sl=node.el.querySelector(`[data-slider="${key}"]`);
  if(sl){ const min=+sl.min,max=+sl.max; sl.style.setProperty("--p",((val-min)/(max-min)*100)+"%"); if(+sl.value!==val) sl.value=val; }
  if(key==="c0"||key==="c1"){
    const sw=node.el.querySelector(`[data-cp="${key}"]`)?.closest(".swatch"); if(sw) sw.style.background=val;
    const rp=node.el.querySelector("[data-ramp]"); if(rp) rp.style.background=`linear-gradient(90deg,${node.params.c0},${node.params.c1})`;
  }
  evaluate();
}

/* ====================================================================
   CANVAS / BACKGROUND INTERACTION (pan / marquee / zoom)
   ==================================================================== */
stage.addEventListener("pointerdown",(e)=>{
  if(e.target.closest(".node")||e.target.closest(".ov")||e.target.closest(".edge")||e.target.closest(".hit")) return;
  if(e.button===1 || (e.button===0 && shouldPan(e))) startPan(e);
  else if(e.button===0) startMarquee(e);
});
function shouldPan(e){ const pan=state.mode==="pan"; return e.shiftKey?!pan:pan; }
let pan=null;
function startPan(e){
  e.preventDefault(); stage.classList.add("is-panning");
  if(!e.shiftKey && state.mode==="pan"){} // cursor handled by css
  pan={sx:e.clientX,sy:e.clientY,vx:state.view.x,vy:state.view.y};
  window.addEventListener("pointermove",onPan);
  window.addEventListener("pointerup",endPan,{once:true});
}
function onPan(e){ if(!pan)return; state.view.x=pan.vx+(e.clientX-pan.sx); state.view.y=pan.vy+(e.clientY-pan.sy); applyView(); }
function endPan(){ pan=null; stage.classList.remove("is-panning"); window.removeEventListener("pointermove",onPan); }

let marq=null;
function startMarquee(e){
  e.preventDefault();
  if(!e.shiftKey) { clearSelection(); renderInspector(); updateDeleteBtn(); }
  const r=stageRect();
  marq={x0:e.clientX-r.left,y0:e.clientY-r.top,add:e.shiftKey,base:new Set(state.sel)};
  marqEl.style.display="block";
  window.addEventListener("pointermove",onMarquee);
  window.addEventListener("pointerup",endMarquee,{once:true});
}
function onMarquee(e){
  if(!marq)return; const r=stageRect();
  const x=e.clientX-r.left,y=e.clientY-r.top;
  const L=Math.min(x,marq.x0),T=Math.min(y,marq.y0),W=Math.abs(x-marq.x0),H=Math.abs(y-marq.y0);
  Object.assign(marqEl.style,{left:L+"px",top:T+"px",width:W+"px",height:H+"px"});
  // world rect
  const a=screenToWorld(r.left+L,r.top+T), b=screenToWorld(r.left+L+W,r.top+T+H);
  clearSelection();
  marq.base.forEach(id=>{ state.sel.add(id); state.nodes.get(id)?.el.classList.add("sel"); });
  state.nodes.forEach(n=>{
    const hit = n.x< b.x && n.x+NODE_W> a.x && n.y< b.y && n.y+(n.h||120)> a.y;
    if(hit){ state.sel.add(n.id); n.el.classList.add("sel"); }
  });
}
function endMarquee(){
  if(!marq)return; marqEl.style.display="none"; marq=null;
  window.removeEventListener("pointermove",onMarquee);
  renderInspector(); updateDeleteBtn();
}

stage.addEventListener("wheel",(e)=>{
  e.preventDefault();
  if(e.ctrlKey || !e.shiftKey){
    const factor=Math.exp(-e.deltaY*0.0016);
    zoomAt(e.clientX,e.clientY,factor);
  } else { // shift+wheel pans horizontally (and plain wheel handled above)
    state.view.x-=e.deltaY; applyView();
  }
},{passive:false});

/* ====================================================================
   MINIMAP
   ==================================================================== */
const mmSvg=$("#mmSvg"), MM_W=212, MM_H=142;
let mmDrag=null;
function drawMinimap(){
  const bb=nodesBBox();
  mmSvg.innerHTML="";
  if(!bb) return;
  const pad=60, bx0=bb.x0-pad,by0=bb.y0-pad,bw=bb.w+pad*2,bh=bb.h+pad*2;
  const s=Math.min(MM_W/bw, MM_H/bh);
  const ox=(MM_W-bw*s)/2 - bx0*s, oy=(MM_H-bh*s)/2 - by0*s;
  mmSvg._t={s,ox,oy};
  state.nodes.forEach(n=>{
    const r=svgEl("rect",{class:"mm-node",x:n.x*s+ox,y:n.y*s+oy,width:NODE_W*s,height:(n.h||120)*s,
      fill:TYPES[n.type].cat, opacity:state.sel.has(n.id)?1:.62, rx:1.5});
    mmSvg.appendChild(r);
  });
  // viewport rect (world region visible)
  const r=stageRect();
  const vx=(-state.view.x/state.view.k), vy=(-state.view.y/state.view.k);
  const vw=r.width/state.view.k, vh=r.height/state.view.k;
  mmSvg.appendChild(svgEl("rect",{class:"mm-view",x:vx*s+ox,y:vy*s+oy,width:vw*s,height:vh*s,rx:2}));
}
$("#minimap").addEventListener("pointerdown",(e)=>{
  const t=mmSvg._t; if(!t)return;
  const r=$("#minimap").getBoundingClientRect();
  jumpMM(e.clientX-r.left, e.clientY-r.top, t);
  mmDrag=t;
  window.addEventListener("pointermove",onMMDrag); window.addEventListener("pointerup",()=>{mmDrag=null; window.removeEventListener("pointermove",onMMDrag);},{once:true});
});
function onMMDrag(e){ if(!mmDrag)return; const r=$("#minimap").getBoundingClientRect(); jumpMM(e.clientX-r.left,e.clientY-r.top,mmDrag); }
function jumpMM(mx,my,t){
  // minimap point -> world point; center the viewport there
  const wx=(mx*(MM_W/ $("#minimap").clientWidth) - t.ox)/t.s;
  const wy=(my*(MM_H/ $("#minimap").clientHeight) - t.oy)/t.s;
  const rr=stageRect();
  state.view.x=rr.width/2 - wx*state.view.k;
  state.view.y=rr.height/2 - wy*state.view.k;
  applyView();
}

/* ====================================================================
   INSPECTOR
   ==================================================================== */
function renderInspector(){
  const head=$("#inspector").querySelector(".sheet-grip");
  if(state.sel.size===1 && state.selEdges.size===0){ inspMount.innerHTML=inspectorForNode(state.nodes.get([...state.sel][0])); bindInspector(); }
  else if(state.sel.size>1){ inspMount.innerHTML=inspectorMulti(); bindInspectorMulti(); }
  else if(state.selEdges.size>0){ inspMount.innerHTML=inspectorEdge(); bindInspectorEdge(); }
  else inspMount.innerHTML=inspectorEmpty();
}
function inspHead(catVar, iconKey, title, sub){
  return `<div class="insp-head" style="--cat:${catVar}">
    <span class="ih-ico">${ico(iconKey)}</span>
    <span class="ih-tt"><h2>${escapeHtml(title)}</h2><span class="ih-sub">${sub}</span></span>
  </div>`;
}
function inspectorForNode(node){
  const def=TYPES[node.type];
  let fields="";
  // label
  fields+=`<div class="field"><label for="ip-label">Label</label>
     <input id="ip-label" class="text-in" type="text" value="${escapeHtml(node.label)}" data-ilabel maxlength="32"></div>`;
  // params
  if(node.type==="oscillator"){
    fields+=segField("Waveform","wave",[["sine","Sine"],["square","Square"],["saw","Saw"],["tri","Tri"]],node.params.wave);
    fields+=sliderField("Frequency","freq",1,8,1,node.params.freq, inputConnected(node,"freq"));
    fields+=sliderField("Amplitude","amp",0,2,0.01,node.params.amp, inputConnected(node,"amp"));
  } else if(node.type==="value"){
    fields+=sliderField("Value","value",node.params.min,node.params.max,node.params.step,node.params.value);
    fields+=`<div class="insp-meta"><div class="field"><label for="ip-min">Min</label><input id="ip-min" class="text-in" type="number" value="${node.params.min}" data-iparam="min" step="0.1"></div>
      <div class="field"><label for="ip-max">Max</label><input id="ip-max" class="text-in" type="number" value="${node.params.max}" data-iparam="max" step="0.1"></div></div>`;
  } else if(node.type==="math"){
    fields+=segField("Operation","op",[["add","+"],["sub","−"],["mul","×"],["div","÷"]],node.params.op);
    fields+=sliderField("A","a",-5,5,0.1,node.params.a, inputConnected(node,"a"));
    fields+=sliderField("B","b",-5,5,0.1,node.params.b, inputConnected(node,"b"));
  } else if(node.type==="gain"){
    fields+=sliderField("Gain","gain",0,3,0.01,node.params.gain, inputConnected(node,"gain"));
  } else if(node.type==="blend"){
    fields+=sliderField("Mix","mix",0,1,0.01,node.params.mix, inputConnected(node,"mix"));
  } else if(node.type==="shaper"){
    fields+=sliderField("Drive","drive",0.1,6,0.05,node.params.drive, inputConnected(node,"drive"));
  } else if(node.type==="colorramp"){
    fields+=`<div class="field"><label>Gradient stops</label><div class="swatches">
      <span class="swatch" style="background:${node.params.c0}"><input type="color" value="${node.params.c0}" data-iparam="c0" aria-label="Start color"></span>
      <span class="ramp-prev" style="background:linear-gradient(90deg,${node.params.c0},${node.params.c1})"></span>
      <span class="swatch" style="background:${node.params.c1}"><input type="color" value="${node.params.c1}" data-iparam="c1" aria-label="End color"></span></div></div>`;
    fields+=sliderField("Position","t",0,1,0.01,node.params.t, inputConnected(node,"t"));
  }
  // error
  if(node.error) fields+=`<div class="err-note">${ico('warn')}<span><b>Evaluation error.</b> ${escapeHtml(node.error)}</span></div>`;
  // connections + meta
  const conns=connectionsFor(node);
