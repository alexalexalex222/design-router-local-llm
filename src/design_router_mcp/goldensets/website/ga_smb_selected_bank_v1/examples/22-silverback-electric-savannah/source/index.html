<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverback Electric | Engineered Power</title>
    <meta name="description"
        content="Savannah's powerhouse licensed electricians. High-voltage execution. Industrial precision.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Using Space Grotesk for the "Tech Startup" brutalist feel -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="site-wrapper">
        <header class="header">
            <div class="header-inner">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" stroke="#00F0FF" stroke-width="2"
                            stroke-linejoin="round" />
                    </svg>
                    <span>SILVERBACK</span>
                </div>
                <nav class="nav-links">
                    <a href="#services">Services</a>
                    <a href="#projects">Projects</a>
                    <a href="#about">About</a>
                    <a href="#contact">Contact</a>
                </nav>
            </div>
        </header>

        <section class="hero" id="home">
            <div class="hero-bg"></div>

            <!-- The glowing cyan laser line -->
            <div class="laser-split"></div>

            <div class="hero-content">
                <h1 class="hero-title">
                    ENGINEERED<br>POWER.
                </h1>

                <h2 class="hero-subtitle">Savannah Licensed & Insured Electricians.</h2>

                <div class="hero-action">
                    <a href="tel:9125550198" class="btn-primary">
                        <span class="btn-text">INITIALIZE SERVICE</span>
                        <div class="btn-glow"></div>
                    </a>
                </div>
            </div>

            <!-- Tech Details Overlay -->
            <div class="tech-overlay top-left">
                <span class="tech-label">SYS_STATUS:</span>
                <span class="tech-value">ONLINE</span>
            </div>
            <div class="tech-overlay bottom-right">
                <span class="tech-label">LAT: 32.0809° N</span>
                <span class="tech-label">LON: 81.0912° W</span>
            </div>
        </section>
    </div>
</body>

</html>
