  <style type="text/css" data-vite-dev-id="phosphor-instrument/styles/index.css">/* PHOSPHOR — stylesheet entry. Order matters: tokens first. */
/* ============================================================================
   PHOSPHOR — design tokens
   Warm near-black hardware. One signal accent (amber = audio), one modulation
   accent (teal = motion/LFO). Everything else is a tuned neutral ramp.
   Build only from these tokens.
   ========================================================================== */
:root {
  /* — Neutral ramp: warm near-black → warm white (8 steps) — */
  --bg-0: #07080b; /* page void */
  --bg-1: #0b0d12; /* stage / recessed */
  --surface-1: #13161d; /* panel face */
  --surface-2: #1a1e27; /* raised well / control bed */
  --surface-3: #232834; /* knob shoulder / key */
  --surface-4: #2d3340; /* knob cap / hover */

  --line: rgba(233, 238, 248, 0.07);
  --line-2: rgba(233, 238, 248, 0.12);
  --line-3: rgba(233, 238, 248, 0.2);

  --text-0: #f3f0ea; /* primary, warm white */
  --text-1: #c2c6cf; /* secondary */
  --text-2: #868c98; /* labels */
  --text-3: #565c68; /* faint / units */

  /* — Signal accent (audio): tungsten amber — */
  --signal: #ffb13b;
  --signal-soft: #f7a23a;
  --signal-dim: rgba(255, 177, 59, 0.16);
  --signal-line: rgba(255, 177, 59, 0.42);
  --hot: #fff1d4; /* white-hot peak */

  /* — Modulation accent (motion / LFO): phosphor teal — */
  --mod: #3fd9cb;
  --mod-soft: #36c2b6;
  --mod-dim: rgba(63, 217, 203, 0.14);
  --mod-line: rgba(63, 217, 203, 0.4);

  /* — Status — */
  --danger: #ff5b4d;
  --danger-dim: rgba(255, 91, 77, 0.16);
  --good: #6fe08a;

  /* — Type — */
  --font-ui: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
    "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo",
    "Roboto Mono", monospace;

  /* Fluid type scale, minor-third-ish, body locked ≥16px */
  --fs-micro: clamp(9.5px, 0.2vw + 9px, 10.5px); /* unit ticks */
  --fs-label: clamp(10.5px, 0.2vw + 10px, 11.5px); /* control labels */
  --fs-meta: clamp(12px, 0.2vw + 11.5px, 13px); /* readouts */
  --fs-body: clamp(16px, 0.3vw + 15px, 17px);
  --fs-h3: clamp(13px, 0.4vw + 12px, 15px);
  --fs-h2: clamp(18px, 0.6vw + 16px, 22px);
  --fs-display: clamp(28px, 4vw + 12px, 56px);

  --tracking-label: 0.14em;
  --tracking-wide: 0.26em;

  /* — Spacing (4px base) — */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;
  --sp-7: 48px;
  --sp-8: 64px;

  /* — Radii — */
  --r-1: 4px;
  --r-2: 8px;
  --r-3: 12px;
  --r-4: 18px;
  --r-pill: 999px;

  /* — Elevation (3 tiers) — */
  --elev-1: 0 1px 0 rgba(255, 255, 255, 0.03) inset,
    0 2px 8px rgba(0, 0, 0, 0.45);
  --elev-2: 0 1px 0 rgba(255, 255, 255, 0.04) inset,
    0 8px 26px rgba(0, 0, 0, 0.55);
  --elev-3: 0 1px 0 rgba(255, 255, 255, 0.05) inset,
    0 18px 48px rgba(0, 0, 0, 0.6);

  /* glow used sparingly for "live" elements */
  --glow-signal: 0 0 0.5px var(--signal), 0 0 14px rgba(255, 177, 59, 0.35);
  --glow-mod: 0 0 0.5px var(--mod), 0 0 14px rgba(63, 217, 203, 0.3);

  /* — Motion — */
  --dur-1: 120ms; /* interaction feedback */
  --dur-2: 200ms;
  --dur-3: 320ms;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --ease-snap: cubic-bezier(0.2, 0.9, 0.25, 1.2);

  --maxw: 1380px;
}
/* ============================================================================
   PHOSPHOR — base: reset, typography, power-on gate, footer
   ========================================================================== */
*,
*::before,
*::after {
  box-sizing: border-box;
}
* {
  margin: 0;
}
html {
  -webkit-text-size-adjust: 100%;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  font-family: var(--font-ui);
  font-size: var(--fs-body);
  line-height: 1.5;
  color: var(--text-1);
  background: var(--bg-0);
  min-height: 100dvh;
  overflow-x: hidden;
  /* subtle warm vignette + grain-free radial so the void isn't flat black */
  background:
    radial-gradient(120% 80% at 50% -10%, #11131a 0%, var(--bg-0) 60%),
    var(--bg-0);
}
button {
  font: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
kbd {
  font-family: var(--font-mono);
  font-size: 0.86em;
  padding: 1px 5px;
  border-radius: var(--r-1);
  border: 1px solid var(--line-2);
  background: var(--surface-2);
  color: var(--text-1);
}
:focus-visible {
  outline: 2px solid var(--signal);
  outline-offset: 2px;
  border-radius: var(--r-1);
}
.skip-link {
  position: fixed;
  left: var(--sp-3);
  top: -60px;
  z-index: 100;
  padding: var(--sp-2) var(--sp-4);
  background: var(--surface-2);
  color: var(--text-0);
  border: 1px solid var(--line-2);
  border-radius: var(--r-2);
  text-decoration: none;
  transition: top var(--dur-2) var(--ease-out);
}
.skip-link:focus {
  top: var(--sp-3);
}
::selection {
  background: var(--signal);
  color: #1a1205;
}
/* — custom scrollbars (thin, on-brand) — */
* {
  scrollbar-width: thin;
  scrollbar-color: var(--surface-4) transparent;
}
*::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
*::-webkit-scrollbar-thumb {
  background: var(--surface-4);
  border-radius: var(--r-pill);
  border: 3px solid transparent;
  background-clip: content-box;
}
/* ── Power-on gate ─────────────────────────────────────────────────────── */
.gate {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: grid;
  place-items: center;
  padding: var(--sp-5);
  background:
    radial-gradient(80% 60% at 50% 38%, rgba(255, 177, 59, 0.05), transparent 70%),
    radial-gradient(120% 90% at 50% 0%, #0f1117, var(--bg-0));
  transition: opacity var(--dur-3) var(--ease-out), visibility var(--dur-3);
}
.gate[hidden] {
  display: grid; /* keep layout while fading */
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.gate__inner {
  text-align: center;
  display: grid;
  justify-items: center;
  gap: var(--sp-4);
  max-width: 30rem;
}
.gate__mark {
  color: var(--text-3);
  opacity: 0.5;
}
.gate__title {
  font-size: var(--fs-display);
  font-weight: 600;
  letter-spacing: var(--tracking-wide);
  color: var(--text-0);
  padding-left: var(--tracking-wide);
}
.gate__sub {
  color: var(--text-2);
  font-size: var(--fs-meta);
  max-width: 28ch;
}
.gate__hint {
  color: var(--text-3);
  font-size: var(--fs-label);
  margin-top: var(--sp-2);
}
.gate__hint kbd {
  font-size: 0.78em;
}
.power {
  position: relative;
  margin-top: var(--sp-3);
  width: 132px;
  height: 132px;
  border-radius: var(--r-pill);
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 50% 38%, var(--surface-3), var(--surface-1) 72%);
  box-shadow: var(--elev-2);
  border: 1px solid var(--line-2);
  transition: transform var(--dur-1) var(--ease-out),
    box-shadow var(--dur-2) var(--ease-out);
}
.power__ring {
  position: absolute;
  inset: 14px;
  border-radius: var(--r-pill);
  border: 2px solid var(--line-3);
  /* the broken ring + bar = universal power glyph, drawn in CSS */
  -webkit-mask:
    radial-gradient(circle, transparent 0, transparent 0) ;
  transition: border-color var(--dur-2) var(--ease-out),
    box-shadow var(--dur-2) var(--ease-out);
}
.power__ring::before {
  content: "";
  position: absolute;
  top: -3px;
  left: 50%;
  width: 8px;
  height: 22px;
  transform: translateX(-50%);
  background: var(--bg-1);
}
.power__ring::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 6px;
  width: 2px;
  height: 18px;
  transform: translateX(-50%);
  background: var(--text-2);
  border-radius: var(--r-pill);
  transition: background var(--dur-2) var(--ease-out),
    box-shadow var(--dur-2) var(--ease-out);
}
.power__label {
  position: absolute;
  bottom: -30px;
  font-size: var(--fs-label);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-2);
}
.power:hover {
  transform: translateY(-1px);
  box-shadow: var(--elev-3);
}
.power:hover .power__ring {
  border-color: var(--signal-line);
}
.power:hover .power__ring::after {
  background: var(--signal);
  box-shadow: var(--glow-signal);
}
.power:active {
  transform: translateY(0) scale(0.98);
}
/* ── Footer ────────────────────────────────────────────────────────────── */
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-4);
  padding: var(--sp-3) var(--sp-2);
  color: var(--text-3);
  font-size: var(--fs-label);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
}
.footer__status {
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--text-2);
}
/* ── Reduced motion ────────────────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}
/* ============================================================================
   PHOSPHOR — layout shell
   topbar · stage(visualizer) · rack(controls) · motion(sequencer) · board(keys)
   ========================================================================== */
.app {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: clamp(var(--sp-3), 2vw, var(--sp-5));
  display: flex;
  flex-direction: column;
  gap: clamp(var(--sp-3), 1.4vw, var(--sp-4));
  min-height: 100dvh;
}
.app[hidden] {
  display: none;
}
/* ── Topbar ────────────────────────────────────────────────────────────── */
.topbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: var(--sp-4);
  padding: var(--sp-2) var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--line);
}
.brand {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  color: var(--text-0);
}
.brand__mark {
  display: block;
  flex: none;
}
.brand__word {
  font-size: var(--fs-h2);
  font-weight: 600;
  letter-spacing: 0.2em;
  color: var(--text-0);
  padding-left: 0.2em;
}
.brand__tag {
  font-size: var(--fs-label);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-3);
  margin-left: var(--sp-2);
}
@media (max-width: 680px) {
  .brand__tag {
    display: none;
  }
}
.topbar__transport {
  display: flex;
  justify-content: center;
}
.topbar__right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: var(--sp-4);
}
/* ── Stage / visualizer ────────────────────────────────────────────────── */
.stage {
  position: relative;
  border-radius: var(--r-4);
  background: linear-gradient(180deg, #0c0e14, #090a0e);
  border: 1px solid var(--line);
  box-shadow: var(--elev-2);
  overflow: hidden;
}
.visualizer {
  position: relative;
  width: 100%;
  height: clamp(190px, 26vh, 300px);
}
/* ── Rack / controls ───────────────────────────────────────────────────── */
.rack__grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: clamp(var(--sp-2), 1vw, var(--sp-3));
}
.rack__grid > * {
  grid-column: span var(--span, 4);
}
/* ── Motion / sequencer · Board / keyboard ─────────────────────────────── */
.motion,
.board {
  border-radius: var(--r-4);
  background: var(--surface-1);
  border: 1px solid var(--line);
  box-shadow: var(--elev-1);
}
.board {
  padding: var(--sp-3);
}
.footer {
  margin-top: auto;
}
/* ── Responsive recomposition (not just reflow) ────────────────────────── */
@media (max-width: 1120px) {
  .rack__grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .rack__grid > * {
    grid-column: auto;
  }
}
@media (max-width: 780px) {
  .topbar {
    grid-template-columns: 1fr;
    justify-items: stretch;
    gap: var(--sp-3);
  }
  .topbar__transport {
    justify-content: flex-start;
  }
  .topbar__right {
    justify-content: space-between;
  }
}
@media (max-width: 560px) {
  .rack__grid {
    grid-template-columns: 1fr;
  }
}
/* ============================================================================
   PHOSPHOR — components: panel · knob · wave/seg · transport · meter ·
   sequencer · keyboard
   ========================================================================== */
/* ── Panel (a synth module) ────────────────────────────────────────────── */
.panel {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-3) var(--sp-4);
  border-radius: var(--r-3);
  background: linear-gradient(180deg, var(--surface-1), #10131a);
  border: 1px solid var(--line);
  box-shadow: var(--elev-1);
}
.panel__head {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding-bottom: var(--sp-2);
  border-bottom: 1px solid var(--line);
}
.panel__led {
  width: 7px;
  height: 7px;
  border-radius: var(--r-pill);
  background: var(--accent, var(--signal));
  box-shadow: 0 0 8px 0 var(--accent, var(--signal));
  flex: none;
}
.panel__title {
  font-size: var(--fs-label);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-1);
  font-weight: 600;
}
.panel__sub {
  margin-left: auto;
  font-size: var(--fs-micro);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-3);
}
.panel__body {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2) var(--sp-3);
  align-items: flex-start;
}
.panel__group {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
  padding: var(--sp-2);
  border-radius: var(--r-2);
  background: rgba(0, 0, 0, 0.18);
  border: 1px solid var(--line);
}
.panel__group-label {
  font-size: var(--fs-micro);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-3);
  text-align: center;
}
.panel__row {
  display: flex;
  gap: var(--sp-3);
  flex-wrap: wrap;
}
/* ── Knob ──────────────────────────────────────────────────────────────── */
.knob {
  --knob-accent: var(--signal);
  --size: clamp(48px, 4.4vw, 60px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  width: calc(var(--size) + 14px);
  user-select: none;
  -webkit-user-select: none;
}
.knob__label {
  font-size: var(--fs-micro);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-2);
  white-space: nowrap;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}
.knob__dial {
  position: relative;
  width: var(--size);
  height: var(--size);
  cursor: ns-resize;
  touch-action: none;
  border-radius: var(--r-pill);
  transition: transform var(--dur-1) var(--ease-out);
}
.knob__dial:active {
  cursor: grabbing;
}
.knob svg {
  display: block;
  width: 100%;
  height: 100%;
  overflow: visible;
}
.knob__track {
  fill: none;
  stroke: var(--line-2);
  stroke-width: 6;
  stroke-linecap: round;
}
.knob__arc {
  fill: none;
  stroke: var(--knob-accent);
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dasharray var(--dur-1) linear;
  filter: drop-shadow(0 0 4px rgba(255, 177, 59, 0.45));
}
.knob.is-mod .knob__arc {
  filter: drop-shadow(0 0 4px rgba(63, 217, 203, 0.45));
}
.knob__cap {
  fill: url(#knobcap);
  stroke: var(--line-2);
  stroke-width: 1;
}
.knob__pointer {
  stroke: var(--text-0);
  stroke-width: 3;
  stroke-linecap: round;
  transition: transform var(--dur-1) var(--ease-out);
  transform-origin: 50px 50px;
}
.knob__dial:hover .knob__pointer,
.knob__dial:focus-visible .knob__pointer {
  stroke: var(--knob-accent);
}
.knob__dial:hover {
  transform: translateY(-1px);
}
.knob__value {
  font-family: var(--font-mono);
  font-size: var(--fs-meta);
  color: var(--text-0);
  letter-spacing: 0.01em;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.knob__unit {
  color: var(--text-3);
  font-size: 0.82em;
  margin-left: 2px;
}
/* ── Segmented / wave selector ─────────────────────────────────────────── */
.seg {
  display: inline-flex;
  padding: 3px;
  gap: 2px;
  border-radius: var(--r-2);
  background: rgba(0, 0, 0, 0.28);
  border: 1px solid var(--line);
}
.seg__btn {
  --seg-accent: var(--signal);
  display: grid;
  place-items: center;
  width: 30px;
  height: 26px;
  border-radius: var(--r-1);
  color: var(--text-2);
  transition: background var(--dur-1) var(--ease-out),
    color var(--dur-1) var(--ease-out), box-shadow var(--dur-1) var(--ease-out);
}
.seg__btn svg {
  width: 20px;
  height: 14px;
  display: block;
}
.seg__btn:hover {
  color: var(--text-0);
  background: var(--surface-2);
}
.seg__btn[aria-pressed="true"],
.seg__btn.is-active {
  color: #15110a;
  background: var(--seg-accent);
  box-shadow: 0 0 10px rgba(255, 177, 59, 0.35);
}
.seg.is-mod .seg__btn[aria-pressed="true"],
.seg.is-mod .seg__btn.is-active {
  color: #052422;
  background: var(--mod);
  box-shadow: 0 0 10px rgba(63, 217, 203, 0.35);
}
/* wider segmented for text options (LFO dest, scale) */
.seg--text .seg__btn {
  width: auto;
  padding: 0 var(--sp-2);
  font-size: var(--fs-micro);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
/* ── Toggle button (pill) ──────────────────────────────────────────────── */
.toggle {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-1) var(--sp-3);
  border-radius: var(--r-pill);
  border: 1px solid var(--line-2);
  background: var(--surface-2);
  color: var(--text-2);
  font-size: var(--fs-label);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  transition: all var(--dur-1) var(--ease-out);
}
.toggle__dot {
  width: 6px;
  height: 6px;
  border-radius: var(--r-pill);
  background: var(--text-3);
  transition: all var(--dur-1) var(--ease-out);
}
.toggle[aria-pressed="true"] {
  color: var(--text-0);
  border-color: var(--mod-line);
}
.toggle[aria-pressed="true"] .toggle__dot {
  background: var(--mod);
  box-shadow: var(--glow-mod);
}
.toggle:hover {
  border-color: var(--line-3);
  color: var(--text-1);
}
/* ── Transport ─────────────────────────────────────────────────────────── */
.transport {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--r-pill);
  background: var(--surface-1);
  border: 1px solid var(--line);
  box-shadow: var(--elev-1);
}
.play {
  position: relative;
  width: 42px;
  height: 42px;
  border-radius: var(--r-pill);
  display: grid;
  place-items: center;
  background: radial-gradient(circle at 50% 35%, var(--surface-4), var(--surface-2));
  border: 1px solid var(--line-2);
  color: var(--text-0);
  transition: transform var(--dur-1) var(--ease-out),
    box-shadow var(--dur-2) var(--ease-out);
}
.play:hover {
  transform: translateY(-1px);
}
.play:active {
  transform: scale(0.96);
}
.play.is-playing {
  color: var(--signal);
  box-shadow: 0 0 0 1px var(--signal-line), var(--glow-signal);
}
.play svg {
  width: 16px;
  height: 16px;
}
.tempo {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 78px;
  cursor: ns-resize;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
.tempo__value {
  font-family: var(--font-mono);
  font-size: var(--fs-h3);
  color: var(--text-0);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}
.tempo__label {
  font-size: var(--fs-micro);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-3);
}
.beat {
  display: flex;
  gap: 5px;
  align-items: center;
}
.beat__dot {
  width: 7px;
  height: 7px;
  border-radius: var(--r-pill);
  background: var(--surface-4);
  transition: background 80ms linear, box-shadow 80ms linear;
}
.beat__dot.is-on {
  background: var(--signal);
  box-shadow: var(--glow-signal);
}
/* ── Preset bar ────────────────────────────────────────────────────────── */
.preset {
  display: flex;
  align-items: center;
  gap: var(--sp-1);
  padding: 3px;
  border-radius: var(--r-2);
  background: var(--surface-1);
  border: 1px solid var(--line);
}
.preset__nav {
  width: 26px;
  height: 30px;
  display: grid;
  place-items: center;
  border-radius: var(--r-1);
  color: var(--text-2);
  transition: all var(--dur-1) var(--ease-out);
}
.preset__nav:hover {
  background: var(--surface-3);
  color: var(--text-0);
}
.preset__select {
  position: relative;
}
.preset__current {
  appearance: none;
  -webkit-appearance: none;
  font-family: var(--font-mono);
  font-size: var(--fs-meta);
  color: var(--text-0);
  background: transparent;
  border: none;
  padding: 0 var(--sp-4) 0 var(--sp-2);
  height: 30px;
  min-width: 116px;
  text-align: center;

  letter-spacing: 0.02em;
}
.preset__select::after {
  content: "";
  position: absolute;
  right: 6px;
  top: 50%;
  width: 6px;
  height: 6px;
  border-right: 1.5px solid var(--text-2);
  border-bottom: 1.5px solid var(--text-2);
  transform: translateY(-65%) rotate(45deg);
  pointer-events: none;
}
.preset__current option {
  background: var(--surface-2);
  color: var(--text-0);
}
/* ── Output meter ──────────────────────────────────────────────────────── */
.meter {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}
.meter__label {
  font-size: var(--fs-micro);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-3);
}
.meter__bars {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.meter__channel {
  position: relative;
  width: 88px;
  height: 6px;
  border-radius: var(--r-pill);
  background: rgba(0, 0, 0, 0.4);
  overflow: hidden;
  border: 1px solid var(--line);
}
.meter__fill {
  position: absolute;
  inset: 0;
  width: 0%;
  transform-origin: left;
  background: linear-gradient(
    90deg,
    var(--good) 0%,
    var(--good) 55%,
    var(--signal) 78%,
    var(--danger) 100%
  );
  /* gradient is full-width and revealed by width; keeps colors positional */
  background-size: 88px 100%;
  background-position: left;
  transition: width 60ms linear;
}
.meter__peak {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--hot);
  opacity: 0.85;
  transition: left 90ms linear;
}
/* ── Sequencer ─────────────────────────────────────────────────────────── */
.seq {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4) var(--sp-4);
}
.seq__head {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  flex-wrap: wrap;
}
.seq__title {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: var(--fs-label);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-1);
  font-weight: 600;
}
.seq__title .panel__led {
  --accent: var(--mod);
}
.seq__tools {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-left: auto;
  flex-wrap: wrap;
}
.seq__btn {
  padding: var(--sp-1) var(--sp-3);
  border-radius: var(--r-2);
  border: 1px solid var(--line-2);
  background: var(--surface-2);
  color: var(--text-2);
  font-size: var(--fs-label);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: all var(--dur-1) var(--ease-out);
}
.seq__btn:hover {
  color: var(--text-0);
  border-color: var(--line-3);
  background: var(--surface-3);
}
.seq__grid {
  display: grid;
  grid-template-columns: repeat(var(--steps, 16), minmax(0, 1fr));
  gap: clamp(3px, 0.5vw, 6px);
}
.cell {
  position: relative;
  height: clamp(64px, 9vw, 92px);
  border-radius: var(--r-2);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.25));
  border: 1px solid var(--line);
  cursor: ns-resize;
  touch-action: none;
  overflow: hidden;
  transition: border-color var(--dur-1) var(--ease-out);
}
.cell:nth-child(4n + 1) {
  border-left: 1px solid var(--line-2);
}
.cell__bar {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 30%;
  background: linear-gradient(180deg, var(--mod), var(--mod-soft));
  opacity: 0.18;
  transition: height var(--dur-1) var(--ease-out), opacity var(--dur-1) var(--ease-out);
}
.cell.is-active .cell__bar {
  opacity: 0.9;
  box-shadow: 0 0 12px rgba(63, 217, 203, 0.35);
}
.cell__note {
  position: absolute;
  top: 4px;
  left: 0;
  right: 0;
  text-align: center;
  font-family: var(--font-mono);
  font-size: var(--fs-micro);
  color: var(--text-3);
  pointer-events: none;
  transition: color var(--dur-1) var(--ease-out);
}
.cell.is-active .cell__note {
  color: var(--text-1);
}
.cell.is-playing {
  border-color: var(--signal-line);
}
.cell.is-playing::after {
  content: "";
  position: absolute;
  inset: 0;
  box-shadow: inset 0 0 0 2px var(--signal-line), inset 0 0 18px rgba(255, 177, 59, 0.25);
  border-radius: inherit;
  pointer-events: none;
}
.cell.is-playing.is-active .cell__bar {
  background: linear-gradient(180deg, var(--signal), var(--signal-soft));
  opacity: 1;
}
.cell__idx {
  position: absolute;
  bottom: 3px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 8px;
  color: var(--text-3);
  pointer-events: none;
}
/* ── Visualizer canvas ─────────────────────────────────────────────────── */
.viz-canvas {
  position: absolute;
  inset: 0;
  display: block;
}
.knob__dial.is-dragging {
  cursor: grabbing;
}
/* ── Keyboard ──────────────────────────────────────────────────────────── */
.keyboard {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
}
.keyboard__head {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  flex-wrap: wrap;
}
.keyboard__title {
  font-size: var(--fs-label);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-2);
  font-weight: 600;
}
.octave {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-left: auto;
}
.octave__btn {
  width: 28px;
  height: 28px;
  display: grid;
  place-items: center;
  border-radius: var(--r-1);
  border: 1px solid var(--line-2);
  background: var(--surface-2);
  color: var(--text-1);
  font-family: var(--font-mono);
  transition: all var(--dur-1) var(--ease-out);
}
.octave__btn:hover {
  background: var(--surface-3);
  color: var(--text-0);
}
.octave__val {
  font-family: var(--font-mono);
  font-size: var(--fs-meta);
  color: var(--text-1);
  min-width: 40px;
  text-align: center;
}
.keys {
  position: relative;
  display: flex;
  height: clamp(120px, 17vw, 168px);
  padding: 0;
  border-radius: var(--r-2);
  background: #0a0c10;
  border: 1px solid var(--line-2);
  box-shadow: inset 0 2px 12px rgba(0, 0, 0, 0.6);
  overflow: hidden;
  touch-action: none;
}
.key {
  position: relative;
  flex: 1 1 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: var(--sp-2);
  border-right: 1px solid #05060a;
  background: linear-gradient(180deg, #e9e6dd, #cdcabf 72%, #b6b3a8);
  color: #5a5750;
  transition: filter 70ms var(--ease-out), transform 70ms var(--ease-out);
  cursor: pointer;
}
.key:last-child {
  border-right: none;
}
.key__hint {
  font-family: var(--font-mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  opacity: 0.6;
  pointer-events: none;
}
.key.is-down {
  filter: brightness(0.86);
  background: linear-gradient(180deg, #ffe6b0, #ffcf7a 72%, #f7b347);
  box-shadow: inset 0 0 18px rgba(255, 150, 30, 0.5);
}
.key--black {
  position: absolute;
  top: 0;
  width: 5.2%;
  height: 62%;
  margin: 0;
  flex: none;
  border: 1px solid #000;
  border-radius: 0 0 var(--r-1) var(--r-1);
  background: linear-gradient(180deg, #2a2c31, #16181c 70%, #0c0d10);
  color: #b6b3a8;
  z-index: 2;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
  align-items: flex-end;
}
.key--black .key__hint {
  opacity: 0.5;
  font-size: 8px;
}
.key--black.is-down {
  background: linear-gradient(180deg, #6a4a15, #b9791f 70%, #f7b347);
  box-shadow: inset 0 0 14px rgba(255, 150, 30, 0.55);
}
